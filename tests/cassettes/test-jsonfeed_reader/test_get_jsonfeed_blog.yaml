        readers of this blog know that I often talk about bibliographic management
        tools (most recently here and here), and it was probably for this reason that
        I was invited to an interesting full-day workshop last week at the Royal Free
        Hospital Medical Library in London:\n<em>\n <em>\n  Bibliographic Management
        meets Web 2.0\n </em>\n</em>\n. The event was organized by science librarians
        Frank Norman, Nathalie Cornee and Betsy Anagnostelis, and was attended","title":"Bibliographic
        Management meets Web 2.0","updated_at":1660899491,"url":"https://blog.front-matter.de/posts/bibliographic-management-meets-web-2-0/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw31","guid":"https://doi.org/10.53731/r294649-6f79289-8cw31","id":"19a0e4ec-fbe5-4772-8f7b-3d2b622e6c52","published_at":1247443200,"summary":"This
        weekend I was at SciFoo, an invitation-only unconference by\n<em>\n O''Reilly
        Media\n</em>\n,\n<em>\n Nature\n</em>\nand\n<em>\n Google\n</em>\nthat took
        place at Google.","title":"The Value of Peer Review","updated_at":1659333256,"url":"https://blog.front-matter.de/posts/the-value-of-peer-review/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw35","guid":"https://doi.org/10.53731/r294649-6f79289-8cw35","id":"4b69ef44-0b26-4838-993c-f1b2b9957dd0","published_at":1249689600,"summary":"Problem  You
        want to distribute papers for a regular journal club in your department.Solution  Create
        a group for your journal club in FriendFeed. You can create a either a private
        group, where only group member can read and post messages, or a public group
        that is open to everyone. Then invite all regular participants of your journal
        club to\n<em>\n <em>\n  FriendFeed\n </em>\n</em>\nand make them join the
        group.","title":"Recipe: Distributing papers for a journal club","updated_at":1660403880,"url":"https://blog.front-matter.de/posts/recipe-distributing-papers-for-a-journal-club/"},{"doi":"https://doi.org/10.53731/a31c37h-hvvj84r","guid":"https://doi.org/10.53731/a31c37h-hvvj84r","id":"ff88db65-c958-479b-8b8c-22315fd9b5fd","published_at":1226620800,"summary":"Henry
        was the first Nature Network blogger to answer a few questions about science
        blogging that we discussed in the Nature Network Bloggers forum. Some more
        posts can be found here and here.1. What is your blog about? I am interested
        in how the internet is changing the way we publish and communicate science.
        I write from the perspective of someone that consumes and sometimes produces
        science.","title":"Some answers for Henry Gee","updated_at":1660495777,"url":"https://blog.front-matter.de/posts/some-answers-for-henry-gee/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbf","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbf","id":"91009bc5-c64f-438b-9ba4-8c7de2ea02d0","published_at":1243468800,"summary":"Google
        Wave is a new tool to communicate online and collaborate and was announced
        today at the Google I/O conference. Google Wave is not only a product, but
        also an open protocol that anyone can use to build his own wave server.","title":"Google
        Wave \u2013 don\u2019t forget the scientists","updated_at":1659166757,"url":"https://blog.front-matter.de/posts/google-wave-dont-forget-the-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3r","id":"69057515-1132-4072-bc2c-57d651b0cfd7","published_at":1243209600,"summary":"Most
        of us find, store and sometimes read scientific papers electronically. Although
        abstracts and full-text papers are usually available as web pages in HTML
        format, PDF is clearly the preferred format for storing and printing papers.
        But publishing scientific papers in electronic form obviously requires more
        than providing the content in HTML or PDF format.","title":"OAI-PMH: Interview
        with Tony Hammond","updated_at":1660404965,"url":"https://blog.front-matter.de/posts/oai-pmh-interview-with-tony-hammond/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3q","id":"fc446749-f94e-43d7-bb8e-a60e052f214d","published_at":1244332800,"summary":"I
        just returned from the American Society of Clinical Oncology (ASCO) meeting
        in Orlando, with approximately 30.000 participants one of the largest oncology
        conferences. Like other conferences of this size, the experience can be overwhelming,
        but thankfully the organizers are getting better every year in using technology
        that helps in finding the most interesting sessions.","title":"Why do we go
        to conferences?","updated_at":1659333108,"url":"https://blog.front-matter.de/posts/why-do-we-go-to-conferences/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3s","id":"0e0a5990-4a67-483d-b7c2-dcaf60d2338e","published_at":1242518400,"summary":"Reference
        managers are essential tools to read and write scholarly papers. In the last
        few years we have seen both a number of new reference managers (most of them
        web-based), but also a trend for the established reference managers to gain
        social networking features. More choice is great, but it also creates confusion
        about the right tool to use.","title":"What is the right reference manager
        for you?","updated_at":1660398562,"url":"https://blog.front-matter.de/posts/what-is-the-right-reference-manager-for-you/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbb","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbb","id":"d8c5a39c-2a52-48a5-815f-49803bedbbcb","published_at":1225584000,"summary":"Working
        in science is as much about reading papers as it is about writing papers.","title":"How
        do you read papers?","updated_at":1693602732,"url":"https://blog.front-matter.de/posts/how-do-you-read-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3v","id":"011d22c5-719d-473c-b096-8f825e26eed1","published_at":1240876800,"summary":"Richard
        Grant, who needs no introduction here on Nature Network, has just moved to
        London to start a new job as\n<em>\n <em>\n  information architect\n </em>\n</em>\nfor
        Faculty of 1000. I took this opportunity to ask Richard a few questions not
        only about Faculty of 1000, but also about his role in the company and future
        plans for the service that they have in mind.1. Can you describe what Faculty
        of 1000 is and does?","title":"Faculty of 1000: Interview with Richard Grant","updated_at":1660721636,"url":"https://blog.front-matter.de/posts/faculty-of-1000-interview-with-richard-grant/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1j","id":"d546d91f-58f2-4612-8a36-ecb146d069ca","published_at":1222404300,"summary":"This
        blog post is about presentations.","title":"New ways to look at your presentation","updated_at":1659332709,"url":"https://blog.front-matter.de/posts/new-ways-to-look-at-your-presentation/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw41","guid":"https://doi.org/10.53731/r294649-6f79289-8cw41","id":"ba603d91-7498-43c5-8e85-7d307f1d16ed","published_at":1237593600,"summary":"Citations
        of the relevant literature are an essential feature of scientific papers.
        Reference Manager software helps adding these citations and creating a bibliography.
        Are there differences in how reference managers work together with your word
        processor of choice?Support for your favorite word processor  Support for
        word processors other than Microsoft Word is spotty.","title":"Word processor
        support in citation managers: Is there a better way?","updated_at":1660721722,"url":"https://blog.front-matter.de/posts/word-processor-support-in-citation-managers-is-there-a-better-way/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1k","id":"ae3c1f5f-71d5-4b7e-9c74-b6edf1fc2467","published_at":1221852060,"summary":"The\n<strong>\n
        German Academic International Network (GAIN)\n</strong>\n<sup>\n <strong>\n  1\n
        </strong>\n</sup>\ninforms German researchers working in North America about
        research opportunities in Germany. The implied intention is to lure German
        researchers back to Germany.","title":"How to lure (German) researchers back
        to Germany","updated_at":1659332628,"url":"https://blog.front-matter.de/posts/how-to-lure-german-researchers-back-to-germany/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb2","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb2","id":"ede5b355-ba9a-49e0-9eed-f25e83ecd4c6","published_at":1218412800,"summary":"Like
        many other blogging platforms, Nature Network uses Textile to format blog
        entries. Textile is a markup language, and Andrew Sun has nicely put together
        the most important tags in this blog post. Unfortunately, Textile doesn''t
        much help with formatting that is specific to science blogging. Specifically,
        there is no standard way to link to journal articles.","title":"We need markup
        for science blogs","updated_at":1660398323,"url":"https://blog.front-matter.de/posts/we-need-markup-for-science-blogs/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw42","guid":"https://doi.org/10.53731/r294649-6f79289-8cw42","id":"01b0e58d-17e8-4ae1-9c40-f569f3633f54","published_at":1237075200,"summary":"<em>\n
        <em>\n  18 April 2009: I''ve updated the chart and added 2collab, the \u201cRead\u201d
        category, sharing of PDF files, and the Mendeley bookmarklet and full-text
        search.\n </em>\n</em>\n<em>\n <em>\n  15 July 2009: I''ve updated the chart
        to indicate that Mendeley and\n </em>\n L\n <em>\n  abmeeting have integrated
        PDF viewers and that 2collab can search Scopus.\n </em>\n</em>\n<em>\n <em>\n  20
        July 2009: I''ve added the offline version of RefWorks for Windows, EndNote
        OpenOffice plugin, and\n </em>\n</em>","title":"Reference Manager Overview","updated_at":1660721984,"url":"https://blog.front-matter.de/posts/reference-manager-overview/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw46","guid":"https://doi.org/10.53731/r294649-6f79289-8cw46","id":"8bc1ab3e-935f-4963-bcb2-7bc006230c40","published_at":1234569600,"summary":"Mutation
        and selection are important concepts in cancer biology. One well-known example
        is hereditary colon cancer. Patients with mutations in the DNA mismatch repair
        genes\n<em>\n MLH1\n</em>\nor\n<em>\n MSH2\n</em>\ndevelop colon cancer because
        of an increased rate of mutations. And tumors in patients with familial polyposis
        coli have a growth advantage because of a mutation in the tumor suppressor
        gene APC.","title":"Mutation, selection and metastasis","updated_at":1755412056,"url":"https://blog.front-matter.de/posts/mutation-selection-and-metastasis/"},{"doi":"https://doi.org/10.53731/fe3njcc-crnxhks","guid":"https://doi.org/10.53731/fe3njcc-crnxhks","id":"752f36df-b4da-42e4-8268-90ffb8b9a468","published_at":1233273600,"summary":"One
        interesting session at ScienceOnline09 was Social networking for scientists,
        moderated by Cameron Neylon and Deepak Singh. We now have so many of these
        social networking sites, that it becomes difficult to differentiate between
        them and to see how they can interact with each other. One important category
        is social bookmarking sites for scientists. I spoke with Kevin Emamy from
        CiteULike to find out more.\n<em>\n <em>\n  Most of the CiteULike team.\n
        </em>\n</em>","title":"CiteULike: Interview with Kevin Emamy","updated_at":1660491172,"url":"https://blog.front-matter.de/posts/interview-with-kevin-emamy/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwag","guid":"https://doi.org/10.53731/r294649-6f79289-8cwag","id":"2979beb7-55fe-45aa-b739-50adf725f763","published_at":1210377600,"summary":"The
        success or failure of Web 2.0 efforts for scientists depends to a large extend
        on the availability of cool applications that make the everyday life of a
        scientist easier. Many of these applications of course already exist, but
        I would argue that there is a lot of room for improvement.","title":"Web 2.0
        for Scientists: Where are the Applications?","updated_at":1660398024,"url":"https://blog.front-matter.de/posts/web-2-0-for-scientists-where-are-the-applications/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw49","guid":"https://doi.org/10.53731/r294649-6f79289-8cw49","id":"90875ccf-00a1-4a3e-bdec-3a3ae747ec97","published_at":1232064000,"summary":"This
        Sunday I will moderate a session called Providing public health and medical
        information to all at ScienceOnline09. I didn''t pick the title, but it is
        a topic I care a lot about. Because the session is intended as an open discussion,
        I thought that a blog post would be good way to organize my thoughts and ideas
        that I have for this session\n<sup>\n 1\n</sup>\n. And even though there are
        only two days left, I might even get some valuable feedback.","title":"ScienceOnline09:
        Providing public health and medical information to all","updated_at":1659332761,"url":"https://blog.front-matter.de/posts/scienceonline09-providing-public-health-and-medical-information-to-all/"},{"doi":"https://doi.org/10.53731/a4290ef-f1jdggn","guid":"https://doi.org/10.53731/a4290ef-f1jdggn","id":"88005d4a-7897-444d-92f3-e046deba1c5e","published_at":1230422400,"summary":"The
        end of the year is always a time to think about the past and the future. Even
        more so if you also have your birthday (FemaleScienceProfessor calls it Christmas
        Time Birthdays). Below are some of my plans for the next year. The general
        theme: more overlap of science blogging with my daytime job as physician treating
        cancer patients and doing cancer research.Meet fellow science bloggers  I''m
        looking forward to ScienceOnline''09 in January.","title":"My Personal Plans
        for 2009","updated_at":1660489339,"url":"https://blog.front-matter.de/posts/my-personal-plans-for-2009/"},{"doi":"https://doi.org/10.53731/8gj67xy-yz5r80q","guid":"https://doi.org/10.53731/8gj67xy-yz5r80q","id":"820ea1fc-2b23-44d4-a38b-feb8d6344a20","published_at":1228003200,"summary":"What
        started out as a few questions to science bloggers in the\n<em>\n <em>\n  Nature
        Network Bloggers Forum\n </em>\n</em>\n, has turned into a collection of more
        than 30 blog posts not limited to\n<em>\n <em>\n  Nature Network\n </em>\n</em>\n(big
        thanks to Bora and others for spreading the word). The following science bloggers
        answered a set of 10 questions about their blogging (roughly in chronological
        order):Henry GeeEva AmsenSteffi SuhrStephen CurryMaxine ClarkeMartin","title":"Why
        do we blog and other important questions, answered by 34 science bloggers","updated_at":1660489401,"url":"https://blog.front-matter.de/posts/why-do-we-blog-and-other-important-questions-answered-by-34-science-bloggers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb8","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb8","id":"d0436102-9f63-4eb5-8a28-d6ae68ce8651","published_at":1223164800,"summary":"The
        2008 Nobel Prizes will be announced next week, starting with the Nobel Prize
        in Physiology or Medicine on Monday. There will be a live webcast on Monday
        at 9:30 AM GMT for those interested\n<sup>\n 1\n</sup>\n. As every year just
        before the announcement, speculation about this year''s winners is in full
        swing. M. William Lensch, here on Nature Network correctly predicted last
        year''s winners\n<sup>\n 2\n</sup>\n, and this year he is trying it again\n<sup>\n
        3\n</sup>\n.","title":"Someone who should have won a Nobel Prize","updated_at":1660575462,"url":"https://blog.front-matter.de/posts/someone-who-should-have-won-a-nobel-prize/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb5","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb5","id":"1b0b5ca2-9ba2-470e-a42e-4f6242ab0530","published_at":1219968000,"summary":"Pictures
        missing","title":"London Science Tour in Pictures","updated_at":1660574977,"url":"https://blog.front-matter.de/posts/london-science-tour-in-pictures/"},{"doi":"https://doi.org/10.53731/fy8ppqw-wctn03p","guid":"https://doi.org/10.53731/fy8ppqw-wctn03p","id":"091811b4-ac71-4b8b-b3f1-6715c00c0aa7","published_at":1222992000,"summary":"Good
        software solves a problem. When one journal after another switched to PDF
        as electronic document format, and journals started to appear only in electronic
        form, storing papers as printouts in folders became impractical. But the PDF
        files will soon start to clutter the hard drive, despite efforts to organize
        them by topic, year or author. At least for Macintosh users, Papers is one
        practical and elegant solution to this problem.","title":"Papers: Interview
        with Alexander Griekspoor","updated_at":1660575430,"url":"https://blog.front-matter.de/posts/interview-with-alexander-griekspoor/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1m","id":"43e6f25b-0994-4b8b-89d9-5d7b17b26378","published_at":1221236160,"summary":"<em>\n
        <strong>\n  Conference 2.0\n </strong>\n \u2013 A scheduled meeting of people
        sharing a common interest that takes advantage of Web 2.0\n <sup>\n  <strong>\n   1\n  </strong>\n
        </sup>\n concepts.\n</em>\nScientific conferences are essential both for the
        exchange of ideas and for networking. But they don\u2019t have to be organized
        the same way as 10-20 years ago. Web 2.0 tools now allow much broader user
        participation before, during and after the conference.","title":"It''s time
        for Conference 2.0","updated_at":1659332569,"url":"https://blog.front-matter.de/posts/its-time-for-conference-2-0/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb0","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb0","id":"32bb3dc0-f1d2-45a6-ac20-046db62e366e","published_at":1217548800,"summary":"The\n<em>\n
        <em>\n  British Medical Journal\n </em>\n</em>\nthis week published Open access
        publishing, article downloads, and citations: randomised controlled trial
        by Phlip Davis et al. There are already several publications that looked at
        the full paper downloads and citations of open access papers compared to closed
        access papers.","title":"Article downloads and citations of open access papers","updated_at":1659252956,"url":"https://blog.front-matter.de/posts/article-downloads-and-citations-of-open-access-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaz","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaz","id":"ba02481e-6585-4e49-8e65-aa8ea6de9983","published_at":1217116800,"summary":"The
        German medical journal\n<em>\n <em>\n  Deutsches\n </em>\n \u00c4\n <em>\n  rzteblatt\n
        </em>\n</em>\ndid an analysis of the percentage of female first authors over
        the last 50 years. The number was 0-4% as recently as 25 years ago, but there
        has been a yearly increase to 18% last year (see this figure), both for submitted
        and accepted manuscripts.","title":"First authorship by women in a German
        medical journal","updated_at":1659252899,"url":"https://blog.front-matter.de/posts/first-authorship-by-women-in-a-german-medical-journal/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwat","guid":"https://doi.org/10.53731/r294649-6f79289-8cwat","id":"7ba28ea2-40bc-4fc3-aa19-85e27ab58907","published_at":1215907200,"summary":"The
        20th International Congress of Genetics started in Berlin yesterday. This
        is the first time that I attend a meeting as a science blogger. An interesting
        experience since you look at the talks from a different perspective and you
        have to try to cover topics that are of general interest but often not really
        your area of expertise.","title":"In which I became a conference blogger","updated_at":1659332129,"url":"https://blog.front-matter.de/posts/in-which-i-became-a-conference-blogger/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb1","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb1","id":"efb3c052-1a07-4ccf-a8f2-2b350c533cb7","published_at":1217635200,"summary":"In
        2005 registration of clinical trials in publicly available databases before
        the first patient was entered became mandatory for papers submitted to the
        most important medical journals. In September of last year, U.S. President
        Bush signed the Federal Drug Administration Amendment Act (FDAAA) into law.","title":"FDAAA:
        Push to open data in clinical medicine","updated_at":1659253025,"url":"https://blog.front-matter.de/posts/fdaaa-push-to-open-data-in-clinical-medicine/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cway","guid":"https://doi.org/10.53731/r294649-6f79289-8cway","id":"3c48b5ec-10cc-4cbb-9a4d-baad57c27848","published_at":1216857600,"summary":"The
        Science Blogging 2008: London conference will highlight the wide variety of
        science blogging that has evolved in recent years.","title":"Edublogging at
        Science Blogging 2008: London","updated_at":1661767923,"url":"https://blog.front-matter.de/posts/edublogging-at-science-blogging-2008-london/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaw","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaw","id":"69688683-14de-45a9-a691-c1037a8bf4c2","published_at":1216080000,"summary":"This
        Sunday morning at the International Congress of Genetics, Tony Griffiths gave
        an interesting presentation with the above title. He identified 12 possible
        reasons why students have problems learning genetics. His main argument: students
        should learn concepts and principles and apply them creatively in novel situations
        (the\n<em>\n <em>\n  research mode\n </em>\n</em>\n). Instead, too many details
        are often crammed into seminars and textbooks.","title":"Why is genetics so
        difficult for students to learn?","updated_at":1659332277,"url":"https://blog.front-matter.de/posts/why-is-genetics-so-difficult-for-students-to-learn/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa5","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa5","id":"dec80bd2-efbc-41aa-9d50-97c8ac14d35c","published_at":1206921600,"summary":"Anna''s
        recent post about her struggles with Pubmed searches reminded me that there
        is still a lot that could and should be done to improve the paper (or thesis)
        writing process.","title":"Pubmed and other Annoyances in the Paper Writing
        Process","updated_at":1659503526,"url":"https://blog.front-matter.de/posts/pubmed-and-other-annoyances-in-the-paper-writing-process/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwas","guid":"https://doi.org/10.53731/r294649-6f79289-8cwas","id":"f5c00351-68b0-43a4-b466-46c00f727c21","published_at":1215820800,"summary":"Last
        night we had the first in a series of Nature Network Berlin dinners scheduled
        around the International Congress of Genetics.","title":"Nobel blogging?","updated_at":1659332080,"url":"https://blog.front-matter.de/posts/nobel-blogging/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwad","guid":"https://doi.org/10.53731/r294649-6f79289-8cwad","id":"4ad858c4-7947-4fc4-87cd-87884f626dc4","published_at":1209427200,"summary":"Our
        recent discussion on public access made me have a closer look on the options
        I have for my own papers. The results aren''t pretty.Most journals allow posting
        post-prints on a university website  The copyright agreement with the journal
        is the easy part. Most publishers allow posting of post-prints (after peer-review,
        but not the journal PDF) in a non-commercial repository, usually the repository
        of your institution.","title":"Considering posting your paper in a repository?
        Think again","updated_at":1660397910,"url":"https://blog.front-matter.de/posts/considering-posting-your-paper-in-a-repository-think-again/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwam","guid":"https://doi.org/10.53731/r294649-6f79289-8cwam","id":"c7f04f2e-e511-4913-9c0a-3cd2c95325a1","published_at":1211587200,"summary":"Microsoft
        yesterday announced on the Live Search Blog that their Academic Search will
        be closed next week. And Google Scholar still has shortcomings, including
        the lack of special limitation features that are found in PubMed. A more detailed
        comparison of PubMed and Google Scholar can be found in this paper.","title":"Microsoft
        stops Live Search Academic","updated_at":1659166513,"url":"https://blog.front-matter.de/posts/microsoft-stops-live-search-academic/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwak","guid":"https://doi.org/10.53731/r294649-6f79289-8cwak","id":"5f3188c4-80fd-436d-8384-68c9216b8108","published_at":1211587200,"summary":"Earlier
        this week Matt Brown announced important changes to the Nature Network software:
        The first step towards new local hubs. Most importantly, it is now possible
        to set your location and hub. The hub can be the same as the location, or
        a city or region nearby (as in my case Berlin). Later this year, Nature Network
        will add new hubs to the existing London and Boston.","title":"Why local hubs
        in Nature Network are important","updated_at":1660398092,"url":"https://blog.front-matter.de/posts/why-local-hubs-in-nature-network-are-important/"},{"doi":"https://doi.org/10.53731/c99ks6c-c04z2dh","guid":"https://doi.org/10.53731/c99ks6c-c04z2dh","id":"fe7dbe7c-846c-459f-a700-e4c1ed31da61","published_at":1207008000,"summary":"Erythropoietin
        is an effective drug to increase your number of red blood cells. It is primarily
        used in anemic patients with cancer and on dialysis, but it is also popular
        with athletes that want to (illegally) increase their endurance performance,
        most notably cyclists and cross country skiers.","title":"What can Erythopoetin
        do for you?","updated_at":1660489726,"url":"https://blog.front-matter.de/posts/what-can-erythopoetin-do-for-you/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9v","id":"c2270484-5072-4556-b618-5eb23a3e94a2","published_at":1203638400,"summary":"There
        are many reasons to list all your publications online. Maybe you are looking
        for a new job or want to attract students to start their PhD in your lab.
        Usually you find this information on the home page of your laboratory or department,
        but several tools can automate this process.Nature Network  You can list your
        publications in your Nature Network profile. Simply add the DOI or Pubmed
        ID in the form provided.","title":"An easy online list of all your publications","updated_at":1659252565,"url":"https://blog.front-matter.de/posts/an-easy-online-list-of-all-your-publications/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9y","id":"877aed5d-4d6a-473b-8f4b-c0077a6dd5d8","published_at":1204761600,"summary":"Today
        is World Book Day, at least in the United Kingdom. So I wanted to join my
        fellow NN Bloggers in our newest\n<em>\n <em>\n  SynchroBlogging\n </em>\n</em>\neffort
        and wrote this post about science and books. I decided to write about the
        last book I bought \u2013 which was yesterday.","title":"Experimental Travel","updated_at":1660573939,"url":"https://blog.front-matter.de/posts/experimental-travel/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9z","id":"eb6f13b8-f5e5-4577-9bd5-0f3ba69b7d8e","published_at":1205193600,"summary":"You
        have finished all the experiments and are in the middle of writing that wonderful
        manuscript that will change not only the field you are working in but also
        your personal career. But then you encounter all these complicated issues
        related to paper writing, including duplicate publications, joint first authors,
        multi-authored papers and paper rejections.","title":"How to COPE with uniform
        requirements","updated_at":1659252609,"url":"https://blog.front-matter.de/posts/how-to-cope-with-uniform-requirements/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa3","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa3","id":"7fc81fe4-d05c-4045-a340-97dd9933e2b0","published_at":1205798400,"summary":"A
        March 13 Nature News article (Six degrees of messaging) talks about a study
        on Microsoft Messenger chat users. Any random two Microsoft Messenger users
        (out of about 240 million) could be connected two each other via an average
        of 6 users that have chatted with each other. This study is just another confirmation
        of the six degrees of separation concept.","title":"Six degrees of separation
        on Nature Network","updated_at":1659252669,"url":"https://blog.front-matter.de/posts/six-degrees-of-separation-on-nature-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw92","guid":"https://doi.org/10.53731/r294649-6f79289-8cw92","id":"773d4422-d4ea-4b4f-bc00-9c15871f2200","published_at":1192320000,"summary":"We
        just had a very interesting discussion in the Ask the Nature Editor Forum
        about scientific writing. Most people agreed that the quality of the writing
        in the end doesn''t really influence the decision to accept or reject a paper.
        But good writing, especially in the first paragraph, certainly helps. But
        what is good scientific writing? Two weeks ago I suggested a few good books
        on the subject in a blog post.","title":"Do you know the Flesch score of your
        papers?","updated_at":1659207307,"url":"https://blog.front-matter.de/posts/do-you-know-the-flesch-score-of-your-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9h","id":"808b56ec-a260-4e75-b798-1d6ade64e62e","published_at":1200182400,"summary":"M.
        Mitchell Waldrop has posted a draft version of an article called Science 2.0:
        Great New Tool, or Great Risk?. The article will appear in Scientific American
        (which, like the Nature Publishing Group, is owned by Macmillan). In this
        article he talks about the increasing use of Web 2.0 technologies in research.
        The largest part of the article is about Open Notebook Science and OpenWetWare
        in particular.","title":"Science 2.0: the Scientific American perspective","updated_at":1659209358,"url":"https://blog.front-matter.de/posts/science-2-0-the-scientific-american-perspective/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9n","id":"19137a42-80fd-4607-96d3-934f3b262902","published_at":1201046400,"summary":"Advice
        by your supervisor, books, workshops and\n<em>\n <em>\n  a lot\n </em>\n</em>\nof
        experience can improve the quality of your scientific writing. But when you
        are about to submit your paper and don''t want to take any chances \u2013
        especially when English is not your first language \u2013 a scientific writer
        can be helpful.","title":"Scientific writers can help publish good papers","updated_at":1659355021,"url":"https://blog.front-matter.de/posts/scientific-writers-can-help-publish-good-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9k","id":"72edf627-5eb0-4ec0-8195-c34f74ea6ca2","published_at":1200787200,"summary":"January
        is an important month for Macintosh users. MacWorld Expo takes place every
        year in San Francisco and we usually see a lot of new software and hardware.
        The MacBook Air is a wonderful new subnotebook perfect for successful scientists
        with many talks to give and enough money to spend. But Microsoft Office 2008
        for Mac is probably the most important new product from a scientists perspective.","title":"Microsoft
        Office 2008 for Mac released","updated_at":1659164662,"url":"https://blog.front-matter.de/posts/microsoft-office-2008-for-mac-released/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw99","guid":"https://doi.org/10.53731/r294649-6f79289-8cw99","id":"20a08da5-4b50-4c79-899a-7e33ce4ecfa0","published_at":1194739200,"summary":"Today
        I decided to rename my blog from\n<em>\n <em>\n  Publish or Perish 2.0\n </em>\n</em>\nto\n<em>\n
        <em>\n  Goobledygook\n </em>\n</em>\n. The old name explained the topics of
        this blog pretty well, so why the change after only 4 months of blogging on
        Nature Network? And there are already many blogs with the same name. I simply
        like the new name.","title":"A case for Goobledygook","updated_at":1659164412,"url":"https://blog.front-matter.de/posts/a-case-for-goobledygook/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw97","guid":"https://doi.org/10.53731/r294649-6f79289-8cw97","id":"f355cba6-21f0-4d05-ac90-608031360173","published_at":1194134400,"summary":"The
        STIX Project has finally released a first beta version of their fonts. STIX
        stands for Scientific and Technical Information Exchange and the fonts were
        designed specifically for publishing scientific or mathematical texts.","title":"STIX:
        Fonts for electronic and print publishing","updated_at":1659164302,"url":"https://blog.front-matter.de/posts/stix-fonts-for-electronic-and-print-publishing/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw95","guid":"https://doi.org/10.53731/r294649-6f79289-8cw95","id":"b118a840-9b61-4082-99ec-349399507ff3","published_at":1193184000,"summary":"The
        U.S. senate yesterday passed the FY2008 Labor, HHS, and Education Appropriations
        Bill. The bill includes provisions that make public access of all papers from
        NIH-funded research mandatory.","title":"U.S. Senate passed bill with NIH
        open access mandate","updated_at":1659164251,"url":"https://blog.front-matter.de/posts/u-s-senate-passed-bill-with-nih-open-access-mandate/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8s","id":"a6da6035-cff9-4079-8f89-1a0479eadfff","published_at":1191110400,"summary":"Last
        weekend I visited my brother-in-law in Cambridge (UK). In the Cambridge University
        Press bookstore I found the wonderful little book\n<em>\n <em>\n  How to Write
        and Illustrate a Scientific Paper\n </em>\n</em>\nby Bj\u00f6rn Gustavii (Cambridge
        University Press 2003). On less than 150 pages B. Gustavii gives a good summary
        of the typical problems and their solutions.","title":"Books about scientific
        writing","updated_at":1660573169,"url":"https://blog.front-matter.de/posts/books-about-scientific-writing/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw90","guid":"https://doi.org/10.53731/r294649-6f79289-8cw90","id":"05cf648f-6047-46c1-bb7a-77dca508bc95","published_at":1189296000,"summary":"Google
        Docs and Zoho Writer are web-based writing tools that have gained many of
        the features of traditional word processors such as Microsoft Word. Looking
        at Google Docs as an example (Zoho Writer shares many of the strenghts and
        weaknesses), I wanted to find out if they are mature enough to write a scientific
        paper.The Good  The major strength is collaboration.","title":"Could you write
        your next paper with Google Docs?","updated_at":1660391477,"url":"https://blog.front-matter.de/posts/could-you-write-your-next-paper-with-google-docs/"},{"doi":"https://doi.org/10.53731/9jsby1d-dsjt9xj","guid":"https://doi.org/10.53731/9jsby1d-dsjt9xj","id":"b220195f-41cf-4230-b61f-ec97f64a31b5","published_at":1187654400,"summary":"Thompson
        Scientific today announced the release of Endnote X1 for Macintosh. New features
        include Applescript support, group references and better support for Endnote
        Web. Endnote X1 for Windows was released in June. In addition to the features
        above, it supports Microsoft Word 2007 and Vista. Endnote is an essential
        bibliographic tool for scientific publishing.","title":"Endnote X1 for Macintosh
        released","updated_at":1660489869,"url":"https://blog.front-matter.de/posts/endnote-x1-for-macintosh-released/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8j","id":"42f87305-286b-4fa9-9c0b-3cab5b70db14","published_at":1188086400,"summary":"On
        August 23, the Partnership for Research Integrity in Science and Medicine
        or PRISM was announced. PRISM is a lobbying organisation created by the Professional
        &amp; Scholarly Publishing Division (PSP) of the Association of American Publishers
        (AAP). The main purpose of PRISM appears to lobby legislators in Washington
        to not sign legislation that would require public access to all scientific
        papers within 12 months after publication.","title":"PRISM \u2013 lobbying
        against open access","updated_at":1659126726,"url":"https://blog.front-matter.de/posts/prism-lobbying-against-open-access/"},{"doi":"https://doi.org/10.53731/frdn9-grw19","guid":"https://doi.org/10.53731/frdn9-grw19","id":"997c5241-b865-4708-9ba8-efa345ce4177","published_at":1710748824,"summary":"Last
        week the Rogue Scholar science blog archive reached another milestone with
        15,000 (15,332 as of today) science blog posts. These posts come from 86 participating
        blogs with 69% written in English and 28% in German.","title":"Rogue Scholar
        reaches another milestone with 15,000 science blog posts","updated_at":1737651049,"url":"https://blog.front-matter.de/posts/milestone-15000/"},{"doi":"https://doi.org/10.53731/xxm2e-9f976","guid":"https://doi.org/10.53731/xxm2e-9f976","id":"76a2b7af-b490-415a-ba96-ede75b7d22a1","published_at":1748866670,"summary":"This
        is the May issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive.","title":"Rogue Scholar Newsletter May 2025","updated_at":1748866670,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-may-2025/"},{"doi":"https://doi.org/10.53731/6cf2w-r3a86","guid":"https://doi.org/10.53731/6cf2w-r3a86","id":"1172271e-10f1-4ea5-b8b3-2933f8c5f501","published_at":1736169131,"summary":"The
        Rogue Scholar science blog archive depends on RSS feeds to automatically collect
        metadata and content. Atom, JSON Feed, and JSON APIs (e.g. for the WordPress,
        Ghost, or Substack platforms) are closely related to RSS. The Rogue Scholar
        API understands these different formats and regularly (currently every 10
        min) checks participating blogs for new or updated content and associated
        metadata.","title":"How to include DOIs in RSS feeds","updated_at":1736169577,"url":"https://blog.front-matter.de/posts/how-to-include-dois-in-rss-feeds/"},{"doi":"https://doi.org/10.53731/xxnmm-krz54","guid":"https://doi.org/10.53731/xxnmm-krz54","id":"1450e6e5-de93-466a-89fa-7ea46a70b7b9","published_at":1707152841,"summary":"Yesterday
        I released version 0.13 of the commonmeta-py library on PyPi. The major new
        feature is a command-line interface for all metadata conversions, and the
        metadata validation with the Commonmeta JSON Schema has finally been fixed.
        The command-line interface takes any supported persistent identifier or file
        as input, and returns the metadata in the desired format as output.","title":"New
        version of commonmeta-py library for scholarly metadata","updated_at":1737651217,"url":"https://blog.front-matter.io/posts/new-version-commonmeta-py/"},{"doi":"https://doi.org/10.53731/1dfxr-hs665","guid":"https://doi.org/10.53731/1dfxr-hs665","id":"ec6ee1cf-ec7c-4898-b80e-09956a450b07","published_at":1704713035,"summary":"The
        Rogue Scholar science blog archive starts 2024 with an important release:
        all blog posts (more than 13,000) are now available for download in Markdown,
        ePub, and PDF formats. This builds on work completed in December to store
        the full text of every Rogue Scholar blog post in Markdown format in the Rogue
        Scholar backend. Combined with the metadata in YAML format, these posts can
        now be downloaded via the Rogue Scholar API, e.g.","title":"Every Rogue Scholar
        blog post now available in Markdown, ePub, and PDF formats","updated_at":1737651593,"url":"https://blog.front-matter.de/posts/rogue-scholar-blog-posts-markdown-epub-and-pdf-formats/"},{"doi":"https://doi.org/10.53731/mh9a1-dw902","guid":"https://doi.org/10.53731/mh9a1-dw902","id":"2aa60a8a-ba89-4d77-867f-b5dbf44fa560","published_at":1695648187,"summary":"The
        Rogue Scholar science blog archive is open to science blogs that want to be
        enhanced by adding long-term archiving, DOI registration, and full-text search.
        The currently 56 participating blogs represent a broad spectrum of topics,
        people, and communities. Today I want to go into more detail into one particular
        Rogue Scholar use case: science blogs for grant-funded projects.","title":"Use
        cases for science blogs: grant-funded projects","updated_at":1737651949,"url":"https://blog.front-matter.de/posts/use-cases-for-science-blogs-grant-funded-projects/"},{"doi":"https://doi.org/10.53731/h4b6c-h1444","guid":"https://doi.org/10.53731/h4b6c-h1444","id":"e019018b-151f-4a69-aedb-d1a833c91caf","published_at":1681216300,"summary":"The
        Rogue Scholar science blog archive launched last week. Going forward the focus
        is on improving the service and adding more blogs. This includes giving blog
        authors feedback on how they can improve their RSS/Atom feeds \u2013 used
        by the Rogue Scholar to collect and archive the blog content.Feedback for
        science blog publishers  A good starting point is author information, which
        often can be improved.","title":"Feedback for science blog publishers","updated_at":1707335736,"url":"https://blog.front-matter.de/posts/feedback-for-blog-publishers/"},{"doi":"https://doi.org/10.53731/6r1dx-wdp04","guid":"https://doi.org/10.53731/6r1dx-wdp04","id":"3023e24a-817d-452e-bb6e-ddadecce94c6","published_at":1688994653,"summary":"Two
        weeks ago I added a first version of full-text search to the Rogue Scholar
        blog archive. This was a good start, as blogs typically only have the timeline,
        tags, and metadata like titles and authors to help readers find relevant content.","title":"Rogue
        Scholar full-text search improvements","updated_at":1737652807,"url":"https://blog.front-matter.de/posts/rogue-scholar-full-text-search-improvements/"},{"doi":"https://doi.org/10.53731/eyf75cj-jsgv26c","guid":"https://doi.org/10.53731/eyf75cj-jsgv26c","id":"44f8e268-1374-449f-bea8-286209e0a55e","published_at":1671632627,"summary":"Another
        follow-up post, extending three earlier posts (see references), on the Scholarly
        Blog Archive that Front Matter is building and that I plan to launch in the
        first half of 2023. I have been thinking about the building blocks that make
        this blog archive work:Diamond Open Access  Using this term sounds strange
        in the context of scholarly blog posts, but it means that scholarly blog infrastructure
        should be free to publish and free to read.","title":"Building Blocks for
        a Scholarly Blog Archive","updated_at":1707335873,"url":"https://blog.front-matter.de/posts/building-blocks/"},{"doi":"https://doi.org/10.53731/br4gac1-1k9ptea","guid":"https://doi.org/10.53731/br4gac1-1k9ptea","id":"ffaf6f8f-e897-4d40-8aa1-c36bdccc76cf","published_at":1676315948,"summary":"Talbot
        is a Python package I started working on at the end of 2022 and plan to release
        to the Python Package Index (PyPi) in March. Talbot converts scholarly metadata
        in various formats, including Crossref, DataCite, Schema.org, BibTeX, RIS,
        and formatted citations \u2013 the complete list of supported formats is here.
        Talbot is a Python version of the Bolognese Ruby gem that I worked on with
        my DataCite colleagues starting in 2018.","title":"Talking about Talbot","updated_at":1736463403,"url":"https://blog.front-matter.de/posts/talking-about-talbot/"},{"doi":"https://doi.org/10.53731/n7vvs-h6995","guid":"https://doi.org/10.53731/n7vvs-h6995","id":"4a1d1779-ce6c-4645-9653-5eb4fc9cd297","published_at":1680122814,"summary":"The
        Rogue Scholar blog archive today released its first catalog of science blogs,
        a total of nineteen science blogs that signed up for the Rogue Scholar via
        submission form and met the inclusion criteria: The blog is about science
        and in English or German (more languages will follow later, reach out to me
        if you can help).The full-text content is available via RSS feed and distributed
        using a Creative Commons Attribution license (CC-BY). The","title":"The Rogue
        Scholar releases its first catalog of science blogs","updated_at":1707335677,"url":"https://blog.front-matter.de/posts/rogue-scholar-releases-first-catalog/"},{"doi":"https://doi.org/10.53731/9z6rz5d-djbay0y","guid":"https://doi.org/10.53731/9z6rz5d-djbay0y","id":"930e533b-1a52-4479-b637-02e0c7a48aaf","published_at":1664381457,"summary":"In
        August 2021 I joined the InvenioRDM project to help develop and host a modern
        repository platform for scholarly content. Things didn''t exactly go as planned
        at the beginning of 2022, and I spent five months in the hospital with serious
        personal health issues. Since returning home in early June, my health has
        improved considerably, and in September I was able to slowly start working
        again.","title":"Starting Work on the Front Matter Archive","updated_at":1707335938,"url":"https://blog.front-matter.de/posts/starting-work-on-the-front-matter-archive/"},{"doi":"https://doi.org/10.53731/d6vdvbt-tffmezj","guid":"https://doi.org/10.53731/d6vdvbt-tffmezj","id":"30a7b019-85a8-43e9-8056-672df6e94269","published_at":1673888274,"summary":"As
        I discussed in a recent post, RSS is an essential building block for the upcoming
        Rogue Scholar Scholarly Blog Archive. RSS makes it easy to import blog posts
        (both metadata and content) automatically and is supported by all blogging
        platforms.","title":"RSS, Atom, JSON Feed","updated_at":1707334522,"url":"https://blog.front-matter.de/posts/rss-atom-jsonfeed/"},{"doi":"https://doi.org/10.53731/revzwnv-rpd913d-8drwz","guid":"https://doi.org/10.53731/revzwnv-rpd913d-8drwz","id":"37b1995a-7a87-47c4-80bf-a8697ff34cb0","published_at":1641809859,"summary":"The
        Front Matter blog is launching a new membership model today. In August 2021
        this blog started offering optional paid membership via the Buy Me a Coffee
        service. Unfortunately. two things happened: a) Paypal dropped supporting
        Buy Me a Coffee for membership payments at the end of last year, and b) there
        wasn''t really any uptake of this support model, even if only charging $3
        (or a cup of coffee) per month.","title":"A new membership model for the Front
        Matter blog","updated_at":1737655388,"url":"https://blog.front-matter.de/posts/a-new-membership-model/"},{"doi":"https://doi.org/10.53731/rc2nchn-tzg61kj-7ztfa","guid":"https://doi.org/10.53731/rc2nchn-tzg61kj-7ztfa","id":"89f1a126-0b42-44ea-b09e-fe55c6d0672d","published_at":1635958397,"summary":"Readability
        is obviously important for any kind of scholarly communication, from writing
        papers to blog posts. I have written about scientific writing before (e.g.
        Scientific writers can help publish good papers, Books about Science Writing,
        Do you know the Flesch score of your papers?), and writing scholarly content
        that is understandable is something that can be taught and learned.","title":"On
        Readability","updated_at":1660589901,"url":"https://blog.front-matter.de/posts/on-readability/"},{"doi":"https://doi.org/10.53731/pk03d-24338","guid":"68c273500f96ce00011b7d9c","id":"2c559446-c16a-44a3-8866-b835c05adfbb","published_at":1757579406,"summary":"This
        week, the Rogue Scholar science blog archive started registering DOIs and
        metadata with Crossref using the InvenioRDM repository platform rather than
        relying on external tooling. InvenioRDM has of course supported DOI registration
        with DataCite for a long time, so this adds another option for repositories
        hosting reports, preprints, dissertations, or other textual documents.","title":"Rogue
        Scholar now registers DOIs with InvenioRDM","updated_at":1757579406,"url":"https://blog.front-matter.de/posts/rogue-scholar-registers-dois-with-inveniordm/"},{"doi":"https://doi.org/10.53731/918y1-v4d08","guid":"https://doi.org/10.53731/918y1-v4d08","id":"38a8650b-f7b9-4cce-a0f8-8715f3f629f1","published_at":1707152841,"summary":"Yesterday
        I released version 0.13 of the commonmeta-py library on PyPi. The major new
        feature is a command-line interface for all metadata conversions, and the
        metadata validation with the Commonmeta JSON Schema has finally been fixed.
        The command-line interface takes any supported persistent identifier or file
        as input, and returns the metadata in the desired format as output.","title":"New
        version of commonmeta-py library for scholarly metadata","updated_at":1707152841,"url":"https://blog.front-matter.io/posts/new-version-commonmeta-py"},{"doi":"https://doi.org/10.53731/r87krmh-97aq74v-ag5x0","guid":"https://doi.org/10.53731/r87krmh-97aq74v-ag5x0","id":"b6d41d6a-7556-43a2-9da0-d988bae23e12","published_at":1627899752,"summary":"Front
        Matter describes the content preceding the main text of a book or journal.
        In science, several research journals, including\n<em>\n PLOS Biology\n</em>\n,\n<em>\n
        Nature,\n</em>\nand\n<em>\n Science\n</em>\n, have Front Matter sections,
        used for news, opinions, and other content that are not research articles.","title":"Front
        Matter officially launches today","updated_at":1690197379,"url":"https://blog.front-matter.de/posts/front-matter-officially-launches-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2x","id":"acd37fdb-83e7-4972-8a9b-9e9397bd358f","published_at":1326931200,"summary":"The
        Sloan Foundation has awarded a $125,000 grant to Columbia University and Mendeley
        to fund the development of a Citation-Style Language (CSL) editor. CSL is
        a XML-based language to format citations and bibliographies, and is used by
        the reference managers Zotero, Mendeley and Papers, and in many other places.","title":"Sloan
        Foundation funds Columbia and Mendeley to develop a Citation-Style Language
        Editor","updated_at":1736461857,"url":"https://blog.front-matter.de/posts/sloan-foundation-funds-columbia-and-mendeley-to-develop-a-citation-style-language-editor/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6s","id":"16838fc4-94c6-44c2-8621-b6e657f331a1","published_at":1304899200,"summary":"Ten
        days ago I mentioned a paper by Zhiyong Lu that gives an overview over the
        available web tools to search the biomedical literature. Most of these tools
        enhance the PubMed service, and Zhiyong Lu in fact works for the NCBI, the
        developer of PubMed. In this post I want to take a more detailed look at the
        available tools. A good starting point is the companion webpage to the paper,
        listing 28 services.","title":"Web Tools for Searching the Biomedical Literature
        \u2013 part II","updated_at":1660740429,"url":"https://blog.front-matter.de/posts/web-tools-for-searching-the-biomedical-literature-part-ii/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7h","id":"a47f0f42-db90-41b4-95e2-a3908c191874","published_at":1293062400,"summary":"Last
        week the first public beta (version 0.5) of Paperpile was released (available
        for Mac and Linux). Paperpile is a desktop reference manager with typical
        features: search in PubMed, Google Scholar or ArXiv, import PDF files, support
        for BibTex and other standard file formates, etc. Paperpile currently doesn\u2019t
        sync with a web-based version, and Paperpile doesn\u2019t insert citations
        into manuscripts.","title":"Paperpile: an open source reference manager for
        Mac and Linux","updated_at":1660742071,"url":"https://blog.front-matter.de/posts/paperpile-an-open-source-reference-manager-for-mac-and-linux/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6y","id":"0029523d-ba45-49c7-8927-b3ab70cb0fd9","published_at":1300752000,"summary":"Version
        2.1 of the reference manager Zotero was released last Friday. The biggest
        change for me is the support of Citation Style Language (CSL) 1.0. CSL is
        an open XML-based standard for citations and bibliographies. Older versions
        of Zotero used CSL 0.8.1, but the improved CSL 1.0 was released a year ago.","title":"Zotero
        2.1 released with support for CSL 1.0","updated_at":1689249772,"url":"https://blog.front-matter.de/posts/zotero-2-1-released-with-support-for-csl-1-0/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw56","guid":"https://doi.org/10.53731/r294649-6f79289-8cw56","id":"38c2f0f3-c412-4800-9854-a86e8b4389c4","published_at":1280102400,"summary":"The
        last few days we have seen a number of blog posts reflecting on the pros and
        cons of science blogging networks. Bora Zivkovic last week announced his departure
        from scienceblogs.com, and in his must-read post reflected on the history
        of science blogging (A Farewell to Scienceblogs: the Changing Science Blogging
        Ecosystem). Richard Grant on Saturday wrote down his thoughts On Nature Network.","title":"Yet
        another look at blogging networks","updated_at":1660809792,"url":"https://blog.front-matter.de/posts/yet-another-look-at-blogging-networks/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3n","id":"7269761a-eef9-4b30-8a17-aa237549063f","published_at":1245542400,"summary":"Problem  You
        want to regularly go through the papers published in the most important journals
        in your research field.Solution  Subscribe to the journal table of contents
        (TOC) RSS feed. Almost all journals now provide their TOC as RSS feed that
        is updated with every new issue. RSS is a standard web format used to publish
        frequently updated works.","title":"Recipe: Receiving Journal Table of Contents
        Automatically","updated_at":1755412491,"url":"https://blog.front-matter.de/posts/recipe-receiving-journal-table-of-contents-automatically/"},{"doi":"https://doi.org/10.53731/9swze-jr923","guid":"https://doi.org/10.53731/9swze-jr923","id":"2cf3edbb-a2c1-400b-975b-6dcaea742072","published_at":1772700997,"summary":"This
        is the February 2026 issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.Blogs added to Rogue Scholar  No
        blog was added in February.","title":"Rogue Scholar Newsletter February 2026","updated_at":1772700997,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-february-2026/"},{"doi":"https://doi.org/10.53731/tb8z7-7ft90","guid":"https://doi.org/10.53731/tb8z7-7ft90","id":"f9352ae9-0c23-4e44-adb2-0deb546dccdb","published_at":1768470895,"summary":"The
        Rogue Scholar science blog archive consolidated authentication into a single
        Identity and Access Management (IAM) service, powered by a self-hosted\u00a0Keycloak\u00a0instance,
        at the end of last year. This week, this service started supporting passwordless
        authentication via magic links. The Rogue Scholar login form has not changed:
        you register an account via ORCID (and validate your email address), and you
        sign in via ORCID or email.","title":"Rogue Scholar now supports passwordless
        authentication with magic links","updated_at":1768470895,"url":"https://blog.front-matter.de/posts/rogue-scholar-now-supports-passwordless-authentication-with-magic-links/"},{"doi":"https://doi.org/10.53731/aa1rk-1xf54","guid":"https://doi.org/10.53731/aa1rk-1xf54","id":"63dd41f7-2624-479e-811f-9606830781b5","published_at":1764953967,"summary":"This
        is the November issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.Blogs added to Rogue Scholar  Two
        blogs were added in November. Welcome!","title":"Rogue Scholar Newsletter
        November 2025","updated_at":1764953967,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-november-2025/"},{"doi":"https://doi.org/10.53731/nxp08-a9947","guid":"https://doi.org/10.53731/nxp08-a9947","id":"500d2ec8-f74e-4e3f-b0e1-c3c821ec5b0b","published_at":1759164151,"summary":"The
        science blog archive Rogue Scholar this week started supporting versioning
        of blog posts. This is a core feature of the InvenioRDM repository platform
        used by Rogue Scholar, but Rogue Scholar uses DOIs from Crossref rather than
        DataCite, the default DOI registration agency for InvenioRDM. Crossref versioning
        was made possible with the Crossref schema 5.4.0 released in March.","title":"Rogue
        Scholar starts supporting versioning","updated_at":1759164151,"url":"https://blog.front-matter.de/posts/rogue-scholar-starts-supporting-versioning/"},{"doi":"https://doi.org/10.53731/yjq4w-5yr32","guid":"https://doi.org/10.53731/yjq4w-5yr32","id":"02bb3558-161c-40d7-bd7a-e719ed5086e6","published_at":1755507615,"summary":"The
        Rogue Scholar science blog archive has supported ORCID and DOI identifiers
        for linking to authors and blog posts since its launch. Starting this week,
        these two identifiers can also be used to navigate within the Rogue Scholar
        archive.ORCID  One third (32.71%) of science blog posts in Rogue Scholar are
        linked to the ORCID of at least one of their authors.","title":"Rogue Scholar
        links records via ORCID and DOI","updated_at":1755507615,"url":"https://blog.front-matter.de/posts/rogue-scholar-links-records-via-orcid-and-doi/"},{"doi":"https://doi.org/10.53731/xm5m2-3j810","guid":"https://doi.org/10.53731/xm5m2-3j810","id":"8bf66524-d8b6-4e26-baec-8a4f42507f49","published_at":1763560623,"summary":"Yesterday
        I renamed the Front Matter blog to blog.front-matter.de, i.e. changing the
        top-level domain from .io to .de.  I did this for two reasons:The internet
        country code top-level domain .io has a complicated history, and I wanted
        to migrate away from it for some time.The Domain registrar and name servers
        for front-matter.de are now located in Germany instead of the United States
        (front-matter.io name servers are with digitalocean.com, and","title":"Renaming
        the Front Matter Blog","updated_at":1763560623,"url":"https://blog.front-matter.de/posts/renaming-the-front-matter-blog/"},{"doi":"https://doi.org/10.53731/r5fw0-tdd11","guid":"https://doi.org/10.53731/r5fw0-tdd11","id":"8db5b55a-1a36-46f0-869c-10d2139f6685","published_at":1746531757,"summary":"Personal
        names remain among the hardest scholarly metadata to capture properly, including
        for science blog posts.","title":"Personal names in science blogs","updated_at":1746532822,"url":"https://blog.front-matter.de/posts/personal-names-in-science-blogs/"},{"doi":"https://doi.org/10.53731/f6tvb-se107","guid":"https://doi.org/10.53731/f6tvb-se107","id":"f3a7b5f0-ea20-41da-bace-85b9668ebf7a","published_at":1744643919,"summary":"Today,
        the Rogue Scholar science blog archive launched an important new feature:
        showing the full-text content (in addition to metadata) of all participating
        blogs on blog post pages. Rogue Scholar has always stored the full-text internally
        and made it available via the REST API, as the full-text is needed for archiving
        and full-text search.","title":"Rogue Scholar adds full-text content to all
        blog post web pages","updated_at":1744702028,"url":"https://blog.front-matter.de/posts/rogue-scholar-adds-full-text-content/"},{"doi":"https://doi.org/10.53731/5q274-3e235","guid":"https://doi.org/10.53731/5q274-3e235","id":"df3a2121-a503-490f-ae76-f33314c98823","published_at":1767123070,"summary":"Starting
        this week, the Rogue Scholar science blog archive has consolidated authentication
        into a single Identity and Access Management (IAM) service, powered by a self-hosted
        Keycloak instance at https://auth.front-matter.de. The goal of this consolidation
        into a single service was to make it easier to enforce three basic rules:Authenticated
        users must have an ORCID identifier,Authenticated users must have a validated
        email address,Rogue","title":"Consolidating Rogue Scholar Authentication","updated_at":1767173181,"url":"https://blog.front-matter.de/posts/consolidating-rogue-scholar-authentication/"},{"doi":"https://doi.org/10.53731/zh0af-01d30","guid":"https://doi.org/10.53731/zh0af-01d30","id":"7d4161c0-cb75-45a8-8434-7c92ddff72d4","published_at":1751473006,"summary":"This
        is the June issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.Blogs added to Rogue Scholar  Two
        blogs were added in June. Welcome everybody!","title":"Rogue Scholar Newsletter
        June 2025","updated_at":1752778355,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-june-2026/"},{"doi":"https://doi.org/10.53731/qpfy8-66j66","guid":"https://doi.org/10.53731/qpfy8-66j66","id":"a5353218-b766-40e8-a102-6b4198338fd6","published_at":1740739065,"summary":"This
        is the second issue of the new monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users. The big news this month is
        Rogue Scholar reaching another major milestone: 25,000 archived science blog
