        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.Blogs added to Rogue Scholar  One
        blog was added in January. Welcome!","title":"Rogue Scholar Newsletter January
        2026","updated_at":1770821978,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-january-2026/"},{"doi":"https://doi.org/10.53731/f0g5b-68326","guid":"https://doi.org/10.53731/f0g5b-68326","id":"f5b2d271-9e55-4ac6-b898-889cf1b0f434","published_at":1745260791,"summary":"The
        commonmeta Go library has seen a major update this week that dramatically
        simplifies working with the Research Organization Registry (ROR) data dump,
        including conversion to other serialization formats (e.g. JSON Lines) and
        metadata formats (InvenioRDM), and integrated affiliation matching.File Download  ROR
        metadata are updated regularly (typically about once a month) and made available
        as a file download via the Zenodo repository under a","title":"Working with
        the Research Organization Registry (ROR) Data Dump","updated_at":1745482803,"url":"https://blog.front-matter.de/posts/working-with-ror-data-dump/"},{"doi":"https://doi.org/10.53731/8gwcz-gv749","guid":"https://doi.org/10.53731/8gwcz-gv749","id":"2fb18782-3f89-4ea4-98a2-4d1e8ce5d644","published_at":1764161658,"summary":"The
        Rogue Scholar science blog archive started work on improving the subject classification
        of blog posts, using an open approach to subject classification developed
        by CWTS and OpenAlex. Based on my previous work on the importance of subject
        classification for scholarly works at DataCite, Rogue Scholar launched OECD
        Fields of Science subject area support for every blog post in February of
        this year.","title":"Rogue Scholar is improving subject classification","updated_at":1764202472,"url":"https://blog.front-matter.de/posts/rogue-scholar-improving-subject-classificatiion/"},{"doi":"https://doi.org/10.53731/dzznx-zkn71","guid":"https://doi.org/10.53731/dzznx-zkn71","id":"6386e214-634b-415f-9373-85aae54d7e17","published_at":1769077375,"summary":"Like
        most digital infrastructure nowadays, Rogue Scholar and the underlying digital
        repository platform InvenioRDM are built and deployed using Docker containers.
        There are many ways to orchestrate (manage) Docker containers; two common
        options are Docker Compose for local development and Kubernetes for production
        infrastructure.","title":"Rogue Scholar migrated to Coolify Cloud","updated_at":1769077375,"url":"https://blog.front-matter.de/posts/rogue-scholar-migrated-coolify-cloud/"},{"doi":"https://doi.org/10.53731/1cy73-6m923","guid":"https://doi.org/10.53731/1cy73-6m923","id":"f409e933-5e56-4891-bbd7-8d000d9b5b0c","published_at":1771253877,"summary":"About
        85% of the almost 50,000 Rogue Scholar blog posts are written in English,
        while German, Spanish and French are the most popular languages other than
        English \u2013 for example more than 5,000 German-language blog posts have
        been archived.","title":"Rogue Scholar speaks more languages","updated_at":1771253877,"url":"https://blog.front-matter.de/posts/rogue-scholar-speaks-more-languages/"},{"doi":"https://doi.org/10.53731/ymbv8-7jm78","guid":"https://doi.org/10.53731/ymbv8-7jm78","id":"758c4cd6-4d28-4f06-96a4-ef75d5228f25","published_at":1744048171,"summary":"The
        InvenioRDM project partners met in Hamburg two weeks ago, and we discussed
        a wide range of topics over five days. InvenioRDM is the open source repository
        platform that also powers the Rogue Scholar science blog archive, and one
        priority for me is to keep the repository platform''s maintenance simple while
        adding the features I need.","title":"Where I simplified ROR affiliation metadata
        handling","updated_at":1744234344,"url":"https://blog.front-matter.de/posts/simplified-ror-affiliation-metadata-handling/"},{"doi":"https://doi.org/10.53731/m65a8-6sm21","guid":"https://doi.org/10.53731/m65a8-6sm21","id":"ef91b547-c16a-4ed0-8b01-bf23c2692ade","published_at":1760963207,"summary":"With
        this blog post, the science blog archive Rogue Scholar starts the formal process
        to adhere to the Principles of Open Scholarly Infrastructure (POSI). To do
        so, an organization has to perform a self-audit of its compliance with the
        principles, with a focus on\n<em>\n principles\n</em>\nand not hard\n<em>\n
        rules\n</em>\n. POSI was updated to version 2.0 this October, with the changes
        marked up in a separate document.","title":"Rogue Scholar follows the Principles
        of Open  Scholarly Infrastructure (POSI)","updated_at":1760963207,"url":"https://blog.front-matter.de/posts/rogue-scholar-follows-posi/"},{"doi":"https://doi.org/10.53731/m7gng-jmm19","guid":"https://doi.org/10.53731/m7gng-jmm19","id":"7798debf-42f6-4dca-afcf-a7cdd80cf0ff","published_at":1751039471,"summary":"InvenioRDM
        is the open source turn-key research data management platform, with detailed
        documentation available here. InvenioRDM Starter facilitates deployment and
        configuration of InvenioRDM, allowing you to run InvenioRDM on your local
        computer within 15 min. This is achieved by providing a) a prebuilt Invenio-App-RDM
        Docker image, and b) a Docker Compose configuration file with sensible defaults.","title":"Kamal
        deploys InvenioRDM Starter to production","updated_at":1751054599,"url":"https://blog.front-matter.de/posts/kamal-deploys-inveniordm-starter-to-production/"},{"doi":"https://doi.org/10.53731/rftfk-qv692","guid":"https://doi.org/10.53731/rftfk-qv692","id":"3e1eb034-fcd7-4869-a197-fc2e535feef8","published_at":1762169712,"summary":"The
        science blog archive Rogue Scholar started the process of becoming a German
        non-profit organization in 2026. This blog post summarizes the reasoning and
        the main steps needed to achieve this.","title":"Rogue Scholar is becoming
        a German Non-Profit Organization","updated_at":1762173014,"url":"https://blog.front-matter.de/posts/rogue-scholar-german-non-profit-organization/"},{"doi":"https://doi.org/10.53731/326tr-95k32","guid":"https://doi.org/10.53731/326tr-95k32","id":"110737aa-546a-4512-b713-e16383bf6028","published_at":1756123028,"summary":"References  are
        an important element of scholarly metadata, and that is also true for science
        blog posts. Currently 5.06% of all Rogue Scholar posts include at least one
        reference, which are then registered with Crossref metadata. Citations are
        the counterpart of references. When other scholarly works are cited in the
        references of a scholarly work, this citation information can be communicated
        to the cited work.","title":"Adding references to Wordpress posts: updated
