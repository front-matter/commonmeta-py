        is a great way to report from a scientific conference. This could be done
        either with regular blog posts written in the evening or after the conference,
        and/or live-blogging using tools such as Friendfeed or Twitter.","title":"Conference
        Blogging: Interview with Alex Knoll","updated_at":1660721456,"url":"https://blog.front-matter.de/posts/conference-blogging-interview-with-alex-knoll/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbk","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbk","id":"d3ab0cba-7fd2-482e-87f7-beac1cf735e1","published_at":1253318400,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nThis time I had to decide between
        two parallel sessions for the first time at this meeting. Plant genetics or
        Development? Coming from plant molecular genetics myself, there perhaps was
        a ready-made decision, but I decided otherwise.","title":"German Genetics
