        review is central to how we evaluate science and therefore how journal papers,
        grants, and jobs are awarded. Peer review is done in many different ways,
        and has dramatically changed in the last 25 years. But the purpose of peer
        review is still to improve the quality of research by providing feedback and
        to evaluate the quality of research. The evaluation serves as a filter both
        for limited resources (e.g. grants or jobs;","title":"Editorial Peer Reviewers\u2019
        Recommendations at a General Medical Journal: Are They Reliable and Do Editors
        Care?","updated_at":1688579787,"url":"https://blog.front-matter.de/posts/editorial-peer-reviewers-recommendations-at-a-general-medical-journal-are-they-reliable-and-do-editors-care/"},{"doi":"https://doi.org/10.53731/rceh7pn-tzg61kj-7zv63","guid":"https://doi.org/10.53731/rceh7pn-tzg61kj-7zv63","id":"a05a6635-3316-40c7-9a43-3d331032b9af","published_at":1636973522,"summary":"In
        October Jen Gibson started as the new Executive Director for the Dryad Data
        Repository. I used the opportunity to ask Jen a few questions about Dryad,
        challenges with data sharing, and ideas about moving Dryad forward. I was
        particularly interested in the interview as I served on the Dryad Board of
        Directors from 2013 to 2016.","title":"Dryad: Interview with Jen Gibson","updated_at":1660589787,"url":"https://blog.front-matter.de/posts/dryad-interview-jen-gibson/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4z","id":"430de8ac-312f-4542-8655-242fe7071382","published_at":1270425600,"summary":"Last
        Wednesday I attended the Health Care Social Media Camp in Berlin. Healthcare
        Social Media in Europe \u2013\n<em>\n <em>\n  #hcsmeu\n </em>\n</em>\nfor
        short \u2013 is a community of healthcare twitterers and social media users
        from Europe, started in August 2009 by Silja Chouquet and Andrew Spong.","title":"Lst
        wk I had g8t fun @ #hcsmeucamp","updated_at":1659334630,"url":"https://blog.front-matter.de/posts/lst-wk-i-had-g8t-fun-hcsmeucamp/"},{"doi":"https://doi.org/10.53731/r79zath-97aq74v-ag5j8","guid":"https://doi.org/10.53731/r79zath-97aq74v-ag5j8","id":"b5a4524b-c2b7-44b6-8b04-a17268ef10e3","published_at":1463702400,"summary":"CSV
        in many ways is for data what Markdown is for text documents: a very simple
        format that is both human- and machine-readable, and that \u2013 despite a
        number of shortcomings - is widely used. Given the popularity of Markdown
        for writing blog posts, using CSV to publish blog posts with tabular data
        should be an obvious thing to do, and we have just published our first blog
        post using CSV data.","title":"Publishing tabular data as blog post","updated_at":1744753043,"url":"https://blog.front-matter.de/posts/publishing-tabular-data-as-blog-post/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4r","id":"cc927a48-8202-4d33-b8f6-6d79d3679fbc","published_at":1269216000,"summary":"Last
        Tuesday the\n<em>\n Archives of Internal Medicine\n</em>\nreleased a study
        that analyzed the news reporting about cancer in 8 large-readership newspapers
        and 5 national magazines in the United States. The authors identified 2228
        cancer-focused articles published between 2005-2007 and did a more detailed
        analysis on a random sample of 436 (20%) articles.","title":"Cancer and the
        media","updated_at":1736457737,"url":"https://blog.front-matter.de/posts/cancer-and-the-media/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4t","id":"f6615c01-e956-4b94-ba97-2bf616a1dad7","published_at":1268006400,"summary":"Last
        Monday I was listening to a very interesting presentation by Ian Rowlands,
        reader in scholarly communication in the Department of Information Studies
        at University College London.","title":"How do researchers use online journals?","updated_at":1710582996,"url":"https://blog.front-matter.de/posts/how-do-researchers-use-online-journals/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4j","id":"d30e7a2f-31ed-4145-8c50-530e2a318459","published_at":1266796800,"summary":"Last
        week Lambert Heller and myself did a two-day workshop\n<em>\n Reference Management
        in Times of Web 2.0\n</em>\nfor a group of German librarians. We introduced
        and tested the following five programs:RefWorksZoteroCiteULikeMendeleyEndnote
        The goal of the workshop was to introduce the participants to the Web 2.0
        aspects of these reference managers. We briefly talked about Papers and Citavi,
        but neither of them offers any Web 2.0 functionality.","title":"There is still
        so much to learn in reference management","updated_at":1755335391,"url":"https://blog.front-matter.de/posts/there-is-still-so-much-to-learn-in-reference-management/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0p","id":"7cbee243-b7bb-4922-a122-ed0c0c7e6085","published_at":1386259560,"summary":"Opening
        Science: The Evolving Guide on How the Internet is Changing Research, Collaboration
        and Scholarly Publishing is a SpringerOpen book (using a Creative Commons
        Attribution-NonCommercial license) that will be published in a few weeks.
        If you can\u2019t wait for the book to be published and/or you want to make
        comments or suggestions, go to the dynamic book online version at http://book.openingscience.org.","title":"Opening
        Science - the Book","updated_at":1660569428,"url":"https://blog.front-matter.de/posts/opening-science-the-book/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0m","id":"7e848bbd-1c37-4277-9ba9-4b7ab32d1e81","published_at":1386777480,"summary":"<em>\n
        Article-level metrics (ALMs) provide a wide range of metrics about the uptake
        of an individual journal article by the scientific community after publication.
        They include citations, usage statistics, discussions in online comments and
        social media, social bookmarking, and recommendations.\n</em>","title":"What
        Can Article-Level Metrics Do for You?","updated_at":1741370104,"url":"https://blog.front-matter.de/posts/what-can-article-level-metrics-do-for-you/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0q","id":"64be6e70-e6cd-414a-ba7b-0d2d675b1d2b","published_at":1384704600,"summary":"Authoring
        of scholarly articles is a recurring theme in this blog since it started in
        2008. Authoring is still in desperate need for improvement, and nobody has
        convincingly figured out how to solve this problem. Authoring involves several
        steps, and it helps to think about them separately:\n<strong>\n <strong>\n  Writing\n
        </strong>\n</strong>\n. Manuscript writing, including formatting, collaborative
        authoring\n<strong>\n <strong>\n  Submission\n </strong>\n</strong>\n.","title":"The
        Grammar of Scholarly Communication","updated_at":1660840778,"url":"https://blog.front-matter.de/posts/the-grammar-of-scholarly-communication/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0s","id":"97e1525e-8884-42f9-9a4f-ad12de99f49b","published_at":1383581880,"summary":"This
        Friday and Saturday the SpotOn London Conference will take place at the British
