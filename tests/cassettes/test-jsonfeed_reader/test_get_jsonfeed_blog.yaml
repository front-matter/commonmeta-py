    body:
      string: '{"archive_collection":22096,"archive_host":null,"archive_timestamps":[20231101172748,20240501180447,20241101172601],"authors":[{"name":"Martin
        Fenner","url":"https://orcid.org/0000-0003-1419-2405"}],"category":"computerAndInformationSciences","community_id":"91dd2c24-5248-4510-9c2b-30b772bf8b60","created_at":1672561153,"current_feed_url":"","description":"The
        Front Matter Blog covers the intersection of science and technology since
        2007.","favicon":"https://rogue-scholar.org/api/communities/15a362ea-8138-42b8-917f-1840a92addf8/logo","feed_format":"application/atom+xml","feed_url":"https://blog.front-matter.de/atom","filter":null,"generator":"Ghost","generator_raw":"Ghost
        5.52","home_page_url":"https://blog.front-matter.de","id":"74659bc5-e36e-4a27-901f-f0c8d5769cb8","issn":"2749-9952","language":"en","license":"https://creativecommons.org/licenses/by/4.0/legalcode","mastodon":"https://hachyderm.io/@mfenner","posts":[{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2v","id":"1128ff7c-f971-415e-8072-72626a0dec3a","published_at":1327881600,"summary":"Faculty
        1000 today announced\n<strong>\n F1000 Research\n</strong>\n,\n<em>\n a new
        fully Open Access publishing program across biology and medicine, that will
        start publishing later this year\n</em>\n. The default open access license
        is CC-BY, and CC0 for data.","title":"Say Hello to F1000 Research","updated_at":1659201034,"url":"https://blog.front-matter.de/posts/say-hello-to-f1000-research/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw69","guid":"https://doi.org/10.53731/r294649-6f79289-8cw69","id":"c9d439b9-421b-4717-bb46-d2c6b4a642bc","published_at":1318118400,"summary":"ScienceCard
        is a new service that I started last month with the simple idea to automatically
        track all journal articles of a given author, and to collect the article-level
        metrics (citations, bookmarks, etc.) for these papers. ScienceCard requires
        unique identifiers for articles and authors to work. Unique identifiers for
        authors is a difficult topic regularly discussed in this blog.","title":"The
        trouble with DOIs","updated_at":1660732657,"url":"https://blog.front-matter.de/posts/the-trouble-with-dois/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6b","id":"03db03f3-443f-4efc-9251-d43329facecd","published_at":1315180800,"summary":"The
        Science Online London 2011 Conference was a great event that took place last
        Friday and Saturday. I was able to celebrate the first\n<em>\n PLoS Blogs\n</em>\nanniversary
        together with community manager\n<strong>\n Brian Mossop\n</strong>\n, but
        a detailed conference post will follow later. The blog posts covering the
        event are here, and the list is growing by the hour.","title":"Hacking the
        PLoS Article-Level Metrics API Server","updated_at":1736462742,"url":"https://blog.front-matter.de/posts/hacking-the-plos-article-level-metrics-api-server/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw70","guid":"https://doi.org/10.53731/r294649-6f79289-8cw70","id":"c28082d5-cb02-4c4a-851e-f5b0117a95a3","published_at":1300147200,"summary":"The
        best and quickest discussions of a scientific paper now sometimes happen in
        science blogs rather than in the peer-reviewed literature. Whereas we have
        a number of scholarly databases that track citations between papers, we don\u2019t
        have the same tools for science blogs.","title":"Discussing science with microformats","updated_at":1689256618,"url":"https://blog.front-matter.de/posts/discussing-science-with-microformats/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0v","id":"e35e1aab-5dab-4d9e-99ca-24ce58256978","published_at":1382545380,"summary":"Yesterday
        PLOS Biology published an essay by me: What Can Article Level Metrics Do for
        You? (Fenner, 2013). I had help from many others in writing the essay, in
        particular PLOS Biology editor Emma Ganley. I hope that the essay can help
        researchers get introduced to article-level metrics, and I am honored that
        the essay is part of the PLOS Biology 10th anniversary collection.","title":"What
        Can Article-Level Metrics Do for You?","updated_at":1660896910,"url":"https://blog.front-matter.de/posts/what-can-article-level-metrics-do-for-you-2/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2b","id":"7a78be53-1e9c-4877-87b9-89ff238b3411","published_at":1343088000,"summary":"Inspired
        by four recent blog posts and their comments (Comments at journal websites:
        just turn them off, Open Access and The Dramatic Growth of PLoS ONE, No Comment?,
        If you email it, they will comment), I created a graphic to show what users
        do with PLoS ONE papers. As always, the data behind the graphic are openly
        available.","title":"What Users do with PLOS ONE Papers","updated_at":1660725707,"url":"https://blog.front-matter.de/posts/what-users-do-with-plos-one-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw73","guid":"https://doi.org/10.53731/r294649-6f79289-8cw73","id":"222aa28e-eddf-493e-a5b9-9c70c2606863","published_at":1297641600,"summary":"One
        of the annoyances with bibliographies as we use them for scholarly papers
        is that is usually unclear why a particular paper was cited. It is often possible
        for readers to gather this information by looking at the citation in the context
        of the surrounding text, but this is very difficult to automate.","title":"How
        to use Citation Typing Ontology (CiTO) in your blog posts","updated_at":1660740911,"url":"https://blog.front-matter.de/posts/how-to-use-citation-typing-ontology-cito-in-your-blog-posts/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2f","id":"12f93167-269c-49b6-a10f-34cdefad0bcd","published_at":1342224000,"summary":"DNA
        Barcoding the Native Flowering Plants and Conifers of Wales has been one of
        the most popular new\n<em>\n PLoS ONE\n</em>\npapers in June. In the paper
        Natasha de Vere\n<em>\n et al.\n</em>\ndescribe a DNA barcode resource that
        covers the 1143 native Welsh flowering plants and conifers. My new job as
        technical lead for the PLoS Article Level Metrics (ALM) project involves thinking
        about how we can best display the ALM collected for this and other papers.","title":"Visualizing
        tweets linking to a paper","updated_at":1660728421,"url":"https://blog.front-matter.de/posts/visualizing-tweets-linking-to-a-paper/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2j","id":"acec12fb-40d3-4fd9-aba9-e5409fc1036b","published_at":1335139200,"summary":"This
        blog occasionally does interviews with people providing interesting tools
        for scholars. These interviews have always been among my favorite blog posts.
        This now is obviously an interview with myself, but I felt this is the best
        format to explain some important news. Starting May 16 I will be working full-time
        as technical lead for the PLoS Article Level Metrics (ALM) project.","title":"PLoS
        Article-Level Metrics: Interview with Martin Fenner","updated_at":1660728624,"url":"https://blog.front-matter.de/posts/plos-article-level-metrics-interview-with-martin-fenner/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2k","id":"2234766b-38c0-49c8-b89f-6157df105009","published_at":1332806400,"summary":"The
        April issue of\n<em>\n Nature Materials\n</em>\ncontains three articles that
        discuss marketing strategies for scientists. The Editorial (\u201cThe scientific
        marketplace\u201d) introduces the topic and explains why scientists should
        consider marketing their work.","title":"Marketing for Scientists","updated_at":1688580952,"url":"https://blog.front-matter.de/posts/marketing-for-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2m","id":"081962e8-cbb3-46af-9071-c9b19869952e","published_at":1330905600,"summary":"Altmetrics
        \u2013 tools to assess the impact of scholarly works based on alternative
        online measures such as bookmarks, links, blog posts, etc. \u2013have become
        a regular topic in this blog. The altmetrics manifesto was published in October
        2010, and in the last 18 months we have seen a number of interesting new altmetrics
        services, including the ScienceCard service that I started six months ago.","title":"Why
        I still like FriendFeed, why Twitter is important and other thoughts about
        Altmetrics","updated_at":1660728711,"url":"https://blog.front-matter.de/posts/why-i-still-like-friendfeed-why-twitter-is-important-and-other-thoughts-about-altmetrics/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2n","id":"4e4a12c1-bf2b-4a86-a0fd-25090a85c1bf","published_at":1330041600,"summary":"This
        was another week with a fair amount of spam in my email inbox. We all receive
        email spam on a regular basis and most of us have probably also received science
        spam: invitations to scientific conferences about topics we are not working
        on, invitations to submit articles to journals not covering your field, and
        information about lab supplies we never had asked for.","title":"A Few Questions
        about Science Spam","updated_at":1659264754,"url":"https://blog.front-matter.de/posts/a-few-questions-about-science-spam/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2p","id":"c3c00883-c375-46f2-a642-f50eaad71562","published_at":1329609600,"summary":"In
        December Euan Adie and I started the CrowdoMeter project, an analysis of the
        semantic content of tweets linking to scholarly papers. Because classifying
        almost 500 tweets is a lot of work, we turned this into a crowdsourcing project.
        We got help from 36 people, who did 953 classifications, and we discussed
        the preliminary results (available here) at the ScienceOnline2012 conference.","title":"Crowdsourcing
        the analysis of scholarly tweets","updated_at":1660728788,"url":"https://blog.front-matter.de/posts/crowdsourcing-the-analysis-of-scholarly-tweets/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2s","id":"96390136-1b2a-44ee-94dc-721639dd8a5b","published_at":1328832000,"summary":"Earlier
        this week I wrote a guest post for the\n<strong>\n Impact of Social Sciences\n</strong>\nblog.","title":"The
        Personalized Journal","updated_at":1659354055,"url":"https://blog.front-matter.de/posts/the-personalized-journal/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2t","id":"3921492d-2f7f-4028-aaa5-b5db95f90fbd","published_at":1327968000,"summary":"Zotero
        3.0 was officially released today. The big change in version 3.0 of the reference
        manager is a standalone version that runs outside the Firefox browser. The
        first beta was released in August 2011.","title":"Zotero 3.0 Released","updated_at":1660729035,"url":"https://blog.front-matter.de/posts/zotero-3-0-released/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2y","id":"62626fc4-6fda-48a5-bd26-5e5e495b7a49","published_at":1325980800,"summary":"ScienceCard
        is a web service that collects all scientific articles published by an author
        and displays their aggregate article-level metrics. Yesterday I added a mobile
        version to ScienceCard, simply browse to ScienceCard with your mobile phone
        or go to http://mobile.sciencecard.org.","title":"Altmetrics to go \u2013
        mobile version of ScienceCard available","updated_at":1660731987,"url":"https://blog.front-matter.de/posts/altmetrics-to-go-mobile-version-of-sciencecard-available/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2z","id":"04828def-51f8-4a2d-b323-04e49fef2434","published_at":1325635200,"summary":"Two
        weeks ago Euan Adie from altmetric.com and myself launched the website CrowdoMeter,
        a crowdsourcing project that tries to classify tweets about scholarly articles
        using the Citation Typing Ontology (CiTO). Despite the holidays we have gotten
        off to a good start with currently 597 classifications by 56 different users,
        already covering 93% of the tweets we wanted to classify.","title":"CrowdoMeter
        goes Mobile","updated_at":1660732122,"url":"https://blog.front-matter.de/posts/crowdometer-goes-mobile/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw61","guid":"https://doi.org/10.53731/r294649-6f79289-8cw61","id":"01d1abf6-d68e-412b-ab58-813262179b4f","published_at":1323302400,"summary":"Version
        1.0 of Annotum, the free WordPress theme for writing scholarly articles, was
        announced in late November. Back in June I wrote about the first public version
        of Annotum, but until now using Annotum was experimental. Annotum is available
        in the WordPress Themes Directory at WordPress.org (and has been downloaded
        more than 9,000 times in the past three weeks), and is also available for
        users of WordPress.com.","title":"Introducing Annotum to WordPress Bloggers","updated_at":1660732271,"url":"https://blog.front-matter.de/posts/introducing-annotum-to-wordpress-bloggers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw62","guid":"https://doi.org/10.53731/r294649-6f79289-8cw62","id":"16a3aa6d-c8ce-4422-b004-1510cc441bfd","published_at":1321747200,"summary":"I\u2019m
        very proud to report that ScienceCard last week has been named finalist in
        the Mendeley/PLoS API Binary Battle. Not bad for a project that started only
        two months ago in a hackathon following the Science Online London conference
        and is done in my spare time. The winners of the contest will be named on
        November 30, but I\u2019m more than happy that the project has even gotten
        this far.","title":"ScienceCard named Finalist in Mendeley/PLoS API Binary
        Battle","updated_at":1693646389,"url":"https://blog.front-matter.de/posts/sciencecard-named-finalist-in-mendeley-plos-api-binary-battle/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw68","guid":"https://doi.org/10.53731/r294649-6f79289-8cw68","id":"fc7fa308-457c-499c-92bc-871914254cbd","published_at":1318291200,"summary":"Today,
        Digital Science announced an investment in startup Labtiva. And Labtiva released
        a \u201ccommunity preview\u201d of their reference manager ReadCube. The community
        preview is a free download for Windows and Mac, and this is the summary of
        my first impressions. You could write two different reviews about ReadCube.
        The first version would mention the really slick interface, and the fun you
        have using the program.","title":"Two reviews of new reference manager ReadCube","updated_at":1660732569,"url":"https://blog.front-matter.de/posts/two-reviews-of-new-reference-manager-readcube/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw64","guid":"https://doi.org/10.53731/r294649-6f79289-8cw64","id":"08821d27-5ecc-4670-9dd4-88b254b7e72d","published_at":1320019200,"summary":"Last
        week I attended the Transforming Scholarly Communication workshop in Cambridge,
        Massachusetts. The main goal of the workshop was to come up with practical
        recommendations for the topics #resources #review #literature #media #recognition
        and #platforms: The workshop started with product demos (18 demos in a little
        over three hours!), we then spent two half days working in smaller groups
        on one of the six topics above.","title":"Wikis, Q&amp;As and Cookbooks","updated_at":1736293544,"url":"https://blog.front-matter.de/posts/wikis-q-as-and-cookbooks/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6a","id":"f55f9cf9-f30a-4ad9-9973-56bc2666ac08","published_at":1317168000,"summary":"Metrics
        for scholarly works are used for evaluation and discovery. The Journal Impact
        Factor is widely used, but is not the best tool to look at the metrics of
        an individual article. In the past few years we finally started to have the
        technology to do article-level metrics (citations, downloads, etc.) and PLoS
        has pushed this concept since at least 2009.","title":"Announcing ScienceCard","updated_at":1660732724,"url":"https://blog.front-matter.de/posts/announcing-sciencecard/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6c","id":"e854fce9-b98a-40e2-ab85-0523ebb74691","published_at":1314489600,"summary":"At
        the Science Online London Conference later this week I will moderate a session
        on\n<strong>\n <strong>\n  microattribution\n </strong>\n</strong>\n, together
        with Mike Peel, Bora Zivkovic and Scott Edmunds. I thought that microattribution
        would be an established concept, so I was surprised to find so little information
        about it. Wikipedia doesn\u2019t know about microattribution.","title":"On
        Microattribution","updated_at":1660290108,"url":"https://blog.front-matter.de/posts/on-microattribution/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6f","id":"38cc803d-be7b-413a-bc4f-ded000c2b120","published_at":1313193600,"summary":"In
        July Wiley published the book\n<strong>\n <strong>\n  Visualize This \u2013
        The Flowing Data Guide to Design, Visualization and Statistics\n </strong>\n</strong>\n.
        The book is written by\n<em>\n <em>\n  Nathan Yau\n </em>\n</em>\n, and he
        is of course also behind the popular FlowingData blog about the same topic.
        This is a short review of the book. Please keep in mind that I\u2019m no expert
        in data visualization.","title":"Book Review: Visualize This by Nathan Yau","updated_at":1660733108,"url":"https://blog.front-matter.de/posts/book-review-visualize-this-by-nathan-yau/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6g","id":"ed2b7cf5-ca9c-4328-a565-5036ad14b5de","published_at":1311724800,"summary":"Version
        1.0 of the reference manager Mendeley was released today. In good Web 2.0
        tradition it took three years from the first Beta release to the first \u201cfinished\u201d
        product. I interviewed co-founder Victor Henning back in September 2008, and
        both the software and the company have gone a long way since then. Congratulations.
        Mendeley has changed reference management in many ways.","title":"Mendeley
        1.0 released Today","updated_at":1736465547,"url":"https://blog.front-matter.de/posts/mendeley-1-0-released-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6h","id":"bdc80f85-777e-41ce-b06c-99895c113182","published_at":1311724800,"summary":"Last
        week Google Scholar announced a new feature on the Google Scholar Blog:\n<strong>\n
        <strong>\n  Google Scholar Citations\n </strong>\n</strong>\n. The stated
        purpose of this tool is to allow researchers to calculate their citation metrics,
        e.g. their Hirsch index (H-index). This is an interesting new service, that
        not only helps with calculating citation metrics, but also shows you who is
        citing your papers \u2013 a great discovery tool.","title":"Google Scholar
        Citations, Researcher Profiles, and why we need an Open Bibliography","updated_at":1660733291,"url":"https://blog.front-matter.de/posts/google-scholar-citations-researcher-profiles-and-why-we-need-an-open-bibliography/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6j","id":"6fa5c7ef-1b17-4955-90e9-179399ee6ea7","published_at":1310515200,"summary":"Brendan
        Thomas has published an interesting paper that looks at author email addresses
        in the PubMed database of biomedical literature. Email addresses of first
        authors have been added to PubMed since 1996, and they can be retrieved via
        the standard web interface or automated software. This makes PubMed an excellent
        place to find the email address of an academic author, but also shows that
        PubMed is very vulnerable to email address harvesting.","title":"Did you receive
        spam because you published a paper?","updated_at":1688581268,"url":"https://blog.front-matter.de/posts/did-you-receive-spam-because-you-published-a-paper/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6m","id":"b4f6452e-27f9-47c2-8ff2-b12c620ab7f1","published_at":1309392000,"summary":"Last
        week the first Alpha version of\n<strong>\n <strong>\n  Annotum\n </strong>\n</strong>\nwas
        released. Annotum is \u201ca\u00a0scholarly authoring and publishing platform
        based on WordPress\u201d. I first learned about Annotum at the Beyond the
        PDF workshop in January. One of the themes of the workshop was that we need
        better tools for authoring, reviewing and publishing of scholarly articles.","title":"Annotum:
        Publishing with WordPress soon coming to a journal near you","updated_at":1659188521,"url":"https://blog.front-matter.de/posts/annotum-publishing-with-wordpress-soon-coming-to-a-journal-near-you/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6p","id":"170cf51e-3673-4570-9693-9f2db2384451","published_at":1308441600,"summary":"At
        the beginning of the month Google, Bing and Yahoo announced schema.org, a
        new initiative for structured markup on the web. Richard MacManus responded
        with a critical piece at ReadWriteWeb (Is Schema.org really a Google Land
        Grab?), mainly criticizing that the initiative didn\u2019t use RDFa and didn\u2019t
        seem to have consulted with the web standards body W3C.","title":"Is Schema.org
        about a technical standard or about something else?","updated_at":1660399786,"url":"https://blog.front-matter.de/posts/is-schema-org-about-a-technical-standard-or-about-something-else/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6r","id":"5c398d37-cdf3-4078-86d6-5b0c7207b632","published_at":1307404800,"summary":"Last
        Thursday the search engines Google, Bing and Yahoo announced schema.org, a
        new initiative for structured data markup on the web. Websites that use this
        schema to markup their data (more than 100 data types are supported) will
        make it easier for the three largest web search engines to find their content.
        Schema.org uses microdata, not microformats or RDFa, according to the FAQ
        this was a pragmatic decision.","title":"Schema.org for Scholarly HTML?","updated_at":1660733475,"url":"https://blog.front-matter.de/posts/schema-org-for-scholarly-html/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6t","id":"c2402498-bd55-44ea-a3a4-b0e4b2ec3083","published_at":1304035200,"summary":"Zhiyong
        Lu recently published an excellent overview of the web tools that are currently
        available to search the biomedical literature. The article has also a companion
        web page that allows user to filter for the features they are interested in,
        and to report new tools. The author describes 28 tools developed specifically
        for the biomedical domain.","title":"Web Tools for Searching the Biomedical
        Literature \u2013 part I","updated_at":1659256220,"url":"https://blog.front-matter.de/posts/web-tools-for-searching-the-biomedical-literature-part-i/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7b","id":"82efbfaa-3340-4f7e-933d-8428ca243ef9","published_at":1294272000,"summary":"It\u2019s
        very unusual for me to post two blog posts in a single day, and even more
        so when both posts are based on press releases by the same organization. But
        this is important news for everybody interested in scholarly publishing.","title":"New
        journal \u201cNature ONE\u201d launched today","updated_at":1658841164,"url":"https://blog.front-matter.de/posts/new-journal-nature-one-launched-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7j","id":"718bdeaa-eac4-42db-9f4f-d6028fd7ca1b","published_at":1292630400,"summary":"Two
        weeks ago\n<strong>\n <strong>\n  Eva Amsen\n </strong>\n</strong>\nwrote
        in a thoughtful blog post: Eva argues that \u2013 contrary to popular belief
        \u2013 there is actually a divide between science and technology. Scientists
        are on average not really comfortable using technology, and many computing
        tools aimed for scientists really miss the point of what scientists really
        care about.","title":"Digital Science launched: closing the gap between science
        and technology?","updated_at":1660742178,"url":"https://blog.front-matter.de/posts/digital-science-launched-closing-the-gap-between-science-and-technology/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw81","guid":"https://doi.org/10.53731/r294649-6f79289-8cw81","id":"4b7c0ac6-8b58-4801-aebf-c5244d2afe3c","published_at":1288656000,"summary":"The
        Open Researcher &amp; Contributor ID (ORCID) initiative is working on a unique
        researcher identifier for the creation of a clear and unambiguous scholarly
        record. The initiative is supported by more than 140 universities, research
        institutes, funding organizations, publishers and other organizations interested
        in scholarly communication. The ORCID system will become publicly available
        in the first half of 2011.","title":"An ORCID discussion group for researchers","updated_at":1659187130,"url":"https://blog.front-matter.de/posts/an-orcid-discussion-group-for-researchers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw86","guid":"https://doi.org/10.53731/r294649-6f79289-8cw86","id":"55e6f4e8-c63d-4831-a538-b8b3553c7bd9","published_at":1287532800,"summary":"Two
        weeks ago I gave a presentation at the STM Annual Conference 2010 in Frankfurt
        (STM is the International Association of Scientific, Technical and Medical
        Publishers). I told the audience that publishers could do a much better job
        helping researchers create digital content \u2013 both by providing better
        tools and by reconsidering licenses for content reuse. A video of my presentation
        is available here.","title":"Helping researchers create scholarly content","updated_at":1659335431,"url":"https://blog.front-matter.de/posts/helping-researchers-create-scholarly-content/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw71","guid":"https://doi.org/10.53731/r294649-6f79289-8cw71","id":"3e701a53-cdcb-43da-969d-583e3796121d","published_at":1299542400,"summary":"The
        reference management software Papers has been a regular topic on this blog.","title":"Papers
        2: the reference manager made with love","updated_at":1660740790,"url":"https://blog.front-matter.de/posts/papers-2-the-reference-manager-made-with-love/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw72","guid":"https://doi.org/10.53731/r294649-6f79289-8cw72","id":"0876e02d-472e-4851-959a-01644098264a","published_at":1299456000,"summary":"The
        bibliography of a scholarly paper is interesting and important reading material.
        You can see whether the authors have cited the relevant literature, and you
        often find references to interesting papers you didn\u2019t know about. Bibliographies
        are obviously also needed to count citations, and then do all kinds of useful
        and not so useful things with them. Unfortunately almost all bibliographies
        are in the wrong format.","title":"The Trouble with Bibliographies","updated_at":1660740856,"url":"https://blog.front-matter.de/posts/the-trouble-with-bibliographies/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw74","guid":"https://doi.org/10.53731/r294649-6f79289-8cw74","id":"8e38d9c5-ac81-479f-8a7d-4985a874d39f","published_at":1296950400,"summary":"ePub
        is a great format for scholarly content, and there are a number of tools to
        create ePub files. But creating content is only half the story, at least as
        important is an easy mechanism for distribution. This is particularly true
        if your ePub files are not books, but shorter pieces of content: journal articles,
        blog posts or even output from your ongoing research.","title":"OPDS: RSS
        for ePub or how to distribute ePub files","updated_at":1660740954,"url":"https://blog.front-matter.de/posts/opds-rss-for-epub-or-how-to-distribute-epub-files/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw76","guid":"https://doi.org/10.53731/r294649-6f79289-8cw76","id":"221a671e-1805-4888-964d-abd1d5804358","published_at":1296518400,"summary":"The
        Beyond the PDF workshop took place a little over a week ago. One take-home
        message for me was that ePub is a very interesting document format for scholarly
        publishing and has several advantages over PDF. The workshop had a wonderful
        spirit\n<em>\n <em>\n  to do something\n </em>\n</em>\n, and in this spirit
        I wrote a WordPress plugin that automatically creates ePub files from blog
        posts.","title":"ePub WordPress plugin released today","updated_at":1660741079,"url":"https://blog.front-matter.de/posts/epub-wordpress-plugin-released-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw78","guid":"https://doi.org/10.53731/r294649-6f79289-8cw78","id":"dfc32ca4-f435-487a-a837-b2fd9f378eb5","published_at":1295740800,"summary":"Having
        breakfast at the end of a conference is a good way to recap what was discussed
        and can help to generate new ideas. Two years ago at ScienceOnline09 a conversation
        with Cameron Neylon that followed up on the session Reputation, authority
        and incentives. Or: How to get rid of the Impact Factor (moderated by Bj\u00f6rn
        Brembs and Pete Binfield) was started my interest in unique author identifiers
        for researchers.","title":"Beyond the PDF \u2026 is ePub","updated_at":1660898928,"url":"https://blog.front-matter.de/posts/beyond-the-pdf-is-epub/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw79","guid":"https://doi.org/10.53731/r294649-6f79289-8cw79","id":"8bdda369-ebe9-4a2d-ad47-9b27a5bdd828","published_at":1294963200,"summary":"DataCite
        is an international consortium for data citation. DataCite originally started
        as a project at the German National Library of Science and Technology (TIB).
        Since 2005 the TIB was providing digital object identifiers (DOIs) to research
        datasets. In December 2009 research libraries and technical information centres
        from 6 countries founded the DataCite initiative.","title":"DataCite: visit
        their new blog","updated_at":1660741556,"url":"https://blog.front-matter.de/posts/datacite-visit-their-new-blog/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7a","id":"4eddf67c-29e9-4844-bca7-b2823e2fb8d9","published_at":1294704000,"summary":"ScienceOnline2011,
        the fifth annual international meeting on Science and the Web, is only two
        days away. I am very excited for many reasons, most importantly because it
        gives me the chance to meet many online friends in person \u2013 again or
        for the first time.","title":"Having fun with citations at ScienceOnline2011","updated_at":1660741728,"url":"https://blog.front-matter.de/posts/having-fun-with-citations-at-scienceonline2011/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7n","id":"8624943a-4621-42a3-8eab-95927c9388ea","published_at":1292025600,"summary":"Citations
        are a fundamental concept of scholarly works. Unfortunately they are also
        difficult to do. Traditional writing tools such as Microsoft Word can\u2019t
        really handle them in a way that is appropriate for a scientific manuscript,
        and that is why we have reference managers such as Endnote, Zotero or Mendeley.","title":"Citations
        are links, so where is the problem?","updated_at":1660742332,"url":"https://blog.front-matter.de/posts/citations-are-links-so-where-is-the-problem/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7c","id":"e3f27d8e-3e3d-413e-8405-208dbf0c31db","published_at":1294272000,"summary":"Articles
        published in\n<em>\n <em>\n  Nature\n </em>\n</em>\n,\n<em>\n <em>\n  Nature
        Biotechnology\n </em>\n</em>\n,\n<em>\n <em>\n  Nature Cell Biology\n </em>\n</em>\n,\n<em>\n
        <em>\n  Nature Medicine\n </em>\n</em>\nor\n<em>\n <em>\n  Nature Chemical
        Biology\n </em>\n</em>\nare now available for renting from DeepDyve. Downloading
        or printing is not possible, and the $3.99 rental is for 24 hours. Later this
        month, Nature plans to release the nature.com reader for the iPad.","title":"Now
        in your DeepDyve store: Nature papers to rent","updated_at":1659187736,"url":"https://blog.front-matter.de/posts/now-in-your-deepdyve-store-nature-papers-to-rent/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7d","id":"915028c9-1de5-4db2-a322-6b6fca6c602b","published_at":1294185600,"summary":"In
        1990 Tim Berners-Lee and others started HTML and the world wide web to facilitate
        scientific communications at CERN, the world\u2019s largest particle physics
        laboratory. Although the world wide web profoundly changed scholarly publishing
        (and of course many other things), HTML did not become the standard document
        format for scientific papers. In fact, there is no standard document format.","title":"HTML5
        or messages from beyond the PDF","updated_at":1660741814,"url":"https://blog.front-matter.de/posts/html5-or-messages-from-beyond-the-pdf/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7f","id":"e21b8017-5b2d-4b0e-b9c5-9b3f62f296a5","published_at":1293494400,"summary":"One
        of the more complicated aspects of scientific writing is reference management
        \u2013 an important limitation of online collaborative tools such as\n<em>\n
        <em>\n  Google Docs\n </em>\n</em>\n. I have argued before that WordPress
        has the potential to become a great scientific writing tool. Wordpress can\u2019t
        do reference management out of the box, and the available plugins are somewhat
        limited.","title":"WordPress for Reference Management","updated_at":1659255845,"url":"https://blog.front-matter.de/posts/wordpress-for-reference-management/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7g","id":"a1a072dd-1a4c-4506-a85d-3e08df0af634","published_at":1293062400,"summary":"Jason
        Rollins gave a presentation with that topic at the recent STM Innovations
        Seminar in London. The video of his presentation has now been made available
        by River Valley TV, and his slides are here. Jason talks about some recent
        trends in reference management software. For him one important new trend is
        APIs/extensions. I fully agree with him, but we haven\u2019t really seen many
        tools based on these APIs.","title":"New and emerging technologies for reference
        software","updated_at":1660898998,"url":"https://blog.front-matter.de/posts/new-and-emerging-technologies-for-reference-software/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7m","id":"78eb4b31-8acf-46e4-b30e-0b42160708d5","published_at":1291939200,"summary":"In
        early December Knowledge Exchange, a partnership of JISC (United Kingdom),
        SURF (Netherlands), DEFF (Denmark), and DFG (Germany) released a report on
        submission fees that they had commissioned to Mark Ware Consulting. The report
        was also discussed by Robert Kiley on the UK PubMed Central blog and by Phil
        Davis on the Scholarly Kitchen blog. Submission fees are more common than
        I thought, particularly in economics and the life sciences.","title":"Submission
        Fees for Open Access Journals?","updated_at":1660742484,"url":"https://blog.front-matter.de/posts/submission-fees-for-open-access-journals/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7p","id":"74d25709-ee22-46ae-bf64-9e0730e52810","published_at":1291507200,"summary":"Four
        weeks ago I wrote about the Beyond the PDF workshop that is planned for January
        in San Diego. The goal of the workshop is to identify a set of requirements,
        and a group of willing participants to develop open source code to accelerate
        scientific knowledge sharing. The Google Group for the workshop has already
        seen a lot of interesting discussions.","title":"Blogging Beyond the PDF","updated_at":1659335616,"url":"https://blog.front-matter.de/posts/blogging-beyond-the-pdf/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7r","id":"acda7e21-7c68-4836-818a-0be27dfba724","published_at":1291075200,"summary":"Earlier
        today I gave this presentation at the DINI/Helmholtz Repositories Workshop
        in Berlin. I\u2019m looking forward to the second day tomorrow.","title":"Repositories:
        Researcher Perspective","updated_at":1661768073,"url":"https://blog.front-matter.de/posts/repositories-researcher-perspective/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7s","id":"927a5dd8-9224-4263-a4c4-c016ed06b1ec","published_at":1290902400,"summary":"When
        we want to change something, we have to look at the incentives for those involved.References  Swan,
        A. (2006) The culture of Open Access: researchers\u2019 views and responses.
        In:\n<em>\n <em>\n  Open Access: Key Strategic, Technical and Economic Aspects\n
        </em>\n</em>\n, Chandos.","title":"Researchers\u2019 reasons for publishing
        their work","updated_at":1660742539,"url":"https://blog.front-matter.de/posts/researchers-reasons-for-publishing-their-work/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7v","id":"744a0880-5637-4ab3-a4ef-39121cd458f2","published_at":1290816000,"summary":"On
        Monday I was finally able to start the clinical trial\n<strong>\n <strong>\n  Everolimus
        for patients with relapsed/refractory germ cell cancer\n </strong>\n</strong>\n(RADIT),
        and I\u2019m now looking forward to recruit the first patient. We aim to treat
        25 patients with cancer of the testis with the mTOR inhibitor everolimus in
        this phase II trial, and eight German hospitals are participating.","title":"Making
        your study public before you start can be fun","updated_at":1659255732,"url":"https://blog.front-matter.de/posts/making-your-study-public-before-you-start-can-be-fun/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7w","id":"759ea565-0d8a-4c9d-aac7-d9d947e1d91f","published_at":1289692800,"summary":"Last
        Tuesday\n<em>\n <em>\n  Nucleic Acids Research\n </em>\n</em>\npublished a
        nice paper describing the UK PubMed Central (UKPMC) database (McEntyre 2010).
        UKPMC was started in 2007, the enhanced version described in the paper was
        launched January 2010. In November 2009 I published an interview with Phil
        Vaughan, the senior author of the paper.","title":"UK PubMed Central explained
        in Nucleic Acids Research Paper","updated_at":1688581554,"url":"https://blog.front-matter.de/posts/uk-pubmed-central-explained-in-nucleic-acids-research-paper/"},{"doi":"https://doi.org/10.53731/9xpwtq8-84qkgwd","guid":"https://doi.org/10.53731/9xpwtq8-84qkgwd","id":"c45d1dac-5632-4fc7-9cc7-74969b043830","published_at":1288742400,"summary":"Thanks
        to a lot of hard work both at\n<strong>\n <strong>\n  Nature Network\n </strong>\n</strong>\nand
        here at\n<strong>\n <strong>\n  PLoS Blogs\n </strong>\n</strong>\n, all blog
        posts and comments from my former blog at Nature Network (August 2007 to August
        2010) are now also available here. Special thanks go to Lou Woudley and Brian
        Mossop who made all this happen. There are of course a few formatting glitches
        here and there, but I will try to fix them over time.","title":"More Gobbledygook
        at PLoS Blogs","updated_at":1660487966,"url":"https://blog.front-matter.de/posts/more-gobbledygook-at-plos-blogs/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw84","guid":"https://doi.org/10.53731/r294649-6f79289-8cw84","id":"7678a770-f36e-401b-9b23-b9c71bcf8676","published_at":1288051200,"summary":"My
        post last week about citation rates of mandated vs. self-selected Open Accessfulfills
        resulted in an interesting discussion thanks to some good arguments made by
        Stevan Harnad. One personal conclusion for me: mandates for self-archiving
        are not a good idea. I would very much prefer researchers to be highly motivated
        to self-archive thanks to a repository that both fulfills important functions
        and is fun to use.","title":"Self-motivated vs. mandated archiving","updated_at":1729113238,"url":"https://blog.front-matter.de/posts/self-motivated-vs-mandated-archiving/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw88","guid":"https://doi.org/10.53731/r294649-6f79289-8cw88","id":"af7f4f9c-585f-4d1a-adcf-a9edc51eb040","published_at":1287360000,"summary":"Find
        out more at the Open Access Week website. And watch this blog for another
        Open Access story later today.","title":"Start Open Access Week with Kick-Off
        Video","updated_at":1659185794,"url":"https://blog.front-matter.de/posts/start-open-access-week-with-kick-off-video/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8b","id":"23ee04a6-72bb-4805-9f2f-6eeaeb569f38","published_at":1286928000,"summary":"Earlier
        this year I wrote about the Nature.com iPhone application that was released
        in February.","title":"Nature.com iPhone app updated","updated_at":1689257437,"url":"https://blog.front-matter.de/posts/nature-com-iphone-app-updated/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8c","id":"af41b3d6-5451-4e89-9d80-fce93a24f09f","published_at":1286841600,"summary":"The
        ORCID initiative for unique researcher identifiers yesterday started a survey
        that everybody interested in ORCID should fill out. The survey asks questions
        about the main services that users expect from ORCID, and how the ORCID service
        should be paid for (e.g. membership fees or fee-for service). In quick response
        to the announcement of the survey on Twitter, an interesting discussion started
        on\n<strong>\n <strong>\n  FriendFeed\n </strong>\n</strong>\n.","title":"Survey
        asks for feedback about ORCID unique researcher identifier","updated_at":1660743357,"url":"https://blog.front-matter.de/posts/survey-asks-for-feedback-about-orcid-unique-researcher-identifier/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8d","id":"4a0fb9fe-cbd2-47aa-bcba-53b47c75b64d","published_at":1286582400,"summary":"Practically
        all papers in high-energy physics (&gt; 90% since the late 1990s) are first
        published on the ArXiv preprint server. Several related disciplines also have
        a long ArXiv tradition.","title":"New on Arxiv: first report of SOAP open
        access publishing project","updated_at":1755333696,"url":"https://blog.front-matter.de/posts/new-on-arxiv-first-report-of-soap-open-access-publishing-project/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw60","guid":"https://doi.org/10.53731/r294649-6f79289-8cw60","id":"93f6ccd5-3f2e-4f4b-acc6-eb393fedfc7a","published_at":1285804800,"summary":"Tables
        and figures contain the data of a scientific paper in condensed (and often
        visually appealing) form. This is why they are among the first thing we look
        at, and why they are often reused when we discuss the paper in a presentation
        or blog post.","title":"Why can\u2019t I reuse these tables and figures?","updated_at":1660744018,"url":"https://blog.front-matter.de/posts/why-cant-i-reuse-these-tables-and-figures/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8e","id":"93b6372b-474f-4ea2-b524-f75f7c7c7d20","published_at":1286496000,"summary":"<em>\n
        <em>\n  Cellular Therapy and Transplantation\n </em>\n</em>\ntoday published
        my paper Reference Management meets Web 2.0. Regular readers of this blog
        probably know about most of the things I talk about in the paper, but I hope
        it is a good introduction for those new to reference management.","title":"Paper
        published: Reference Management meets Web 2.0","updated_at":1659167580,"url":"https://blog.front-matter.de/posts/paper-published-reference-management-meets-web-2-0/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7z","id":"cdcbd9df-1f64-4176-898a-673eb6254815","published_at":1286323200,"summary":"PDF
        has become the standard way we consume scientific papers, but in fact is not
        a good format for this purpose at all.","title":"Beyond the PDF \u2013 it
        is time for a workshop","updated_at":1660895565,"url":"https://blog.front-matter.de/posts/beyond-the-pdf-it-is-time-for-a-workshop/"},{"doi":"https://doi.org/10.53731/c6913yb-bwqqcty","guid":"https://doi.org/10.53731/c6913yb-bwqqcty","id":"a81ee491-d06c-46d7-a7c2-1b315c674e30","published_at":1283040000,"summary":"Elsevier
        on Saturday launched SciVerse, the new Elsevier platform that combines\n<em>\n
        <em>\n  ScienceDirect\n </em>\n</em>\n(full-text journal articles) and\n<em>\n
        <em>\n  Scopus\n </em>\n</em>\n(abstract and citation database of peer-reviewed
        literature). In 2011\n<em>\n <em>\n  SciTopics\n </em>\n</em>\n(research summaries)
        will also be integrated and outside developers will be able to build SciVerse\n<em>\n
        <em>\n  applications\n </em>\n</em>\n(Elsevier and 3rd party tools that integrate
        with","title":"Elsevier launches SciVerse, integrates ScienceDirect + Scopus
        + More","updated_at":1660488078,"url":"https://blog.front-matter.de/posts/elsevier-launches-sciverse-integrates-sciencedirect-scopus-more/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw51","guid":"https://doi.org/10.53731/r294649-6f79289-8cw51","id":"19a29496-323e-406e-95f5-48bb7f359fa2","published_at":1273536000,"summary":"Last
        weekend was\n<em>\n <em>\n  BibCamp Hannover\n </em>\n</em>\n, a \u201cBarCamp
        for librarians and other hackers\u201d. If you understand German, you can
        read about the sessions, discussions and people in the Blog, Wiki, and FriendFeed
        Room. And Steffi Suhr wrote a nice post about The most beautiful library in
        the world in her\n<em>\n <em>\n  Nature Network\n </em>\n</em>\nblog.","title":"Action
        points","updated_at":1660895789,"url":"https://blog.front-matter.de/posts/action-points/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5z","id":"f08cbd9e-b1ca-48f5-b2f5-e0007eb36bcc","published_at":1285459200,"summary":"Dear
        Christian Specht, Thank you very much for your detailed response in\n<em>\n
        The Scientist\n</em>\nto our previous letter regarding citation mutations.","title":"Paper
        retractions do not induce citation mutations","updated_at":1711831677,"url":"https://blog.front-matter.de/posts/paper-retractions-do-not-induce-citation-mutations/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5q","id":"dc6523cc-ee91-48f2-ad86-2e4fc416bf23","published_at":1284336000,"summary":"One
        of the main themes at the Science Online London Conference last weekend was\n<strong>\n
        <strong>\n  data\n </strong>\n</strong>\n, with several sessions devoted to
        publishing primary research data, connecting scientific data from various
        resources, and a scientific experiment taking place before and during the
