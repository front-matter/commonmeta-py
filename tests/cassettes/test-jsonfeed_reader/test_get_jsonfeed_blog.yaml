        <em>\n  The final guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nSession V  Friday ended with two
        talks in session V, the first by Tony Hyman from the Max Planck Institute
        for Cell Biology and Genetics in Dresden. He looked at the ways that cells
        structure and organize their cytoplasm by comparison with non-biological systems.","title":"German
        Genetics Society Meeting 2009: Session V and VII","updated_at":1659334171,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-v-and-vii/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbm","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbm","id":"eea5fe80-8850-4981-ab85-1a2502b18e18","published_at":1253404800,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nJust after lunch the next decision:
        Neurogenetics or Evolution? Here I went with the topic that is less far from
        my field, and attended the evolution session.","title":"German Genetics Society
