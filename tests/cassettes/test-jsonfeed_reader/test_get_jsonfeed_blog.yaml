        #altmetrics12), at least until Twitter had a total blackout around 12 PM our
        time. All but two presenters used slides \u2013 I have uploaded my presentation
        to Speaker Deck.","title":"Random notes from the altmetrics12 conference","updated_at":1660728540,"url":"https://blog.front-matter.de/posts/random-notes-from-the-altmetrics12-conference/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4k","id":"a945220a-939c-431a-9799-3063e694aea0","published_at":1266192000,"summary":"Microblogging
        is blogging of short text messages, photos or other media and is best exemplified
        by\n<em>\n <em>\n  Twitter\n </em>\n</em>\n. Twitter use has grown tremendously
        in 2009, and this also includes many scientists.\n<sup>\n 1\n</sup>\n<em>\n
        <em>\n  FriendFeed\n </em>\n</em>\nis a another microblogging tool that not
        only allows sending of short text messages, but connects them together in
        groups and discussions threads similar to what you can do in online forums.","title":"ScienceFeed:
        Interview with Ijad Madisch","updated_at":1688580150,"url":"https://blog.front-matter.de/posts/sciencefeed-interview-with-ijad-madisch/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4m","id":"0e7e2bc0-c5bf-4f2f-bbb7-1da61e6974c9","published_at":1266105600,"summary":"Nature
        Network turns 3 years old today, and it has been a very interesting ride.
        I wasn''t around when Nature Network started, but posted by first Gobbledygook
        blog post (the blog had a different name back then) in August 2007. We passed
        the 50.000 comments milestone just a few weeks ago. And we were told that
        big changes to the blogging platform underneath are imminent. I have had many,
        many positive experiences in these 2 1/2 years.","title":"Happy third birthday
        Nature Network!","updated_at":1660811535,"url":"https://blog.front-matter.de/posts/happy-third-birthday-nature-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4f","id":"fca92b3f-da6b-4de4-9522-91b84cc66e40","published_at":1264291200,"summary":"Following
        the\n<em>\n ScienceOnline2010\n</em>\nconference, librarian Dorothea Salo
        wrote on her blog:  These are serious questions, and of course I don''t have
        the answers. But I would like to add my thoughts from a researcher perspective.
        The role of libraries in providing teaching material for students (textbooks,
        etc.) is another story that I will not touch today.","title":"Scientists and
        librarians: friend or foe?","updated_at":1694074024,"url":"https://blog.front-matter.de/posts/scientists-and-librarians-friend-or-foe/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4v","id":"459e57cd-6b12-47ee-96bd-65e633f8bff6","published_at":1267401600,"summary":"Last
        Tuesday the\n<em>\n <em>\n  German Research Foundation\n </em>\n</em>\n(DFG)
        announced changes to the grant application process, going in effect in July.
        Researchers are no longer allowed to list all their publications in their
        grant proposals.","title":"German Research Foundation says that numbers aren\u2019t
        everything","updated_at":1660811263,"url":"https://blog.front-matter.de/posts/german-research-foundation-says-that-numbers-arent-everything/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4n","id":"a86464a5-d151-4f50-9542-6c1452dcf4ef","published_at":1265587200,"summary":"Just
        four weeks ago I wrote a blog post titled How do you read papers? 2010 will
        be different. Not only have we since seen the announcement of the Apple iPad,
        but last Monday the free Nature.com iPhone app was launched.","title":"Nature.com
        iPhone app in pictures","updated_at":1689257610,"url":"https://blog.front-matter.de/posts/nature-com-iphone-app-in-pictures/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3e","id":"81ce228c-2405-452d-b704-95f536e4bd82","published_at":1257897600,"summary":"In
        September\n<em>\n <em>\n  PLoS\n </em>\n</em>\nstarted to show usage data
        (downloads, citations, but also use of social bookmarking services and blog
        posts) for all their published papers (article-level metrics at PLoS: addition
        of usage data).\n<em>\n <em>\n  PLoS\n </em>\n</em>\nis not the first publisher
        to do that, but certainly the largest to date.","title":"Moving article-level
        metrics forward","updated_at":1660899277,"url":"https://blog.front-matter.de/posts/moving-article-level-metrics-forward/"},{"doi":"https://doi.org/10.53731/ew3e999-93v00dz","guid":"https://doi.org/10.53731/ew3e999-93v00dz","id":"cccdd6ee-cc7c-4f6f-b69c-0c26fd0c629e","published_at":1235692800,"summary":"Finishing
        an exciting research project and writing it up in a paper are the first two
        steps in getting your work published. The next two steps \u2013 submitting
        your paper to a journal and getting it through the review process \u2013 have
        changed dramatically in the last 10-15 years.","title":"Lemon8-XML: Interview
        with MJ Suhonos","updated_at":1660722116,"url":"https://blog.front-matter.de/posts/lemon8-xml-interview-with-mj-suhonos/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbh","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbh","id":"c808b374-9d6f-49c6-b9f5-ae2596223ca3","published_at":1253232000,"summary":"<em>\n
        <em>\n  Another guest post from Alex Knoll reporting from the German Genetics
        Conference in Cologne.\n </em>\n</em>\nDusko Ehrlich fom Jouy en Josas in
        France started off the second session of the meeting. He is working with the
        MetaHIT project, which tries to do a metagenomic analysis of the human intestinal
        tract.","title":"German Genetics Conference 2009: Session II","updated_at":1659333539,"url":"https://blog.front-matter.de/posts/german-genetics-conference-2009-session-ii/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb9","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb9","id":"8a8cd0da-2bf8-4744-ae01-d4d76c83f98e","published_at":1223942400,"summary":"Today
        is Open Access Day\n<sup>\n 1\n</sup>\n, intended to broaden awareness and
        understanding of Open Access.","title":"Open Access \u2013 what\u2019s in
        it for me?","updated_at":1660398481,"url":"https://blog.front-matter.de/posts/open-access-whats-in-it-for-me/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb6","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb6","id":"17d2b563-d06c-4cc7-8057-ec102d5bb314","published_at":1220140800,"summary":"The
        just finished conference Science Blogging 2008: London was a wonderful chance
        for real-life socialising networking. I started to upload some fotos to Flickr
        (e.g. Scott Keir explaining sign language, see all fotos tagged\n<em>\n <em>\n  sciblog\n
        </em>\n</em>\nhere), some of them are too embarrassing and I will keep them
        for bribes reference later on. The meeting was also a great opportunity to
        think about where we are today with scienceblogging.","title":"Science blogging
        is the new email","updated_at":1659332484,"url":"https://blog.front-matter.de/posts/science-blogging-is-the-new-email/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb3","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb3","id":"eee4d48f-6b92-4d61-b1f6-a56b48a3356f","published_at":1218931200,"summary":"Most
        scientific papers are now published in English, and I believe that this trend
        is good for international collaboration. Therefore I believe that blogs intended
        for scientists should also be written in English.","title":"Science Blogging
        in German","updated_at":1660574766,"url":"https://blog.front-matter.de/posts/science-blogging-in-german/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwap","guid":"https://doi.org/10.53731/r294649-6f79289-8cwap","id":"8d36ed00-a962-4596-b113-6a4680901270","published_at":1212537600,"summary":"As
        I said before on this blog, I do like poster sessions. The poster sessions
        at the just finished American Society of Clinical Oncology meeting didn''t
        offer food and drink, but were otherwise very enjoyable. The meeting is probably
        special because a lot of high quality research will be presented as poster,
        as there is just not enough time for enough oral sessions. Many of the poster
        presenters were senior faculty.","title":"I like poster sessions","updated_at":1660899549,"url":"https://blog.front-matter.de/posts/i-like-poster-sessions/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa2","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa2","id":"caf7eaad-f30b-461f-a71a-e1b79d289c26","published_at":1205625600,"summary":"David
        Crotty, the Executive Editor from CSH Protocols, last month wrote a provocative
        blog post called Why Web 2.0 is failing in Biology. He did an informal poll
        among scientists and found that none of them read science blogs or use social
        networking sites for scientists.","title":"Is Web 2.0 failing in Biology?","updated_at":1660397534,"url":"https://blog.front-matter.de/posts/is-web-2-0-failing-in-biology/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9q","id":"a8bb6699-166d-4bfa-b70d-2c7006d39482","published_at":1201996800,"summary":"Just
        Science is an effort to collect blog posts about science that are written
        within one week. Just Science 2008 will start tomorrow and ends February 8.
        Science bloggers that agree to participate should write one daily blog entry
        for these five days.","title":"Just Science starts tomorrow","updated_at":1659252461,"url":"https://blog.front-matter.de/posts/just-science-starts-tomorrow/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8p","id":"5dc9ad61-9164-4808-8141-7292907215d2","published_at":1187222400,"summary":"Earlier
        this month, Apple announced the productivity suite iWork 08 for Macintosh
        users.","title":"iWork 08 ready for scientists?","updated_at":1659126348,"url":"https://blog.front-matter.de/posts/iwork-08-ready-for-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw40","guid":"https://doi.org/10.53731/r294649-6f79289-8cw40","id":"01aad116-4534-484d-b492-1d3a69988b84","published_at":1237939200,"summary":"Practically
        all scientific journals now use web-based systems for paper submissions and
        peer review. This saves the authors a lot of time compared to paper submissions
        by postal mail (until 15 years ago) or email (until 5 years ago). Unfortunately
        the submission process is still far from perfect and requires authors to spend
        many hours formatting manuscripts, references and images instead of focusing
        on the scientific content.","title":"Editorial Manager: Interview with Richard
        Wynne","updated_at":1660404737,"url":"https://blog.front-matter.de/posts/editorial-manager-interview-with-richard-wynne/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3m","id":"fe213a20-1cc1-4361-ad7e-c50d631d302a","published_at":1258502400,"summary":"Last
        week the\n<em>\n New England Journal of Medicine\n</em>\n(\n<em>\n NEJM\n</em>\n)
        published a paper on selective outcome reporting in clinical trials (Vedula
        et al. 2009). The primary and secondary outcome(s) of a clinical trial could
        for example be survival in cancer patients or rate of heart attacks and other
        cardiovascular events in patients taking cholesterol-lowering drugs.","title":"Publication
        bias in clinical trials","updated_at":1711831524,"url":"https://blog.front-matter.de/posts/publication-bias-in-clinical-trials/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3p","id":"cfa83d3f-5743-49ef-a4e1-261e74eeb8c5","published_at":1244937600,"summary":"The
        term\n<em>\n <em>\n  digital divide\n </em>\n</em>\nusually describes\n<em>\n
        <em>\n  the troubling gap between those who use computers and the Internet
        and those who do not\n </em>\n</em>\n(Wikipedia). Many if not most scientists
        are experienced users of computers and the internet, and use email or public
        databases such as\n<em>\n <em>\n  PubMed\n </em>\n</em>\non a daily basis.","title":"How
        to close the digital divide among scientists","updated_at":1659253994,"url":"https://blog.front-matter.de/posts/how-to-close-the-digital-divide-among-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3y","id":"5f8c88ba-c315-4e87-bf66-bcf629d39d4f","published_at":1239580800,"summary":"The
        scientific articles we write are uniquely identified by Digital Object Identifiers
        (DOI). Many people believe that we also need unique identifiers for the authors
        of those articles. Some of the arguments why author identifiers could be very
        helpful are found in this interview with Geoffrey Bilder, this Researcher
        Identification Primer, and this FriendFeed discussion.","title":"A few questions
        about author identifiers","updated_at":1659253897,"url":"https://blog.front-matter.de/posts/a-few-questions-about-author-identifiers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3j","id":"428c5fec-3764-4351-b96d-e2d19100366d","published_at":1261872000,"summary":"Sustainability
        in science is nothing new. The term sustainability science was probably first
        used in 2001 (see Wikipedia entry), and the title of this blog post was already
        used by a 2002 editorial in\n<em>\n <em>\n  Science\n </em>\n</em>\n. There
        are both journals (Sustainability: Science, Practice &amp; Policy, Sustainability
        Science) and conferences (e.g. here and here) about this topic and you can
        get a degree in sustainability science.","title":"Science and Sustainability","updated_at":1659503364,"url":"https://blog.front-matter.de/posts/science-and-sustainability/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3g","id":"5698c5b1-793e-41e6-99bd-16417bb3985b","published_at":1260662400,"summary":"Earlier
        this month I gave this talk in my department. It is basically a summary of
        two blog posts that I wrote in October during\n<strong>\n <strong>\n  Open
        Access Week\n </strong>\n</strong>\n(Open Access Week: a researcher''s perspective
        part I and part II), and I had given a similar talk in November in an Open
        Access workshop organized by the Helmholtz Association.","title":"On giving
        a talk about Open Access in my department","updated_at":1660289841,"url":"https://blog.front-matter.de/posts/on-giving-a-talk-about-open-access-in-my-department/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbs","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbs","id":"36918e05-f11b-4b6a-89a7-dd9029a1f2f4","published_at":1253836800,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nSaturday had two more sessions
        before the end of the meeting. Irina Stancheva from the Wellcome Trust Centre
        for Cell Biology at the University of Edinburgh started us into the day with
        a talk on epigenetics in mouse development. One form of epigenetic silencing
        is methylation of cytosine bases in DNA.","title":"German Genetics Society
        Meeting 2009: Session VI","updated_at":1659334102,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-vi/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbr","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbr","id":"04f0919b-cc1e-44a4-b802-085abf509482","published_at":1253750400,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nAs promised, I attended the second
        Plant Genetics session of the meeting, thus missing the Epigenetics session.
        I learned an important lesson at the first talk by Juliette de Meaux from
        the Max Planck Institute for Plant Breeding Research: Bring sweets for the
        audience, and you have everyone on your side!","title":"German Genetics Society
        Meeting 2009: Session Plant Genetics II","updated_at":1659333961,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-plant-genetics-ii/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbq","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbq","id":"1d3ce444-383e-4d37-bd9e-5f14477f9c76","published_at":1253750400,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nThe last session on Thursday was
        split into two talks by Philippe Sansonetti from the Institute Pasteur in
        Paris and Julian Parkhill from the Sanger Institute in Hinxton, Great Britain.
        Both talked about pathogenic microbes, but from a different perspective.","title":"German
        Genetics Society Meeting 2009: Session III","updated_at":1659334048,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-iii/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbp","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbp","id":"3e3468af-51da-43c7-9c07-61109d7b114d","published_at":1253577600,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nBoth sessions had some interesting
        talks, so it was really hard to decide between attending Cellular Genetic
        Mechanisms or Human Genetics, but in the end I went to the former. The first
        talk by Marina Rodnina from the Max Planck Institute for Biophysical Chemistry
        is not easy to put into words.","title":"German Genetics Society Meeting 2009:
        Session Cellular Genetic Mechanisms","updated_at":1659333865,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-cellular-genetic-mechanisms/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbn","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbn","id":"b695d19d-20d1-4ab0-b770-f28d50e26fc9","published_at":1253491200,"summary":"<em>\n
        <em>\n  Another guest post by Alex Knoll reporting from the German Genetics
        Society Meeting in Cologne.\n </em>\n</em>\nThe first session on Friday started
        with a talk by Frauke Melchior from the ZMBP in Heidelberg on SUMO. Apart
        from being interesting to work with, it also is good for some rather funny
        paper titles At the start, she gave a short introduction on the proterties
        of SUMO.","title":"German Genetics Society Meeting 2009: Session IV","updated_at":1659333777,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-iv/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbg","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbg","id":"471fd89a-1eda-466c-9b64-fdceaf0cfabd","published_at":1253232000,"summary":"<em>\n
        <em>\n  The second guest post from fellow science blogger Alex Knoll reporting
        from the German Genetics Conference currently held in Cologne.\n </em>\n</em>\nThe
        first session was all over the place in terms of topics. Starting off the
        meeting, Linda Partridge from the Institute of Healthy Ageing in London and
        the Max Planck Institute for Biology of Ageing in Cologne told us about the
        Genetics of Ageing.","title":"German Genetics Society Meeting 2009: Session
        I","updated_at":1659333596,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-session-i/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbj","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbj","id":"fcb36e36-b9df-49ab-b17d-083373e2ae13","published_at":1253145600,"summary":"<em>\n
        <em>\n  This is the first of several posts by guest science blogger Alexander
        Knoll, who will report from the Annual Meeting of the German Genetics Society.
        I will be back from my summer vacation on Sunday.\n </em>\n</em>\nAway from
        my usually blogging grounds at Alles was lebt at the German Scienceblogs,
        I want to bring you impressions from the Annual Meeting of the German Genetics
        Society in Cologne.","title":"German Genetics Society Meeting 2009: Introduction","updated_at":1659333485,"url":"https://blog.front-matter.de/posts/german-genetics-society-meeting-2009-introduction/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw37","guid":"https://doi.org/10.53731/r294649-6f79289-8cw37","id":"1a8f5da5-3c54-4250-bdde-5b5b41558e43","published_at":1250726400,"summary":"Euan
        Adie in June announced the Streamosphere service on the Nascent blog: Welcome
        to the Streamosphere. His simple explanation of what Streamosphere does:  The
        Nascent blog post explains Streamosphere in more detail, in another post from
        July Euan talks about some updates to the service. I''ve asked Euan a few
        questions to learn more about Streamosphere.1. Can you explain what Streamosphere
        is and does?","title":"Streamosphere: Interview with Euan Adie","updated_at":1661768999,"url":"https://blog.front-matter.de/posts/streamosphere-interview-with-euan-adie/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3t","id":"4a4af7ee-d1f4-4b69-8b69-f7b73f39d1b2","published_at":1241136000,"summary":"Scientific
        papers are submitted to a journal as word processor files, usually in Microsoft
        Word format. After the paper is accepted for publication, the journal takes
        the manuscript and translates the text into a format that is better suited
        for publication online and/or in print. XML and the NLM DTD \u2013 a set of
        XML schema modules \u2013 have evolved as the standard data format for this
        purpose.","title":"eXtyles: Interview with Elizabeth Blake and Bruce Rosenblum","updated_at":1660404892,"url":"https://blog.front-matter.de/posts/xtyles-interview-with-elizabeth-blake-and-bruce-rosenblum/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw33","guid":"https://doi.org/10.53731/r294649-6f79289-8cw33","id":"e82260c5-257d-4a5a-8db8-c984924e8dfb","published_at":1248566400,"summary":"Last
        year\n<em>\n <em>\n  Elsevier\n </em>\n</em>\nstarted the Article 2.0 Contest
        and asked for the best ideas on how research articles should be presented
        on the web.","title":"How does the article of the future look like?","updated_at":1690472929,"url":"https://blog.front-matter.de/posts/how-does-the-article-of-the-future-look-like/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw38","guid":"https://doi.org/10.53731/r294649-6f79289-8cw38","id":"795b21ba-7818-4bbf-af34-a32fc4ac620e","published_at":1250985600,"summary":"We
        did it. Yesterday was Science Online London, a conference about the online
        communication of science that took place at the Royal Institution. I hope
        that everybody that attended had a great time. You can see a lot of conference
        coverage on Twitter (hashtag #solo09) and in the FriendFeed Science Online
        London group.","title":"Thoughts on the Science Online London Conference","updated_at":1755413476,"url":"https://blog.front-matter.de/posts/thoughts-on-the-science-online-london-conference/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw36","guid":"https://doi.org/10.53731/r294649-6f79289-8cw36","id":"8570f938-38d9-4fb5-9868-a2bec6ee2e65","published_at":1250294400,"summary":"At
        SciBar Camp Palo Alto last month, Peter Binfield from PLoS ONE gave a very
        interesting presentation on Article-level metrics from the PLoS perspective.
        Particularly interesting was his announcement that\n<em>\n <em>\n  PLoS\n
        </em>\n</em>\njournals will provide usage data (HTML pageviews, PDF and XML
        downloads) for all their articles in September.","title":"PLoS One: Interview
        with Peter Binfield","updated_at":1660667301,"url":"https://blog.front-matter.de/posts/plos-one-interview-with-peter-binfield/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3w","id":"89b3f5b7-48b7-46c6-a1c2-19e569bba4d4","published_at":1240704000,"summary":"I''ve
        recently asked a few questions about author identifiers for scientists. Here
        are the results (based on 48 responses). The results are also available as
        .xls file.","title":"A few questions about author identifiers: the answers","updated_at":1659166699,"url":"https://blog.front-matter.de/posts/a-few-questions-about-author-identifiers-the-answers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3x","id":"804a2371-2325-4dbb-9281-1966f66a5283","published_at":1240012800,"summary":"Now
        that we have a number of online reference managers to choose from, I thought
        it would be interesting to look at their popularity \u2013 both in absolute
        numbers of visitors and the in changes during the last 12 months. Online tools
        such as Compete allow everybody to do just that, and their basic functions
        are free to use.","title":"Popularity of online reference managers","updated_at":1659253944,"url":"https://blog.front-matter.de/posts/popularity-of-online-reference-managers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw3z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw3z","id":"7de0b3df-563f-452a-90f0-ad8a0b80685f","published_at":1238457600,"summary":"A
        recent\n<em>\n Nature News\n</em>\narticle by Geoff Brumfiel (Science journalism:
        Supplanting the old media?) has stirred up many interesting discussions about
        the relationship of science blogging and traditional science journalism. Good
        starting places to follow these discussions (and engage in them) are Technorati,
        Nature.com Blogs and FriendFeed. Science blogging extends, but also threatens
        traditional science journalism.","title":"Twitter for Peer Review","updated_at":1755412398,"url":"https://blog.front-matter.de/posts/twitter-for-peer-review/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw45","guid":"https://doi.org/10.53731/r294649-6f79289-8cw45","id":"5632e27c-f95e-4377-8d9d-3cbdf020e899","published_at":1235001600,"summary":"Papers
        is a great Macintosh program to manage the PDF files of scientific papers
        on your (Macintosh) computer. I''ve mentioned several times that I like the
        program and I interviewed the author Alex Griekspoor back in October.","title":"Papers
        for iPhone released \u2013 time for more poetry","updated_at":1659166619,"url":"https://blog.front-matter.de/posts/papers-for-iphone-released-time-for-more-poetry/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1h","id":"74c52bf9-8eec-44c6-8f81-688299b809de","published_at":1234902420,"summary":"Almost
        exactly two years ago,\n<strong>\n CrossRef\n</strong>\ninvited a number of
        people to discuss unique identifiers for researchers (\n<strong>\n CrossRef
        Author ID meeting\n</strong>\n). One year ago Thomson Reuters launched\n<strong>\n
        ResearcherID\n</strong>\n(\n<strong>\n Thomson Scientific launches ResearcherID
        to uniquely identify authors\n</strong>\n). And two months ago Phil Bourne
        and Lynn Fink wrote about this topic in a\n<strong>\n PLoS Computational\n</strong>","title":"Author
        Identifiers: Interview with Geoffrey Bilder","updated_at":1660667125,"url":"https://blog.front-matter.de/posts/interview-with-geoffrey-bilder/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwbe","guid":"https://doi.org/10.53731/r294649-6f79289-8cwbe","id":"c81b4126-5dc4-4cea-baa7-76635300f0e7","published_at":1227398400,"summary":"Results
        of clinical trials can sometimes not only change our understanding of the
        condition studied, but may also affect the way we practice medicine. The Justification
        for the Use of Statins in Primary Prevention: an Intervention Trial Evaluating
        Rosuvastatin (\n<em>\n <em>\n  JUPITER\n </em>\n</em>\n) is such a study.","title":"What
        are the right numbers for JUPITER?","updated_at":1659253306,"url":"https://blog.front-matter.de/posts/what-are-the-right-numbers-for-jupiter/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwae","guid":"https://doi.org/10.53731/r294649-6f79289-8cwae","id":"1405b499-2036-45d9-8f46-aa4b7968f74e","published_at":1210002480,"summary":"Last
        week I received email invitations from three different journals to submit
        a research article. I should have felt flattered, but it is unclear why it
        is me that received invitations to the journals\n<em>\n Biomarker Insights\n</em>\n,\n<em>\n
        Genomics Insights\n</em>\nand\n<em>\n International Journal of Medical Sciences\n</em>\n.
        All three journals already exist for a few years, and I wouldn''t say that
        the focus of my research is biomarkers or genomics.","title":"When calls for
        papers go wrong","updated_at":1659354854,"url":"https://blog.front-matter.de/posts/when-calls-for-papers-go-wrong/"},{"doi":"https://doi.org/10.53731/e5fkxk7-79487ej","guid":"https://doi.org/10.53731/e5fkxk7-79487ej","id":"da53e90f-5c85-48b8-bdaa-5131543b8711","published_at":1232755200,"summary":"The
        ScienceOnline09 meeting last weekend not only had a number of interesting
        presentations and discussions, but even more importantly, was a great opportunity
        to personally interact with a great number of people that share your ideas
        and interests.","title":"JoVE: Interview with Moshe Pritsker","updated_at":1660491200,"url":"https://blog.front-matter.de/posts/interview-with-moshe-pritsker/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4b","id":"71f907d9-48bd-4462-b54e-124cb8904528","published_at":1231545600,"summary":"A
        few weeks ago I wrote about the different ways results of a clinical trial
        can be reported (What are the right numbers for JUPITER). Inspired by blog
        posts by\n<em>\n Eva Amsen\n</em>\n(Failure) and\n<em>\n Sally Church\n</em>\n(Over
        hyped cancer drugs or sensational journalism?), I thought more about what
        makes scientific findings worth talking about outside of your immediate research
        community.","title":"What science is worth shouting about?","updated_at":1755346309,"url":"https://blog.front-matter.de/posts/what-science-is-worth-shouting-about/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4c","id":"c52f8627-02f9-41a3-8a00-aae21440d8fe","published_at":1229904000,"summary":"With
        the December 18 issue\n<em>\n <em>\n  Nature\n </em>\n</em>\nstarted to support
        XMP markup in article PDFs (reported last week on the\n<em>\n <em>\n  Nascent\n
        </em>\n</em>\nblog by\n<em>\n <em>\n  Tony Hammond\n </em>\n</em>\n)\n<sup>\n
        1\n</sup>\n. XMP stands for Extensible Metadata Platform and is a technology
        to embed metadata in files, including PDFs\n<sup>\n 2\n</sup>\n. XMP was created
        by Adobe (with XMP support in PDF files since 2001), but is an open standard
        with backing by others,","title":"Just DOI it!","updated_at":1659253400,"url":"https://blog.front-matter.de/posts/just-doi-it/"},{"doi":"https://doi.org/10.53731/e18npj3-3akbqq0","guid":"https://doi.org/10.53731/e18npj3-3akbqq0","id":"515b9f1a-9da0-40cc-8ea9-11d473cdf13d","published_at":1226016000,"summary":"The
        Article Authoring Tag Set of the National Library of Medicine (NLM DTD for
        short)\n<em>\n <em>\n  creates a standardized format for new journal articles
        that can be used by authors to submit publications to journals and to archives
        such as PubMed Central.\n </em>\n</em>\n[1] The Microsoft Word Article Authoring
        Add-in that was released earlier this year reads and writes this format.","title":"NLM
        DTD: Interview with Pablo Fernicola","updated_at":1660491358,"url":"https://blog.front-matter.de/posts/interview-with-pablo-fernicola/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwba","guid":"https://doi.org/10.53731/r294649-6f79289-8cwba","id":"d3a75815-caae-47d4-9903-8a8a781b3ea2","published_at":1224806400,"summary":"<em>\n
        <em>\n  Ben Goldacre: Bad Science. Published September 2008 by Fourth Estate
        Ltd. Paperback, 352 pages, ISBN 0007240198\n </em>\n</em>\nBen Goldacre, blogger
        of the\n<em>\n <em>\n  Bad Science\n </em>\n</em>\n[1] column in the Guardian
        newspaper, in September published a book based on material from his blog.
        Just like the newspaper column, the book is primarily intended for a general
        audience rather than the trained scientist or medical doctor.","title":"Book
        Review: Bad Science by Ben Goldacre","updated_at":1660575516,"url":"https://blog.front-matter.de/posts/book-review-bad-science-by-ben-goldacre/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwb4","guid":"https://doi.org/10.53731/r294649-6f79289-8cwb4","id":"26f0000c-52c1-4301-a024-faa861302d84","published_at":1219536000,"summary":"This
        blog entry is primarily intended for science educators that are interested
        in starting a blog for their teaching activities. Some of them will not be
        familiar with blogging and other web 2.0 tools. Not the typical audience of
        this blog, but I would greatly appreciate feedback, as I''m in the process
        of writing an article about this topic (in German).What is blogging and all
        this web 2.0 stuff?","title":"Edublogging for beginners","updated_at":1659253181,"url":"https://blog.front-matter.de/posts/edublogging-for-beginners/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1p","id":"c0f02b2b-2149-43dd-b2d5-abcb2919fdf2","published_at":1217721600,"summary":"A
        year ago today I wrote my first blog post on Nature Network (\n<strong>\n
        Open access may become mandatory for NIH-funded research\n</strong>\n). This
        is blog post #84 one year later and a good time to reflect on the experience.
        In May of last year I started the science blog\n<strong>\n in a nutshell\n</strong>\n,
        hosted on my own server and written just for fun.","title":"Looking back on
        a year of gobbledygook","updated_at":1755345973,"url":"https://blog.front-matter.de/posts/looking-back-on-a-year-of-gobbledygook/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwav","guid":"https://doi.org/10.53731/r294649-6f79289-8cwav","id":"34cffd63-7c62-426b-971b-2b4f9c45ca73","published_at":1215993600,"summary":"One
        of the opening lectures this Saturday of the International Congress of Genetics
        was held by Mario Capecchi. His talked was entitled\n<em>\n Modeling human
        disease in the mouse: from cancer to neuropsychiatric disorders\n</em>\n.
        In the first half he described his mouse model of synovial sarcoma. Synovial
        sarcoma is an aggressive and often fatal soft tissue tumor.","title":"Mouse
        models of human cancer and the need for more translational research","updated_at":1755345824,"url":"https://blog.front-matter.de/posts/mouse-models-of-human-cancer-and-the-need-for-more-translational-research/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwar","guid":"https://doi.org/10.53731/r294649-6f79289-8cwar","id":"18dcd87e-83aa-4149-8091-3e8c242ee60b","published_at":1214784000,"summary":"We
        have been talking a lot about Web 2.0 approaches for scientific papers. Now
        Elsevier announced an Article 2.0 Contest:\n<em>\n <em>\n  Demonstrate your
        best ideas for how scientific research articles should be presented on the
        web and compete to win great prizes!\n </em>\n</em>\nThe contest runs from
        September 1st until December 31st.","title":"I will participate in the Elsevier
        Article 2.0 Contest","updated_at":1659503592,"url":"https://blog.front-matter.de/posts/i-will-participate-in-the-elsevier-article-2-0-contest/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1r","id":"b66a586d-279c-429e-917f-85ec775a3c39","published_at":1213454460,"summary":"I\u2019ve
        written a similar post\n<strong>\n before\n</strong>\n, put I would like to
        talk about some of the features that I would like to see in an ideal paper
        writing application.\n<strong>\n Intelligent Formatting\n</strong>\nContent
        and formatting should be separated from each other.","title":"My Paper Writing
        Dream Machine 1.0","updated_at":1659503058,"url":"https://blog.front-matter.de/posts/my-paper-writing-dream-machine-1-0/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwan","guid":"https://doi.org/10.53731/r294649-6f79289-8cwan","id":"2a4076a7-f473-4170-b48f-bac193ea3908","published_at":1212364800,"summary":"I''m
        currently in Chicago at the annual meeting of the American Society of Clinical
        Oncology (ASCO). This is a large meeting on clinical cancer research with
        about 30.000 people attending. Rather than writing about the specific research
        presented and discussed at the meeting, I would like to talk about how (web)
        technology can help in having a better conference.","title":"How technology
        can help you to survive a meeting","updated_at":1660574368,"url":"https://blog.front-matter.de/posts/how-technology-can-help-you-to-survive-a-meeting/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwah","guid":"https://doi.org/10.53731/r294649-6f79289-8cwah","id":"986c4e28-3ec8-4687-8d1f-62ebfba69fd0","published_at":1210809600,"summary":"In
        the last issue of Nature, a news feature and research highlight look at two
        recent high-profile paper retractions. The two papers by biochemist Homme
        Hellinga delt with rational enzyme design. A second group couldn''t reproduce
        the results, ultimately leading to the paper retractions. Then a third group
        was able to demonstrate that rational enzyme design is indeed possible.","title":"Designer
        debacles and other misdemeanors","updated_at":1659252778,"url":"https://blog.front-matter.de/posts/designer-debacles-and-other-misdemeanors/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaf","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaf","id":"1bdcd8da-cb2d-4a2e-93e4-36d2a5071dfe","published_at":1210118400,"summary":"Google
        Publish or Perish is a new science writing tool that facilitates paper submissions.
        The tool was field-tested at the NIH and should be particularly valuable for
        open access and public access journals. Accepted papers are automatically
        added to your Researcher ID account. For more information, read this forum
        post by Matt Brown.","title":"Publish or Perish: no longer just a buzzword","updated_at":1659125670,"url":"https://blog.front-matter.de/posts/publish-or-perish-no-longer-just-a-buzzword/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1t","id":"90f8a510-6d31-4ed1-89f7-716a0803a642","published_at":1199664000,"summary":"Picking
        the right journal is one of the most important decisions when you start to
        work on a paper. You probably have a gut feeling of the journals that are
        best suited for your paper in progress. To make this decision more objective,
        you can rely on the Impact Factor of a journal. The Impact Factor is roughly
        the average number of citations per paper in a given journal and is published
        by \u00a0Thomson Scientic.","title":"Tired of Impact Factors? Try the SJR
        indicator","updated_at":1659164537,"url":"https://blog.front-matter.de/posts/tired-of-impact-factors-try-the-sjr-indicator/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8v","id":"d71eead8-f17e-46b6-a3be-b077349274bb","published_at":1190851200,"summary":"The
        Howard Hughes Medical Institute (HHMI) today announced that it will support
        Open Access in Springer journals through the Springer Open Choice program.","title":"Howard
        Hughes Medical Institute pays for Open Access in Springer journals","updated_at":1659164188,"url":"https://blog.front-matter.de/posts/howard-hughes-medical-institute-pays-for-open-access-in-springer-journals/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9e","id":"18e3875d-4b72-4c16-b3b6-4ba1ab4ce583","published_at":1198108800,"summary":"Buzzword
        is a free online word processor based on the Adobe Flash technology. I previously
        wrote about Buzzword and how it could be used to write a scientific paper.
        The first impressions were positive, so I decided to write my next paper with
        Buzzword. This paper has been submitted this week. What did I like and dislike
        about Buzzword?Good  Most importantly, there is only one version of your manuscript.","title":"Writing
        a paper with Buzzword","updated_at":1659208984,"url":"https://blog.front-matter.de/posts/writing-a-paper-with-buzzword/"},{"doi":"https://doi.org/10.53731/8zrmqsp-p0196jf","guid":"https://doi.org/10.53731/8zrmqsp-p0196jf","id":"b6621cf0-9f32-4560-99e2-2e4c03531d41","published_at":1197158400,"summary":"We
        usually look forward to a well-written paper about central aspects of your
        research. But sometimes you are frustrated. Maybe someone has done (almost)
        the same experiments, but was quicker in getting the work published. Then
        you can at least publish your results, probably in a less prestigous journal,
        to confirm these findings.","title":"Frustrations of a scientist","updated_at":1755332485,"url":"https://blog.front-matter.de/posts/frustrations-of-a-scientist/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw96","guid":"https://doi.org/10.53731/r294649-6f79289-8cw96","id":"8b835b2e-4967-4f22-95b6-6c15785ad092","published_at":1193529600,"summary":"Kathy
        Redmond wrote an editorial in the November issue of Nature Clinical Practice
        Oncology about the media coverage of cancer. She argues that this coverage
        is frequently of poor quality, reinforcing the myth of cancer as an automatic
        death sentence and the overemphasis on stories about wonder cures.","title":"Poor
        media coverage of cancer research: are blogs one answer?","updated_at":1755344371,"url":"https://blog.front-matter.de/posts/poor-media-coverage-of-cancer-research-are-blogs-one-answer/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw93","guid":"https://doi.org/10.53731/r294649-6f79289-8cw93","id":"fe23a68c-b667-466b-ba24-1db74a9b028e","published_at":1193011200,"summary":"Last
        week the German Max Planck Society (MPG) cancelled their licensing agreement
        with Springer. Starting January 1st, MPG scientists no longer have access
        to the 1200 Springer journals through the\n<em>\n <em>\n  SpringerLink\n </em>\n</em>\ninterface.
        This is an important announcement, because the MPG is one of the largest research
        organizations in Germany and Springer the second largest STM (Science, Technology,
        Medicine) publisher after Elsevier.","title":"German Max Planck Society cancels
        licensing agreement with Springer","updated_at":1659164109,"url":"https://blog.front-matter.de/posts/german-max-planck-society-cancels-licensing-agreement-with-springer/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw91","guid":"https://doi.org/10.53731/r294649-6f79289-8cw91","id":"5fd27feb-0a70-4357-b8b4-1ab6d785e787","published_at":1191196800,"summary":"Both
        Adobe and Microsoft today announced free web-based solutions for document
        sharing. Adobe Share uses the Flash technology to display various document
        formats. Tim O''Reilly has a nice writeup of the new service. Microsoft Office
        Live Workspace allows the sharing of Microsoft Office documents. Just as with
        Adobe Share, and in contrast to Google Docs, you can''t directly edit documents
        online. Why should a scientist care about all this?","title":"Adobe Share
        and Microsoft Office Live Workspace announced today","updated_at":1659126918,"url":"https://blog.front-matter.de/posts/adobe-share-and-microsoft-office-live-workspace-announced-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8x","id":"aadfc1ab-991a-4023-aeac-2596271259d6","published_at":1190160000,"summary":"This
        Monday Google officially announced Presently, their web-based application
        for presentations, a.k.a. Microsoft Powerpoint clone. Although it is possible
        to create presentations from scratch using Presently, most users will probably
        use it to upload their finished (or almost finished) Microsoft Powerpoint
        presentations (there is a 10 MB size limit). The presentations can then be
        shared either globally or to a restricted list of colleagues.","title":"You
        can now share Powerpoint presentations online with Google Presently","updated_at":1659331769,"url":"https://blog.front-matter.de/posts/you-can-now-share-powerpoint-presentations-online-with-google-presently/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwab","guid":"https://doi.org/10.53731/r294649-6f79289-8cwab","id":"6fce3b39-9617-4d8f-92a2-cd0ce6718670","published_at":1208563200,"summary":"The
        legal disputes following the withdrawal from the market of two drugs for the
        treatment of pain (the COX-2 inhibitors rofecoxib and valdecoxib) have led
        to another critical examination of the paper publishing process. I have written
        in February about the drug company Pfizer trying to obtain confidential peer
        review documents from the journals JAMA and NEJM. Courts in Chicago and Boston
        have denied such requests.","title":"On Guest authors and Ghostwriters","updated_at":1660397815,"url":"https://blog.front-matter.de/posts/on-guest-authors-and-ghostwriters/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaa","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaa","id":"4d8d63d4-8548-4fa0-a580-1b06261987b8","published_at":1208044800,"summary":"The
        new NIH Public Access policy started this past Monday. Fellow Nature Networker
        Graham Steel has summarized this week''s reaction of the blogosphere. I would
        like to highlight some of the discussions we had here on Nature Network. Bob
        O''Hara wonders about the cost of publishing in Open Access: Show us the Money!.
        He argues that shifting the costs from reader to author can create problems.","title":"Public
        Access Week: Personal Summary","updated_at":1660397731,"url":"https://blog.front-matter.de/posts/public-access-week-personal-summary/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa9","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa9","id":"4a32fc73-af85-4d87-8690-ac5ade53c496","published_at":1207872000,"summary":"I
        did a little experiment to figure out whether the full-text versions of my
        last 15 papers (published between 1997-2008) are available online. The result:3
        papers available for everybody10 papers only available from within my institution
        (Journal subscription required)2 papers only available for purchase Interestingly,
        the papers in the two journals with the highest impact factor are both available
        as full-text.","title":"Public Access Week: Who could read my papers?","updated_at":1660397653,"url":"https://blog.front-matter.de/posts/public-access-week-who-could-read-my-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa7","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa7","id":"6dd44863-8fc6-4a78-887c-8b1b68871a62","published_at":1207440000,"summary":"Around
        Christmas, mandatory open access for NIH-funded research was signed into law:
        Starting April 7, the new NIH Public Access Policy implementing this law will
        take effect for most NIH grantees. The NIH is soliciting comments until May
        1st for this new policy. Open Access and this new policy are complicated topics
        that simply can''t be covered in a single blog post.","title":"Public Access
        Week: New NIH Public Access Policy starts Today","updated_at":1659164916,"url":"https://blog.front-matter.de/posts/public-access-week-new-nih-public-access-policy-starts-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa4","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa4","id":"3a1fca72-18ec-4d8d-a5ad-8be37d01f143","published_at":1206057600,"summary":"Participation
        in a social network can have it''s perks. Thanks to the O''Reilly Group on
        Facebook (that other social network), I received a review copy of Wikipedia:
        The Missing Manual. But why would a scientist want to know how to write and
        edit articles on Wikipedia? Wikipedia has become a respectable source of information
        that rivals the more traditional encylopedias such as the Encyclopaedia Britannica.","title":"Is
        Wikipedia for Scientists?","updated_at":1659252726,"url":"https://blog.front-matter.de/posts/is-wikipedia-for-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa1","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa1","id":"66233766-ecf2-48f2-852e-b45011be307b","published_at":1205452800,"summary":"Nature
        News this week reports that This extremely embarrassing story is fortunately
        no longer possible. The German Kultusministerkonferenz decided on March 6
        (text in German) to allow U.S. PhDs to call themselves Dr. in Germany. Until
        this story evolved, I didn''t even know that this is an issue.","title":"What
        is a PhD in Germany?","updated_at":1659164791,"url":"https://blog.front-matter.de/posts/what-is-a-phd-in-germany/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa0","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa0","id":"142e21e8-b684-49fb-83f9-3a3071283b05","published_at":1205452800,"summary":"To
        celebrate the annual Pi Day, and in the good tradition of geeky music by scientists,
        I would like to draw your attention to the American Pi Song (lyrics are found
        here), best listened to at 1:59 PM today.","title":"Happy Pi Day","updated_at":1659164857,"url":"https://blog.front-matter.de/posts/happy-pi-day/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9x","id":"14a6f4a7-8403-4c1c-807d-d7e7e9b0cbf4","published_at":1204329600,"summary":"Posters
        are an important tool to communicate your research findings to a larger audience.
        The format is different from oral presentations or full papers, and special
        rules for a good poster apply. Posters can be an important step before a full
        publication, although many posters will never be peer-reviewed and published.
        The problem with posters is that they are second class citizens to oral presentations
        in most meetings.","title":"Are posters worth the effort?","updated_at":1659331869,"url":"https://blog.front-matter.de/posts/are-posters-worth-the-effort/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9w","id":"8964cab8-1391-4862-8397-ca8a38d17be1","published_at":1203724800,"summary":"Donald
        Kennedy, the edior-in-chief of Science, yesterday wrote an editorial about
        a legal dispute between the New England Journal of Medicine and the drug company
        Pfizer. Pfizer wants the NEJM to provide the reviewer comments on submitted
        papers about the two Pfizer products celecoxib (Celebrex) and valdecoxib (Bextra).
        Both drugs are used to treat pain and belong to the COX-2 inhibitor class
        of drugs.","title":"Should Peer Review be confidential?","updated_at":1660397427,"url":"https://blog.front-matter.de/posts/should-peer-review-be-confidential/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9t","id":"2cd0d8ef-b0ec-4bf9-8fa2-96173b8a8207","published_at":1203206400,"summary":"A
        Nature News article last week talked about the confusion that happens if a
        number of authors have the same or similar names (Scientific publishing: Identity
        crisis). This is apparently a special issue in China because of the difficulties
        transliterating Chinese characters into English and the use of only a limited
        number of surnames.","title":"Are names important?","updated_at":1660397365,"url":"https://blog.front-matter.de/posts/are-names-important/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9r","id":"d8759b4c-a2b0-44c6-a9d0-eb2c00d1b94b","published_at":1202342400,"summary":"Cancer
        is caused by genetic changes\n<sup>\n 1\n</sup>\n. Oncogenes harbor activating
        mutations that cause or promote cancer, whereas tumor suppressor genes\n<sup>\n
        2\n</sup>\nprotect from cancer. In this model, genetic changes in one copy
        of an oncogene, but both copies of a tumor suppressor gene are required to
        initiate cancer.","title":"Using RNA interference to identify genes that protect
        from cancer","updated_at":1736457911,"url":"https://blog.front-matter.de/posts/using-rna-interference-to-identify-genes-that-protect-from-cancer/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9m","id":"7dd94493-def3-4651-b23c-7ba42bf85196","published_at":1200873600,"summary":"Thomson
        Scientific last week announced\n<em>\n <em>\n  ResearcherID\n </em>\n</em>\n.
        ResearcherID tries to solve a problem that has annoyed me for many years.
        In contrast to papers and journals, authors are not associated with a unique
        ID in databases such as PubMed. You are lucky if you have an uncommon last
        name that contains only letters from the English alphabet.","title":"Thomson
        Scientific launches ResearcherID to uniquely identify authors","updated_at":1659354962,"url":"https://blog.front-matter.de/posts/thomson-scientific-launches-researcherid-to-uniquely-identify-authors/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9p","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9p","id":"9f6ad4fb-149c-4b54-a381-1cb2ffcbe957","published_at":1201132800,"summary":"Nature
        today published a report on the prevalence of duplicate papers in Medline.
        In this report Mounir Errami and Harold Garner estimate that there as many
        as 200.000 duplicate papers in Medline or 1% of all published papers. The
        article has already been widely cited, including of course Nature News and
        Nature Network, but also Noble Intent and DigitalKoans.","title":"Duplicate
        Papers: another trick to improve your publication record","updated_at":1659209488,"url":"https://blog.front-matter.de/posts/duplicate-papers-another-trick-to-improve-your-publication-record/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9j","id":"8fb3d323-1d7e-4073-994f-bb5290681736","published_at":1200441600,"summary":"The
        Deutsche \u00c4rzteblatt is the official journal of the German Medical Association,
        just as the British Medical Journal (BMJ) and the Journal of the American
        Medical Association (JAMA). Starting January 21, an English language version
        of the journal will be available. The publisher and editors of the journal
        decided to make this step to have the journal articles better indexed in databases
        such as PubMed and available to more readers.","title":"Should all papers
        be published in English?","updated_at":1659164596,"url":"https://blog.front-matter.de/posts/should-all-papers-be-published-in-english/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9g","id":"4dfb3f08-520a-40c0-b9c2-cc8f20d1e8a3","published_at":1200096000,"summary":"I''m
        a regular reader of TechCrunch, a popular blog about internet products and
        companies. But somehow I missed the article just before christmas that talks
        about the popularity of different Google products. In this analysis, traffic
        for Google Scholar was down 32% compared to 2006. I haven''t seen this information
        reproduced somewhere else, but the number for most of the other Google products
        were higher than 2006, as expected.","title":"Is Google Scholar use declining?","updated_at":1659209147,"url":"https://blog.front-matter.de/posts/is-google-scholar-use-declining/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9f","id":"942649d7-0396-46e3-a99d-9dfae80a3239","published_at":1198627200,"summary":"U.S.
        President Bush today signed into law the federal spending bill that includes
        provisions for NIH-funded research. Final, peer-reviewed manuscripts of NIH-funded
        research have to be publicly available at PubMed Central no later than 12
        months after publication. The Open Access mandate for NIH-funded research
        was voluntary since 2005. Fewer than 5% of research papers were actually made
        publicly available.","title":"Mandatory open access for NIH-funded research
        signed into law","updated_at":1659164480,"url":"https://blog.front-matter.de/posts/mandatory-open-access-for-nih-funded-research-signed-into-law/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9b","id":"387e96d6-1298-4aa1-8fca-d37522ae8a51","published_at":1195516800,"summary":"A
        recent Nature article, repeated in a Nautilus blog post, talks about author
        accountability. The article suggests that at least one author per collaborative
        group signs a statement with reference to Nature''s publication policies.
        This policy would certainly help avoid\n<em>\n honorary authorship\n</em>\n,
        but it can be difficult to enforce in large research projects. I would like
        to make another suggestion.","title":"How many authors makes a good paper?","updated_at":1755345216,"url":"https://blog.front-matter.de/posts/how-many-authors-makes-a-good-paper/"},{"doi":"https://doi.org/10.53731/eewgt6b-bh097qd","guid":"https://doi.org/10.53731/eewgt6b-bh097qd","id":"5451d9ba-aac1-432c-a6d4-c03bb8578bfb","published_at":1220595480,"summary":"In
        the last few months we have seen an ever increasing number of new social networking
        (Web 2.0) sites for scientists. Good Web 2.0 tools for scientists primarily
        try to solve a problem. But by adding a social aspect, they will gain useful
        features that would otherwise not be possible.","title":"Mendeley: Interview
        with Victor Henning","updated_at":1660575153,"url":"https://blog.front-matter.de/posts/interview-with-victor-henning-from-mendeley/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9c","id":"79658a65-5a67-4b1c-9460-7afc21d6005c","published_at":1195171200,"summary":"How
        could you improve your scientific writing skills? Two months ago I talked
        about books. Another idea would be a scientific writing workshop. This weekend
        I attended such a workshop, organized by Julia Klapproth and Barry Drees from
        Trilogy Writing &amp; Consulting. The workshop was organized as a 1\u00bd
        day course with many group exercises.","title":"Can a workshop improve your
        scientific writing?","updated_at":1659208685,"url":"https://blog.front-matter.de/posts/can-a-workshop-improve-your-scientific-writing/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9a","id":"3b9ff8b0-48ee-4da0-bf4d-0a08139b1052","published_at":1194912000,"summary":"Are
        you tired of writing a paper, based on real experiments? SciGen could come
        to the rescue, at least if you do computer science research. SciGen is a program
        that creates random papers, complete with results, discussion, graphs and
        references. Some of these random papers have been accepted at conferences
        or even for publication. SciGen is of course a hoax.","title":"Your next paper
        could be computer-generated","updated_at":1659208504,"url":"https://blog.front-matter.de/posts/your-next-paper-could-be-computer-generated/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw94","guid":"https://doi.org/10.53731/r294649-6f79289-8cw94","id":"40082dc4-c6d1-46b7-b7ef-9cdc2e212b16","published_at":1193097600,"summary":"Uwe
        Hossfeld and Lennart Olsson have just added a story from a dark time in German
        science to the History of Nature website. This article extends an earlier
        report from September 2006 that uncovered the story of how\n<em>\n <em>\n  Nature\n
        </em>\n</em>\nwas banned in Germany in November 1937. The arguments used by
        the German science minister Bernhard Rust at the time are not worth repeating
        \u2013 they are ideological rather than scientific arguments.","title":"Nature
        in Nazi Germany 70 years ago: no open access","updated_at":1659207437,"url":"https://blog.front-matter.de/posts/nature-in-nazi-germany-70-years-ago-no-open-access/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8t","id":"5840c547-b6b3-45ed-a0c8-a137a14109dc","published_at":1191110400,"summary":"Earlier
        this month I attended RailsConf Europe in Berlin. RailsConf is a conference
        about Ruby on Rails, a programming framework to produce websites. I''m a part-time
        Ruby on Rails programmer and had a very interesting conference. Others have
        already written about RailsConf, so I want to focus on how it was like from
        a scientist''s perspective.","title":"Notes of a scientist from RailsConf
        Europe","updated_at":1659331817,"url":"https://blog.front-matter.de/posts/notes-of-a-scientist-from-railsconf-europe/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8w","id":"fb6eb42e-d907-49d4-ac8f-cb3783aa98aa","published_at":1190851200,"summary":"I
        recently wrote about the potential of Google Docs and Zoho Writer als online
        writing tools for scientists.\n<em>\n <em>\n  Buzzword\n </em>\n</em>\nis
        another web-based writing tool and last week was opened for new users. Buzzword
        is different, because it is based on Adobe Flash, which makes for a much nicer
        user interface. As expected, Buzzword doesn''t handle references as flexible
        as Microsoft Word.","title":"More on online writing tools \u2013 Buzzword
        is different","updated_at":1659207201,"url":"https://blog.front-matter.de/posts/more-on-online-writing-tools-buzzword-is-different/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8y","id":"21dd888d-899b-4ed9-ba7c-6237267f0f4a","published_at":1189900800,"summary":"Last
        week I wrote about web-based writing tools. I believe that these tools are\n<em>\n
        <em>\n  almost\n </em>\n</em>\nthere and someone has to put the pieces together
        to make them work for writing a scientific paper. EJ Press System by EJournal
        Press, Manuscript Central by ScholarOne and Editiorial Manager by Aries Systems
        are among the most popular web-based online submission systems.","title":"Could
        you write your next paper within the manuscript submission system?","updated_at":1659503173,"url":"https://blog.front-matter.de/posts/could-you-write-your-next-paper-within-the-manuscript-submission-system/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaj","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaj","id":"07aad2f9-689e-41cb-99a6-ed82bd7cc784","published_at":1210982400,"summary":"In
        one of my first blog posts (before I joined Nature Network) about a year ago
        I wrote about the American Society of Clinical Oncology (ASCO) 2007 Meeting.
        I was surprised that only a handful of blogs reported about the event, one
        of the largest and most important meetings for clinical cancer research. One
        would think that blogging and scientific meetings would be a natural combination.","title":"Scientific
        meetings need more bloggers","updated_at":1659331913,"url":"https://blog.front-matter.de/posts/scientific-meetings-need-more-bloggers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1b","id":"d2258571-0655-4115-b2a8-d4b66a72de41","published_at":1371661980,"summary":"In
        the comments on Monday\u2019s blog post about the Markdown for Science workshop,
        Carl Boettiger had some good arguments against the proposal for how to do
        citations that we came up with during the workshop. As this is a complex topic,
        I decided to write this blog post. Citations of the scholarly literature are
        an essential part of scholarly texts and therefore have to be supported by
        scholarly markdown.","title":"Citations in Scholarly Markdown","updated_at":1741370332,"url":"https://blog.front-matter.de/posts/citations-in-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/ftm7mbj-jpteh8h","guid":"https://doi.org/10.53731/ftm7mbj-jpteh8h","id":"93dbf47b-38a9-46d2-9ec7-a0c51658306d","published_at":1236124800,"summary":"Zotero
        is a reference manager built as an extension of the Firefox web browser. The
        best introduction to Zotero is probably this short video. Last week the newest
        version (1.5 beta) was announced on the Zotero blog. Among the most exciting
        new features is the synchronization of library data with the Zotero server,
        which in the future will allow a lot of interesting social features.","title":"Zotero:
        Interview with Trevor Owens","updated_at":1691328052,"url":"https://blog.front-matter.de/posts/zotero-interview-with-trevor-owens/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8q","id":"f3e3291c-3ad4-4b43-a9bc-567f937adf93","published_at":1186531200,"summary":"Three
        days ago I blogged about Yale University dropping their Biomed Central (BMC)
        membership. Matthew Cockerill, the BMC publisher yesterday wrote a response.
        Briefly, he argues that the author-pays model is a viable business model for
        Open Access publishing and that the rising costs cited by Yale are simply
        a reflection of the increasing number of articles submitted to BMC. This is
        an important discussion.","title":"Yale University drops Biomed Central membership
        \u2013 BMC responds","updated_at":1659126258,"url":"https://blog.front-matter.de/posts/yale-university-drops-biomed-central-membership-bmc-responds/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8z","id":"33cfd9f7-5c84-4b9f-9f84-2535334d5bfe","published_at":1189382400,"summary":"OncologySTAT
        is a new (it launched September 7) web portal by Reed Elsevier that offers,
        among many other things, full access to journal articles in Elsevier oncology
        journals. Elsevier hopes to generate enough revenue from selling advertising
        on the web site to compensate for (potentially) lost journal sales.","title":"OncologySTAT:
        free access to journal articles from Elsevier oncology journals","updated_at":1659126811,"url":"https://blog.front-matter.de/posts/oncologystat-free-access-to-journal-articles-from-elsevier-oncology-journals/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8m","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8m","id":"a5b9fd21-d170-4866-a01a-dba59c2b7359","published_at":1187568000,"summary":"BioMed
        Central today announced that the Howard Hughes Medical Institute will become
        a BioMed Central member (read the HHMI announcement here). HHMI will pay all
        article processing charges for HHMI investigators in BioMed Central journals
        starting September 1. This announcement comes two months after HHMI started
        to require that all HHMI-supported research has to become publicly available
        6 months after publication and at a time when Yale","title":"Howard Hughes
        Medical Institute (HHMI) becomes BioMed Central member","updated_at":1659126420,"url":"https://blog.front-matter.de/posts/howard-hughes-medical-institute-hhmi-becomes-biomed-central-member/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8r","id":"69c211a6-9cf3-4964-89bc-f97e9b06f5e2","published_at":1186272000,"summary":"The
        Yale University science libraries have decided to cancel their Biomed Central
        membership. Dramatically increasing page charges are the reason behind this
        decision. Other former members of Biomed Central include the Centers for Disease
        Control and Prevention (CDC), Brown University, The Jackson Laboratory, the
        drug company Eli Lilly, University of Oxford, Cancer Research UK, EMBL and
        DKFZ in Heidelberg, and many others.","title":"Yale University drops Biomed
        Central membership","updated_at":1659126204,"url":"https://blog.front-matter.de/posts/yale-university-drops-biomed-central-membership/"},{"doi":"https://doi.org/10.53731/r79rdp1-97aq74v-ag4nb","guid":"https://doi.org/10.53731/r79rdp1-97aq74v-ag4nb","id":"c7ca73b3-472f-419b-adf6-675d11edd587","published_at":1599436800,"summary":"Metadata
        are essential for finding, accessing, and reusing scholarly content, i.e.
        to increase the FAIRness [Wilkinson et al. (2016)] of datasets and other scholarly
        resources.","title":"Making the most out of available Metadata","updated_at":1736460200,"url":"https://blog.front-matter.de/posts/making-the-most-out-of-available-metadata/"},{"doi":"https://doi.org/10.53731/4nwxn-frt36","guid":"https://doi.org/10.53731/4nwxn-frt36","id":"5bb66e92-5cb9-4659-8aca-20e486b695c9","published_at":1684237016,"summary":"One
        question I have increasingly asked myself in the past few years. Meaning  As
        the Docker project turned ten this spring, it has become standard practice
        to distribute open source software via Docker images and to provide a Docker
        Compose file to run the software together with other dependencies. The Awesome
        Compose project has collected many examples, and all you need is a docker-compose.ymlfile
        and a recent installation of Docker, e.g.","title":"Does it compose?","updated_at":1736463697,"url":"https://blog.front-matter.de/posts/does-it-compose/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5j","id":"b5b327d5-b6f2-4ed8-b24b-40a714459486","published_at":1283817600,"summary":"This
        was the title of the session with\n<strong>\n <strong>\n  Geoff Bilder\n </strong>\n</strong>\n,\n<strong>\n
        <strong>\n  Gudmundur Thorisson\n </strong>\n</strong>\nand myself at the
        Science Online London Conference last Saturday. Geoff first introduced the
        ORCID initiative, including several \u00a0principles. We then talked about
        two use cases for ORCID.","title":"ORCID as unique author identifier: what
        is it good for and should we worry or be happy?","updated_at":1660744392,"url":"https://blog.front-matter.de/posts/orcid-as-unique-author-identifier-what-is-it-good-for-and-should-we-worry-or-be-happy/"},{"doi":"https://doi.org/10.53731/f117g-8r09","guid":"https://doi.org/10.53731/f117g-8r09","id":"3a0e3eba-4da7-435e-97f3-3a3c2526b0f2","published_at":1737982143,"summary":"The
        Rogue Scholar science blog archive continues to grow, with seven new blogs
        added this month and more than 24,000 archived blog posts. Luckily, onboarding
        new blogs is mostly automated, with the Rogue Scholar API handling the blog
        setup and blog post ingestion from RSS feeds. Some questions frequently come
        up and I try to improve the Rogue Scholar documentation to address them.","title":"Starting
        a Rogue Scholar monthly newsletter and Slack Community","updated_at":1737982143,"url":"https://blog.front-matter.de/posts/starting-rogue-scholar-monthly-newsletter-slack/"},{"doi":"https://doi.org/10.53731/a0d9m3n-n7r8h0m","guid":"https://doi.org/10.53731/a0d9m3n-n7r8h0m","id":"e5492fcd-5997-4e59-8b74-7d45973f9768","published_at":1675684344,"summary":"These
        guidelines are recommendations for authors of scholarly blogs to help with
        long-term archiving, discoverability, and citation of blog content. They are
        modeled after the publication A Data Citation Roadmap for Scholarly Data Repositories,
        where many of the same guidelines apply, and where I was the first author
        and co-chair of the corresponding Force11 working group.","title":"Guidelines
        for Scholarly Blogs","updated_at":1675684344,"url":"https://blog.front-matter.de/posts/guidelines-for-scholarly-blogs/"},{"doi":"https://doi.org/10.53731/1xbh4-mnt50","guid":"https://doi.org/10.53731/1xbh4-mnt50","id":"79de32ac-1f8a-44fb-b37d-0afe96f4cad6","published_at":1756739798,"summary":"This
        is the August issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.Blogs added to Rogue Scholar  Three
        blogs were added in August, with a few more in progress, requiring additional
        work. Welcome everybody!","title":"Rogue Scholar Newsletter August 2025","updated_at":1756739798,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-august-2025/"},{"doi":"https://doi.org/10.53731/9s79t-dn14","guid":"https://doi.org/10.53731/9s79t-dn14","id":"8e64d38b-4183-4fb1-b0cc-0df75ee5f52c","published_at":1740054406,"summary":"The
        Rogue Scholar science blog archive has started to automatically add all blog
        posts to the subject area community of the blog. Today I am adding another
        automatic community workflow: if a blog post uses tags or categories\u00a0that
        exist as Rogue Scholar topic communities, the post is automatically added
        to these communities.","title":"Adding Rogue Scholar blog posts to topic communities","updated_at":1743253681,"url":"https://blog.front-matter.de/posts/rogue-scholar-topic-communities/"},{"doi":"https://doi.org/10.53731/2vcn2-qq962","guid":"https://doi.org/10.53731/2vcn2-qq962","id":"c69b2002-46da-41ef-bd80-e5e52738f89a","published_at":1738265659,"summary":"This
        is the first issue of a new monthly newsletter from the Rogue Scholar science
        blog archive. The newsletter will report on new blogs that have joined the
        platform, important technical updates in Rogue Scholar infrastructure, community
        updates, and other news relevant to Rogue Scholar users.Blogs added to Rogue
        Scholar  Seven blogs were added in January.","title":"Rogue Scholar Newsletter
        January 2025","updated_at":1743253833,"url":"https://blog.front-matter.de/posts/newsletter-january-2025/"},{"doi":"https://doi.org/10.53731/2j1hr-5xc16","guid":"https://doi.org/10.53731/2j1hr-5xc16","id":"901235d4-4e2b-4011-9e7e-ef23a010e37a","published_at":1737555678,"summary":"References
        are an essential element of scholarly publications.","title":"Formatting references
        in blog posts","updated_at":1737649571,"url":"https://blog.front-matter.de/posts/formatting-references-in-blog-posts/"},{"doi":"https://doi.org/10.53731/sdazp-kzn55","guid":"https://doi.org/10.53731/sdazp-kzn55","id":"cda3244c-4735-4964-96c8-246f4e091174","published_at":1725264001,"summary":"In
        August v.12.0 of the InvenioRDM turn-key research data management repository
        was released, the first long-term support (LTS) release of the open source
        software since January 2023. This release enabled the migration of the Rogue
        Scholar infrastructure to the InvenioRDM platform, a process that will take
        the next four months. Deployment  The first stage of the migration was setting
        up the InvenioRDM production infrastructure.","title":"Rogue Scholar migrates
        to InvenioRDM","updated_at":1729112152,"url":"https://blog.front-matter.de/posts/rogue-scholar-migrates-to-inveniordm-2/"},{"doi":"https://doi.org/10.53731/m9d5v-xmr74","guid":"https://doi.org/10.53731/m9d5v-xmr74","id":"7bb72a86-f6c5-463f-a89d-820c1cf2fb1a","published_at":1736790070,"summary":"Last
        week I wrote about the options we have for including DOIs in RSS feeds. This
        week is implementation time. Starting today, the Atom feed of this blog includes
        the DOI in the Atom&lt;id&gt; metadata field.","title":"Including DOIs in
        RSS Feeds: Implementation","updated_at":1737650041,"url":"https://blog.front-matter.de/posts/including-dois-in-rss-feeds-implementation-2/"},{"doi":"https://doi.org/10.53731/jg09j-8ng60","guid":"https://doi.org/10.53731/jg09j-8ng60","id":"5d62def9-2aae-4a7e-a176-8731c0687c2e","published_at":1730744374,"summary":"The
        science blog archive Rogue Scholar relaunched on a new platform today. Now
        running on the InvenioRDM repository platform, Rogue Scholar continues to\n<em>\n
        improve science blogs in important ways, including full-text search, long-term
        archiving, DOIs and metadata, and\n <strong>\n  now also\n </strong>\n communities\n</em>\n.
        The fundamental services that Rogue Scholar provides have not changed.","title":"Rogue
        Scholar gets a facelift","updated_at":1737650324,"url":"https://blog.front-matter.de/posts/rogue-scholar-gets-facelift/"},{"doi":"https://doi.org/10.53731/3c6pm-xbp04","guid":"https://doi.org/10.53731/3c6pm-xbp04","id":"b1a92a3e-136b-4281-8f0a-8bfdad656bf0","published_at":1734602750,"summary":"December
        has seen good growth in the number of blogs participating in the Rogue Scholar
        science blog archive, with 10 blogs joining in the last three weeks. Here
        you can find all Rogue Scholar blogs, sorted by join date, and the December
        2024 additions are listed below.","title":"Blogs joining Rogue Scholar in
        December 2024","updated_at":1737650087,"url":"https://blog.front-matter.de/posts/joining-rogue-scholar-december-2024/"},{"doi":"https://doi.org/10.53731/mshsw-mjc18","guid":"https://doi.org/10.53731/mshsw-mjc18","id":"c72e83ec-0dba-4520-a458-65a3ef7d193c","published_at":1734364672,"summary":"On
        October 16, 2024, the Rogue Scholar Advisory Board met for the second time
        since it started in January 2024. Since January Rogue Scholar has achieved
        several major milestones. In May, DOI registration was switched to using a
        new commonmeta Go library. This switch allows faster and more flexible  DOI
        registrations and updates (supporting both Crossref and DataCite), which now
        routinely happen within minutes of blog post publication.","title":"Report
        Rogue Scholar Advisory Board Meeting October 16, 2024","updated_at":1737650116,"url":"https://blog.front-matter.de/posts/report-rogue-scholar-advisory-board-meeting-october-16-2024/"},{"doi":"https://doi.org/10.53731/x2bjq-mp305","guid":"https://doi.org/10.53731/x2bjq-mp305","id":"ee46f497-0ddc-4d10-8ce8-9528e164346a","published_at":1733135194,"summary":"Starting
        this week, users of the science blog archive Rogue Scholar can sign in into
        the service using their ORCID credentials.","title":"Rogue Scholar enables
        sign-in with ORCID","updated_at":1736361041,"url":"https://blog.front-matter.de/posts/rogue-scholar-sign-in-with-orcid/"},{"doi":"https://doi.org/10.53731/gqjqv-ntp57","guid":"https://doi.org/10.53731/gqjqv-ntp57","id":"c31801f7-2415-43d1-87d1-e8c05f6e6046","published_at":1732744010,"summary":"The
        latest update of the Rogue Scholar science blog archive this week improves
        the finding and tracking of science blog post references, both on the website
        and in the API. This update again takes advantage of functionality of the
        InvenioRDM repository platform, with some minor tweaks.","title":"Improving
        Rogue Scholar references","updated_at":1737650220,"url":"https://blog.front-matter.de/posts/rogue-scholar-references/"},{"doi":"https://doi.org/10.53731/31k6z-6a925","guid":"https://doi.org/10.53731/31k6z-6a925","id":"b7a9794e-c758-4658-ab38-add83cef4f60","published_at":1731323511,"summary":"The
        science blog archive Rogue Scholar was relaunched on the InvenioRDM repository
        platform last week. While there is still a lot of migration work to do in
        the coming months, this is a good time to start the Rogue Scholar 111 Pledge
        Drive today.","title":"Announcing the Rogue Scholar 111 Pledge Drive","updated_at":1737650300,"url":"https://blog.front-matter.de/posts/rogue-scholar-111-pledge-drive/"},{"doi":"https://doi.org/10.53731/qq42q-bbg27","guid":"https://doi.org/10.53731/qq42q-bbg27","id":"c6b7a77e-4a39-41b4-a855-51f6c045efab","published_at":1732556904,"summary":"Last
        week I reported that the commonmeta Go library can now directly register metadata
        with Crossref and InvenioRDM repositories.","title":"Commonmeta is learning
        new tricks","updated_at":1737650241,"url":"https://blog.front-matter.de/posts/commonmeta-is-learning-new-tricks/"},{"doi":"https://doi.org/10.53731/8gmaq-t7s42","guid":"https://doi.org/10.53731/8gmaq-t7s42","id":"3caeb2d1-0e53-489a-b3b1-b0bbfd44f7c9","published_at":1732039030,"summary":"The
        science blog archive Rogue Scholar depends heavily on GitHub Actions. They
        are used to trigger content and metadata extraction of new blog posts and
        to register DOIs for these posts with Crossref. More recently they have also
        been used to push this content and metadata to the new InvenioRDM-based Rogue
        Scholar platform. GitHub Actions are workflows that typically operate on the
        command line.","title":"Going beyond GitHub Actions for Rogue Scholar","updated_at":1737650268,"url":"https://blog.front-matter.de/posts/going-beyond-hithub-actions/"},{"doi":"https://doi.org/10.53731/a7v8h-8px31","guid":"https://doi.org/10.53731/a7v8h-8px31","id":"d2d23670-4fd9-4652-8b6f-d78218c75008","published_at":1728922249,"summary":"Last
        week I integrated the InvenioRDM API with the Rogue Scholar API, enabling
        the automated export of metadata to the InvenioRDM platform. As of today,
        5,046 (28.8%) blog posts have been exported to InvenioRDM and can be explored
        via UI and API, The export currently includes most metadata, but support for
        references, relations and funding information still needs to be added, as
        does the export of full-text in markdown and PDF formats.","title":"The Rogue
        Scholar migration to InvenioRDM is taking shape","updated_at":1740924952,"url":"https://blog.front-matter.de/posts/the-rogue-scholar-migration-to-inveniordm-is-taking-shape/"},{"doi":"https://doi.org/10.53731/dv8z6-a6s33","guid":"https://doi.org/10.53731/dv8z6-a6s33","id":"c5c2e4e7-ac05-413b-b377-f989a72a5356","published_at":1728301297,"summary":"The
        Rogue Scholar infrastructure started migrating to InvenioRDM infrastructure
        a few weeks ago. This first phase of the migration will conclude on November
        4 with the switch of the Rogue Scholar frontend (rogue-scholar.org) to InvenioRDM
        (to what is currently hosted at beta.rogue-scholar.org).InvenioRDM record  For
        the most part and not by coincidence, InvenioRDM is a very good fit for Rogue
        Scholar.","title":"Rogue Scholar learns about communities","updated_at":1737650552,"url":"https://blog.front-matter.de/posts/rogue-scholar-learns-about-communities/"},{"doi":"https://doi.org/10.53731/zkrxq-mj859","guid":"https://doi.org/10.53731/zkrxq-mj859","id":"04d07de1-769f-4f77-8c94-c8272f894aa0","published_at":1714379014,"summary":"The
        Commonmeta standard for scholarly metadata continues towards version 1.0 with
        some important changes in version v0.14, released this week. And metadata
        for all DOIs from Crossref and DataCite can now be retrieved in commonmeta
        format via a new web service.","title":"Commonmeta grows up","updated_at":1715503274,"url":"https://blog.front-matter.de/posts/commonmeta-grows-up/"},{"doi":"https://doi.org/10.53731/j24pt-fm768","guid":"https://doi.org/10.53731/j24pt-fm768","id":"58a1c62f-fc38-4f13-bd01-2a94826b3d7d","published_at":1723734947,"summary":"Version
        7 of the open source reference manager Zotero was released last Friday. Read
        the linked announcement for details, but the most excited feature for me is
        an improved built-in reader with ePub support. Zotero allows you to store
        metadata and full-text publications and while PDF is the standard format for
        journal articles and preprints, books (and book chapters) are more commonly
        distributed as ePub files.","title":"Zotero 7 released","updated_at":1737650692,"url":"https://blog.front-matter.de/posts/zotero-7-released-2/"},{"doi":"https://doi.org/10.53731/43qt9-x6p52","guid":"https://doi.org/10.53731/43qt9-x6p52","id":"0b775000-94d8-4e22-81ff-2f28aec2c98d","published_at":1715614175,"summary":"Starting
        this week, all DOIs for the Rogue Scholar blog posts are registered and updated
        using the new commonmeta Go library, replacing the commonmeta Python library.
        Authors and readers of blogs archived by Rogue Scholar shouldn''t notice a
        difference, but going forward this change will make it easier to manage the
        DOIs (close to 16K DOIs for currently 93 blogs) registered for Rogue Scholar
        blog posts.","title":"Going for DOI registration","updated_at":1737650806,"url":"https://blog.front-matter.de/posts/going-for-doi-registration/"},{"doi":"https://doi.org/10.53731/jxecm-0me48","guid":"https://doi.org/10.53731/jxecm-0me48","id":"34e67347-b17a-4003-ac7f-95e83a148bb5","published_at":1718643055,"summary":"Today
        I am happy to announce the first beta release of InvenioRDM Starter. InvenioRDM
        is an open source repository management platform developed by more than 25
        organizations coordinated by CERN. The release of  the next major version
        (v12.0) will happen in a few weeks, with the second release candidate released
        on May 31st. InvenioRDM Starter aims to make installing InvenioRDM easy via
        a prebuilt Docker image and Docker Compose file.","title":"Announcing InvenioRDM
        Starter Beta","updated_at":1737650760,"url":"https://blog.front-matter.de/posts/announcing-inveniordm-starter-beta/"},{"doi":"https://doi.org/10.53731/azg9q-3vn50","guid":"https://doi.org/10.53731/azg9q-3vn50","id":"8f00ca53-4e4b-488a-b1fe-3c991cfb3bb6","published_at":1713870421,"summary":"The
        Rogue Scholar science blog archive is built with Open Source software, starting
        with Javascript in June 2023 and adding an API written in Python in October
        2023. This week I am releasing the first version of commonmeta written in
        Go to simplify the Rogue Scholar backend.","title":"Rogue Scholar is learning
        a new language","updated_at":1737650906,"url":"https://blog.front-matter.de/posts/rogue-scholar-new-language/"},{"doi":"https://doi.org/10.53731/mgmcc-yvt53","guid":"https://doi.org/10.53731/mgmcc-yvt53","id":"aaa8c107-f2b2-4c9a-ab4f-7db62c37fcd0","published_at":1712766502,"summary":"This
        week the references included in currently 1,123 Rogue Scholar blog posts have
        become much more powerful, as they now include the full set of scholarly metadata.
        These metadata are displayed in the Rogue Scholar web pages and can be fetched
        via an open API. One of my favorite personal blog posts \u2013 about the 10th
        anniversary of PLOS ONE, reference lists, and the X-Files TV series written
        in 2016 \u2013 nicely demonstrates this new functionality.","title":"Rogue
        Scholar references learn new tricks","updated_at":1755334208,"url":"https://blog.front-matter.de/posts/rogue-scholar-references-learn-new-tricks/"},{"doi":"https://doi.org/10.53731/ne1kh-9mn38","guid":"https://doi.org/10.53731/ne1kh-9mn38","id":"fc2971bd-4f2a-4a9a-923e-bcefdd094c52","published_at":1712570594,"summary":"From
        the start last year one important goal for the Rogue Scholar science blog
        archive was to make it easy to use for blog authors and readers. Today I want
        to focus on another aspect: keep it simple to run Rogue Scholar infrastructure.
        To address that goal I started development work last week to further simplify
        one important aspect of Rogue Scholar infrastructure: metadata conversion.","title":"Simplifying
        Rogue Scholar Infrastructure","updated_at":1737650976,"url":"https://blog.front-matter.de/posts/simplifying-rogue-scholar-infrastructure/"},{"doi":"https://doi.org/10.53731/bxk5g-pxw97","guid":"https://doi.org/10.53731/bxk5g-pxw97","id":"4e7c3c96-cfdb-4aa8-b1e6-98cf10d31dd8","published_at":1709633272,"summary":"This
        week the Rogue Scholar science blog archive has added author affiliation name
        and ROR ID to the DOI metadata of about 2,500 of its 15K blog posts registered
        with Crossref. This makes Front Matter (the Crossref member registering Rogue
        Scholar DOIs) one of the top 10 ROR early adopters in Crossref metadata.","title":"Rogue
        Scholar has added author affiliation metadata","updated_at":1736452688,"url":"https://blog.front-matter.de/posts/rogue-scholar-has-added-author-affiliation-metadata/"},{"doi":"https://doi.org/10.53731/j77gv-54g66","guid":"https://doi.org/10.53731/j77gv-54g66","id":"3f4b2aa1-864e-4dc9-804a-cbd1d3ec1578","published_at":1711542161,"summary":"The
        Rogue Scholar science blog archive has been collecting the references of blog
        posts since June 2023, and has registered Crossref DOIs for 1,114 blog posts
        with references as of today.","title":"Tracking references of Rogue Scholar
        blog posts","updated_at":1737651014,"url":"https://blog.front-matter.de/posts/tracking-references-of-rogue-scholar-blog-posts/"},{"doi":"https://doi.org/10.53731/2kkkq-p4h51","guid":"https://doi.org/10.53731/2kkkq-p4h51","id":"f0452080-30b1-4867-ab91-8ac5bebcad73","published_at":1710346914,"summary":"The
        Rogue Scholar science blog archive is launching a new pricing plan this week:\n<strong>\n
        Project\n</strong>\n. Blogs that participate in the\n<strong>\n Project\n</strong>\nplan
        get all the benefits of the existing\n<strong>\n Team\n</strong>\nplan \u2013
        unlimited blog posts with DOI registration, full-text search, and long-term
        archiving with the Internet Archive \u2013 for a one-time fee of $150.","title":"Rogue
        Scholar launches project plan for grant-funded projects","updated_at":1737651068,"url":"https://blog.front-matter.de/posts/rogue-scholar-launches-project-plan-for-grant-funded-projects/"},{"doi":"https://doi.org/10.53731/bdrgt-cjh09","guid":"https://doi.org/10.53731/bdrgt-cjh09","id":"4507d4c8-8481-40cd-bb7d-a8e3ecbc7abc","published_at":1708948611,"summary":"The
        Rogue Scholar science blog archive today has launched a new free\n<strong>\n
        Personal Plan\n</strong>\n: similar to the\n<strong>\n Starter Plan\n</strong>\nlaunched
        last year, but only for personal (single-author) blogs, and with no limitations
        on the number of blog posts that can be archived and registered with a DOI
        per year.","title":"Rogue Scholar launches a free personal plan","updated_at":1737651111,"url":"https://blog.front-matter.de/posts/rogue-scholar-launches-a-free-personal-plan/"},{"doi":"https://doi.org/10.53731/b8j4w-zpk40","guid":"https://doi.org/10.53731/b8j4w-zpk40","id":"7d9860c5-c1df-4812-97ff-52da2a24a22c","published_at":1708449777,"summary":"This
        week the commonmeta-py Python library adds an important new feature: metadata
        lists. With this feature commonmeta-py no longer only operates on metadata
        for a single scholarly work (e.g. a journal article, book, dataset, software,
        or blog post), but can handle lists of scholarly works.","title":"commonmeta-py
        now supports metadata lists","updated_at":1737651134,"url":"https://blog.front-matter.de/posts/commonmeta-py-now-supports-metadata-lists/"},{"doi":"https://doi.org/10.53731/9yf86-p8541","guid":"https://doi.org/10.53731/9yf86-p8541","id":"767fa1b5-2d1b-4f73-bf8a-0f4f2fa1254f","published_at":1707382841,"summary":"In
        January 2024 the new Rogue Scholar Advisory Board had its first meeting. It
        consists of six people with diverse expertise in scholarly blogging. Advisory
        Board members come from different scholarly disciplines and geographic regions,
        write in several languages besides English, and have different levels of technical
        expertise.","title":"Introducing the Rogue Scholar Advisory Board","updated_at":1737651180,"url":"https://blog.front-matter.de/posts/rogue-scholar-has-an-advisory-board/"},{"doi":"https://doi.org/10.53731/dnfg0-hge29","guid":"https://doi.org/10.53731/dnfg0-hge29","id":"41447489-a042-4c94-ab6e-ca21f2dbb16e","published_at":1706534103,"summary":"The
        Rogue Scholar science blogging archive joined the fediverse in August of last
        year. This week I want to report on an updated strategy for Rogue Scholar,
        and what it means for science blogs participating in Rogue Scholar. In August\u00a0I
        launched a Mastodon instance at\u00a0Rogue Scholar Social\u00a0that accepted
        Science Blog bots as accounts, (semi-)automatically publishing summaries of
        blog posts via Rogue Scholar.","title":"An update on Rogue Scholar in the
        fediverse","updated_at":1737651256,"url":"https://blog.front-matter.de/posts/an-update-on-the-rogue-scholar-fediverse/"},{"doi":"https://doi.org/10.53731/293b8-kbq75","guid":"https://doi.org/10.53731/293b8-kbq75","id":"a9f5cbf1-f3e9-4294-bac5-b8a9c7a15304","published_at":1706288854,"summary":"On
        Wednesday DataCite released version 4.5 of the DataCite metadata schema. Today
        I released updated versions of the commonmeta Ruby and Python libraries that
        fully support the new schema. You can install them via Rubygems and PyPI,
        respectively.","title":"Commonmeta adds DataCite schema 4.5 support","updated_at":1737651292,"url":"https://blog.front-matter.de/posts/commonmeta-adds-datacite-schema-45-support/"},{"doi":"https://doi.org/10.53731/bxgh0-dhj87","guid":"https://doi.org/10.53731/bxgh0-dhj87","id":"b3fd2c5f-235b-4ca4-b5bf-de86b0a7ace9","published_at":1706200527,"summary":"Last
        week I reported a small change to the Rogue Scholar science blog submission
        form. By asking for the homepage URL of the blog instead of the feed URL,
        I hope to make it easier for users to register their blog. At the same time,
        I fixed a bug in the submission form, caused by an issue with the database
        backend. Unfortunately, that bug fix didn''t work as expected.","title":"Adding
        automated end-to-end testing to Rogue Scholar","updated_at":1737651320,"url":"https://blog.front-matter.de/posts/adding-automated-end-to-end-testing/"},{"doi":"https://doi.org/10.53731/sgavn-wr288","guid":"https://doi.org/10.53731/sgavn-wr288","id":"29d9dc0d-3644-42d2-92fa-7b2512f30ffd","published_at":1705501571,"summary":"Yesterday
        I had to fix a bug in the Rogue Scholar registration form (a software regression
        that happened over the holidays related to database row level security). This
        was a reminder that registering a science blog with the Rogue Scholar science
        blog archive should be quick and painless. Today I made one change that hopefully
        simplifies registration: Ask for the blog homepage instead of the RSS feed
        URL.","title":"Making it easier to register a science blog with Rogue Scholar","updated_at":1707331396,"url":"https://blog.front-matter.de/posts/making-it-easier-to-register/"},{"doi":"https://doi.org/10.53731/mndd9-1d509","guid":"https://doi.org/10.53731/mndd9-1d509","id":"a18c1799-0bf0-466e-8917-2510fd504a25","published_at":1705076822,"summary":"On
        Monday the Rogue Scholar science blog archive launched the export of blog
        posts in PDF and other formats. Over the last few days I have been busy improving
        the PDF output, and today I am releasing a new version, available for all
        the more than 13K science blog posts archived by Rogue Scholar. The PDF is
        generated using the open source Pandoc universal document converter in combination
        with the Weasyprint library.","title":"Improved PDF-formatted Rogue Scholar
        blog posts","updated_at":1737651431,"url":"https://blog.front-matter.de/posts/improved-pdf-formatted-rogue-scholar-blog-posts/"},{"doi":"https://doi.org/10.53731/g60vh-3ng48","guid":"https://doi.org/10.53731/g60vh-3ng48","id":"7a077d8b-5373-4537-b400-121cee258fb4","published_at":1699549380,"summary":"Blogs
        participating in the Rogue Scholar science blog archive are now archived in
        the Internet Archive. Starting November 1st, Rogue Scholar is participating
        in the Internet Archive Archive-It service and all archived blogs can be found
        here. Archiving of all blog posts, associated HTML pages, and media will automatically
        happen every six months, with the first round of archiving well underway.","title":"Archiving
        Rogue Scholar blogs with the Internet Archive","updated_at":1737651692,"url":"https://blog.front-matter.de/posts/archiving-rogue-scholar-blogs-with-the-internet-archive/"},{"doi":"https://doi.org/10.53731/fgyjr-hg721","guid":"https://doi.org/10.53731/fgyjr-hg721","id":"cba7c066-c906-45ff-8600-a0bd485a8fb9","published_at":1701973128,"summary":"Writing
        software is more than writing code \u2013 good documentation is one essential
        aspect. A lot of the tools and libraries that make writing documentation easier
        use markdown as a file format, combined with metadata in yaml format and optionally
        some additional functionality, e.g. mdx \u2013 which combines markdown with
        jsx for JSX-based projects such as React.","title":"Documentation, documentation,
        documentation","updated_at":1737651635,"url":"https://blog.front-matter.de/posts/documentation-documentation-documentation/"},{"doi":"https://doi.org/10.53731/7qcr3-0m590","guid":"https://doi.org/10.53731/7qcr3-0m590","id":"7bf47bf9-12cc-4fa3-9983-5866c3066eef","published_at":1700835707,"summary":"Shortly
        following an update earlier this week, the Rogue Scholar science blog archive
        has updated or added two features today: better documentation and new comments.Documentation  The
        Rogue Scholar documentation site was launched with the service but hasn''t
        seen any updates in several months. Today I updated the platforms page, explaining
        what blogging platforms are used by the blogs participating in Rogue Scholar
        and how they are integrated.","title":"Rogue Scholar updates: documentation
        and comments","updated_at":1737651653,"url":"https://blog.front-matter.de/posts/rogue-scholar-updates-documentation-and-comments/"},{"doi":"https://doi.org/10.53731/fy5gh-g0w69","guid":"https://doi.org/10.53731/fy5gh-g0w69","id":"d79c9b2c-85a1-403a-8cff-4a2d7d9e3c2a","published_at":1700659022,"summary":"The
        Rogue Scholar science blog archive launched two new features today: GUIDs
        (globally unique identifiers) and support for OECD Fields of Science and Technology.
        Globally unique identifiers (GUIDs)  GUIDs are used to globally identify a
        blog post and are part of the RSS, Atom, and JSON Feed specifications.","title":"Rogue
        Scholar updates: GUIDs and fields of science","updated_at":1736413387,"url":"https://blog.front-matter.de/posts/rogue-scholar-guids-fields-of-science/"},{"doi":"https://doi.org/10.53731/j4m27-bdw69","guid":"https://doi.org/10.53731/j4m27-bdw69","id":"db56ed1f-6430-4418-b4a5-afa6338cf318","published_at":1699009062,"summary":"With
        an update launched yesterday, all blogs that participate in the Rogue Scholar
        science blog archive are now searchable by blog title, description, language,
        blogging platform, category (scientific field using the OECD Fields of Science
        and Technology), and ISSN.","title":"Rogue Scholar blogs are now searchable","updated_at":1699181519,"url":"https://blog.front-matter.de/posts/rogue-scholar-blogs-are-now-searchable/"},{"doi":"https://doi.org/10.53731/hhtx0-wb293","guid":"https://doi.org/10.53731/hhtx0-wb293","id":"0f088281-880f-4509-b5e3-d0a929518311","published_at":1698677547,"summary":"Today
        I am happy to announce an important milestone for the Rogue Scholar science
        blog archive. Starting November 1st, all blog posts from participating blogs
        will automatically be archived by the Internet Archive. Front Matter has signed
        a contract with Internet Archive to use their Archive-It service, and archiving
        will start in November.","title":"Starting November, all Rogue Scholar blog
        posts will be archived by the Internet Archive","updated_at":1744748371,"url":"https://blog.front-matter.de/posts/rogue-scholar-blog-posts-archived-by-internet-archive/"},{"doi":"https://doi.org/10.53731/qq4a5-6zc45","guid":"https://doi.org/10.53731/qq4a5-6zc45","id":"51315945-12d0-4b57-8f8d-35971bd6078c","published_at":1698165957,"summary":"The
        dedicated API for the Rogue Scholar science blog archive launched two weeks
        ago. The initial release supported fetching metadata and content from Rogue
        Scholar. Today this API was updated with important new functionality: parsing
        of science blog posts and storing the metadata and content in the Rogue Scholar.","title":"The
        Rogue Scholar API now automatically indexes blog posts","updated_at":1737651777,"url":"https://blog.front-matter.de/posts/rogue-scholar-api-indexes-posts/"},{"doi":"https://doi.org/10.53731/gzrse-p5d35","guid":"https://doi.org/10.53731/gzrse-p5d35","id":"1cc6de6d-9eef-4305-a936-933446c315dd","published_at":1697042431,"summary":"On
        Monday the Rogue Scholar science blog archive launched a dedicated API. Today
        I am reporting on the first Jupyter notebook using that API to generate an
        overlay blog post. An\n<strong>\n overlay blog post\n</strong>\napplies the
        idea of an\n<strong>\n overlay journal\n</strong>\nto science blog posts,
        and the Rogue Scholar API \u2013 in combination with content that has an open
        license (CC-BY) \u2013 makes that easy.","title":"Generating Overlay blog
        posts","updated_at":1737651815,"url":"https://blog.front-matter.de/posts/generating-overlay-blog-posts/"},{"doi":"https://doi.org/10.53731/ybhah-9jy85","guid":"https://doi.org/10.53731/ybhah-9jy85","id":"4ede6374-6ba8-436f-81e6-4504fd70441a","published_at":1696415792,"summary":"Newsletters
        have been around forever, but their popularity has significantly increased
        in the past few years, also thanks to platforms such as Ghost, Medium, and
        Substack. Which of course also includes science newsletters.Failure of advertising
        as a revenue model  The most important driver of this trend is probably the
        realization that advertising is a poor revenue model for content published
        on the web, including blogs.","title":"The rise of the (science) newsletter","updated_at":1744748150,"url":"https://blog.front-matter.de/posts/the-rise-of-the-science-newsletter/"},{"doi":"https://doi.org/10.53731/yaws9-eyt23","guid":"https://doi.org/10.53731/yaws9-eyt23","id":"3a14093c-03f8-4a66-8512-47266b2e5759","published_at":1696276976,"summary":"Metadata
        are an important feature of every scholarly resource. For science blog posts
        \u2013 which are published with far fewer resources than for example journal
        articles or books \u2013 there is an additional requirement: make the metadata
        collection as painless as possible.","title":"Collecting metadata for science
        blog posts","updated_at":1744748236,"url":"https://blog.front-matter.de/posts/collecting-metadata/"},{"doi":"https://doi.org/10.53731/gvb08-7kc16","guid":"https://doi.org/10.53731/gvb08-7kc16","id":"c328f921-7896-4582-bb37-12dc9dc62388","published_at":1695111991,"summary":"The
        Rogue Scholar science blog archive is adding important functionality to existing
        science blogs. The first step after a blog has signed up with Rogue Scholar
        is archiving the content. This is not only needed for long-term preservation
        but also enables full-text search and DOI registration with meaningful metadata.","title":"Streamlining
        the archiving of science blog posts","updated_at":1737652038,"url":"https://blog.front-matter.de/posts/streamlining/"},{"doi":"https://doi.org/10.53731/6mkrk-dzh02","guid":"https://doi.org/10.53731/6mkrk-dzh02","id":"59be790f-f08c-4dd7-b6d7-74fe27c4df7b","published_at":1686906678,"summary":"Two
        weeks ago I started registering DOIs for blog posts included in the Rogue
        Scholar blog archive. It is an automated process but involves a lot of manual
        checks. So far I have registered 231 blog posts from 20 different science
        blogs, and I hope to finish the DOI registrations by the end of the month.","title":"Starting
        to include references in DOI metadata for blog posts","updated_at":1737652853,"url":"https://blog.front-matter.de/posts/starting-to-include-references-in-doi-metadata-for-blog-posts/"},{"doi":"https://doi.org/10.53731/c09py-3we11","guid":"https://doi.org/10.53731/c09py-3we11","id":"1bbd7036-3f57-47a0-a028-bfd6bab838c8","published_at":1691408436,"summary":"The
        Rogue Scholar science blog archive adds important functionality to existing
        science blogs, namely archiving, full-text search, and DOI registration. While
        a lot of effort has gone into making Rogue Scholar as affordable as possible
        by using Open Source software, automation, and involving the community, it
        still costs money to build and run scholarly infrastructure, including scholarly
        infrastructure for science blogs.","title":"How to support Rogue Scholar?","updated_at":1737652281,"url":"https://blog.front-matter.de/posts/how-to-support-rogue-scholar/"},{"doi":"https://doi.org/10.53731/ggtnh-1as93","guid":"https://doi.org/10.53731/ggtnh-1as93","id":"95c97731-d72c-431c-9c60-ea371972463f","published_at":1693834967,"summary":"The
        Rogue Scholar science blog archive received a small update today with the
        following changes: optionally filter blog posts by language, added support
        for all OECD fields of science and technology, and searching by DOI.","title":"New
        in Rogue Scholar: filter posts by language","updated_at":1737652116,"url":"https://blog.front-matter.de/posts/filter-posts-by-language/"},{"doi":"https://doi.org/10.53731/9cdnt-2k006","guid":"https://doi.org/10.53731/9cdnt-2k006","id":"9ccc018a-21f8-493f-9ccf-426d40362a7f","published_at":1690818822,"summary":"The
        Rogue Scholar science blog archive is growing nicely, reaching more than 1,500
        blog posts this week, and 5-10 new posts every week. You can subscribe to
        all the blogs you are interested in via an RSS Reader and use various strategies
        to find and read interesting content, but some people prefer to receive regular
        email updates instead.","title":"The Rogue Scholar weekly newsletter launches
        on Wednesday","updated_at":1736453078,"url":"https://blog.front-matter.de/posts/rogue-scholar-weekly-newsletter/"},{"doi":"https://doi.org/10.53731/f1mhr-wps22","guid":"https://doi.org/10.53731/f1mhr-wps22","id":"f0687d50-0df0-4864-a854-aed335659a68","published_at":1692612302,"summary":"Today
        I am happy to announce that the Rogue Scholar science blog archive has joined
        the Fediverse, the federated social network that communicates using the\u00a0ActivityPub\u00a0protocol.
        I have launched a Mastodon instance at Rogue Scholar Social that accepts Science
        Blog bots as accounts, publishing summaries of blog posts. Science blogs are
        typically read by going to the blog homepage with a web browser or using an
        RSS reader.","title":"Rogue Scholar joins the Fediverse","updated_at":1737652176,"url":"https://blog.front-matter.de/posts/rogue-scholar-joins-fediverse/"},{"doi":"https://doi.org/10.53731/7pqhx-z0y63","guid":"https://doi.org/10.53731/7pqhx-z0y63","id":"db5a85a2-c9e0-4997-868a-059d43cd6589","published_at":1690992651,"summary":"The
        Rogue Scholar science blog archive adds important functionality to existing
        blogs, namely long-term archiving, full-text search, and DOI registration.
        In this week''s update, I focussed on improving functionality that is specific
        for blogs and not really found regularly with other formats for scholarly
        content.Tags  Tags are a common way to categorize blog posts and help find
        content of interest.","title":"Improvements in Rogue Scholar: tags and images","updated_at":1737652707,"url":"https://blog.front-matter.de/posts/improvements-in-rogue-scholar-tags-and-images/"},{"doi":"https://doi.org/10.53731/vhw34-xxf63","guid":"https://doi.org/10.53731/vhw34-xxf63","id":"92866aa5-5a07-47ad-ad93-8a16ac116892","published_at":1689753638,"summary":"This
        week I added blog administration self-service to the Rogue Scholar blog archive.
        This makes adding a blog to Rogue Scholar easier, faster, and cheaper. To
        start blog administration please create an account with Rogue Scholar. Use
        the \"Sign In\" Link in the upper right corner to sign in or create an account
        with username and password, or sign in via Google or GitHub. Once signed in,
        you can add your blog via the Dashboard page.","title":"Launching blog administration
        self-service in Rogue Scholar","updated_at":1707335517,"url":"https://blog.front-matter.de/posts/blog-administration-self-service/"},{"doi":"https://doi.org/10.53731/89zgc-ptr93","guid":"https://doi.org/10.53731/89zgc-ptr93","id":"26f04cd8-3892-4f47-a7d7-827acf8f3a19","published_at":1688369557,"summary":"The
        Rogue Scholar science blog archive launched in April and I have been busy
        building out the core features of archiving the full-text of blog posts, establishing
        a full-text search, and registering DOIs and metadata for all posts. My announced
        goal was to complete this work by the end of the second quarter.","title":"The
        Rogue Scholar archive reaches a milestone: 1000 searchable full-text science
        blog posts with DOIs","updated_at":1737654314,"url":"https://blog.front-matter.de/posts/the-rogue-scholar-milestone/"},{"doi":"https://doi.org/10.53731/nfa3v-h9q90","guid":"https://doi.org/10.53731/nfa3v-h9q90","id":"306d7e0c-8458-4092-96f0-68ce040745ab","published_at":1681751306,"summary":"I
        am a big fan of dog food, and I wrote about this topic already seven years
        ago: One of the major projects I am working on right now is the Rogue Scholar
        science blog archive that launched at the beginning of the month. As part
        of this work \u2013 but also because I am very interested in this \u2013 I
        read a lot of science blogs.","title":"Dog food, persistent identifiers, and
        metadata","updated_at":1736463270,"url":"https://blog.front-matter.de/posts/dog-food-persistent-identifiers-and-metadata/"},{"doi":"https://doi.org/10.53731/80awr-zcc48","guid":"https://doi.org/10.53731/80awr-zcc48","id":"f9cb1cdf-0400-4379-b2fc-076136c905ab","published_at":1687871064,"summary":"In
        January I started the Rogue Scholar blog archive with the slogan \"science
        blogging on steroids\", promising to enhance science blogs in important ways.
        Earlier this month I began DOI registrations for blog posts, and I am well
        on track to complete this for the included 35 blogs with more than 1,000 blog
        posts in the next few weeks.","title":"Full-text search added to the Rogue
        Scholar science blog archive","updated_at":1707335619,"url":"https://blog.front-matter.de/posts/full-text-search-added-to-the-rogue-scholar-science-blog-archive/"},{"doi":"https://doi.org/10.53731/wa7k5-v4t16","guid":"https://doi.org/10.53731/wa7k5-v4t16","id":"dc475de2-aaca-4324-9b83-01c6b22f53be","published_at":1679481737,"summary":"While
        the launch of the Rogue Scholar blog archive is still a few months away (happening
        in the second quarter of this year), I want to give an update on the ongoing
        work. The\n<em>\n Rogue Scholar\n</em>\nblog archive will improve science
        blogs in important ways, including full-text search, DOIs and metadata, and
        long-term archiving. The central piece of the underlying infrastructure is
        the InvenioRDM open source repository software.","title":"Starting the Rogue
        Scholar OPML Feed","updated_at":1737654643,"url":"https://blog.front-matter.de/posts/starting-the-rogue-scholar-opml-feed/"},{"doi":"https://doi.org/10.53731/m9fs5-nap05","guid":"https://doi.org/10.53731/m9fs5-nap05","id":"fb7abef9-d035-47a0-bc31-b5b1240cac19","published_at":1685971104,"summary":"The
        Rogue Scholar archive of scholarly blogs has grown to 34 blogs with about
        420 blog posts.","title":"Starting to register DOIs for all blog posts included
        in the Rogue Scholar","updated_at":1736466078,"url":"https://blog.front-matter.de/posts/starting-to-register-dois-for-all-blog-posts-included-in-the-rogue-scholar/"},{"doi":"https://doi.org/10.53731/cp7apdj-jk5f471","guid":"https://doi.org/10.53731/cp7apdj-jk5f471","id":"84d36661-046c-4861-8f19-206164f63efc","published_at":1678383404,"summary":"This
        week I launched\n<strong>\n Commonmeta\n</strong>\n, a new scholarly metadata
        standard described at https://commonmeta.org. Commonmeta is the result of
        working on conversion tools for scholarly metadata for many years. One conclusion
        early on was that these conversions are many-to-many, so it becomes much easier
        to have an internal format that is the intermediate step for these conversions.","title":"Announcing
        Commonmeta","updated_at":1736460570,"url":"https://blog.front-matter.de/posts/announcing-commonmeta/"},{"doi":"https://doi.org/10.53731/z9v2s-bh329","guid":"https://doi.org/10.53731/z9v2s-bh329","id":"2a6fb006-ecb2-45d0-9d73-ca8a0e7f559e","published_at":1680597816,"summary":"The
        Rogue Scholar science blog archive launched with limited functionality on
        April 3rd. Interested science blogs can go to the sign-up page, provide some
        basic information via the sign-up form, and then will be added to the Rogue
        Scholar archive within two business days.","title":"The Rogue Scholar is now
        open for business","updated_at":1707335705,"url":"https://blog.front-matter.de/posts/rogue-scholar-open-for-business/"},{"doi":"https://doi.org/10.53731/fawv321-14359c4","guid":"https://doi.org/10.53731/fawv321-14359c4","id":"2fb2e235-a8da-4ffb-8e11-a468b076de91","published_at":1679324040,"summary":"Following
        recent announcements of the commonmeta standard for scholarly metadata and
        a Python package that converts several metadata formats (commonmeta-py), today
        I am happy to announce commonmeta-ruby, a Ruby gem and command-line tool to
        convert scholarly metadata using commonmeta as the internal format.","title":"Announcing
        commonmeta-ruby","updated_at":1736460493,"url":"https://blog.front-matter.de/posts/announcing-commonmeta-ruby/"},{"doi":"https://doi.org/10.53731/fezg09h-hgn1gzm","guid":"https://doi.org/10.53731/fezg09h-hgn1gzm","id":"20d7716f-a70e-4efa-8418-9dd9efbb12b1","published_at":1661445580,"summary":"This
        blog since earlier this month is no longer using a JAMStack setup but a regular
        Ghost setup using Ghost Pro for hosting. The primary driver were the new native
        search and native comments, but I needed to do a little bit of work to keep
        the DOI registration working.","title":"DOI Registrations for all Ghost Blogs","updated_at":1736463444,"url":"https://blog.front-matter.de/posts/doi-registrations-for-all-blog/"},{"doi":"https://doi.org/10.53731/88drdpz-znvdjr9","guid":"https://doi.org/10.53731/88drdpz-znvdjr9","id":"be3cf915-7233-45b4-ad38-de4190fe58c6","published_at":1675082906,"summary":"On
        Wednesday this week I am launching the\n<em>\n Front Matter Gazette\n</em>\n,
        a weekly newsletter that highlights exciting science stories from around the
        web. The linked content highlighted in the newsletter is published elsewhere
        and is free to read whenever possible. The newsletter requires a paid subscription
        (available here), 5 \u20ac/month or 50 \u20ac/year with a thirty-day free
        trial and free subscriptions on request.","title":"Launching the Front Matter
        Gazette","updated_at":1707336000,"url":"https://blog.front-matter.de/posts/launching-the-front-matter-gazette/"},{"doi":"https://doi.org/10.53731/avg2ykg-gdxppcd","guid":"https://doi.org/10.53731/avg2ykg-gdxppcd","id":"aaf7245a-380b-4aad-b4bf-05d61c945f34","published_at":1674659657,"summary":"Science
        blogs have been around for at least 20 years and have become an important
        part of science communication. So are there any fundamental issues that need
        fixing?Barriers to Entry  Blogging platforms are mature at this point, and
        the technology is not imposing barriers to entry for most people.","title":"Do
        we need to fix science blogs?","updated_at":1707335780,"url":"https://blog.front-matter.de/posts/need-to-fix-science-blogs/"},{"doi":"https://doi.org/10.53731/cbdtfp1-1798beh","guid":"https://doi.org/10.53731/cbdtfp1-1798beh","id":"0ffa03b1-436c-45b7-9830-d6b293cfa86b","published_at":1671459617,"summary":"In
        a blog post last week I talked about what I am currently working on, namely
        a) helping to make it easier (and safer) to run the InvenioRDM digital repository
        software in Docker container infrastructure, and b) working on converting
        the bolognese metadata conversion Ruby gem to Python to enhance InvenioRDM
        functionality.","title":"Launching the Front Matter Roadmap","updated_at":1737654891,"url":"https://blog.front-matter.de/posts/front-matter-roadmap/"},{"doi":"https://doi.org/10.53731/br9f5xa-a556w2t","guid":"https://doi.org/10.53731/br9f5xa-a556w2t","id":"fd5840a8-6a93-4401-81b2-c1327ab79e85","published_at":1670849913,"summary":"This
        blog post is a follow-up to a post in September (Fenner 2022a), where I announced
        that I had started working on an archive for scholarly blog posts based on
        the InvenioRDM open-source repository software.","title":"Building an archive
        for scholarly blog posts","updated_at":1707335911,"url":"https://blog.front-matter.de/posts/building-an-archive-for-scholarly-blog-posts/"},{"doi":"https://doi.org/10.53731/cgdnpqv-vxss4fm","guid":"https://doi.org/10.53731/cgdnpqv-vxss4fm","id":"0b9e2116-23ab-4e31-83e7-912f8b275dee","published_at":1660748166,"summary":"Since
        last year this blog is powered by the Ghost open source blogging platform.
        Two important and long-standing shortcomings of the platform were search and
        comments, which I added via integrating third-party tools (Typesense and Discourse,
        respectively). In the last several weeks Ghost team has worked hard to add
        these features to the core platform, described here and here.","title":"Now
        with native comments","updated_at":1661367518,"url":"https://blog.front-matter.de/posts/native-comments/"},{"doi":"https://doi.org/10.53731/c6dwz6z-zzz0b3q","guid":"https://doi.org/10.53731/c6dwz6z-zzz0b3q","id":"064b928a-8f6b-4491-9023-61952f2e51a1","published_at":1661771303,"summary":"Feature
        images are commonly used for blog posts, including on this blog. We can use
        our screenshots or photos or stock photos (ideally license free or with an
        open license) from sites like Flickr, Unsplash, or Pexels. More recently,
        we can also use artificial intelligence tools such as DALL\u00b7E 2 that generate
        images from a description in natural language.","title":"Adding Feature Images
        to Blog Posts","updated_at":1736463885,"url":"https://blog.front-matter.de/posts/adding-feature-images/"},{"doi":"https://doi.org/10.53731/bs60jms-sqaehsk","guid":"https://doi.org/10.53731/bs60jms-sqaehsk","id":"d2098d02-4a1f-4d66-9369-492489e1778b","published_at":1660227188,"summary":"The
        first post on this blog was published on August 3, 2007 (Open access may become
        mandatory for NIH-funded research). This is post number 465, and in the past
        15 years the blog has seen changes in technology and hosting location \u2013
        but I wrote all posts (with the exception of a few guest posts). The overall
        theme remained unchanged: technology used in scholarly communication.","title":"This
        blog turned 15 (years old) this month","updated_at":1660486165,"url":"https://blog.front-matter.de/posts/this-blog-turned-15-this-month/"},{"doi":"https://doi.org/10.53731/rbqhe51-97aq74v-ag89n","guid":"https://doi.org/10.53731/rbqhe51-97aq74v-ag89n","id":"55bfdcbd-1579-48fd-bf5c-23297c3fab53","published_at":1635230630,"summary":"The
        Journal of Open Source Software (JOSS) is a developer friendly, open access
        journal for research software packages published as open source software.
        JOSS started publishing in 2016, and has published more than 1,500 articles
        so far. After five years and that many articles, it is time to have a closer
        look at how JOSS content is reused.","title":"Open Scholarly Metrics for the
        Journal of Open Source Software","updated_at":1737655548,"url":"https://blog.front-matter.de/posts/open-scholarly-metrics-for-joss/"},{"doi":"https://doi.org/10.53731/rckvde5-tzg61kj-7zvc1","guid":"https://doi.org/10.53731/rckvde5-tzg61kj-7zvc1","id":"d0f0a008-48de-4e96-a015-de7431b23295","published_at":1637082146,"summary":"The
        Force2021 conference will take place from December 7-9. The conference will
        be virtual, and registration is free. And we will again be hosting a Force2021
        hackathon, as co-located virtual event on December 6 and December 10. We will
        meet for four hours each (1 PM - 5 PM GMT) and will communicate via Zoom.","title":"Join
        us for the Force2021 Hackathon","updated_at":1736451877,"url":"https://blog.front-matter.de/posts/join-us-for-the-force2021-hackathon/"},{"doi":"https://doi.org/10.53731/r79qwf1-97aq74v-ag4j1","guid":"https://doi.org/10.53731/r79qwf1-97aq74v-ag4j1","id":"7aeab9eb-9296-40ae-993e-edb8b7c2ab92","published_at":1625845140,"summary":"After
        six years as DataCite Technical Director, I am both sad and excited to announce
        that I will be leaving DataCite, beginning a new adventure as an independent
        developer for the invenioRDM project on August 1st. My focus will remain on
        research data management, but with a different angle. A lot has changed since
        2015 at DataCite in general, and the DataCite technical architecture in particular.","title":"Farewell
        to DataCite","updated_at":1660590365,"url":"https://blog.front-matter.de/posts/farewell-to-datacite/"},{"doi":"https://doi.org/10.53731/rb7xw01-97aq74v-ag7qh","guid":"https://doi.org/10.53731/rb7xw01-97aq74v-ag7qh","id":"72a17bc5-acd9-4e6f-8b64-1bc73cdd0734","published_at":1634219028,"summary":"Yesterday
        I started registering DOIs for all Front Matter blog posts. I have registered
        100 blog posts by now, and will have completed the registration process for
        all 450 blog posts on Monday. The DOIs are registered with Crossref which
        Front Matter joined in August. The blog posts are registered as posted content,
        and this is done via the metadata in schema.org format exposed on each blog
        page.","title":"The Front Matter blog now uses DOIs","updated_at":1736464806,"url":"https://blog.front-matter.de/posts/the-front-matter-blog-now-uses-dois/"},{"doi":"https://doi.org/10.53731/r79qyn1-97aq74v-ag4jh","guid":"https://doi.org/10.53731/r79qyn1-97aq74v-ag4jh","id":"3701b425-5497-47ae-83d3-3b56f688cd1d","published_at":1623944520,"summary":"DataCite
        is a DOI registration agency that enables the registration of scholarly content
        with a persistent identifier (DOI) and metadata. This content can then be
        searched for, reused, and connected to other scholarly resources. But how
        does the underlying infrastructure enable this? In this blog post, we will
        describe what we have built to make this work. This is a fairly technical
        post, as I tried to go a little deeper into the details.","title":"The DataCite
        Technology Stack","updated_at":1694087923,"url":"https://blog.front-matter.de/posts/the-datacite-technology-stack/"},{"doi":"https://doi.org/10.53731/r9nqx6h-97aq74v-ag7bw","guid":"https://doi.org/10.53731/r9nqx6h-97aq74v-ag7bw","id":"a251a725-2903-48bf-9fec-5a5dda8fde6b","published_at":1630914605,"summary":"More
        than 200 health journals today published an editorial calling for urgent action
        to keep average global temperature increases below 1.5\u00b0C, halt the destruction
        of nature, and protect health. The editorial can be read for example here
        (published under a CC-BY Open Access license), and the full list of participating
        journals can be found here. The COVID Pandemic is currently taking up all
        our attention.","title":"Editorial by more than 200 health journals: Call
        for emergency action to limit global temperature increases, restore biodiversity,
        and protect health","updated_at":1737655477,"url":"https://blog.front-matter.de/posts/editorial-by-more-than-200-call-for-emergency-action-to-limit-global-temperature-increases-restore-biodiversity-and-protect-health/"},{"doi":"https://doi.org/10.53731/r9531p1-97aq74v-ag78v","guid":"https://doi.org/10.53731/r9531p1-97aq74v-ag78v","id":"1aa440e2-fd22-4dbe-b144-b3d7daa29043","published_at":1629824244,"summary":"On
        August 19, GitHub announced software citation support in GitHub repositories.
        Citation information provided by users (using a CITATION.cff YAML file in
        the root directory of the default branch) is parsed and made available as
        bibtex file or formatted citation, currently supporting the APA citation style.","title":"A
        step forward for software citation: GitHub''s enhanced software citation support","updated_at":1736464876,"url":"https://blog.front-matter.de/posts/step-forward-for-software-citation/"},{"doi":"https://doi.org/10.53731/r8hb7h1-97aq74v-ag6ew","guid":"https://doi.org/10.53731/r8hb7h1-97aq74v-ag6ew","id":"47bfec7f-b021-41fc-83ea-8dfb9035ad19","published_at":1628605197,"summary":"The
        Front Matter blog launched last week and while the content is currently only
        written by me, I hope this will change in the coming months to include one-time
        guest posts and regular writers. One challenge is to figure out how to finance
        the blog in the long run.","title":"How readers can support the Front Matter
        blog","updated_at":1660746739,"url":"https://blog.front-matter.de/posts/how-readers-can-support/"},{"doi":"https://doi.org/10.53731/r79s4nh-97aq74v-ag4t1","guid":"https://doi.org/10.53731/r79s4nh-97aq74v-ag4t1","id":"e58dc9c8-b870-4db2-8896-238b3246c551","published_at":1561939200,"summary":"The
        connections between scholarly resources generated by persistent identifiers
        (PIDs) and associated metadata form a graph: the PID Graph [Fenner &amp; Aryani
        (2019)]. We developed this PID Graph concept in the EC-funded FREYA project,
        and have identified important use cases and technical requirements. In May,
        DataCite introduced a GraphQL API to standardize and simplify how users can
        contribute to and consume the PID Graph [Fenner (2019b)].","title":"Tracking
        the Growth of the PID Graph","updated_at":1736466569,"url":"https://blog.front-matter.de/posts/tracking-the-growth-of-the-pid-graph/"},{"doi":"https://doi.org/10.53731/r79r7fh-97aq74v-ag4m5","guid":"https://doi.org/10.53731/r79r7fh-97aq74v-ag4m5","id":"6ab7596b-0708-4c94-ab3b-d46cf8fd3675","published_at":1603929600,"summary":"DataCite
        and the FREYA project partners are proud to announce the official launch of
        DataCite Commons today.","title":"DataCite Commons at your service","updated_at":1694087681,"url":"https://blog.front-matter.de/posts/datacite-commons-at-your-service/"},{"doi":"https://doi.org/10.53731/kx45q-14h82","guid":"https://doi.org/10.53731/kx45q-14h82","id":"6f84e748-759b-497a-b075-ea254e130f0a","published_at":1598486400,"summary":"Today
        DataCite is proud to announce the launch of DataCite Commons, available at
        https://commons.datacite.org. DataCite Commons is a discovery service that
        enables simple searches while giving users a comprehensive overview of connections
        between entities in the research landscape.","title":"DataCite Commons - Exploiting
        the Power of PIDs and the PID Graph","updated_at":1694087567,"url":"https://blog.front-matter.de/posts/datacite-commons-exploiting-the-power-of-pids-and-the-pid-graph/"},{"doi":"https://doi.org/10.53731/r79rgj1-97aq74v-ag4ny","guid":"https://doi.org/10.53731/r79rgj1-97aq74v-ag4ny","id":"d2946cda-1a85-45dc-bed7-30bf5563c137","published_at":1592784000,"summary":"In
        May, the Make Data Count team announced that we have received additional funding
        from the Alfred P. Sloan Foundation for work on the Make Data Count (MDC)
        initiative.","title":"The DataCite MDC Stack","updated_at":1736464161,"url":"https://blog.front-matter.de/posts/the-datacite-mdc-stack/"},{"doi":"https://doi.org/10.53731/r79rkf1-97aq74v-ag4pj","guid":"https://doi.org/10.53731/r79rkf1-97aq74v-ag4pj","id":"2c31fae6-c39b-4341-b620-340b33b9c6d2","published_at":1588723200,"summary":"Today
        DataCite launches a new API that powers the PID Graph, the graph formed by
        scholarly resources described by persistent identifiers (PIDs) and the connections
        between them. The API is powered by GraphQL, a widely adopted Open Source
        technology that enables queries of this graph, addressing use cases of our
        community in ways that were not possible before.","title":"Powering the PID
        Graph: announcing the DataCite GraphQL API","updated_at":1736460954,"url":"https://blog.front-matter.de/posts/powering-the-pid-graph-announcing-the-datacite-graphql-api/"},{"doi":"https://doi.org/10.53731/r79spkh-97aq74v-ag4xz","guid":"https://doi.org/10.53731/r79spkh-97aq74v-ag4xz","id":"9c13de10-2ad2-4ac9-8671-8e3b5d47422c","published_at":1545177600,"summary":"All
        DataCite DOIs have associated metadata, described in the DataCite Metadata
        Schema Documentation (DataCite Metadata Working Group (2017)), validated and
        stored as XML in the DataCite Metadata Store (MDS). These metadata are then
        made available via DataCite APIs and services. For these services XML is not
        always the best format, and we are thus providing the metadata in other formats,
        most notably JSON.","title":"Introducing DataCite JSON","updated_at":1736461498,"url":"https://blog.front-matter.de/posts/introducing-datacite-json/"},{"doi":"https://doi.org/10.53731/r79s2b1-97aq74v-ag4sc","guid":"https://doi.org/10.53731/r79s2b1-97aq74v-ag4sc","id":"fdb07e8e-0287-4ce7-af53-cb50a1543738","published_at":1564099200,"summary":"DOI
        content negotiation is one of the oldest DataCite services, launched in 2012.
        Content negotiation makes it easy to fetch DataCite metadata in other metadata
        formats, for example\n<em>\n BibTeX\n</em>\nor\n<em>\n schema.org\n</em>\n,
        or as formatted citation in one of more than 5,000 citation styles. For example:curl
        -LH \"Accept: application/x-bibtex\" https://doi.org/10.5438/0000-0C2G In
        2017 we updated the service, both adding new content types (e.g.","title":"Upcoming
        Changes to DOI Content Negotiation","updated_at":1736461429,"url":"https://blog.front-matter.de/posts/upcoming-changes-to-doi-content-negotiation/"},{"doi":"https://doi.org/10.53731/r79rpj1-97aq74v-ag4qd","guid":"https://doi.org/10.53731/r79rpj1-97aq74v-ag4qd","id":"5233f822-112b-4d49-98e5-6655c183b465","published_at":1582761600,"summary":"In
        a blog post four weeks ago DataCite Executive Director Matt Buys talked about
        the DataCite strategic priorities for 2020 (Buys, 2020). In this post we want
        to talk a bit more about the strategic priorities for this year we have regarding
        services and infrastructure work: a) consolidation of our services and infrastructure,
        and b) stronger emphasis on member-driven product development.","title":"2020
        Strategic Priorities for Services and Infrastructure","updated_at":1744749648,"url":"https://blog.front-matter.de/posts/2020-strategic-priorities-for-services-and-infrastructure/"},{"doi":"https://doi.org/10.53731/r79rw6h-97aq74v-ag4r1","guid":"https://doi.org/10.53731/r79rw6h-97aq74v-ag4r1","id":"4cd25f57-dff9-42d0-a933-9772321783db","published_at":1579478400,"summary":"When
        we launched the new version of the OAI-PMH service in November (Hallett (2019)),
        and retired Solr (used by the old OAI-PMH service) in December, we completed
        the transition to Elasticsearch as our search index, and the REST API as our
        main API.","title":"Announcing the new Member API","updated_at":1736465204,"url":"https://blog.front-matter.de/posts/announcing-the-new-member-api/"},{"doi":"https://doi.org/10.53731/r79s7a1-97aq74v-ag4tq","guid":"https://doi.org/10.53731/r79s7a1-97aq74v-ag4tq","id":"5e49c75b-f239-4c8c-8c16-7c3cced90865","published_at":1558915200,"summary":"Two
        weeks ago DataCite announced the pre-release version of a GraphQL API [Fenner
        (2019)]. GraphQL simplifies complex queries that for example want to retrieve
        information about the authors, funding and data citations for a dataset with
        a DataCite DOI. These connections together form the PID Graph [Fenner &amp;","title":"Using
        Jupyter Notebooks with GraphQL and the PID Graph","updated_at":1755334025,"url":"https://blog.front-matter.de/posts/using-jupyter-notebooks-with-graphql-and-the-pid-graph/"},{"doi":"https://doi.org/10.53731/r7adsah-97aq74v-ag5mp","guid":"https://doi.org/10.53731/r7adsah-97aq74v-ag5mp","id":"014b1e3a-7d2b-4a17-af04-0f3bea6122d7","published_at":1508284800,"summary":"Today
        DataCite is launching DOI Fabrica, the next generation of DataCite\u2019s
        DOI registration service, replacing the Metadata Store (MDS). This is the
        biggest and most important product release DataCite has done in many years,
        and the result of nine months of hard work by the entire DataCite team. DOI
        registration is the core service that DataCite is providing to its members
        and the data centers they work with.","title":"Announcing DataCite DOI Fabrica","updated_at":1736464936,"url":"https://blog.front-matter.de/posts/announcing-datacite-doi-fabrica/"},{"doi":"https://doi.org/10.53731/r79sa71-97aq74v-ag4vc","guid":"https://doi.org/10.53731/r79sa71-97aq74v-ag4vc","id":"fc118d8a-ec35-4b46-9485-5b4681b39597","published_at":1557878400,"summary":"DataCite
        DOIs describe resources such as datasets, samples, software and publications
        with rich metadata. An important part of this metadata is the description
        of connections between resources that use persistent identifiers (PIDs) provided
        by DataCite and others (Crossref, ORCID, ROR, ISNI, IGSN, etc.). Together
        these resources and their connections form a graph, the PID Graph (Fenner
        &amp;","title":"The DataCite GraphQL API is now open for (pre-release) business","updated_at":1736465065,"url":"https://blog.front-matter.de/posts/the-datacite-graphql-api-is-now-open-for-pre-release-business/"},{"doi":"https://doi.org/10.53731/ewrv712-2k7rx6d","guid":"https://doi.org/10.53731/ewrv712-2k7rx6d","id":"9e24e4be-1915-48cc-a6b0-c23da5bc2857","published_at":1553731200,"summary":"Persistent
        identifiers (PIDs) are not only important to uniquely identify a publication,
        dataset, or person, but the metadata for these persistent identifiers can
        provide unambiguous linking between persistent identifiers of the same type,
        e.g. journal articles citing other journal articles, or of different types,
        e.g. linking a researcher and the datasets they produced.","title":"Introducing
        the PID Graph","updated_at":1694087324,"url":"https://blog.front-matter.de/posts/introducing-the-pid-graph/"},{"doi":"https://doi.org/10.53731/r79sjwh-97aq74v-ag4xc","guid":"https://doi.org/10.53731/r79sjwh-97aq74v-ag4xc","id":"0c4ae5ab-c203-4e55-a925-cf0f3e447ffe","published_at":1546819200,"summary":"Today
        we are announcing our first new functionality of 2019, a much improved search
        for DataCite DOIs and metadata. While the DataCite Search user interface has
        not changed, changes under the hood bring many important improvements and
        are our biggest changes to search since 2012.Faster Indexing  Newly registered
        (and tagged findable) DOIs now appear in the DataCite Search index within
        a few minutes, compared with the previous up to 12 hour lag.","title":"DataCite''s
        New Search","updated_at":1736464857,"url":"https://blog.front-matter.de/posts/datacites-new-search/"},{"doi":"https://doi.org/10.53731/r7ae36h-97aq74v-ag5pw","guid":"https://doi.org/10.53731/r7ae36h-97aq74v-ag5pw","id":"d1bdb3e8-0bb3-4b9a-b80b-2d67699d7020","published_at":1526515200,"summary":"We
        know that software is important in research, and some of us in the scholarly
        communications community, for example, in FORCE11, have been pushing the concept
        of software citation as a method to allow software developers and maintainers
        to get academic credit for their work: software releases are published and
        assigned DOIs, and software users then cite these releases when they publish
        research that uses the software.","title":"DOI Registrations for Software","updated_at":1744751860,"url":"https://blog.front-matter.de/posts/doi-registrations-for-software/"},{"doi":"https://doi.org/10.53731/r79vxn1-97aq74v-ag58n","guid":"https://doi.org/10.53731/r79vxn1-97aq74v-ag58n","id":"64d635be-cd6a-4fd1-afe1-893097a048fd","published_at":1482192000,"summary":"Eating
        your own dog food is a slang term to describe that an organization should
        itself use the products and services it provides. For DataCite this means
        that we should use DOIs with appropriate metadata and strategies for long-term
        preservation for the scholarly outputs we produce.","title":"Eating your own
        Dog Food","updated_at":1694075681,"url":"https://blog.front-matter.de/posts/eating-your-own-dog-food/"},{"doi":"https://doi.org/10.53731/r79zrr1-97aq74v-ag5k1","guid":"https://doi.org/10.53731/r79zrr1-97aq74v-ag5k1","id":"d0f52685-294b-4035-8d7d-f3456fbd760f","published_at":1483920000,"summary":"Three
        weeks ago we started assigning DOIs to every post on this blog (Fenner, 2016c).
        The process we implemented uses a new command line utility and integrates
        well with our the publishing workflow, with (almost) no extra effort compared
        to how we published blog posts before. Given that DataCite is a DOI registration
        agency, we obviously are careful about following best practices for assigning
        DOIs.","title":"Using Schema.org for DOI Registration","updated_at":1744752288,"url":"https://blog.front-matter.de/posts/using-schema-org-for-doi-registration/"},{"doi":"https://doi.org/10.53731/r7adm61-97aq74v-ag5kv","guid":"https://doi.org/10.53731/r7adm61-97aq74v-ag5kv","id":"905063c2-fd53-4705-978b-a60b95f3957c","published_at":1493337600,"summary":"While
        it is a best practice for DOIs (expressed as URL) to send the user to the
        landing page for that resource (Starr et al., 2015), sometimes we want something
        else:\n<strong>\n metadata\n</strong>\n, e.g. to generate a citation, or to
        go to the\n<strong>\n content\n</strong>\nitself. The easiest way to do that
        is to use DOI content negotiation.","title":"A Content Negotiation Update","updated_at":1694075006,"url":"https://blog.front-matter.de/posts/a-content-negotiation-update/"},{"doi":"https://doi.org/10.53731/r79x921-97aq74v-ag5a2","guid":"https://doi.org/10.53731/r79x921-97aq74v-ag5a2","id":"c755669c-4ba6-4e6b-a4a2-e50e37e78e4b","published_at":1481760000,"summary":"In
        1998 Tim Berners-Lee coined the term cool URIs (1998), that is URIs that don\u2019t
        change. We know that URLs referenced in the scholarly literature are often
        not cool, leading to link rot (Klein et al., 2014) and making it hard or impossible
        to find the referenced resource.","title":"Cool DOIs","updated_at":1744752926,"url":"https://blog.front-matter.de/posts/cool-dois/"},{"doi":"https://doi.org/10.53731/r79x5j1-97aq74v-ag59c","guid":"https://doi.org/10.53731/r79x5j1-97aq74v-ag59c","id":"a7452c16-9385-4578-817d-6766575958ab","published_at":1478131200,"summary":"Today
        we are launching a new version of the DataCite API at http://api.datacite.org.
        This new version includes numerous bug fixes and now includes related resources
        (e.g. data centers, members or contributors) according to the JSONAPI spec.
        The changelog can be found here. Current users of the API should watch out
        for breaking changes in the meta object used for faceting.","title":"A common
        API for retrieving DataCite Metadata","updated_at":1736293800,"url":"https://blog.front-matter.de/posts/a-common-api-for-retrieving-datacite-metadata/"},{"doi":"https://doi.org/10.53731/r79xvx1-97aq74v-ag5d5","guid":"https://doi.org/10.53731/r79xvx1-97aq74v-ag5d5","id":"966a3cca-2282-48c4-963e-d985a6cbac86","published_at":1477958400,"summary":"The
        scholarly research community has come to depend on a series of open identifier
        and metadata infrastructure systems to great success. Content identifiers
        (through DataCite and Crossref) and contributor identifiers (through ORCID)
        have become foundational infrastructure for the community.","title":"Announcing
        the Organization Identifier Project: a Way Forward","updated_at":1747227780,"url":"https://blog.front-matter.de/posts/announcing-the-organization-identifier-project-a-way-forward/"},{"doi":"https://doi.org/10.53731/r79yhah-97aq74v-ag5fv","guid":"https://doi.org/10.53731/r79yhah-97aq74v-ag5fv","id":"13e01631-13ee-4289-ae0c-df677e1606fa","published_at":1467676800,"summary":"This
        week we relaunched DataCite Search, providing a more user-friendly search
        interface for DataCite metadata. We also added functionality that was not
        available before. The new search uses a single entry box for queries, and
        filters by resource type, publication year and data center. A new Cite button
        will generate a citation in several popular citation styles, and in BibTeX
        and RIS import formats.","title":"Relaunching DataCite Search","updated_at":1694075466,"url":"https://blog.front-matter.de/posts/relaunching-datacite-search/"},{"doi":"https://doi.org/10.53731/r79xk11-97aq74v-ag5ca","guid":"https://doi.org/10.53731/r79xk11-97aq74v-ag5ca","id":"af9e9521-919d-4d72-9a51-1e60c3ac2e3b","published_at":1463097600,"summary":"Data
        citation is core to DataCite''s mission and DataCite is involved in several
        projects that try to facilitate data citation, including THOR, Data Citation
        Implementation Pilot (DCIP), Research Data Alliance (RDA), and COPDESS. The
        biggest roadblock for wider data citation adoption might be insufficient incentives
        for individual researchers, but another major challenge is that implementing
        data citation is still too complicated.","title":"Data catalog cards: simplifying
        article/data linking","updated_at":1744753238,"url":"https://blog.front-matter.de/posts/data-catalog-cards-simplifying-article-data-linking/"},{"doi":"https://doi.org/10.53731/r796bk1-97aq74v-ag4dq","guid":"https://doi.org/10.53731/r796bk1-97aq74v-ag4dq","id":"04c5cfac-27e0-413a-ad3d-826e74eb2184","published_at":1444867200,"summary":"<em>\n
        This blog post provides more detail for a short presentation I will give today
        at the\n <em>\n  Software Credit Workshop\n </em>\n in London.\n</em>","title":"Software
        Citation Workflows","updated_at":1694075226,"url":"https://blog.front-matter.de/posts/software-citation-workflows/"},{"doi":"https://doi.org/10.53731/r79y8rh-97aq74v-ag5ew","guid":"https://doi.org/10.53731/r79y8rh-97aq74v-ag5ew","id":"0f876fce-a624-4cd5-a9e0-14c56ed78fb7","published_at":1452470400,"summary":"As
        a provider of crucial scholarly infrastructure, it is critical that DataCite
        not only provides a reliable service, but also properly communicates problems.
        The best way to do this is via a central status page, a best practice used
        by many organizations from Github and Diqus to Slack.","title":"Launching
        the DataCite Status Page","updated_at":1736463081,"url":"https://blog.front-matter.de/posts/launching-the-datacite-status-page/"},{"doi":"https://doi.org/10.53731/r79tzg1-97aq74v-ag56j","guid":"https://doi.org/10.53731/r79tzg1-97aq74v-ag56j","id":"9aadb802-7c17-47a5-a72b-fd23e411e0f0","published_at":1446076800,"summary":"This
        Monday ORCID, CrossRef and DataCite announced (ORCID post, CrossRef post,
        DataCite post) the new auto-update service that automatically pushes metadata
        to ORCID when an ORCID identifier is found in newly registered DOI names.
        This is the first joint announcement by the three organizations, and shows
        the close collaboration between ORCID, CrossRef and DataCite.","title":"Explaining
        the DataCite/ORCID Auto-update","updated_at":1694075299,"url":"https://blog.front-matter.de/posts/explaining-the-datacite-orcid-auto-update/"},{"doi":"https://doi.org/10.53731/r79szbh-97aq74v-ag4ze","guid":"https://doi.org/10.53731/r79szbh-97aq74v-ag4ze","id":"b5ec0722-b4c6-410e-b4c9-6efcbca12185","published_at":1451260800,"summary":"The
        DataCite blog has migrated to a new platform, from a hosted version at Ghost
        to a self-hosted version using Jekyll. The main reason for this change is
        that it gives us more control over the formatting of blog posts. The migration
        was easy as both Ghost and Jekyll use markdown to format blog posts, and the
        blog post URLs haven''t changed.","title":"Announcing the DataCite Blog Relaunch","updated_at":1694075373,"url":"https://blog.front-matter.de/posts/announcing-the-datacite-blog-relaunch/"},{"doi":"https://doi.org/10.53731/r7971ah-97aq74v-ag4gw","guid":"https://doi.org/10.53731/r7971ah-97aq74v-ag4gw","id":"e3ec6eff-f977-44d7-abd0-730e32605ca7","published_at":1450828800,"summary":"When
        I started as DataCite Technical Director four months ago, my first post (Fenner,
        2015) on this blog was about what I called\n<strong>\n Data-Driven Development\n</strong>\n.
        The post included a lot of ideas on how to approach development and technical
        infrastructure. In this post I want to take a second look.","title":"Infrastructure
        Tips for the Non-Profit Startup","updated_at":1744753519,"url":"https://blog.front-matter.de/posts/infrastructure-tips-for-the-non-profit-startup/"},{"doi":"https://doi.org/10.53731/mgt0y-0hj40","guid":"https://doi.org/10.53731/mgt0y-0hj40","id":"4a40bfcc-ae18-4967-be81-4b8ce5dc592b","published_at":1444953600,"summary":"Three
        years ago today Open Researcher &amp; Contributor ID (ORCID) launched its
        service at the Outreach Meeting in Berlin. One of many tweets from the launch
        day: Executive Director Laure Haak was written a nice blog post summarizing
        the achievements in the past few years, going from 0 to 1.7 million registered
        users, 400 members, and a staff of 20. Congratulations!","title":"Happy Birthday
        ORCID","updated_at":1705143122,"url":"https://blog.front-matter.de/posts/happy-birthday-orcid/"},{"doi":"https://doi.org/10.53731/r796skh-97aq74v-ag4gb","guid":"https://doi.org/10.53731/r796skh-97aq74v-ag4gb","id":"ecad6464-b854-46cc-821b-5b389165088f","published_at":1442880000,"summary":"Yesterday
        DataCite and ePIC co-hosted the workshop Persistent Identifiers: Enabling
        Services for Data Intensive Research. Below is a short summary of the tweets,
        all using the hashtag #pid_paris. The last tweet shows the views from the
        reception. If you have any questions or comments about the event, use the
        hashtag #pid_paris on Twitter, or use the comments of this blog.","title":"Persistent
        Identifiers: Enabling Services for Data Intensive Research","updated_at":1736378763,"url":"https://blog.front-matter.de/posts/persistent-identifiers-enabling-services-for-data-intensive-research/"},{"doi":"https://doi.org/10.53731/r79tfth-97aq74v-ag53f","guid":"https://doi.org/10.53731/r79tfth-97aq74v-ag53f","id":"579fbcdf-c7c4-4cc7-8d06-1b44883577ae","published_at":1441238400,"summary":"CSV
        (comma-separated values) is a popular file format for data. It is popular
        because it is very simple: CSV is text-based and any application that can
        open text files can read or write CSV. This makes it a good fit for digital
        preservation. We don''t know how many of the datasets in DataCite use CSV
        because the format metadata attribute is not used much (this query gives you
        some examples), but we know that the number is big.","title":"Using YAML Frontmatter
        with CSV","updated_at":1736463607,"url":"https://blog.front-matter.de/posts/using-yaml-frontmatter-with-csv/"},{"doi":"https://doi.org/10.53731/r796n5h-97aq74v-ag4fn","guid":"https://doi.org/10.53731/r796n5h-97aq74v-ag4fn","id":"2ba3c512-e5a8-4a4e-9db0-62cf4d4b5538","published_at":1442361600,"summary":"We
        launched this blog six weeks ago on a hosted version of Ghost, the open source
        blogging platform. Ghost doesn''t have all the features of Wordpress or other
        more mature blogging platforms, but it is a pleasure to use. The other alternative
        would have been to put the blog up on the Drupal-based main DataCite website,
        but Drupal is really a content-management system and usually not the best
        choice for a serious blog.","title":"Adding References to the DataCite Blog","updated_at":1660556739,"url":"https://blog.front-matter.de/posts/adding-references-to-the-datacite-blog/"},{"doi":"https://doi.org/10.53731/r79t5ph-97aq74v-ag50s","guid":"https://doi.org/10.53731/r79t5ph-97aq74v-ag50s","id":"6864fbde-cd60-40ee-8c18-219481db01b0","published_at":1441756800,"summary":"Last
        week Jennifer Lin shared information on the\n<strong>\n Making Data Count\n</strong>\n(MDC)
        project on this blog. MDC is a project funded by the U.S. National Science
        Foundation (NSF) to design and develop metrics that track and measure data
        use \u2013\n<strong>\n data-level metrics\n</strong>\n(DLM).  Funding for
        the 12 month project ends October 1st, with a no-cost extension until March
        1st.","title":"Announcing Data-Level Metrics in DataCite Labs","updated_at":1695024529,"url":"https://blog.front-matter.de/posts/announcing-data-level-metrics-in-datacite-labs/"},{"doi":"https://doi.org/10.53731/r79t1hh-97aq74v-ag504","guid":"https://doi.org/10.53731/r79t1hh-97aq74v-ag504","id":"1f538609-222f-4c47-918f-f8d39f990e8e","published_at":1439596800,"summary":"Today
        DataCite received an email from a user alerting us that there are some small
        inconsistencies with our recommended data citation format:Creator (PublicationYear):
        Title. Publisher. Identifier at https://www.datacite.org/services/cite-your-data.htmlCreator;
        (PublicationYear): Title; Publisher.","title":"Overcoming Development Pain","updated_at":1660566975,"url":"https://blog.front-matter.de/posts/overcoming-development-pain/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzn","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzn","id":"de1d67aa-1650-4242-b33a-7116087e38ff","published_at":1438167120,"summary":"Starting
        next week I will work as the DataCite Technical Director, and I am excited
        about this new opportunity. But this is material for another post, here I
        want to reflect on the last three years working as Technical Lead for the
        PLOS Article-Level Metrics project.","title":"Thank you PLOS","updated_at":1693642573,"url":"https://blog.front-matter.de/posts/thank-you-plos/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzp","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzp","id":"b70ef38a-fa91-4f53-92bb-4a745f9f65d6","published_at":1436437140,"summary":"Four
        years ago I wrote a blog post about component DOIs. It is time to revisit
        the topic, in particular since our approach to citing data associated with
        a publication has changed since 2011. Component DOIs are explained in the
        CrossRef Help System: Component DOIs are DOIs, i.e. persistent identifiers
        that link directly to the resource in question, e.g. a figure in a publication.","title":"Component
        DOIs Revisited","updated_at":1736464536,"url":"https://blog.front-matter.de/posts/component-dois-revisited/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw00","guid":"https://doi.org/10.53731/r294649-6f79289-8cw00","id":"42ea11d8-a09b-47c5-a6b9-451ea7356157","published_at":1423137780,"summary":"Last
        month at the Force15 conference in Oxford Ian Mulvany and I ran a workshop
        on data citation support in reference managers. The report of that workshop
        isn\u2019t done yet, but I can say that it was a success - we now have a pretty
        good idea what the problems are and what needs to be done to fix them. The
        short summary of the workshop is in this slide deck of the presentation that
        summarized the workshop for the other Force15 attendees.","title":"Manifests
        and Reference Lists","updated_at":1660837965,"url":"https://blog.front-matter.de/posts/manifests-and-reference-lists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzw","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzw","id":"f6a575ec-4ff8-4563-9d4d-2f55d91428ab","published_at":1426852320,"summary":"Metadata
        such as author, title, journal or persistent identifier are essential for
        scholarly documents, and some of us are spending a significant part of our
        time adding or fixing metadata. Unfortunately we sometimes don\u2019t pay
        enough attention to the flow of metadata, i.e. we ignore already existing
        metadata, or reinvent the wheel in how we describe or store them. Storing
        metadata in text-based formats is usually straightforward.","title":"Metadata
        in Microsoft Word documents","updated_at":1736459947,"url":"https://blog.front-matter.de/posts/metadata-in-microsoft-word-documents/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzt","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzt","id":"ab30b0b0-887f-4b77-b00d-943c072746d3","published_at":1429789680,"summary":"Using
        Markdown to author scholarly documents is an attractive alternative to the
        standard authoring tools Microsoft Word and LaTeX. The feeling shared by many
        is that Scholarly Markdown is 80% there, and that more effort is needed for
        the remaining 20% - moving markdown from a niche into the mainstream.","title":"Introducing
        the Scholarly Markdown Bundle","updated_at":1736468880,"url":"https://blog.front-matter.de/posts/introducing-the-scholarly-markdown-bundle/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzy","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzy","id":"08c663f6-d8d8-4ef8-8bd3-ad3902110575","published_at":1424692680,"summary":"The
        iTunes Store was opened by Apple in 2003 to sell digital music and other digital
        assets. Since 2009 music purchased in the iTunes store is free of Digital
        Rights Management (DRM). Apple became the largest music vendor worldwide in
        2010, and by 2013 had sold 25 billion songs. Scholarly articles are distributed
        almost exclusively in digital form.","title":"Why there is no iTunes for science
        papers","updated_at":1660567442,"url":"https://blog.front-matter.de/posts/why-there-is-no-itunes-for-science-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzv","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzv","id":"3f9a42ea-2c58-429d-8dfe-54f9f4c912f3","published_at":1427111400,"summary":"This
        blog has been on four different platforms since starting in 2007: a custom
        blogging engine and then Movable Type on Nature Network 2007-2010, Wordpress
        on the PLOS Blogs Network 2010-2013, and the static blogging engine Jekyll
        hosted on Github Pages since 2013. It might be time for yet another blogging
        platform change.","title":"Blogging Beyond Jekyll","updated_at":1660837303,"url":"https://blog.front-matter.de/posts/blogging-beyond-jekyll/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzz","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzz","id":"3aaab156-9821-4333-8fd1-41e84e680a20","published_at":1424347200,"summary":"One
        of the challenges of collecting metrics for scholarly outputs is persistent
        identifiers. For journal articles the Digital Object Identifier (DOI) has
        become the de-facto standard, other popular identifiers are the pmid from
        PubMed, the identifiers used by Scopus and Web of Science, and the arxiv ID
        for ArXiV preprints. For other research outputs the picture is less clear.","title":"Metrics
        for scientific software","updated_at":1660837486,"url":"https://blog.front-matter.de/posts/metrics-for-scientific-software/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0b","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0b","id":"93b2cbe0-9021-4362-98bd-ea7fbe4be832","published_at":1406993160,"summary":"Before
        all our content turned digital, we already used\n<strong>\n <strong>\n  page
        numbers\n </strong>\n</strong>\nto describe a specific section of a book or
        longer document, with older manuscripts using the folio before that. Page
        numbers have transitioned to electronic books with readers such as the Kindle
        supporting them eventually. For content on the web we can use the # fragment
        identifier, e.g.","title":"Fragment Identifiers and DOIs","updated_at":1660896349,"url":"https://blog.front-matter.de/posts/fragment-identifiers-and-dois/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzx","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzx","id":"7f0f5451-43ae-41ce-bbf3-845573716538","published_at":1425124500,"summary":"Last
        week I wrote about software.lagotto.io, an instance of the lagotto open source
        software collecting metrics for the about 1,400 software repositories included
        in Sciencetoolbox. In this post I want to report the first results analyzing
        the data. If you want to follow along, please go to https://github.com/mfenner/software-analysis,
        this repository holds all the data, as well as the R code used for analysis.","title":"First
        analysis of software metrics","updated_at":1660567385,"url":"https://blog.front-matter.de/posts/first-analysis-of-software-metrics/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0h","id":"d5075a4f-ec9c-4aa4-9a4d-b42b51e57ec4","published_at":1394034420,"summary":"Last
        week I had a little discussion on Twitter about a great blog post by Zach
        Holman: Only 90s Web Developers Remember This. The post is not only fun to
        read, but also reminded me that it is now almost 20 years (1995) that I built
        my first website - of course using some of the techniques (the one pixel gif!,
        the &amp;nbsp; tag!) described in the post.","title":"Are static Websites
        the Future or the Past?","updated_at":1660569058,"url":"https://blog.front-matter.de/posts/are-static-websites-the-future-or-the-past/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0f","id":"49db8015-491d-498c-99a5-a30ba6f8d424","published_at":1397489940,"summary":"Literate
        Programming by Donald Knuth (1983) is a seminal book that introduces the concept
        of literate programming. Using technology available in 2014 we can make a
        small but important change to the last sentence: This blog post is an example
        for such a document.","title":"Literate Blogging","updated_at":1660568830,"url":"https://blog.front-matter.de/posts/literate-blogging/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw04","guid":"https://doi.org/10.53731/r294649-6f79289-8cw04","id":"27596b0b-4758-448f-8cb2-033c5f39cb86","published_at":1412175960,"summary":"In
        my last post I wrote about the importance of keeping things simple in scholarly
        publishing, today I want to go into more detail with one example: citations
        in scholarly documents. Citations are an essential part of scholarly documents,
        and they are summarized in the references section at the end of the article
        or book chapter. The problem is that not everything that is cited in a scholarly
        document ends up in the references list.","title":"Please keep it simple:
        citations, links and references","updated_at":1690924510,"url":"https://blog.front-matter.de/posts/please-keep-it-simple-citations-links-and-references/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw08","guid":"https://doi.org/10.53731/r294649-6f79289-8cw08","id":"dc70f3f3-90e1-4229-b994-1ee20ed94b08","published_at":1408374960,"summary":"In
        July and August I attended the Open Knowledge Festival and Wikimania. At both
        events I had many interesting discussions around open source tools for open
        access scholarly publishing, and I was part of a panel on that topic at Wikimania
        last Sunday.","title":"Introducing Rakali","updated_at":1660839226,"url":"https://blog.front-matter.de/posts/introducing-rakali/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0d","id":"701d7955-e54a-45af-a8b0-4ce7bf4dc88b","published_at":1406215980,"summary":"In
        a post last week I talked about roads and stagecoaches, and how work on scholarly
        infrastructure can often be more important than building customer-facing apps.
        One important aspect of that infrastructure work is to not duplicate efforts.
        A good example is information (or metadata) about scholarly publications.
        I am the technical lead for the open source article-level metrics (ALM) software.","title":"Don''t
        Reinvent the Wheel","updated_at":1660839529,"url":"https://blog.front-matter.de/posts/dont-reinvent-the-wheel/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0j","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0j","id":"2bd30417-318c-4160-9e57-a892d5a17cf8","published_at":1393861800,"summary":"In
        this post I want to talk about some of the misunderstandings I frequently
        encounter when discussing markdown as a format for authoring scholarly documents.Scholars
        will always use Microsoft Word  Microsoft Word is of course what almost all
        authors use in the life sciences and many other disciplines. One big reason
        for this is the file formats accepted my manuscript submission systems.","title":"Six
        Misunderstandings about Scholarly Markdown","updated_at":1736468542,"url":"https://blog.front-matter.de/posts/six-misunderstandings-about-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/4bvt3-hmd07","guid":"https://doi.org/10.53731/4bvt3-hmd07","id":"da23e67a-db23-49f4-9de0-7f7b32b4eaf5","published_at":1738591907,"summary":"Starting
        in February, the Rogue Scholar science blog archive is showing the citations
        (publications that cite the blog post) of science blog posts it archives.","title":"Rogue
        Scholar now shows citations of science blog posts","updated_at":1743253801,"url":"https://blog.front-matter.de/posts/citations-of-science-blog-posts/"},{"doi":"https://doi.org/10.53731/gg3ez-7d428","guid":"https://doi.org/10.53731/gg3ez-7d428","id":"5227e787-3d02-4922-b3ed-698d1abccd2e","published_at":1740505473,"summary":"The
        statistics page for the Rogue Scholar science blog archive was relaunched
        today, as Rogue Scholar reaches the major milestone of 25,000 archived science
        blog posts later this week, and the work on updating all blog posts to content
        type\n<strong>\n blog post\n</strong>\nand including each of them in a subject
        area community has been concluded.Blog Posts by Year  This page is new and
        shows the number of blog posts by year.","title":"Rogue Scholar statistics
        page relaunches","updated_at":1743253661,"url":"https://blog.front-matter.de/posts/rogue-scholar-statistics-page-relaunches/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw65","guid":"https://doi.org/10.53731/r294649-6f79289-8cw65","id":"a098579e-61bd-4e8e-afda-f86f11744791","published_at":1319241600,"summary":"Reinventing
        Discovery, the book by Michael Nielsen we all have been waiting for, has finally
        been published on Friday. Today I flew to Boston for the Microsoft Research
        eScience Workshop: Transforming Scholarly Communication, and reading the book
        on the plane was the perfect preparation for the workshop.","title":"Book
        Review: Reinventing Discovery by Michael Nielsen","updated_at":1660732387,"url":"https://blog.front-matter.de/posts/book-review-reinventing-discovery-by-michael-nielsen/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4s","id":"942fa723-a122-4276-ad89-db43d58964a2","published_at":1268611200,"summary":"Last
        month (shortly after ScienceOnline2010)\n<em>\n <em>\n  David Crotty\n </em>\n</em>\nwrote
        in a blog post Science and Web 2.0: Talking About Science vs. Doing Science:
        The blog post is required reading for everybody interested in science and
        Web 2.0 and has attracted a lot of thoughtful comments (on the blog and on
        FriendFeed). In another discussion\n<em>\n <em>\n  Thomas S\n </em>\n \u00f6\n
        <em>\n  derquist\n </em>\n</em>\nfrom the Medical Museion in Copenhagen reminded
        me that there","title":"Chances and problems of doing science online","updated_at":1688994126,"url":"https://blog.front-matter.de/posts/chances-and-problems-of-doing-science-online/"},{"doi":"https://doi.org/10.53731/8ey1pyb-bdqppv7","guid":"https://doi.org/10.53731/8ey1pyb-bdqppv7","id":"a456aec3-8c2d-40dd-8f89-7af7c1512c0f","published_at":1247875200,"summary":"Google
        Wave is a new tool for communication and collaboration on the web. When Wave
        was first announced May 28 at the Google I/O conference, many people immediately
        saw its potential as a great collaboration tool for scientists:Ricardo Vidal:
        Using Google Wave to surf the streamsMe: Google Wave \u2013 don''t forget
        the scientistsCameron Neylon: OMG! This changes EVERYTHING!","title":"Using
        Google Wave for a week \u2013 it\u2019s still great!","updated_at":1660488486,"url":"https://blog.front-matter.de/posts/using-google-wave-for-a-week-its-still-great/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw4d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw4d","id":"5d8290fb-e73b-49e7-9ad9-1d54ef60007a","published_at":1228435200,"summary":"Direct
        to consumer advertising (DTCA) \u2013 advertising for prescription drugs \u2013
        is only allowed in the United States (since 1997, when restrictions were loosened)
        and New Zealand. Drug companies pay for direct to consumer advertising (more
        than $4 billion in 2005 (Donohue 2007)) because they believe that it increases
        prescription rates.","title":"Open access is not enough \u2013 the source
        is also important","updated_at":1755346051,"url":"https://blog.front-matter.de/posts/open-access-is-not-enough-the-source-is-also-important/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwaq","guid":"https://doi.org/10.53731/r294649-6f79289-8cwaq","id":"b7c338e4-e5d8-4ffa-9ecf-9ec8e9435002","published_at":1214179200,"summary":"For
        my Paper Writing Dream Machine I obviously need a reference manager. My list
        of required features includes:Easy addition of references by integration with
        Pubmed, Google Scholar and other online databases.","title":"Online reference
        managers: not quite there yet","updated_at":1660398191,"url":"https://blog.front-matter.de/posts/online-reference-managers-not-quite-there-yet/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwac","guid":"https://doi.org/10.53731/r294649-6f79289-8cwac","id":"c4f91bc8-076d-4874-b4f7-7c007cb3136a","published_at":1208822400,"summary":"A
        real Web 2.0 application needs a serious mashup (web_application_hybrid).
        At least the folks at ResearcherID thought so. You might remember that ResearcherID
        creates a unique author ID for each interested scientist and was launched
        by Thomson Scientific (recently renamed Thomson Reuters) earlier this year.
        The new ResearcherID features include a mashup with Yahoo Maps that shows
        the location of your collaborators.","title":"ResearcherID now with Mashups","updated_at":1659166396,"url":"https://blog.front-matter.de/posts/researcherid-now-with-mashups/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw98","guid":"https://doi.org/10.53731/r294649-6f79289-8cw98","id":"47d670f9-f6c6-4412-8108-2bf2c71f6ab2","published_at":1194307200,"summary":"Papers
        is Macintosh-only software to manage the PDF files of all the scientific papers
        you stored on your computer. I previously wrote about version 1.0 that appeared
        earlier this year.The new Version 1.5 is compatible with Leopard, the latest
        release of the Macintosh operating system. The biggest improvement is support
        for search engine plugins.","title":"New version of Papers software released","updated_at":1659164359,"url":"https://blog.front-matter.de/posts/new-version-of-papers-software-released/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8n","id":"a8972509-21bb-4bf9-9d1d-cd53fa1ac185","published_at":1187308800,"summary":"The
        Hirsch number tries to quantify the (scientific) productivity of a scientist.
        The Hirsch number was first described by the physicist J.E. Hirsch in a 2005
        PNAS paper: An index to quantify an individual\u2019s scientific research
        output.","title":"Do you know your Hirsch number?","updated_at":1660573006,"url":"https://blog.front-matter.de/posts/do-you-know-your-hirsch-number/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1q","id":"8c4dd869-eb02-433d-8bc3-b8ede8367e80","published_at":1186150620,"summary":"The
        National Institutes of Health (NIH) is currently recommending public access
        of all papers from NIH-funded research.\n<strong>\n Fewer than 5% of research
        papers\n</strong>\nhave gone this route since the policy went into effect
        in 2005.","title":"Open access may become mandatory for NIH-funded research","updated_at":1659126119,"url":"https://blog.front-matter.de/posts/open-access-may-become-mandatory-for-nih-funded-research/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5r","id":"1fda824c-0996-4c2a-bc2e-c56b78c18c6b","published_at":1284422400,"summary":"The
        Scholarly Kitchen is a group blog started by the Society for Scholarly Publishing
        in 2008. The blog posts by authors Kent Anderson, Phil Davis, David Crotty,
        Michael Clarke, etc. are an always interesting \u2013 and often thought-provoking
        \u2013 read about scholarly publishing. Two recent posts looked at peer review.","title":"Peer
        Review at the Scholarly Kitchen","updated_at":1659254825,"url":"https://blog.front-matter.de/posts/peer-review-at-the-scholarly-kitchen/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwax","guid":"https://doi.org/10.53731/r294649-6f79289-8cwax","id":"0b6bfdc4-5e0a-4ce8-a50e-df74525d30c5","published_at":1216425600,"summary":"James
        Evans, a sociologist from the University of Chicago, reports his research
        on the kind and frequency of citations over the last 60 years in the latest
        issue of\n<em>\n <em>\n  Science\n </em>\n</em>\n. He found a change in citation
        behavior as more and more journals became electronically available: fewer
        journals and articles were cited and the cited articles were more recent.","title":"Do
        online journals narrow science and scholarship?","updated_at":1659252839,"url":"https://blog.front-matter.de/posts/do-online-journals-narrow-science-and-scholarship/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cwa8","guid":"https://doi.org/10.53731/r294649-6f79289-8cwa8","id":"a869301e-7468-441a-ad65-15935d6f8a5f","published_at":1207785600,"summary":"Starting
        this week, papers submitted from NIH-funded research have to be made publicly
        available no later than 12 months after publication. But what is the current
        situation in Germany, especially mandatory Open Access?","title":"Public Access
        Week: How do we do it in Germany?","updated_at":1659166306,"url":"https://blog.front-matter.de/posts/public-access-week-how-do-we-do-it-in-germany/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5a","id":"5de444a2-d01f-4036-8672-51548b96f1d9","published_at":1281744000,"summary":"In
        his new book\n<em>\n <em>\n  Cognitive Surplus\n </em>\n</em>\nClay Shirky
        argues that in the last 50 years many of those living in industrialized countries
        have seen a dramatic increase in free time, paired with better education and
        a higher standard of living. But a very large part of that free time or cognitive
        surplus is now routinely used to watch television, a passive activity that
        makes us a consumer rather than a participant.","title":"Book Review: Cognitive
        Surplus by Clay Shirky","updated_at":1660809272,"url":"https://blog.front-matter.de/posts/book-review-cognitive-surplus-by-clay-shirky/"},{"doi":"https://doi.org/10.53731/3htrx-1a525","guid":"https://doi.org/10.53731/3htrx-1a525","id":"2df77235-e7c7-4f3d-90bf-126eb6fc5500","published_at":1739218770,"summary":"In
        a few weeks, the Rogue Scholar science blog archive will reach the milestone
        of 25,000 archived science blog posts, each with a DOI and metadata and searchable
        via full-text search. With this number of blog posts, it is now time to start
        using a dedicated content type, and last week Rogue Scholar started the migration
        to the B\n<strong>\n logPost\n</strong>\ncontent type.","title":"It is time
        for a blog post content type","updated_at":1743253734,"url":"https://blog.front-matter.de/posts/blog-post-content-type/"},{"doi":"https://doi.org/10.53731/9zb20-k8z13","guid":"https://doi.org/10.53731/9zb20-k8z13","id":"49386563-0b83-49f7-9b2e-2f1be24e7c03","published_at":1739815061,"summary":"The
        Rogue Scholar science blog archive has started to automatically add all blog
        posts to the subject area community of the blog. Rogue Scholar uses the 48
        OECD Fields of Science and Technology subject areas since September 2023 and
        blog authors pick a subject area when they join Rogue Scholar.","title":"Rogue
        Scholar starts subject area communities","updated_at":1743253703,"url":"https://blog.front-matter.de/posts/rogue-scholar-subject-area-communities/"},{"doi":"https://doi.org/10.53731/r79sd61-97aq74v-ag4w1","guid":"https://doi.org/10.53731/r79sd61-97aq74v-ag4w1","id":"f616928f-1f68-4f07-bf34-66e619e63106","published_at":1554854400,"summary":"DOI
        metadata provenance is describing the history of a particular DOI metadata
        record, i.e. what changes were made when and by whom. This information is
        now stored and provided via an API for all DOI registrations since March 10,
        2019.","title":"Exposing DOI metadata provenance","updated_at":1736460092,"url":"https://blog.front-matter.de/posts/exposing-doi-metadata-provenance/"},{"doi":"https://doi.org/10.53731/xkfsa-xkk56","guid":"https://doi.org/10.53731/xkfsa-xkk56","id":"d52048b5-cfee-4281-8096-fa265c7ab73e","published_at":1721060935,"summary":"Earlier
        this month the Rogue Scholar science blog archive reached another important
        milestone: 100 science blogs registered and archived (with in total 16,179
        posts). Rogue Scholar launched twelve months ago and this rate of adoption
        of the service has greatly surpassed my expectations. To celebrate this milestone,
        Rogue Scholar will drop all fees for blog authors going forward.","title":"Rogue
        Scholar reaches another milestone and drops all registration fees","updated_at":1721071928,"url":"https://blog.front-matter.de/posts/rogue-scholar-reaches-another-milestone-and-drops-all-registration-fees-2/"},{"doi":"https://doi.org/10.53731/aapzk-01136","guid":"65c103e29414e3000128b37a","id":"e356b6a8-5d20-4b2e-8b01-7433c35f0c80","published_at":1707152841,"summary":"Yesterday
        I released version 0.13 of the commonmeta-py library on PyPi. The major new
        feature is a command-line interface for all metadata conversions, and the
        metadata validation with the Commonmeta JSON Schema has finally been fixed.
        The command-line interface takes any supported persistent identifier or file
        as input, and returns the metadata in the desired format as output.","title":"New
        version of commonmeta-py library for scholarly metadata","updated_at":1737651217,"url":"https://blog.front-matter.de/posts/new-version-commonmeta-py/"},{"doi":"https://doi.org/10.53731/3w1ye-q6z42","guid":"https://doi.org/10.53731/3w1ye-q6z42","id":"2e55b2f4-88cd-4a18-98cd-ec4b25a63f65","published_at":1704899351,"summary":"On
        Monday the Rogue Scholar science blog archive added support for exporting
        the blog posts in various formats: markdown, ePub, and PDF. Today I am adding
        another export format: JATS XML, the standard format for scholarly articles.
        JATS is again automatically generated with the Pandoc universal document converter,
        with some initial tweaks of the Rogue Scholar metadata.","title":"Every Rogue
        Scholar blog post now also available in JATS XML format","updated_at":1737651469,"url":"https://blog.front-matter.de/posts/rogue-scholar-blog-posts-jats-xml/"},{"doi":"https://doi.org/10.53731/n4vfp-nwb08","guid":"https://doi.org/10.53731/n4vfp-nwb08","id":"6fb357f5-80e7-4fd9-8ea8-4eb27be54866","published_at":1705397514,"summary":"Last
        week the Rogue Scholar science blog archive added export of blog post content
        in various formats (Markdown, ePub, PDF, JATS XML). This week Rogue Scholar
        is improving the existing metadata export, and adding metadata export in Schema.org
        JSON-LD format.","title":"Improving Rogue Scholar metadata conversions","updated_at":1737651376,"url":"https://blog.front-matter.de/posts/improving-rogue-scholar-metadata-conversions/"},{"doi":"https://doi.org/10.53731/5vvnh-tnm55","guid":"https://doi.org/10.53731/5vvnh-tnm55","id":"cf0b821a-2b0a-49e5-a71c-b118d24bc267","published_at":1702317174,"summary":"Sometimes
        we want to preserve a blog post to read or reuse later. There are generic
        tools for that purpose, including read-it-later apps such as Instapaper or
        Pocket. For scholarly blog posts, the right place can also be a reference
        manager, which stores the content and the metadata, especially if a DOI was
        registered for each blog post. Reference managers can store full-text documents
        and typically use PDF as the file format.","title":"Archiving individual science
        blog posts","updated_at":1736294308,"url":"https://blog.front-matter.de/posts/archiving-individual-science-blog-posts/"},{"doi":"https://doi.org/10.53731/ch2e1-1cm64","guid":"https://doi.org/10.53731/ch2e1-1cm64","id":"0e832cbc-f4ca-4eee-a6f3-5a25c94054da","published_at":1699978219,"summary":"Today
        I am relaunching the Syldavia Gazette blog on a new blogging platform, switching
        from Ghost to Quarto. This allows me to use Jupyter notebooks in the blog
        to help generate blog posts.","title":"The programmable blog","updated_at":1737651551,"url":"https://blog.front-matter.de/posts/programmable-blog/"},{"doi":"https://doi.org/10.53731/ar11b-5ea39","guid":"https://doi.org/10.53731/ar11b-5ea39","id":"63235dbd-05a6-4ab1-b870-f07f9b3f6ad7","published_at":1696864797,"summary":"The
        Rogue Scholar science blog archive has launched a dedicated API today, publicly
        available at https://api.rogue-scholar.org and complementing the website.
        Rogue Scholar had an API before but with two important limitations.","title":"Rogue
        Scholar has an API","updated_at":1744748075,"url":"https://blog.front-matter.de/posts/rogue-scholar-has-an-api/"},{"doi":"https://doi.org/10.53731/tvsdw-12637","guid":"https://doi.org/10.53731/tvsdw-12637","id":"b655ffad-f39a-4aba-a565-5871e8af7cec","published_at":1716457500,"summary":"This
        week I updated the submission form for the Rogue Scholar science blog archive
        to clarify that participating blogs can''t be journals (or books). Journals
        and journal articles have many similarities to blogs and blog posts, but they
        are something different, and out of scope for the Rogue Scholar science blog
        archive. One feature that can differentiate a journal from a blog is that
        journals often have volumes and issues.","title":"Blogs are not Journals","updated_at":1737650778,"url":"https://blog.front-matter.de/posts/blogs-are-not-journals-2/"},{"doi":"https://doi.org/10.53731/w6nzs-jta75","guid":"https://doi.org/10.53731/w6nzs-jta75","id":"2aeafe76-01b5-497e-80c0-a9e21cd9b8c9","published_at":1695388545,"summary":"In
        previous blog posts such as the one published earlier this week, I discussed
        the various elements involved in registering a DOI for a science blog post.","title":"DOI
        registration workflow for a science blog","updated_at":1737652014,"url":"https://blog.front-matter.de/posts/doi-registration-workflow-science-blog/"},{"doi":"https://doi.org/10.53731/hv15p-dx796","guid":"https://doi.org/10.53731/hv15p-dx796","id":"aa9601ab-a87e-44c1-a88e-3b106ecbe254","published_at":1693220716,"summary":"The
        Rogue Scholar science blog archive continues to grow. It is closing in on
        50 science blogs (currently 45), 3,000 blog posts (currently 2,944, of which
        2,775 have a DOI), and 250 (currently 212) blog posts with references registered
        with Crossref. I have set up eleven Mastodon bots for Rogue Scholar blogs
        after announcing the feature last week.","title":"Rogue Scholar is growing","updated_at":1737652151,"url":"https://blog.front-matter.de/posts/rogue-scholar-is-growing/"},{"doi":"https://doi.org/10.53731/gqvhe-je521","guid":"https://doi.org/10.53731/gqvhe-je521","id":"b19b2baf-e3e6-4b5a-bd81-a85b5a488a43","published_at":1692102029,"summary":"This
        week the Rogue Scholar science blog archive reached another big milestone:
        2,000 blog posts archived (2,242 as of today). This was achieved by adding
        new blogs (now 39) but, more importantly, by archiving older posts from the
        participating blogs.","title":"New Rogue Scholar milestone and funding drive","updated_at":1737652202,"url":"https://blog.front-matter.de/posts/new-rogue-scholar-milestone-and/"},{"doi":"https://doi.org/10.53731/bkkzj8g-gd14mb6","guid":"https://doi.org/10.53731/bkkzj8g-gd14mb6","id":"32599a12-bc19-4a46-8692-ecfa45bff3dd","published_at":1659008756,"summary":"In
        January I woke up one day and couldn''t move my right arm and leg properly.
        As I have high blood pressure, and my father had a stroke the exact day seven
        years earlier, I worried that I might have a stroke and went to the emergency
        room of the local university hospital.","title":"I spent the last five months
        in the hospital","updated_at":1737655038,"url":"https://blog.front-matter.de/posts/i-spent-the-last-five-months-in-the-hospital/"},{"doi":"https://doi.org/10.53731/rdv0jyq-vpb7a9j-zwqzg","guid":"https://doi.org/10.53731/rdv0jyq-vpb7a9j-zwqzg","id":"347c50b8-185b-4be2-81d2-acff7afecc5a","published_at":1639650207,"summary":"In
        August GitHub added enhanced support for citation-file-format (CFF) to all
        GitHub repositories. As you can see in the chart below (kindly provided by
        Stephan Druskat and based on GitHub queries for CFF files), this has led to
        a significant increase of repositories using CFF files and thus exposing software
        metadata that go beyond what GitHub provides via other means.","title":"Improving
        software metadata conversion by adding CFF support","updated_at":1736461059,"url":"https://blog.front-matter.de/posts/improving-software-metadata-conversion/"},{"doi":"https://doi.org/10.53731/rejnyd0-ce6q0km-pr48v","guid":"https://doi.org/10.53731/rejnyd0-ce6q0km-pr48v","id":"8b92ebb7-e4e4-43a5-af47-655d3525094a","published_at":1641214546,"summary":"Fresh
        into 2022, the Front Matter blog today is launching an important new feature:
        a full-text search of all blog posts. An example query would be for\n<strong>\n
        reference manager.\n</strong>\nAs the Front Matter blog has a lot of posts
        about reference managers, a tag would also have worked in this particular
        case, but tags are much less flexible and become overwhelming when used too
        frequently.","title":"Starting 2022 with a new feature: full-text search for
        the Front Matter blog","updated_at":1659197638,"url":"https://blog.front-matter.de/posts/full-text-search-front-matter-blog/"},{"doi":"https://doi.org/10.53731/rc3j5sn-tzg61kj-7ztra","guid":"https://doi.org/10.53731/rc3j5sn-tzg61kj-7ztra","id":"a7185b6b-b9ae-4544-b3c9-1bffd3177df0","published_at":1636018564,"summary":"Last
        Friday the OpenCitations blog published a guest post by Alberto Mart\u00edn-Mart\u00edn
        that describes the coverage by COCI and other open citation data compared
        to subscription citation indexes. This is an important blog post, as it changes
        how we think about citations and open metrics.","title":"Open Citation Data
        reach critical Milestone","updated_at":1737654745,"url":"https://blog.front-matter.de/posts/open-citation-data-reach-critical-milestone/"},{"doi":"https://doi.org/10.53731/r8c26t1-97aq74v-ag66m","guid":"https://doi.org/10.53731/r8c26t1-97aq74v-ag66m","id":"7e425fc7-49ea-4174-a05b-78c64bb45455","published_at":1628183749,"summary":"The
        open source research data management platform InvenioRDM today announced the
        first Long-Term Support (LTS) release, usable on production services. And
        I am joining the effort as a participating partner via Front Matter, the organization
        I started this week.","title":"First InvenioRDM Long-Term Support (LTS) version
        released today \u2013 and Front Matter is joining as a participating partner","updated_at":1736464976,"url":"https://blog.front-matter.de/posts/inveniordm-lts-announced/"},{"doi":"https://doi.org/10.53731/r8n4c91-97aq74v-ag6v9","guid":"https://doi.org/10.53731/r8n4c91-97aq74v-ag6v9","id":"e5f325b7-d0d0-4495-aea0-0d4572cfaa5e","published_at":1628780202,"summary":"Two
        years ago GitHub introduced the ability to sponsor an open source contributor
        \u2013 person or organization. They handle (and pay for) the payment logistics
        for a one-time or regular contribution. A blog post from June 2019 describes
        the thinking of the GiHub Sponsors team that went into this service, and the
        practicalities of using the service are documented here.","title":"Support
        open source software as a GitHub sponsor","updated_at":1660590397,"url":"https://blog.front-matter.de/posts/support-open-source/"},{"doi":"https://doi.org/10.53731/r79r1nh-97aq74v-ag4k9","guid":"https://doi.org/10.53731/r79r1nh-97aq74v-ag4k9","id":"714df6a3-245e-4bfe-bdb9-3244e36daa34","published_at":1620747840,"summary":"Metadata
        that describes scientific software in standard ways \u2013 in particular citation
        metadata such as title, authors, publication year, and venue \u2013 is essential
        for proper software citation implementation. The metadata should be generated
        by the software author, stored in the code repository, included in submissions
        to journals, and archived with the source code in a software archive.","title":"We
        need your feedback: Aligning the CodeMeta vocabulary for scientific software
        with schema.org","updated_at":1736461111,"url":"https://blog.front-matter.de/posts/we-need-your-feedback-aligning-the-codemeta-vocabulary-for-scientific-software-with-schema-org/"},{"doi":"https://doi.org/10.53731/r79xbr1-97aq74v-ag5ar","guid":"https://doi.org/10.53731/r79xbr1-97aq74v-ag5ar","id":"6d3f5b7d-3487-4f08-83e4-b47de095fc65","published_at":1462320000,"summary":"This
        week some of us from DataCite are attending CSVconf in Berlin, and we are
        a conference sponsor and co-organizer. One important reason we are at CSVconf
        is that providing persistent identifiers and starndard metadata for research
        data, which in most cases are stored in tabular data formats such as CSV,
        is central to what DataCite is doing.","title":"Thinking about CSV","updated_at":1691326685,"url":"https://blog.front-matter.de/posts/thinking-about-csv/"},{"doi":"https://doi.org/10.53731/r7ae7bh-97aq74v-ag5qn","guid":"https://doi.org/10.53731/r7ae7bh-97aq74v-ag5qn","id":"bb2c8132-d85c-47a4-90f5-226ba0cc8f3a","published_at":1537228800,"summary":"There
        is a need for the consistent and credible reporting of research data usage.
        Such usage metrics are required as an important component in understanding
        how publicly available research data are being reused.","title":"COUNTER Code
        of Practice for Research Data Usage Metrics release 1","updated_at":1690885672,"url":"https://blog.front-matter.de/posts/counter-code-of-practice-for-research-data-usage-metrics-release-1/"},{"doi":"https://doi.org/10.53731/r79xf41-97aq74v-ag5bc","guid":"https://doi.org/10.53731/r79xf41-97aq74v-ag5bc","id":"6ae862bf-c930-4b47-b042-43fbab81cd7f","published_at":1460659920,"summary":"In
        a guest post two weeks ago Elizabeth Hull explained that only 6% of Dryad
        datasets associated with a journal article are found in the reference list
        of that article, data she also presented at the IDCC conference in February
        (Mayo, Hull, &amp; Vision, 2015). This number has increased from 4% to 8%
        between 2011-2014, but is still low.","title":"It''s all about Relations","updated_at":1694074833,"url":"https://blog.front-matter.de/posts/its-all-about-relations/"},{"doi":"https://doi.org/10.53731/r79z0kh-97aq74v-ag5hb","guid":"https://doi.org/10.53731/r79z0kh-97aq74v-ag5hb","id":"b79e5300-0667-4156-85f4-d9e28ee9e092","published_at":1482451200,"summary":"On
        Tuesday the journal PLOS ONE celebrated its 10th anniversary (see blog post
        by PLOS ONE Editor-in-Chief J\u00f6rg Heber and blog post by PLOS ONE Managing
        Editor Iratxe Puebla and PLOS Advocacy Director Catriona MacCallum). PLOS
        ONE (and PLOS) have changed scholarly publishing in many ways, from a DataCite
        perspective probably most importantly via the data policy updated in February
        2014 that states that PLOS ONE was not the first journal with a","title":"Mysteries
        in Reference Lists","updated_at":1744752661,"url":"https://blog.front-matter.de/posts/mysteries-in-reference-lists/"},{"doi":"https://doi.org/10.53731/r796hz1-97aq74v-ag4f3","guid":"https://doi.org/10.53731/r796hz1-97aq74v-ag4f3","id":"57ed3097-a397-491e-90c0-843d1e0102ac","published_at":1445817600,"summary":"<em>\n
        We will follow up with a blog post later this week explaining the DataCite
        auto-update implementation.\n</em>\nSince ORCID\u2019s inception, our key
        goal has been to unambiguously identify researchers and provide tools to automate
        the connection between researchers and their creative works. We are taking
        a big step towards achieving this goal today, with the launch of Auto-Update
        functionality in collaboration with Crossref and DataCite.","title":"Auto-Update
        Has Arrived!","updated_at":1695197353,"url":"https://blog.front-matter.de/posts/auto-update-has-arrived/"},{"doi":"https://doi.org/10.53731/r79tcr1-97aq74v-ag52m","guid":"https://doi.org/10.53731/r79tcr1-97aq74v-ag52m","id":"b310b937-db18-471e-95c4-5d8177a74ef1","published_at":1447027200,"summary":"DataCite
        Labs today is launching the DataCite Profiles service, a central place for
        users to sign in with DataCite, using their ORCID credentials. The first version
        of DataCite Profiles focusses on integration with ORCID via the\n<strong>\n
        <strong>\n  Search &amp; Link\n </strong>\n</strong>\nand\n<strong>\n <strong>\n  Auto-Update\n
        </strong>\n</strong>\nservices, described in a previous blog post.","title":"Announcing
        the DataCite Profiles Service","updated_at":1736465136,"url":"https://blog.front-matter.de/posts/announcing-the-datacite-profiles-service/"},{"doi":"https://doi.org/10.53731/r79vp7h-97aq74v-ag583","guid":"https://doi.org/10.53731/r79vp7h-97aq74v-ag583","id":"b2bb7ed2-f6b7-4e30-9ee5-a1dc6b36a7cb","published_at":1444608000,"summary":"The
        Force11 Joint Declaration of Data Citation Principles (Data Citation Synthesis
        Group, 2014) highlight the importance of giving scholarly credit to all contributors:  The
        EC-funded THOR project that DataCite is involved in addresses these issues,
        and I have summarized the findings of one of our first reports in a previous
        blog post.","title":"Contributor Information in DataCite Metadata","updated_at":1694074536,"url":"https://blog.front-matter.de/posts/contributor-information-in-datacite-metadata/"},{"doi":"https://doi.org/10.53731/r79sve1-97aq74v-ag4yt","guid":"https://doi.org/10.53731/r79sve1-97aq74v-ag4yt","id":"eaf3d6cb-d5ef-4764-86d1-075c7a8a293f","published_at":1443744000,"summary":"One
        of my personal highlights in last week''s Research Data Alliance (RDA) 6th
        Plenary Meeting in Paris was the Data Packages Birds of a Feather (BoF), organized
        by Rufus Pollock from the Open Knowledge Foundation (OKFN). He highlighted
        the urgent need for packacking data in a standard format to facilitate reuse,
        and described the extensive work the OKFN has done on data packages.","title":"Discussing
        the Scholarly Container","updated_at":1736378523,"url":"https://blog.front-matter.de/posts/discussing-the-scholarly-container/"},{"doi":"https://doi.org/10.53731/r795jkh-97aq74v-ag4bs","guid":"https://doi.org/10.53731/r795jkh-97aq74v-ag4bs","id":"2a06a612-ebb7-4e21-80fb-88c7dce043b4","published_at":1439769600,"summary":"Today
        I am pleased to announce the launch of a new service, DataCite Labs Search
        \u2013 the service is available immediately at https://search.datacite.org/.
        This is one of THOR\u2019s first services and is based on work in the earlier
        EC-funded ODIN Project.  The ODIN project launched the DataCite/ORCID claiming
        tool in June 2013. The DataCite/ORCID claiming tool allows users to add works
        from the DataCite Metadata Store (MDS) to their ORCID profile.","title":"From
        Pilot to Service","updated_at":1694074654,"url":"https://blog.front-matter.de/posts/from-pilot-to-service/"},{"doi":"https://doi.org/10.53731/r79v4e1-97aq74v-ag578","guid":"https://doi.org/10.53731/r79v4e1-97aq74v-ag578","id":"8a4de443-3347-4b82-b57d-e3c82b6485fc","published_at":1442534400,"summary":"One
        of the first tasks for DataCite in the European Commission-funded THOR project,
        which started in June, was to contribute to a comparison of the ORCID and
        DataCite metadata standards.","title":"Differences between ORCID and DataCite
        Metadata","updated_at":1746637479,"url":"https://blog.front-matter.de/posts/differences-between-orcid-and-datacite-metadata/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzr","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzr","id":"3dfe984a-3d73-43c3-8a6f-920faf128231","published_at":1433328180,"summary":"Just
        like the rest of the internet, much of our scholarly infrastructure is built
        around the Hypertext Transfer Protocol (HTTP), increasingly HTTPS for security,
        and soon HTTP/2 for better performance. In this infrastructure Universal Resource
        Locators (URLs) are essential to locate resources (sic) such as scholarly
        articles, datasets, researchers, organizations, or grants.","title":"Persistent
        Identifiers and URLs","updated_at":1660726369,"url":"https://blog.front-matter.de/posts/persistent-identifiers-and-urls/"},{"doi":"https://doi.org/10.53731/r79tp4h-97aq74v-ag54x","guid":"https://doi.org/10.53731/r79tp4h-97aq74v-ag54x","id":"255ae296-f786-41e1-a9f1-7843dca88edc","published_at":1440028800,"summary":"In
        the first post of this new blog a few weeks ago I talked about Data-Driven
        Development, and that service monitoring is an important aspect of this. The
        main service DataCite is providing is registration of digital object identifiers
        (DOIs) for scholarly content, in particular research data. Monitoring this
        service should include the following:number of DOIs registeredmetadata associated
        with these DOIsare the DOIs working as expected, e.g.","title":"Digging into
        Metadata using R","updated_at":1736460229,"url":"https://blog.front-matter.de/posts/digging-into-metadata-using-r/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzs","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzs","id":"d615e75f-95e6-4a35-93f4-7b469e2b4182","published_at":1432723500,"summary":"Yesterday
        Julie McMurry and co-authors published a preprint\n<strong>\n <strong>\n  10
        Simple rules for design, provision, and reuse of persistent identifiers for
        life science data\n </strong>\n</strong>\n. This is an important paper trying
        to address a fundamental problem: how can we make persistent identifiers both
        human-readable and machine-readable?","title":"Human-readable and machine-readable
        Persistent Identifiers","updated_at":1736463941,"url":"https://blog.front-matter.de/posts/human-readable-and-machine-readable-persistent-identifiers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw02","guid":"https://doi.org/10.53731/r294649-6f79289-8cw02","id":"a49da743-42e5-4ddf-81e6-ab025995eb51","published_at":1413557940,"summary":"In
        a blog post two weeks ago I argued for the need for reference managers to
        properly support data citation, if we want data citation to become a standard
        activity.","title":"Webinar on Writing Zotero Translators","updated_at":1755410951,"url":"https://blog.front-matter.de/posts/webinar-on-writing-zotero-translators/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw07","guid":"https://doi.org/10.53731/r294649-6f79289-8cw07","id":"6fb5ed70-2b97-435f-8ae8-4c0b67242c52","published_at":1408979520,"summary":"One
        of the major challenges of writing a journal article is to keep track of versions
        - both the different versions you create as the document progresses, and to
        merge in the changes made by your collaborators. For most academics Microsoft
        Word is the default writing tool, and it is both very good and very bad in
        this.","title":"Using Microsoft Word with git","updated_at":1660838880,"url":"https://blog.front-matter.de/posts/using-microsoft-word-with-git/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0k","id":"7b468341-2b8e-4fd3-8059-87940b4b9ddf","published_at":1386863640,"summary":"The
        Journal Article Tag Suite (JATS) is a NISO standard that defines a set of
        XML elements and attributes for tagging journal articles. JATS is not only
        used for fulltext content at PubMed Central (and JATS has evolved from the
        NLM Archiving and Interchange Tag Suite originally developed for PubMed Central),
        but is also increasinly used by publishers.","title":"From Markdown to JATS
        XML in one Step","updated_at":1736464473,"url":"https://blog.front-matter.de/posts/from-markdown-to-jats-xml-in-one-step/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw05","guid":"https://doi.org/10.53731/r294649-6f79289-8cw05","id":"e2624058-1149-4dbe-bbf9-95f6440493b4","published_at":1410880080,"summary":"Doing
        scientific research is becoming increasingly complex, both in terms of the
        tools and technologies used, and in the collaboration across disciplines and
        locations that is increasingly commonplace. While the way we write up and
        publish research is of course also very different from 25 years ago, I would
        argue that our tools and services haven\u2019t quite evolved at the same pace.","title":"Please
        keep it simple","updated_at":1736466680,"url":"https://blog.front-matter.de/posts/please-keep-it-simple/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0a","id":"c2d167b3-3bc1-4f70-9cb0-f936ef263465","published_at":1407338640,"summary":"This
        Sunday Ian Mulvany and I will do a presentation on Open Scholarship Tools
        at\n<em>\n Wikimania 2014\n</em>\nin London. From the abstract: One of the
        four broad topics we have picked are\n<em>\n digital object identifiers (DOI)s\n</em>\n.
        We want to introduce them to people new to them, and we want to show some
        tricks and cool things to people who already now them.","title":"What is a
        DOI?","updated_at":1661766781,"url":"https://blog.front-matter.de/posts/what-is-doi/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0c","id":"48f42b31-c2c9-4973-b10b-b15934177605","published_at":1406734140,"summary":"Yesterday
        60 years ago the first volume of the\n<em>\n Lord of the Rings\n</em>\ntrilogy
        by\n<em>\n J.R.R. Tolkien\n</em>\nwas published. The quote above obviously
        doesn\u2019t quiet apply to scholarly publishing, but one recurring theme
        that I have often heard in the last few years is that of a need for a canonical
        digital document format for scholarly content that rules all other formats.","title":"One
        Ring to Rule them All","updated_at":1660568415,"url":"https://blog.front-matter.de/posts/one-ring-to-rule-them-all/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0e","id":"396be58d-4328-4521-9af9-fb6e6835ce94","published_at":1405697760,"summary":"I
        attended the Open Knowledge Festival this week and I had a blast. For three
        days (I also attended the fringe event csv,conf on Tuesday) I listed to wonderful
        presentations and was involved in great discussions - both within sessions,
        but more importantly all the informal discussions between and after sessions.","title":"Build
        Roads not Stagecoaches","updated_at":1660568610,"url":"https://blog.front-matter.de/posts/build-roads-not-stagecoaches/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0n","id":"d9f506c0-8c5f-44d2-8a30-01e6e67e697d","published_at":1386777840,"summary":"In
        October I published an essay on Article-Level Metrics (ALM) in PLOS Biology
        (Fenner, 2013). The essay is a good introduction into Article-Level Metrics,
        and I am proud that it is part of the Tenth Anniversary PLOS Biology Collection.
        Like all PLOS content, the article was published with a Creative Commons attribution
        license, allowing me to republish the article on this blog. I have now done
        so and the article is available here.","title":"Example article with embedded
        code and data","updated_at":1736465851,"url":"https://blog.front-matter.de/posts/example-article-with-embedded-code-and-data/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0t","id":"b4ba353d-74a6-4af1-bf94-070579d64922","published_at":1382718060,"summary":"I
        think it is fair to say that commenting on scientific papers is broken. And
        with commenting I mean online comments that are publicly available, not informal
        discussions in journal clubs or at meetings. This definition would include
        discussions of papers on social media such as Twitter or Facebook. Why do
        I think that commenting is broken?the number of papers with online comments
        is low.","title":"Commenting on scientific papers","updated_at":1693643279,"url":"https://blog.front-matter.de/posts/commenting-on-scientific-papers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0w","id":"de6b4410-c353-451d-bcd8-34a815e2525b","published_at":1382286360,"summary":"Open
        access to research data is becoming increasingly important, as manifested
        by memos or press releases from the Wellcome Trust, the European Commission,
        and the the Office of Science and Technology Policy (OSTP) from the White
        House.","title":"The Complete Article","updated_at":1660571989,"url":"https://blog.front-matter.de/posts/the-complete-article/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0z","id":"c1b467de-137d-4402-8749-a5050d75c55b","published_at":1375979580,"summary":"According
        to the description on the Citation Style Language (CSL) website, CSL\n<em>\n
        is an open XML-based language to describe the formatting of citations and
        bibliographies\n</em>\n. We use reference managers such as\n<strong>\n Zotero\n</strong>\n,\n<strong>\n
        <strong>\n  Mendeley\n </strong>\n</strong>\n, or\n<strong>\n <strong>\n  Papers\n
        </strong>\n</strong>\nto format our references in manuscripts we submit for
        publication, and underneath a CSL processor such as Citeproc-js -","title":"CSL
        is more than citation styles","updated_at":1736463839,"url":"https://blog.front-matter.de/posts/csl-is-more-than-citation-styles/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw12","guid":"https://doi.org/10.53731/r294649-6f79289-8cw12","id":"95f17caa-91f5-4428-aac5-3d5c170bd458","published_at":1375202340,"summary":"The
        standard local file formats for bibliographic data are probably bibtex and
        RIS. They have been around for a long time, and are supported by all reference
        managers and many other tools and services.","title":"Citeproc YAML for bibliographies","updated_at":1660898203,"url":"https://blog.front-matter.de/posts/citeproc-yaml-for-bibliographies/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1s","id":"9cba9264-a372-41cc-b8de-917a7a53390d","published_at":1373328000,"summary":"Altmetrics
        track the impact of scholarly works in the social web. Article-Level Metrics
        focuses on articles, but also looks at traditional citations and usage statistics.
        The PLOS Article-Level Metrics project was started in 2008. The altmetrics
        manifesto was published in October 2010 and described the fundamental ideas.
        By October 2011 we had a number of altmetrics tools, fueled by the Mendeley/PLOS
        API programming contest.","title":"Altmetrics: first we need the for what?
        and only then the how? OK?","updated_at":1660572812,"url":"https://blog.front-matter.de/posts/altmetrics-first-we-need-the-for-what-and-only-then-the-how-ok/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw18","guid":"https://doi.org/10.53731/r294649-6f79289-8cw18","id":"2bdebfc5-e02e-42c2-90c5-e873e2d0435d","published_at":1372179840,"summary":"Abstract  Sharing
        data is increasingly considered to be an important part of the scientific
        process. Making your data publicly available allows original results to be
        reproduced and new analyses to be conducted. While sharing your data is the
        first step in allowing reuse, it is also important that the data be easy to
        understand and use.","title":"Nine simple ways to make it easier to (re)use
        your data","updated_at":1744753823,"url":"https://blog.front-matter.de/posts/nine-simple-ways-to-make-it-easier-to-re-use-your-data/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw17","guid":"https://doi.org/10.53731/r294649-6f79289-8cw17","id":"649967ab-7e1d-4adb-8d1d-57cd4f8fe0ba","published_at":1372525260,"summary":"Scholarly
        documents often need metadata that describe them: typically author(s), title
        and location (DOI or URL), but possibly many other things. For some metadata
        it makes sense to store them in the document text, e.g. as is typically done
        for citations. The problem is that this can make it hard to make the metadata
        machine-readable.","title":"Metadata in Scholarly Markdown","updated_at":1736459995,"url":"https://blog.front-matter.de/posts/metadata-in-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw16","guid":"https://doi.org/10.53731/r294649-6f79289-8cw16","id":"fef48952-87bc-467b-8ebb-0bff92ab9e1a","published_at":1372784280,"summary":"A
        few weeks ago Kafkas et al. (2013) published a paper looking at current patterns
        of how datasets o biological databases are cited in research articles, based
        on an analysis of the full text Open Access articles available from Europe
        PMC.","title":"Auto generating links to data and resources","updated_at":1660572893,"url":"https://blog.front-matter.de/posts/auto-generating-links-to-data-and-resources/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1w","id":"b1038a3f-c5aa-4a68-97cb-5c68b27942f7","published_at":1370044800,"summary":"Earlier
        this week re3data.org \u2013 the Registry of Research Data Repositories \u2013
        officially launched. The registry is nicely described in a preprint also published
        this week.\n<em>\n re3data.org offers researchers, funding organizations,
        libraries and publishers and overview of the heterogeneous research data repository
        landscape.\n</em>","title":"re3data.org: registry of research data repositories
        launched","updated_at":1736465242,"url":"https://blog.front-matter.de/posts/re3data-org-registry-of-research-data-repositories-launched/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1a","id":"c9d65498-e795-4262-8bea-eb8aaeee7a89","published_at":1371834660,"summary":"One
        important outcome of the recent Markdown for Science workshop was an overall
        agreement that all the different implementations (or flavors) of markdown
        that currently exist are a big problem for the adoption of Scholarly Markdown
        and that we need: As described by Karthik Ram (31 flavors is great for ice
        cream but not markdown), me and others, there is really a large number of
        markdown implementations to choose from, includingJohn Gruber\u2019s","title":"What
        Flavor is Scholarly Markdown?","updated_at":1660898551,"url":"https://blog.front-matter.de/posts/what-flavor-is-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw19","guid":"https://doi.org/10.53731/r294649-6f79289-8cw19","id":"04490554-82be-4ca6-b547-43a0d955af61","published_at":1372093680,"summary":"After
        the post last week and the crazy discussion that followed I would understand
        that you feel you have heard enough about citations in markdown. But I had
        the feeling last week that something was still missing, and I have done some
        more thinking.","title":"Citations in Markdown Part 3","updated_at":1660898467,"url":"https://blog.front-matter.de/posts/citations-in-markdown-part-3/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1z","id":"64a58884-18cd-4c63-a271-89714a63131e","published_at":1365638400,"summary":"Earlier
        this week the rumors that started in January became official: Elsevier is
        buying Mendeley (see also here). A lot has been written about this announcement,
        in particular about the fear that Mendeley as a product and organization will
        turn into something not as open and collaborative as before. I first met Victor
        and Jan from Mendeley in 2008 and did an interview with Victor in September
        2008.","title":"Mendeley and Elsevier","updated_at":1659201730,"url":"https://blog.front-matter.de/posts/mendeley-and-elsevier/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1y","id":"44690ae5-2ece-403d-8e34-a05668277a29","published_at":1368835200,"summary":"A
        new service allows researchers to add research datasets \u2013 and other content
        with DataCite DOIs, including all figshare content \u2013 to their ORCID profile
        by integrating with the DataCite Metadata Store. The tool is an adaption (or
        fork) of the CrossRef Metadata Search developed by Karl Ward, and was developed
        by Gudmundur Thorisson and myself as part of work in the EU-funded ODIN project.
        More details can be found here.","title":"New DataCite / ORCID Integration
        Tool","updated_at":1694091304,"url":"https://blog.front-matter.de/posts/new-datacite-orcid-integration-tool/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw21","guid":"https://doi.org/10.53731/r294649-6f79289-8cw21","id":"219dea25-aa34-4644-807f-707d7c3cc12b","published_at":1366070400,"summary":"Article-Level
        Metrics provide new ways to look at the impact of scholarly research. Two
        important concepts are a) to track metrics for individual scholarly articles
        instead of using numbers aggregated by journal, and b) to go beyond citations
        and also include usage stats and altmetrics. Article-Level Metrics is also
        doing something else: instead of tracking impact by year, it looks at usage,
        altmetrics and citations in real-time.","title":"Baby steps toward better
        metrics","updated_at":1661802788,"url":"https://blog.front-matter.de/posts/baby-steps-toward-better-metrics/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1x","id":"d84587c8-6b01-4de6-9c51-1fdb63246749","published_at":1369958400,"summary":"This
        Thursday I take part in a panel discussion at the Joint ORCID \u2013 Dryad
        Symposium on Research Attribution. Together with Trish Groves (BMJ) and Christine
        Borgman (UCLA) I will discuss several aspects of attribution. Trish will speak
        about ethics, Christine will highlight problems, and I will add my perspective
        on metrics. This blog post summarizes the main points I want to make.","title":"Metrics
        and attribution: my thoughts for the panel at the ORCID-Dryad symposium on
        research attribution","updated_at":1741370500,"url":"https://blog.front-matter.de/posts/metrics-and-attribution-my-thoughts-for-the-panel-at-the-orcid-dryad-symposium-on-research-attribution/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw22","guid":"https://doi.org/10.53731/r294649-6f79289-8cw22","id":"66aefd28-a9de-45ae-89a2-5aaf91951e64","published_at":1364601600,"summary":"Last
        week Philippe Desjardins-Prouly et al. published the article The case for
        open preprints in biology \u2013 naturally as a preprint on figshare (later
        also published as full paper). The article sees preprint servers as a great
        opportunity for open science, and discusses the status of preprints in the
        biological sciences.","title":"Comment: the case for open preprints in biology","updated_at":1755333406,"url":"https://blog.front-matter.de/posts/comment-the-case-for-open-preprints-in-biology/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw03","guid":"https://doi.org/10.53731/r294649-6f79289-8cw03","id":"46065fc6-8fbf-470d-86bb-b28cfd1e0877","published_at":1413298920,"summary":"This
        year\u2019s SpotOn London conference takes place November 14-15 and the registration
        has opened this Monday. I am helping organize this conference since 2009,
        and I again look forward to the sessions, and - more importantly - the discussions
        with people in and between sessions this year.","title":"Let''s do an unconference","updated_at":1660838555,"url":"https://blog.front-matter.de/posts/lets-do-an-unconference/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw25","guid":"https://doi.org/10.53731/r294649-6f79289-8cw25","id":"acefb507-3d8f-4e42-a5e5-4e4aed541d13","published_at":1363824000,"summary":"On
        Tuesday we released the latest version of the PLOS Article-Level Metrics application.
        As always, the source code is available at Github.","title":"New version of
        Article-Level Metrics app released","updated_at":1659201663,"url":"https://blog.front-matter.de/posts/new-version-of-article-level-metrics-app-released/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw24","guid":"https://doi.org/10.53731/r294649-6f79289-8cw24","id":"faec9558-0b53-438b-9f9a-4c81534ee1f4","published_at":1364256000,"summary":"PLOS
        Article-Level Metrics (ALM) are a great set of data (available via API and
        as monthly data dump) for some nice data visualizations. I have recently become
        a big fan of the d3.js javascript library, and have now used d3 to look at
        some ALM data over time.","title":"Using d3.js to visualize Article-Level
        Metrics over time","updated_at":1660724860,"url":"https://blog.front-matter.de/posts/using-d3-js-to-visualize-article-level-metrics-over-time/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw28","guid":"https://doi.org/10.53731/r294649-6f79289-8cw28","id":"1bb64b71-200a-48f4-9061-da59784f0472","published_at":1350864000,"summary":"Last
        week has been busy. I went to Berlin for the launch of the Open Researcher
        &amp; Contributor ID (ORCID) service. ORCID allows researchers to obtain a
        persistent identifier that can be used to claim publications and other scholarly
        works.","title":"ORCID has launched. What\u2019s next?","updated_at":1736467016,"url":"https://blog.front-matter.de/posts/orcid-has-launched-whats-next/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2a","id":"6a9abc29-7e72-4583-8237-f37c7896ab1d","published_at":1343260800,"summary":"The
        science blogging network Nature Network is moving to a new home. Today SciLogs.com
        launched as a new home for Nature Network bloggers. I have been blogging at
        Nature Network for three years, starting with my first blog post (Open access
        may become mandatory for NIH-funded research) almost exactly 5 years ago to
        the day. My blog moved to PLOS BLOGS in September 2010 and all my old Nature
        Network content can be found here at PLOS BLOGS.","title":"Bye bye Nature
        Network, welcome SciLogs.com","updated_at":1660725572,"url":"https://blog.front-matter.de/posts/bye-bye-nature-network-welcome-scilogs-com/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw27","guid":"https://doi.org/10.53731/r294649-6f79289-8cw27","id":"c691f60b-af75-4874-8479-095b50d522ce","published_at":1363219200,"summary":"Yesterday
        Google announced that they will shut down Google Reader July 1st. In a way
        this announcement didn\u2019t surprise me, as my own use of RSS readers has
        gone down in favor of news readers such as Flipboard and using Twitter as
        a discovery tool.","title":"Bye-bye Google Reader","updated_at":1659201606,"url":"https://blog.front-matter.de/posts/bye-bye-google-reader/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2d","id":"4232e361-242b-4949-9771-ead4418b668a","published_at":1342742400,"summary":"This
        has been another week working on visualizations. I have summarised some of
        the results in a blog post over at the PLoS API website. One of my current
        favorites is the dot chart. PLoS Computational Biology publishes a collection
        of Ten Simple Rules. The dot chart below summarizes the HTML pageviews, PDF
        downloads and Mendeley readers for this collection.","title":"More fun with
        Visualizations","updated_at":1660728010,"url":"https://blog.front-matter.de/posts/more-fun-with-visualizations/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1f","id":"62eb94f9-4702-4103-a58b-84b93de28da3","published_at":1355852040,"summary":"Following
        up from my post last week, below is a suggested list of features that should
        be supported in documents written in scholarly markdown. Please provide feedback
        via the comments, or by editing the Wiki version I have set up here. Listed
        are features that go beyond the standard markdown syntax.","title":"Additional
        Markdown we need in Scholarly Texts","updated_at":1660895303,"url":"https://blog.front-matter.de/posts/additional-markdown-we-need-in-scholarly-texts/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1g","id":"b4e6c8d8-71f2-4046-aa71-5c75e8cc81d0","published_at":1355420220,"summary":"Markdown
        is a lightweight markup language, originally created by John Gruber for writing
        content for the web. Other popular lightweight markup languages are Textile
        and Mediawiki. Whereas Mediawiki markup is of course popular thanks to the
        ubiquitous Wikipedia, Markdown seems to have gained momentum among scholars.","title":"A
        Call for Scholarly Markdown","updated_at":1736467390,"url":"https://blog.front-matter.de/posts/a-call-for-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw29","guid":"https://doi.org/10.53731/r294649-6f79289-8cw29","id":"3e9f4d6f-31e0-4b3f-a32b-2ed9e188c220","published_at":1348012800,"summary":"Almost
        exactly a year ago (in the hackathon of the Science Online London 2011 conference)
        I started the ScienceCard project. ScienceCard is a fork of the Open Source
        PLOS Article-Level Metrics (ALM) code, personalizing the Article-Level Metrics.
        A lot has happened in the last 12 months, most importantly that I started
        to work for PLOS as technical lead for the Article-Level Metrics project in
        May.","title":"Announcing the ScienceCard Relaunch","updated_at":1660894846,"url":"https://blog.front-matter.de/posts/announcing-the-sciencecard-relaunch/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2c","id":"7df0688d-85ba-4d9b-b942-ffd02b8bb375","published_at":1342828800,"summary":"Earlier
        this week the European Commission announced new measures towards open science.
        As part of the announcement interviews of three scientists with European Commission
        Vice President Neelie Kroes were posted on YouTube.","title":"Neelie Kroes
        talks Open Science","updated_at":1659201405,"url":"https://blog.front-matter.de/posts/neelie-kroes-talks-open-science/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2h","id":"470d6af0-5de5-4d4e-a76b-d284cf59bb9e","published_at":1338249600,"summary":"It
        has become common practice to make presentation slides available for those
        unable to attend in person, or for more in-depth review later. The most popular
        service to do this is of course Slideshare. Slideshare is a fine service,
        but the website has become fairly cluttered over the years, and visuals are
        of course important when it comes to presentations.  Speaker Deck is an alternative
        to Slideshare with a focus on \u201csimplicity and beauty\u201d.","title":"Speaker
        Deck for Sharing Presentations","updated_at":1660290564,"url":"https://blog.front-matter.de/posts/speaker-deck-for-sharing-presentations/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2e","id":"8ece3fd3-7ab8-4e44-ae52-a6658aed9661","published_at":1342396800,"summary":"The
        European Research Council on Friday announced that they will participate in
        the UK PubMed Central (UKPMC) open access repository service. They become
        the third European funder to join UKPMC, and the existing UKPMC funders have
        agreed to rebrand UKPMC as Europe PubMed Central (abbreviated to EPMC?) on
        November 1st. More information about these changes can be found on the UKPMC
        blog and in the Wellcome Trust press release.","title":"Europe PubMed Central
        coming in November","updated_at":1660728053,"url":"https://blog.front-matter.de/posts/europe-pubmed-central-coming-in-november/"},{"doi":"https://doi.org/10.53731/fhnh1qv-v9ga47e","guid":"https://doi.org/10.53731/fhnh1qv-v9ga47e","id":"244c8616-d8f9-40d5-a3eb-269c5aaa0fbe","published_at":1320710400,"summary":"BibTeX
        is one of the most popular file formats for bibliographies, and is therefore
        commonly used to transfer bibliographies from one reference manager to another,
        or to other applications that handle bibliographic references. RIS and Endnote
        XML are probably the other two bibliographic file formats most commonly used.
        Most reference managers support all three formats, making it easy to move
        references around.","title":"Why BibTeX, RIS and Endnote XML will soon be
        broken","updated_at":1660487597,"url":"https://blog.front-matter.de/posts/why-bibtex-ris-and-endnote-xml-will-soon-be-broken/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1v","id":"9ca25354-aa4c-4593-a257-a1d90ce7b6dc","published_at":1311206400,"summary":"Other
        blog posts often provide important background material for your own posts,
        and they are typically cited by inline links in the text. But sometimes we
        need more formal citations, e.g. when citing blog posts in a journal article
        or when providing a bibliography. But how do you properly cite a blog post?","title":"How
        to formally cite a blog post","updated_at":1660895333,"url":"https://blog.front-matter.de/posts/how-to-formally-cite-a-blog-post/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6d","id":"239e5c98-8eae-41f8-9c32-ad8b2f9596ed","published_at":1314057600,"summary":"The
        first beta of the reference manager Zotero 3.0 was released yesterday. The
        big news is that Zotero 3.0 no longer only runs within the Firefox browser,
        but is now also available as a standalone version similar to other reference
        managers. Zotero Connectors integrate with the Chrome and Safari browser.
        They also allow saving directly to your Zotero library at zotero.org. Zotero
        does not support Internet Explorer.","title":"Zotero 3.0 Beta released, works
        with Chrome and Safari","updated_at":1660732816,"url":"https://blog.front-matter.de/posts/zotero-3-0-beta-released-works-with-chrome-and-safari/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6n","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6n","id":"6e7ee603-ec1f-46b4-a072-7693fff13a36","published_at":1308787200,"summary":"Three
        leading funding organizations today made this important announcement: Some
        features of the new journal:open accessname of journal to be decidedaims to
        attract and define the very best research publicationspapers will be accepted
        or rejected as rapidly as possiblefirst issue expected for summer of 2012editor-in-chief
        and editorial team will be active scientistsjournal will enable improved data
        presentationlong-term business model to be","title":"Three funding organizations
        will launch new open access journal","updated_at":1659188423,"url":"https://blog.front-matter.de/posts/three-funding-organizations-will-launch-new-open-access-journal/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6k","id":"d467889a-424a-460e-9d9b-02f01af6a173","published_at":1309737600,"summary":"Blogging
        is a great format to report from conferences. The regular blog format works
        best for posts written at the end of the day \u2013 unless you are typing
        really fast. Microblogging, i.e. a number of short or very short posts by
        a group of people, works better for live blogging of an event and has become
        very popular.","title":"Conference microblogging: FriendFeed, Twitter and
        now Google+ ?","updated_at":1660898748,"url":"https://blog.front-matter.de/posts/conference-microblogging-friendfeed-twitter-and-now-google/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6e","id":"26df5759-b960-4945-b24e-8d4c4faaf5ce","published_at":1313280000,"summary":"Yesterday
        I discovered (via a tweet by Owen Stephens) a very interesting document Personal
        names around the world that discusses the following question: The document
        was written by Richard Ishida, Internationalization Activity Lead at the W3C
        (World Wide Web Consortium). The document was published on July 26, and Richard
        was seeking comments until August 7 before finalizing the document.","title":"Personal
        names around the world","updated_at":1660732956,"url":"https://blog.front-matter.de/posts/personal-names-around-the-world/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6x","id":"6979d3fc-0549-4792-888f-d621ae709ede","published_at":1301097600,"summary":"We
        are all familiar with digital object identifiers (DOIs) provided by CrossRef
        to identify (and link to) journal articles. Some of us are familiar with the
        DOIs issued by DataCite to link to datasets. But most of us don\u2019t know
        that CrossRef is also providing component DOIs that can provide persistent
        links to a particular table or figure in a paper.","title":"Direct links to
        figures and tables using component DOIs","updated_at":1689153345,"url":"https://blog.front-matter.de/posts/direct-links-to-figures-and-tables-using-component-dois/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw75","guid":"https://doi.org/10.53731/r294649-6f79289-8cw75","id":"f26edcde-05ff-4f2b-94db-131c95fd3bb0","published_at":1296777600,"summary":"Regular
        readers of this blog know about my current interest in WordPress as a tool
        to create scholarly content. In the last few weeks I have released several
        WordPress plugins for reference management and to create ePub files. Obviously
        I\u2019m not the only person having this idea.","title":"Discussing WordPress
        for Scientists","updated_at":1659255995,"url":"https://blog.front-matter.de/posts/discussing-wordpress-for-scientists/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7q","id":"2b7af15b-2ef6-4a02-b296-a96af5f6e8bd","published_at":1291334400,"summary":"In
        December I am hosting the blog carnival Medical Information Matters, a blog
        carnival about \u2013\n<strong>\n <strong>\n  medical information\n </strong>\n</strong>\n.
        The deadline for submissions is next Tuesday, and I have already received
        a number of interesting posts.","title":"Medical Information Matters","updated_at":1659187306,"url":"https://blog.front-matter.de/posts/medical-information-matters/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw85","guid":"https://doi.org/10.53731/r294649-6f79289-8cw85","id":"bba37711-9b4e-42a5-9571-d8b0d2477ac1","published_at":1287878400,"summary":"Biologist
        Gregory Petsko has written a monthly column for the journal\n<em>\n <em>\n  Genome
        Biology\n </em>\n</em>\nsince the journal launched in 2000. To mark the 10th
        anniversary of the column and the journal,\n<em>\n <em>\n  Genome Biology\n
        </em>\n</em>\ncreated an eBook (iPad/iPhone: free, Kindle: 99 c) containing
        all columns up to August 2010. I downloaded the iBooks version for iPad/iPhone.","title":"Having
        an impact (factor) and other stories from Gregory Petsko","updated_at":1659186967,"url":"https://blog.front-matter.de/posts/having-an-impact-factor-and-other-stories-from-gregory-petsko/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw83","guid":"https://doi.org/10.53731/r294649-6f79289-8cw83","id":"1cff135c-0036-4d37-b8c3-2c52a535fa3f","published_at":1288224000,"summary":"Today
        I posted a document that should help define a set of principles for scientific
        attribution. These principles will be presented and discussed at the National
        Science Foundation workshop\n<strong>\n <strong>\n  Changing the Conduct of
        Science in the Information Age\n </strong>\n</strong>\non November 12. Many
        people helped me with this document (Cameron Neylon in particular), and I
        welcome comments and suggestions.","title":"Some thoughts on principles for
        scientific attribution","updated_at":1659354219,"url":"https://blog.front-matter.de/posts/some-thoughts-on-principles-for-scientific-attribution/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw87","guid":"https://doi.org/10.53731/r294649-6f79289-8cw87","id":"c017100a-caca-43fb-9ad1-7fb9713b3ccc","published_at":1287360000,"summary":"<em>\n
        PLoS ONE\n</em>\ntoday published a paper very relevant to Open Access Week
        (which started today):\n<strong>\n Gargouri Y, Hajjem C, Larivi\u00e8re V,
        Gingras Y, Carr L, Brody T, Harnad S\n</strong>\n. Self-Selected or Mandated,
        Open Access Increases Citation Impact for Higher Quality Research.\n<em>\n
        PLoS ONE\n</em>\n. 2010;5(10):e13636+. doi:10.1371/journal.pone.0013636.","title":"New
        in PLoS ONE: Citation rates of self-selected vs. mandated Open Access","updated_at":1755332862,"url":"https://blog.front-matter.de/posts/new-in-plos-one-citation-rates-of-self-selected-vs-mandated-open-access/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw89","guid":"https://doi.org/10.53731/r294649-6f79289-8cw89","id":"5cf4d731-a249-4027-a027-afdd9758095f","published_at":1287187200,"summary":"The
        ArXiv preprint archive for research articles in physics, mathematics, computer
        science and related disciplines was initiated by Paul Ginsparg in 1991. ArXiv
        enables the rapid dissemination of research articles prior to peer review,
        and it quickly became very successful in this.","title":"In which I suggest
        a preprint archive for clinical trials","updated_at":1755333097,"url":"https://blog.front-matter.de/posts/in-which-i-suggest-a-preprint-archive-for-clinical-trials/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8f","id":"54a8bb55-d86f-4adf-9140-e1165c5aab23","published_at":1286323200,"summary":"The
        iPad was released six months ago, and we already have several reference managers
        available for the platform. Reading the PDF of a scientific paper on an iPad
        is a positive experience, and to me very different from reading the PDF on
        a regular computer.","title":"Reference Management with the iPad","updated_at":1659255459,"url":"https://blog.front-matter.de/posts/reference-management-with-the-ipad/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8h","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8h","id":"3bf8ad0c-c890-4786-bfe7-5d50979121f1","published_at":1285977600,"summary":"This
        week\n<em>\n <em>\n  PLoS Computational Biology\n </em>\n</em>\npublished
        another helpful editorial in their 10 Simple Rules collection (https://doi.org/10.1371/journal.pcbi.1000941):\n<em>\n
        Ten Simple Rules for Editing Wikipedia.\n</em>\nI have very rarely edited
        Wikipedia articles myself, and I suspect this behavior is the rule and not
        the exception among science bloggers.","title":"Advice for scientists who
        want to become Wikipedia editors","updated_at":1659255400,"url":"https://blog.front-matter.de/posts/advice-for-scientists-who-want-to-become-wikipedia-editors/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw9s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw9s","id":"e44ff73a-9b2b-41d8-aad1-b8ed0edcb9d2","published_at":1202947200,"summary":"Nature
        Network turns one year old today and it''s time to celebrate. We already have
        a number of interesting \u2013 and entertaining \u2013 birthday celebrations.
        I want to contribute with my personal experience at Nature Network. During
        the day I treat cancer patients and do cancer research at a German University
        hospital.","title":"How Nature Network changed my life","updated_at":1659164728,"url":"https://blog.front-matter.de/posts/how-nature-network-changed-my-life/"},{"doi":"https://doi.org/10.53731/bph94jk-kxvr00s","guid":"https://doi.org/10.53731/bph94jk-kxvr00s","id":"06ca3584-d8c1-4480-8ae9-61bae3079997","published_at":1284681600,"summary":"Dear
        reader, two weeks ago I moved this blog from Nature Network to\n<strong>\n
        <strong>\n  PLoS Blogs\n </strong>\n</strong>\n. I hope that most of my old
        readers have followed me here, and that I might even have a few new readers.
        Ed Yong recently talked about how he interacts with his many, many blog readers.
        One important strategy he uses is to ask his readers for feedback in regular
        intervals \u2013 he calls it delurking.","title":"And who are you?","updated_at":1661074665,"url":"https://blog.front-matter.de/posts/and-who-are-you/"},{"doi":"https://doi.org/10.53731/6kfyy-nq280","guid":"https://doi.org/10.53731/6kfyy-nq280","id":"f7d68f42-1e4b-4b78-bda5-19925421586e","published_at":1737067311,"summary":"Continuing
        the work on streamlining the DOI assignment for new blog posts in the Rogue
        Scholar science blog archive, I discovered and fixed a major bug. Rogue Scholar
        DOIs strings are generated from a random number and include a checksum. It
        turns out that this checksum was wrong, affecting all Rogue Scholar posts
        generated with the commonmeta Go library between May 2024 and today.","title":"Persistent
        identifiers, random strings, and checksums","updated_at":1737650014,"url":"https://blog.front-matter.de/posts/persistent-identifiers-random-strings-and-checksums-2/"},{"doi":"https://doi.org/10.53731/pzvna-jcs28","guid":"https://doi.org/10.53731/pzvna-jcs28","id":"d6cd6b35-e704-4a08-8f40-60c99fc8df3f","published_at":1733760124,"summary":"Last
        Friday I attended a workshop by the Infra Wiss Blogs project in Berlin.","title":"Minimal
        requirements for a science blog","updated_at":1737650139,"url":"https://blog.front-matter.de/posts/minimal-requirements-for-a-science-blog/"},{"doi":"https://doi.org/10.53731/xszpd-6z265","guid":"https://doi.org/10.53731/xszpd-6z265","id":"eba87cc4-750c-4162-a88e-4ca99128cb9c","published_at":1694539878,"summary":"Today
        I am happy to announce the release of commonmeta-py v0.8, the next major release
        of the Python scholarly metadata conversion library.","title":"Releasing commonmeta-py
        v0.8","updated_at":1737652087,"url":"https://blog.front-matter.de/posts/releasing-commonmeta-py-v0-8/"},{"doi":"https://doi.org/10.53731/rbjgna1-97aq74v-ag811","guid":"https://doi.org/10.53731/rbjgna1-97aq74v-ag811","id":"7319ade2-6101-4915-8513-8c22a852cc42","published_at":1634898983,"summary":"This
        blog started registering DOIs for its content with Crossref last week, and
        all 450+ blog posts so far were registered by Monday morning. This enables
        the easy import into reference managers (here using Zotero): Using Zotero
        or any other reference manager this blog post can now be easily cited: 1.
        \tFenner M. The Front Matter blog now uses DOIs. Front Matter. Published online
        October 14, 2021.","title":"Registering content with Crossref or DataCite","updated_at":1693946879,"url":"https://blog.front-matter.de/posts/registering-content-with-crossref-or-datacite/"},{"doi":"https://doi.org/10.53731/r79ra81-97aq74v-ag4mr","guid":"https://doi.org/10.53731/r79ra81-97aq74v-ag4mr","id":"52cdf533-3cbc-4ff1-b5fe-0896d1851a83","published_at":1602633600,"summary":"Access
        to some DataCite resources and services requires authentication so that DataCite
        knows who is making a request. This includes Fabrica, our DOI registration
        service that requires a member account, but also our integration with ORCID
        in the Profiles service, where researchers authenticate with us to allow us
        to send information about content with DataCite DOIs authored by them to their
        ORCID record.","title":"DataCite switches to Globus for Authentication","updated_at":1711835523,"url":"https://blog.front-matter.de/posts/datacite-switches-to-globus-for-authentication/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cvzq","guid":"https://doi.org/10.53731/r294649-6f79289-8cvzq","id":"d10fbdd2-40f8-4184-bedd-7c24d89f1716","published_at":1435486980,"summary":"At
        the SciFoo Camp this weekend Erin McKiernan and I moderated an unconference
        session on the topic\n<strong>\n Why should we work where we live?\n</strong>\nThis
        was a spontaneous idea after we had talked about this topic on Friday (Erin
        lives in Mexico with a job in Canada, I live in Germany and work for an organization
        in San Francisco). We quickly realized that this situation is far from uncommon
        in the space we work in (science and science","title":"Why should we work
        where we live?","updated_at":1736378890,"url":"https://blog.front-matter.de/posts/why-should-we-work-where-we-live/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0x","id":"c3d0844f-4161-405b-a278-f7f0ed8be21a","published_at":1381681740,"summary":"Yesterday
        we created a set of roughly 10,000 DOIs for journal articles published in
        2011 or 2012. We used these DOIs as a reference set in a data hackathon around
        article-level metrics/altmetrics - material for another blog post. The random
        DOis were generated using the CrossRef RanDOIm service, with article titles
        fetched from the CrossRef OpenURL API.","title":"Challenges in automated DOI
        resolution","updated_at":1659265629,"url":"https://blog.front-matter.de/posts/challenges-in-automated-doi-resolution/"},{"doi":"https://doi.org/10.53731/r795v41-97aq74v-ag4cd","guid":"https://doi.org/10.53731/r795v41-97aq74v-ag4cd","id":"d92def6b-4b23-498d-a18b-3704599f97be","published_at":1482105600,"summary":"Geoff
        Bilder from CrossRef likes to show the following slide at scholarly conferences,
        and then asks the audience what they see: Most of us probably immediately
        recognize this document as a scholarly article.","title":"Reference Lists
        and Tables of Content","updated_at":1660554532,"url":"https://blog.front-matter.de/posts/reference-lists-and-tables-of-content/"},{"doi":"https://doi.org/10.53731/r79y01h-97aq74v-ag5dw","guid":"https://doi.org/10.53731/r79y01h-97aq74v-ag5dw","id":"c8aeabe2-67d9-492a-a3c1-a34a19f3bd91","published_at":1468800000,"summary":"On
        July 12, 2016, DataCite invited Andreas Rauber to present the recommendations
        for dynamic data citation of the RDA Data Citation Working Group in a webinar.
        Andreas is one of the co-chairs of the RDA working group, and he gave a throughout
        overview of the recommendations, and the thinking that went into them. The
        final recommendations are available since last fall, and the current focus
        of the working group is to help with implementations.","title":"Dynamic Data
        Citation Webinar","updated_at":1694075531,"url":"https://blog.front-matter.de/posts/dynamic-data-citation-webinar/"},{"doi":"https://doi.org/10.53731/r79ys5h-97aq74v-ag5gj","guid":"https://doi.org/10.53731/r79ys5h-97aq74v-ag5gj","id":"ae34672e-06da-4b50-8ca6-a8bb010a4df4","published_at":1461024000,"summary":"This
        week most of the DataCite staff is attending the Force16 conference in Portland,
        Oregon. Force16 brings together a large group of people who either already
        work with DataCite in one way or another, or are doing interesting projects
        of relevance to DataCite. ImpactStory is a non-profit that helps scientists
        learn where their research is being cited, shared, saved and more.","title":"We
        were out in Force","updated_at":1736378615,"url":"https://blog.front-matter.de/posts/we-were-out-in-force/"},{"doi":"https://doi.org/10.53731/r79t8y1-97aq74v-ag51m","guid":"https://doi.org/10.53731/r79t8y1-97aq74v-ag51m","id":"ba659398-6e3a-43b2-9441-edd5558e3a71","published_at":1443719040,"summary":"The
        Research Data Alliance 6th Plenary last week discussed numerous topics very
        relevant to DataCite. Below is a short subjective list of topics I found interesting.
        If you attended RDA, feel free to add your thoughts in the comments.","title":"Thoughts
        on the Research Data Alliance 6th Plenary","updated_at":1736378675,"url":"https://blog.front-matter.de/posts/thoughts-on-the-research-data-alliance-6th-plenary/"},{"doi":"https://doi.org/10.53731/r79tt01-97aq74v-ag55w","guid":"https://doi.org/10.53731/r79tt01-97aq74v-ag55w","id":"b4da05f7-544a-437d-b0ed-0e36dbca19c0","published_at":1438560000,"summary":"This
        week I start as the new DataCite Technical Director. While I get up to speed
        with existing DataCite services and infrastructure, and we start to launch
        new services (e.g. this blog), this is also a good time to communicate the
        overall approach I am taking.","title":"Data-Driven Development","updated_at":1688292687,"url":"https://blog.front-matter.de/posts/data-driven-development/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw01","guid":"https://doi.org/10.53731/r294649-6f79289-8cw01","id":"52cc631a-fba9-4d9b-815e-f868ddddbbcf","published_at":1420469700,"summary":"This
        is the title of an upcoming workshop next Sunday organized by Ian Mulvany
        and myself. The workshop is a pre-conference event of the Force15 conference
        in Oxford. This blog post summarizes some of the issues and work that needs
        to be done.","title":"Data Citation Support in Reference Managers","updated_at":1736379001,"url":"https://blog.front-matter.de/posts/data-citation-support-in-reference-managers/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw06","guid":"https://doi.org/10.53731/r294649-6f79289-8cw06","id":"d0ca6fa3-3a93-46d3-b820-446938d78f70","published_at":1410102600,"summary":"One
        of the important outcomes of the Markdown for Science workshop that took place
        in June 2013 was a decision on a name -\n<em>\n Scholarly Markdown\n</em>\n-
        and a brief definition:Markdown that supports the requirements of scientific
        textsMarkdown as format that glues open scientific text resources togetherA
        reference implementation with documentation and testsA community In my eyes
        this is still a great definition.","title":"CommonMark and the Future of Scholarly
        Markdown","updated_at":1736464015,"url":"https://blog.front-matter.de/posts/commonmark-and-the-future-of-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0g","id":"5e8c5f4d-b651-4173-a52a-241d262d738f","published_at":1394466240,"summary":"Earlier
        this week Bj\u00f6rn Brembs wrote in a blog post (What Is The Difference Between
        Text, Data And Code?): The post is about the importance of publication of
        data and software where currently\n<em>\n the rewards are stacked disproportionately
        in favor of text publications\n</em>\n. The intended audience is probably
        mainly other scientists (Bj\u00f6rn is a neurobiologist) who are reluctant
        to publish data and/or code, but there is another interesting aspect","title":"Continuous
        Publishing","updated_at":1704962064,"url":"https://blog.front-matter.de/posts/continuous-publishing/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0r","id":"92f08208-7b2a-4758-82b9-12ca5562d178","published_at":1384186440,"summary":"Last
        Friday and Saturday the 6th SpotOn London conference tool place at the British
        Library. I had a great time with many interesting sessions and good conversations
        both in and between sessions. But I might be biased, since I helped organize
        the event, and in particular did help put the sessions for the Tools strand
        together.","title":"What is holding us back?","updated_at":1660569623,"url":"https://blog.front-matter.de/posts/what-is-holding-us-back/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw09","guid":"https://doi.org/10.53731/r294649-6f79289-8cw09","id":"205b303f-80da-4fd6-af87-2c23bdf9688a","published_at":1407597540,"summary":"One
        topic I will cover this Sunday in a presentation on Open Scholarship Tools
        at\n<em>\n Wikimania 2014\n</em>\ntogether with Ian Mulvany is visualization.
        Data visualization is all about\n<em>\n telling stories with data\n</em>\n,
        something that is of course not only important for scholarly content, but
        for example increasingly common in journalism.","title":"Visualizing Scholarly
        Content","updated_at":1660568097,"url":"https://blog.front-matter.de/posts/visualizing-scholarly-content/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw10","guid":"https://doi.org/10.53731/r294649-6f79289-8cw10","id":"0bec98db-a1b6-47d3-bf11-38ba74ee94fa","published_at":1375806900,"summary":"Now
        that I can automatically import my publications from my ORCID profile and
        display them in this blog, I also want to visualize them. I have started with
        d3.js code that displays the number of publications per year - using the list
        of my publications in Citeproc JSON format.","title":"What a publication timeline
        can tell you","updated_at":1693643992,"url":"https://blog.front-matter.de/posts/what-a-publication-timeline-can-tell-you/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw0y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw0y","id":"bb051be3-53dc-456b-88f3-c9029eb5ab76","published_at":1376152260,"summary":"Ten
        days ago Information Standards Quarterly (ISQ) published a special issue on
        altmetrics.","title":"Altmetrics coming of age? Not for Wikipedia","updated_at":1660572089,"url":"https://blog.front-matter.de/posts/altmetrics-coming-of-age-not-for-wikipedia/"},{"doi":"https://doi.org/10.53731/axtz227-73n18e7","guid":"https://doi.org/10.53731/axtz227-73n18e7","id":"9f735c3d-13fc-4d08-972c-e0c8d1b8becb","published_at":1375634220,"summary":"A
        common feature of blogs written by scientists is a listing of all their publications.
        Publication lists are a great way to provide background information about
        your research. Publication lists should provide links to the fulltext versions
        of these publications, should be nicely formatted - e.g. using a common citation
        style such as APA - and should be easy to maintain.","title":"Automatically
        list all your publications in your blog","updated_at":1660572649,"url":"https://blog.front-matter.de/posts/automatically-list-all-your-publications-in-your-blog/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw13","guid":"https://doi.org/10.53731/r294649-6f79289-8cw13","id":"be1e7988-c4d4-4215-9449-3bdeb1640c68","published_at":1374857280,"summary":"Open
        Researcher &amp; Contributor ID (ORCID) provides a persistent identifier for
        researchers and lets them claim their research outputs in the ORCID Registry.
        I have been involved with ORCID since early 2010 and I am happy to see that
        nine months after launch 200,000 researchers have signed up for the service,
        and the organization has more than 70 member organizations.","title":"RSS
        Feeds for Scholarly Authors","updated_at":1659265307,"url":"https://blog.front-matter.de/posts/rss-feeds-for-scholarly-authors/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw14","guid":"https://doi.org/10.53731/r294649-6f79289-8cw14","id":"20fe9249-e171-4645-bb49-a015829f6d13","published_at":1374598200,"summary":"A
        keynote is a presentation typically given at a start of a conference that
        sets the central theme for the event. A keynote speaker usually has more time
        (45-60 min) than other presenters, and has the full attention of everyone
        attending the conference.","title":"The trouble with keynotes","updated_at":1736379115,"url":"https://blog.front-matter.de/posts/the-trouble-with-keynotes/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw15","guid":"https://doi.org/10.53731/r294649-6f79289-8cw15","id":"3502015b-cc45-4529-b20e-5de2056c22d2","published_at":1374252840,"summary":"Figures
        are an important part of any scientific document. While the kind of figure
        commonly used obviously varies between disciplines, charts are an important
        part of many publications.","title":"Creating charts with Datawrapper","updated_at":1660898323,"url":"https://blog.front-matter.de/posts/creating-charts-with-datawrapper/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1c","id":"3850bdcb-6858-4883-a9e9-b474d0bc6f45","published_at":1371489360,"summary":"One
        of the important discussions taking place at the Markdown for Science workshop
        last weekend was about the definition of Scholarly Markdown.","title":"What
        is Scholarly Markdown?","updated_at":1736379320,"url":"https://blog.front-matter.de/posts/what-is-scholarly-markdown/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw20","guid":"https://doi.org/10.53731/r294649-6f79289-8cw20","id":"2b89531c-a028-493b-ba5c-72a054c149ba","published_at":1365897600,"summary":"Cameron
        Neylon yesterday wrote a great blog post about appropriate business models
        for shared scholarly communications infrastructure. This is an area I have
        also been thinking about a lot recently, and in this post I want to add a
        technical perspective (and an announcement) to the discussion. DevOps is an
        important trend that brings software development and administration of IT
        infrastructure closer together.","title":"You should be able to install my
        software in less than one hour \u2013 or why DevOps is important","updated_at":1736462914,"url":"https://blog.front-matter.de/posts/you-should-be-able-to-install-my-software-in-less-than-one-hour-or-why-devops-is-important/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw1d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw1d","id":"9d46419d-9dea-4345-b12f-da33ddf068f4","published_at":1371316680,"summary":"This
        is the last Gobbledygook post on PLOS Blogs, and at the same time the first
        post at the new Github blog location. I have been blogging at PLOS Blogs since
        the PLOS Blogs Network was launched in September 2010, so this step wasn\u2019t
        easy. But I have two good reasons. In May 2012 I started to work as technical
        lead for the PLOS Article-Level Metrics project.","title":"Goodbye PLOS Blogs,
        Welcome Github Pages","updated_at":1694074092,"url":"https://blog.front-matter.de/posts/goodbye-plos-blogs-welcome-github-pages/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw26","guid":"https://doi.org/10.53731/r294649-6f79289-8cw26","id":"1b14c023-2919-418b-84e6-9076a797f0e3","published_at":1363737600,"summary":"The
        Beyond the PDF Conference is currently taking place in Amsterdam. Unfortunately,
        I am unable to attend in person this time (I took part in the first Beyond
        the PDF in January 2011), but I was watching the livestream of the Business
        Case panel discussion yesterday afternoon.","title":"The Price of Innovation
        \u2013 my Thoughts for Beyond the PDF","updated_at":1660725087,"url":"https://blog.front-matter.de/posts/the-price-of-innovation-my-thoughts-for-beyond-the-pdf/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2q","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2q","id":"7104a08b-8bf0-486c-b16e-c2b3f8be8702","published_at":1329436800,"summary":"Regular
        readers of this blog know that I\u2019m a big fan of the reference manager
        Papers \u2013 three years ago we even had a poetry contest when the iPhone
        version was first released. The strength of Papers has always been the very
        nice user interface, and Papers 2 released last March was a major update that
        added many more reference types, collaboration and a word processor plugin.","title":"Reference
        Manager Papers now available for Windows","updated_at":1659201158,"url":"https://blog.front-matter.de/posts/reference-manager-papers-now-available-for-windows/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2w","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2w","id":"c6cffb68-921a-44cb-8c31-82168990de70","published_at":1327363200,"summary":"The
        ScienceOnline2012 conference last week again was a wonderful experience. This
        was my third time in North Carolina, and I had many great conversations in
        the sessions, hallways \u2013 and bars. One of many highlights was a lunch
        meeting with fellow PLoS bloggers and staffers. Together with Euan Adie I
        moderated a session on Friday:Using altmetrics tools to track the scholarly
        impact of your research.","title":"Altmetrics \u2013 Where Do We Go From Here?","updated_at":1660729136,"url":"https://blog.front-matter.de/posts/altmetrics-where-do-we-go-from-here/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw2r","guid":"https://doi.org/10.53731/r294649-6f79289-8cw2r","id":"64f41059-9d9d-49e6-b1e1-3df00adf7fe2","published_at":1329350400,"summary":"fig\n<strong>\n
        share\n</strong>\n<em>\n allows researchers to publish all of their research
        outputs in seconds in an easily citable, sharable and discoverable manner\n</em>\n.
        The service was started by Mark Hahnel last year while still a PhD student.
        Mark joined Digital Science to work on fig\n<strong>\n share\n</strong>\nin
        September and last month relaunched a much improved version of the service.
        I asked Mark a few questions about fig\n<strong>\n share\n</strong>\nbelow.","title":"Figshare:
        Interview with Mark Hahnel","updated_at":1736451997,"url":"https://blog.front-matter.de/posts/figshare-interview-with-mark-hahnel/"},{"doi":"https://doi.org/10.53731/ddkjr75-55ff0rf","guid":"https://doi.org/10.53731/ddkjr75-55ff0rf","id":"fd7c3f1a-2695-45e8-8543-0c2573e67b04","published_at":1318982400,"summary":"Earlier
        this week\n<strong>\n <strong>\n  Alex Ball\n </strong>\n</strong>\nand\n<strong>\n
        <strong>\n  Monica Duke\n </strong>\n</strong>\nfrom the Digital Curation
        Centre released the how-to guide Cite Datasets and Link to Publications. The
        guide is highly recommended reading for everyone interested in data citation.","title":"Data
        citation how-to guide released by Digital Curation Centre","updated_at":1660487688,"url":"https://blog.front-matter.de/posts/data-citation-how-to-guide-released-by-digital-curation-centre/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw67","guid":"https://doi.org/10.53731/r294649-6f79289-8cw67","id":"8b2b3136-f7f5-4a37-b0fe-e46faf929ed4","published_at":1318809600,"summary":"The
        shortDOI service was launched by the International DOI Foundation (IDF) in
        May 2010. The service creates short versions of the often long DOIs, e.g.\n<strong>\n
        <strong>\n  10/dvq\n </strong>\n</strong>\ninstead of\n<strong>\n <strong>\n  10.1093/hmg/ddp202\n
        </strong>\n</strong>\n\u2013 written as URL this would be http://doi.org/dvq
        instead of http://doi.org/10.1093/hmg/ddp202.","title":"Serving shortDOIs","updated_at":1660732470,"url":"https://blog.front-matter.de/posts/serving-shortdois/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6v","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6v","id":"4020f265-888c-4fd1-9edd-2f62fca63346","published_at":1302652800,"summary":"On
        Monday I gave a presentation about ORCID, based on the ORCID Principles. The
        slides are hopefully a good introduction to ORCID and the current status of
        the initiative. A good in-person update of the ORCID initiative is the next
        ORCID Participant Meeting that takes place May 18 in Boston. Registration
        is free and everybody interested in unique identifiers for scholarly authors
        is invited to attend. More information at the ORCID website.","title":"Explaining
        the ORCID Principles","updated_at":1659354002,"url":"https://blog.front-matter.de/posts/explaining-the-orcid-principles/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw6z","guid":"https://doi.org/10.53731/r294649-6f79289-8cw6z","id":"bfbf9416-36b1-4a1d-8b23-378e1405241b","published_at":1300492800,"summary":"The
        history of HTML begins 1989 at CERN, the European Laboratory for Particle
        Physics in Geneva.\n<strong>\n <strong>\n  Tim Berners-Lee\n </strong>\n</strong>\n,\n<strong>\n
        <strong>\n  Robert Cailliau\n </strong>\n</strong>\nand colleagues invented
        HTML (as well as the transport protocol HTTP and the web browser) to facilitate
        collaboration between CERN physicists.","title":"A very brief history of Scholarly
        HTML","updated_at":1660740657,"url":"https://blog.front-matter.de/posts/a-very-brief-history-of-scholarly-html/"},{"doi":"https://doi.org/10.53731/fceexy7-7f3je4z","guid":"https://doi.org/10.53731/fceexy7-7f3je4z","id":"5987b346-1e68-4221-91af-846553381d9e","published_at":1307923200,"summary":"The
        Science Online London 2011 Conference takes place September 2-3 at the British
        Library. I am again one of the organizers (together with\n<em>\n <em>\n  Lou
        Woodley\n </em>\n</em>\nfrom Nature.com and\n<em>\n <em>\n  Kaitlin Thaney\n
        </em>\n</em>\nfrom Digital Science), and I\u2019m getting both excited and
        nervous the closer we get to September. We have recently posted a first draft
        of the conference program, and you can see that we are trying something new.","title":"Please
        join us for the Science Online London Conference in September","updated_at":1660487787,"url":"https://blog.front-matter.de/posts/please-join-us-for-the-science-online-london-conference-in-september/"},{"doi":"https://doi.org/10.53731/90ctgyp-ph7eq2a","guid":"https://doi.org/10.53731/90ctgyp-ph7eq2a","id":"4a9de200-b310-461b-afc5-d2cf98f9f588","published_at":1302048000,"summary":"The
        recent tragic events in Japan have made it difficult or impossible for many
        Japanese scientists to continue their work. The newly launched Nippon Science
        Support Network has therefore established a database of positions and stipends
        in other countries for Japanese students, research fellows and scientific
        personnel.","title":"Please help the Nippon Science Support Network","updated_at":1660487867,"url":"https://blog.front-matter.de/posts/please-help-the-nippon-science-support-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw77","guid":"https://doi.org/10.53731/r294649-6f79289-8cw77","id":"44c9d2b1-2944-4671-a1c5-3f3c25686f74","published_at":1295827200,"summary":"Today
        nature.com released their iPad reader application.","title":"Nature.com iPad
        app released today","updated_at":1660898818,"url":"https://blog.front-matter.de/posts/nature-com-ipad-app-released-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7k","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7k","id":"74f220b0-73f8-4c7a-8c1b-a4d9cf006a8f","published_at":1292198400,"summary":"Last
        Friday the latest science blogging network officially launched: Occam\u2019s
        Typewriter. The independent blogging network started out with eight bloggers
        and one guest blog, all of them well characterized by Bob O\u2019Hara. Most
        of the bloggers have moved their blogs from Nature Network, where I wrote
        next to them from 2007 until September this year.","title":"Occam\u2019s Typewriter:
        please welcome a new science blogging network","updated_at":1660742266,"url":"https://blog.front-matter.de/posts/occams-typewriter-please-welcome-a-new-science-blogging-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7e","id":"acaeecaf-b64b-44e5-9e40-5cc8c433f3a8","published_at":1293926400,"summary":"Today
        I posted the pre-print of a paper titled\n<strong>\n <strong>\n  Author Identifier
        Overview\n </strong>\n</strong>\nthat I submitted to the journal Libreas.
        This is the abstract: The paper was of course written with WordPress. I wish
        you all a Happy New Year.","title":"Author Identifier Overview","updated_at":1659255916,"url":"https://blog.front-matter.de/posts/author-identifier-overview/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7x","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7x","id":"f8b38cf0-ba90-42cb-92f3-6488404aac89","published_at":1289520000,"summary":"Earlier
        today I gave a short presentation about the Scientific Attribution Principles
        I posted here two weeks ago.","title":"Scientific Attribution Presentation","updated_at":1660899112,"url":"https://blog.front-matter.de/posts/scientific-attribution-presentation/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7t","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7t","id":"d30df8f7-f19e-4377-a4ac-1fc1c34b2114","published_at":1290556800,"summary":"On
        Saturday I went to see the exhibition Evolving English at the British Library
        in London.","title":"Evolving English at the British Library","updated_at":1688584278,"url":"https://blog.front-matter.de/posts/evolving-english-at-the-british-library/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw82","guid":"https://doi.org/10.53731/r294649-6f79289-8cw82","id":"9d1843f1-59e7-4f4a-abfb-825a031dd199","published_at":1288310400,"summary":"On
        Wednesday the NCBI released an Images database, compiled from full text resources
        at the NCBI \u2013 initially PubMed Central articles. The images can be searched
        by several parameters, e.g. figure caption or author. Using this database,
        images are now displayed together with the PubMed abstract for PubMed Central
        articles. More info about these changes can be found in the NLM Bulletin.","title":"NCBI
        adds searchable images database","updated_at":1660742735,"url":"https://blog.front-matter.de/posts/ncbi-adds-searchable-images-database/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8a","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8a","id":"3e735e23-1af9-4718-8854-a1fd875dd434","published_at":1287100800,"summary":"In
        the last few weeks I haven\u2019t seen any announcement for a new science
        blogging network (the last one was probably Scientific American in September).
        So I thought today would be a good day to start a new one. Earlier today I
        wrote the first post on the first blog hosted by my institution.","title":"Today
        I started a new blogging network","updated_at":1660743111,"url":"https://blog.front-matter.de/posts/today-i-started-a-new-blogging-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw7y","guid":"https://doi.org/10.53731/r294649-6f79289-8cw7y","id":"8f3e59ef-b6c0-4e75-bc83-0987a6a875a9","published_at":1286668800,"summary":"Registration
        for the ScienceOnline2011 conference starts today at 12 noon EST. This is
        the fifth annual conference on science and the web, and will be held January
        13-15, 2011 in Research Triangle Park, North Carolina. This is the second
        time I will go to the conference \u2013 I had a wonderful time in 2009.","title":"Registration
        for ScienceOnline2011 starts today","updated_at":1660743788,"url":"https://blog.front-matter.de/posts/registration-for-scienceonline2011-starts-today/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5s","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5s","id":"1535a468-5dae-4d22-81ce-9366d5aada6f","published_at":1284595200,"summary":"All
        science bloggers do a lot of reading for background information, or write
        blog posts based on a (newly published) paper, blog post or news item. So
        I thought that it would be a good idea to collect those references in a single
        place. Reading lists are perfect for this, and they are easy to create and
        maintain with web-based reference managers.","title":"Starting a reading list
        for Gobbledygook","updated_at":1660744132,"url":"https://blog.front-matter.de/posts/starting-a-reading-list-for-goobledygook/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw8g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw8g","id":"3d53b142-00af-452f-bcf0-4c58f6da15d7","published_at":1286064000,"summary":"In
        a blog post last week, Dario Taraborelli officially announced ReaderMeter.
        ReaderMeter takes the usage data from reference managers (starting with Mendeley)
        to analyze the impact of publications by a particular author. ReaderMeter
        is a welcome addition to other metrics of researcher impact, most of which
        are citation-based. And ReaderMeter was hacked together in a few nights, so
        the service should improve over time.","title":"ReaderMeter: researcher-level
        metrics based on readership","updated_at":1660895645,"url":"https://blog.front-matter.de/posts/readermeter-researcher-level-metrics-based-on-readership/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5g","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5g","id":"5227310f-e1a9-4b22-aca5-d791146b274c","published_at":1283731200,"summary":"The
        3rd Annual Science Online London Conference took place last Friday and Saturday.
        For me it was again a fantastic event. Matt Brown is collecting all blog posts,
        pictures, videos, etc. over at this Nature Network post. As one of the organizers
        of the conference (mainly helping with the program) I was pretty nervous,
        and I have to admit that I didn\u2019t sleep well Thursday and Friday. And
        much better Saturday.","title":"The Great Science Online London Tweetup","updated_at":1659335046,"url":"https://blog.front-matter.de/posts/the-great-science-online-london-tweetup/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5f","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5f","id":"9b7ef945-4da6-4664-b87e-5bea77a995b9","published_at":1283558400,"summary":"On
        Wednesday PLoS BLOGs launched with a splash. We (both PLoS BLOGs as a whole
        and me individually) got a lot of positive feedback and words of encouragement
        \u2013 so we are off to a good start. As both our community manager Brian
        Mossop and myself are currently in London for the Science Online London Conference,
        we could celebrate the launch in person. With a good pint of British ale Thursday
        evening.","title":"Unmeasurable Science","updated_at":1660399279,"url":"https://blog.front-matter.de/posts/unmeasurable-science/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5e","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5e","id":"a73c8a56-2baf-4cf6-950d-e98e55875a04","published_at":1283299200,"summary":"This
        is my last post for this Nature Network blog. Later today, I will start a
        new blog somewhere else \u2013 also called Gobbledygook and covering the same
        topics. Writing this blog here on Nature Network since August 2007 has been
        an incredible experience, something that can''t be covered in a single blog
        post. I simply want to say thank you to all the people I interacted with over
        the years \u2013 both online and in person.","title":"Bye-Bye Nature Network","updated_at":1660809034,"url":"https://blog.front-matter.de/posts/bye-bye-nature-network/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5d","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5d","id":"91aea273-df85-4710-80ab-a9273aca22d1","published_at":1280620800,"summary":"Flipboard
        is a\n<em>\n <em>\n  personalized social magazine\n </em>\n</em>\nfor the
        iPad. The free application was released on July 22, and instantly created
        a lot of buzz. Because of the overwhelming interest, they had to create a
        waitlist for the personal features and I could only sign up for and start
        using them a few days ago. Flipboard is a true iPad application, it would
        not work the same on a laptop computer or mobile phone.","title":"Flipboard
        changes the way we use Twitter","updated_at":1660809686,"url":"https://blog.front-matter.de/posts/flipboard-changes-the-way-we-use-twitter/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw5c","guid":"https://doi.org/10.53731/r294649-6f79289-8cw5c","id":"d878b732-0ea5-4553-818f-b1aa1ef1cc6a","published_at":1280793600,"summary":"Reference
        management is a frequent topic on this blog. The last few years we have seen
        both a large increase in the number of available tools, but also big changes
        in how we use reference management software. But for many of us the first
        reference management software was Endnote. I first used Endnote as a medical
        student in 1990 (Endnote Plus at that time, published by Niles Software),
        and I\u2019m still a regular user.","title":"Endnote: Interview with Jason
        Rollins","updated_at":1660405249,"url":"https://blog.front-matter.de/posts/endnote-interview-with-jason-rollins/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw54","guid":"https://doi.org/10.53731/r294649-6f79289-8cw54","id":"e45233f0-1c57-4808-a22f-4248bbbfec2c","published_at":1277164800,"summary":"Earlier
        today I attended the fabulous Innovations in Reference Management workshop
        in Birmingham organized by Owen Stephens from Open University. Owen has written
        some blog posts summarizing the sessions almost in real time. You also find
        a good number of interesting tweets under the hashtag #irm10.","title":"Innovations
        in Reference Management","updated_at":1659334924,"url":"https://blog.front-matter.de/posts/innovations-in-reference-management/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw57","guid":"https://doi.org/10.53731/r294649-6f79289-8cw57","id":"b9bb702a-ce33-4628-b1df-a7a6ed768862","published_at":1278288000,"summary":"About
        a year ago I wrote a blog post about how to use Web 2.0 tools for a journal
        club (Recipe: Distributing papers for a journal club). Although reference
        management tools such as\n<em>\n <em>\n  CiteULike\n </em>\n</em>\nand\n<em>\n
        <em>\n  Mendeley\n </em>\n</em>\ncan be used for journal clubs, discussion
        features are often more of an afterthought. At the time I therefore recommended
        FriendFeed.","title":"Discuss Papers with JournalFire","updated_at":1659167063,"url":"https://blog.front-matter.de/posts/discuss-papers-with-journalfire/"},{"doi":"https://doi.org/10.53731/r294649-6f79289-8cw55","guid":"https://doi.org/10.53731/r294649-6f79289-8cw55","id":"b8f01608-05af-41a8-aa71-7238ddea1677","published_at":1276560000,"summary":"Last
        week I attended the annual meeting of the American Society of Clinical Oncology
        (ASCO) in Chicago. For my work it is the most important scientific meeting
        of the year, and it is also by far the biggest with more than 30.000 participants.
        Blogging is a great way to report from conferences, and for me\n<em>\n FriendFeed\n</em>\nis
        the best microblogging tool to do that.","title":"Using Twitter at the ASCO
