        I released a new version of the commonmeta-py Python library with major improvements
        in Crossref DOI registration, including refactoring to use the Python marshmallow
        library, XML schema validation, and API calls to Crossref and InvenioRDM instances
        via the commonmeta-py command-line interface.Using the marshmallow library  Marshmallow
        is a popular Python library for converting complex objects to and from simple
