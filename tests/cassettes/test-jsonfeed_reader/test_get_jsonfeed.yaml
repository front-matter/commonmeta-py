  response:
    body:
      string: '{"authors":[{"affiliation":[{"id":"https://ror.org/03yty8687","name":"GigaScience
        Press"}],"contributor_roles":[],"family":"Edmunds","given":"Scott","url":"https://orcid.org/0000-0001-6444-1436"}],"blog":{"authors":null,"community_id":"52db0518-e228-4260-8c54-c4e323b2569d","created":1675555200,"current_feed_url":null,"description":"Data
        driven blogging from the GigaScience editors","favicon":"https://rogue-scholar.org/api/communities/52db0518-e228-4260-8c54-c4e323b2569d/logo","feed_format":"application/atom+xml","feed_url":"http://gigasciencejournal.com/blog/feed/atom/","filter":null,"generator":"Other","home_page_url":"https://gigasciencejournal.com/blog","issn":null,"language":"eng","license":"https://creativecommons.org/licenses/by/4.0/legalcode","prefix":"10.59350","relative_url":null,"secure":false,"slug":"gigablog","status":"archived","subfield":"1311","title":"GigaBlog","updated":null,"use_api":null},"blog_name":"GigaBlog","blog_slug":"gigablog","content_html":"<p><em>A
        new era is starting at GigaScience, today being the last day for the Hong
        Kong team including Nicole Nogoy, Chris Hunter, Peter Li, Mary Ann Tuli, Bastien
        Molcrette and Ken Cho. Joining them, and as outgoing Editor in Chief, I thought
        I would give my thoughts and perspectives on the last 15 years</em> <em>at
        the Open Science publishing coalface.</em></p>\n<figure class=\"wp-block-image
        size-full\"><img alt=\"\" class=\"wp-image-6297\" decoding=\"async\" fetchpriority=\"high\"
        height=\"478\" sizes=\"(max-width: 720px) 100vw, 720px\" src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Wutong.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Wutong.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Wutong-300x199.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\"><em>Arriving
        in Shenzhen: My weekend routine of climbing Wutong Mountain and being forced
        to pose for photos.</em></figcaption></figure>\n<p></p>\n<p>It wasn''t meant
        to end this way, but I''m still very grateful for the journey. Carrying out
        my scientific training in the UK and being taught to write scientifically
        using the passive voice, I have to push myself out of my comfort zone to write
        in the first person. But as today is my last day at <em>GigaScience,</em>
        and after giving 14 years and 11 months of my life to this project, excuse
        me this final indulgence.</p>\n<p>The team received notice 30 days ago that
        due to <em>\"strategic planning and operational optimization,\u00a0the operation
        of\u00a0GigaScience will be transferred to the\u00a0BGI Research\u00a0 Shenzhen.
        Regrettably, this adjustment will lead to the disbandment of the GigaScience
        Hong Kong team\"</em>. <em>GigaScience</em> and <em>GigaByte</em> will continue,
        and we have trained the Shenzhen team well and leave them with a strong legacy
        to build upon. The last two years receiving our highest numbers of submissions
        and many of the best papers we have ever published, so we leave a fantastic
        foundation to build from.</p>\n<p>Endpoints are good opportunities for reflection,
        so I thought I would use my last GigaBlog to talk about my personal highlights
        of the last 15 years. And thank the people who have helped made <em>GigaScience</em>
        such a success and pleasure to work on.</p>\n<figure class=\"wp-block-image
        size-full\"><img alt=\"\" class=\"wp-image-6295\" decoding=\"async\" height=\"539\"
        sizes=\"(max-width: 720px) 100vw, 720px\" src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Giga-in-Tibet.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Giga-in-Tibet.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/Giga-in-Tibet-300x225.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\"><em>On top
        of the world in 2011: GigaScience trip to Tibet with our first intern Matt,
        Alexandra, Laurie, and BGI founder Wang Jian and his assistant Ying.</em></figcaption></figure>\n<p></p>\n<p>Firstly
        I need to thank Laurie Goodman, for giving a wet behind the ears Scottish-Iranian
        Londoner with 4 years publishing experience under his belt a break in the
        Wild East. Recruiting me in October 2010 to setup a journal for BGI in Shenzhen
        as she didn''t want to live in China. And also recruiting <em>GigaScience</em>''s
        first Assistant Editor Alexandra Basford so we could keep each other sane
        in a <a href=\"https://www.nature.com/articles/464022a\">giant former shoe
        factory</a> in the industrial badlands of China with only two other foreigners.
        I''d had PhD and postdoctoral experience in cancer molecular pathology before
        moving into Open Access publishing with BioMed Central (BMC). Because I''d
        done a microarray experiment in my PhD and the other BMC Editors were terrified
        of bioinformatics and genomics I ended up running what was the highest-submission
        portfolio of journals in the <em>BMC</em>-series, and launching <em>BMC Medical
        Genomics</em>. Wooed by stories about this mystical utopian genomics company
        in a weird place called Shenzhen by our Board Member Stephan Beck, I was crazy
        enough and had exactly the experience needed to launch a journal in the genomics
        space. Although as two of my ex-BMC colleagues (Rachael Kotarski and Tom Pollard,
        both now doing amazing things in the US) had started working for this new
        organisation called DataCite, I suggested we leverage these new fangled things
        called data DOIs as well as BGI''s data expertise to focus on the broader
        topic of data publishing.</p>\n<p>While the launch of DataCite in 2009 had
        coincided with the first data journals in Earth Sciences nobody had done this
        in biomedical and biological science, despite these fields becoming massive
        producers of data (a genomics organisation like BGI being the perfect example
        of this). Signing up for DataCite membership, and initially working with the
        BGI database team, our initial focus was on building our own \"<a href=\"https://gigadb.org/\">GigaDB</a>\"
        database to assist with data hosting so there was no excuse for our authors
        not to be able to share their data. Coming up with a combined journal-and-data-publishing-as-a-service
        concept and attempting to do something new and different in the staid and
        conservative world of academic publishing. Adding in open peer review to make
        the process transparent, we decided to sign up OA pioneers BMC to be our first
        publishing partner. \u00a0</p>\n<figure class=\"wp-block-image size-full\"><img
        alt=\"\" class=\"wp-image-6296\" decoding=\"async\" height=\"478\" sizes=\"(max-width:
        720px) 100vw, 720px\" src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/GMO-pig.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/GMO-pig.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/GMO-pig-300x199.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\">Petting a cloned
        piglet at the notorious BGI GMO glow-in-the-dark pig farm in Huizhou. </figcaption></figure>\n<p></p>\n<p><strong>Accidentally
        inventing the Tweenome<br/></strong>Being in BGI during their highly productive
        early years in Shenzhen was a blur of having to help entertain visitors like
        <a href=\"https://commons.wikimedia.org/wiki/File:Wang_Jian_showing_Sydney_Brenner_around_BGI.jpg\">Sydney
        Brenner</a>, <a href=\"https://commons.wikimedia.org/wiki/File:Eric_Lander_and_Huanming_Yang_at_BGI_Shenzhen.jpg\">Eric
        Lander</a> and many Human Genomic Project luminaries that I''d learned about
        in my undergraduate studies. While getting ready to launch GigaDB in summer
        2011 our BGI colleagues came to me to help them draft a press release announcing
        they had sequenced the genome of the <a href=\"https://en.wikipedia.org/wiki/2011_Germany_E._coli_O104:H4_outbreak\"><em>E.
        coli</em> 0104:H4 pathogen</a> that was ravaging Germany that summer, killing
        over 50 people and causing mass panic in Europe. While drafting the PR and
        browsing the twitter feed I''d set up for BGI (as nobody in China knew what
        it was) I saw that a German group just released a PR claiming they had sequenced
        the pathogen first, but hadn''t shared any data to back that claim up. Immediately
        letting the BGI group know there was a race on, I asked them if we could use
        this opportunity to quickly release the data via the new publishing platform
        we were setting up. Also giving it our <a href=\"https://doi.org/10.5524/100001\">first
        data DOI</a> and explicitly releasing it into the public domain under a CC0
        waiver. I warned them that the consequences of data release in this manner
        were unknown (for example would journals see this as prior publication), but
        it was the best way to maximise the visibility, utility and reuse potential
        of their data during a major public health crisis. \u00a0BGI very generously
        consented to this (thank you JJ and Yingrui) and before the data had even
        finished uploading to <a href=\"http://www.ncbi.nlm.nih.gov/sites/entrez?cmd=Link&amp;LinkName=bioproject_sra&amp;from_uid=67657\"
        rel=\"noreferrer noopener\" target=\"_blank\">NCBI</a> I shared the FTP links
        to the data via <a href=\"http://sciblogs.co.nz/infectious-thoughts/2011/06/09/an-outbreak-of-crowdsourcing/\"
        rel=\"noreferrer noopener\" target=\"_blank\">twitter</a>. </p>\n<p>Going
        to bed, the next morning we woke up to find a huge community of microbial
        genomicists around the world starting to use this data, taking up the challenge
        to study the organism collaboratively. A <a href=\"https://github.com/ehec-outbreak-crowdsourced/BGI-data-analysis/wiki\"
        rel=\"noreferrer noopener\" target=\"_blank\">github</a> repository was created
        to provide a home to these analyses and data, and groups around the world
        started producing their own annotations and assemblies within 24 hours, also
        sharing them via twitter. A process that was dubbed in blogs and in book chapters
        to have <a href=\"https://doi.org/10.59350/5fpc8-mpp13\">made <em>E. coli
        </em>the first \"Tweenome\"</a>. Within a couple of a days from these collaborative
        efforts a potential ancestral strain was identified, and the many antibiotic
        resistance genes and pathogenic features were much more clearly understood.
        Diagnostic PCR primers were designed and shipped for free by BGI, and anti-microbial
        agents were produced to help bring the outbreak under control. By releasing
        the data under a CC0 waiver, this allowed truly open-source analysis, and
        when the paper was eventually <a href=\"http://doi.org/10.1056/NEJMoa1107643\">published
        in NEJM</a> the Editors were most interested in this \"Open-Source Genomic
        Analysis\" angle (H/T Nick Loman and Mark Pallen for helping kick off the
        crowdsourcing and refocusing the paper). This example has subsequently been
        used as an example for future UK and EU science policy, with the Royal Society
        in the UK using <em>the E. coli</em> crowdsourcing as an example of \"the
        power of intelligently open data\", and highlighting the genome on the cover
        of their influential <a href=\"https://royalsociety.org/news-resources/projects/science-public-enterprise/\">\"Science
        as an Open Enterprise\" report</a>. Which wasn''t a bad outcome from playing
        around on social media, and it set a very high bar for our subsequent datasets.</p>\n<figure
        class=\"wp-block-image size-full\"><img alt=\"\" class=\"wp-image-6300\" decoding=\"async\"
        height=\"444\" loading=\"lazy\" sizes=\"auto, (max-width: 720px) 100vw, 720px\"
        src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/birds.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/birds.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/birds-300x185.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\"><em>Bird genomes
        soaring at a press conference in 2014 for the<em> Avian Phylogenomics Project</em>
        that GigaScience and GigaDB published the data for.</em></figcaption></figure>\n<p></p>\n<p>After
        our first data DOI BGI generously let us continue to experiment and <a href=\"https://doi.org/10.59350/mrr7d-agc81\">seed
        GigaDB</a> with lots of attractive, unpublished genomic datasets. Allowing
        us to do very early experiments in Data Citation, using these novel data DOIs
        to see which journals messed this process up (<a href=\"https://gigasciencejournal.com/blog/promoting-datacitation-in-nature/\">hello
        2012 <em>Nature Genetics</em></a>), which journals said they wouldn''t allow
        data DOIs but contradicted themselves when given a particularly cover-worthy
        paper (<a href=\"https://gigasciencejournal.com/blog/the-latest-weapon-in-publishing-data-the-polar-bear/\">hello
        2014 <em>Cell</em></a>), and which journals could get this to work right at
        the beginning (hello and well done <a href=\"https://gigasciencejournal.com/blog/adventures-in-data-citation-sorghum-as-a-standard-for-data-release/\">2011
        <em>Genome Biology</em></a>). We wrote up these <a href=\"http://dx.doi.org/10.1186/1756-0500-5-223\">adventures
        in data citation</a> to educate more widely on best practices, and this lead
        to getting involved in the development of the <a href=\"https://force11.org/post/joint-declaration-of-data-citation-principles/\">Data
        Citation Principles</a>, the <a href=\"https://gigasciencejournal.com/blog/software-citation-guide/\">Software
        Citation Principles</a> and many <a href=\"https://doi.org/10.1038/s41597-023-02491-7\">other
        guidelines</a> on the topic of Data Citation.</p>\n<p><strong>Caught in the
        Academic Spring<br/></strong>The early 2010''s were an extremely exciting
        time to be in Open Science publishing. Moving to the BGI Hong Kong office
        in January 2012 we recruited our first Lead Curator Tam Sneddon and our first
        Database Administrator Jesse (Si Zhe) Xiao, allowing us to add data curation
        into the service we provided. After a year Tam handed over the role to Chris
        Hunter from EBI who built and brilliantly developed and ran the GigaDB platform
        and growing curation team. Alexandra left and Nicole Nogoy joined the team
        to help with Commissioning and then the managing of the journal, having launched
        and been Managing Editor of <em><a href=\"http://genomemedicine.com/\" rel=\"noreferrer
        noopener\" target=\"_blank\">Genome Medicine</a></em>. Peter Li joined to
        lead the IT development, bringing a lot of experience in the reproducibility
        and computational workflow space and leading lots of the reproducibility experiments
        we worked on. This core team has remained in place to the present day (with
        the addition of Mary Ann Tulli and Bastien Molcrette in the curation team
        and Rija M\u00e9nag\u00e9 and Ken Cho in the development team), and we all
        leave today proud of these accomplishments. Special mention should also go
        to former team members Hans Zauner (our most productive and proficient Editor
        who had to leave a few months ago), Rob Davidson and Chris Armit (our two
        Data Scientists), and Nafisa Qazi who was running the editorial office.</p>\n<figure
        class=\"wp-block-image size-full\"><img alt=\"\" class=\"wp-image-6299\" decoding=\"async\"
        height=\"548\" loading=\"lazy\" sizes=\"auto, (max-width: 720px) 100vw, 720px\"
        src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/4D5F2C1A-A3F5-4061-A041-6474B54CBE26-1105-0000015E5F55D4A8_tmp-1-1.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/4D5F2C1A-A3F5-4061-A041-6474B54CBE26-1105-0000015E5F55D4A8_tmp-1-1.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/4D5F2C1A-A3F5-4061-A041-6474B54CBE26-1105-0000015E5F55D4A8_tmp-1-1-300x228.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\">Being a global
        team it''s hard to take photos of everybody in one place, but this photo from
        the AsiaEvo conference includes (L to R): Scott, Jesse, Chris A, Chris H,
        Hongling, Laurie, Mary Ann and Qi.</figcaption></figure>\n<p></p>\n<p>The
        year 2012 has been <a href=\"https://americanlibrariesmagazine.org/2012/04/04/an-academic-spring-updated/\">labelled
        as an \"academic spring\"</a> as it seemed a major turning point shaking up
        the centuries old, stale and untransparent system of scientific discourse.
        With boycotts of the closed-access old guard gathering momentum, influential
        policy papers signalling government moves towards open access, and the launch
        of a new generation of journals that were moving beyond that first important
        step of making published research open access to begin embracing the wider
        principles of Open Science. These included <em>F1000 Research</em>, <em>eLife</em>,
        and <em>PeerJ</em>, and, on the 12th July 2012, <em>GigaScience</em>, <a href=\"https://blogs.biomedcentral.com/bmcblog/2012/07/12/gigascience-launches-overseeing-the-transition-from-papers-to-executable-research-objects/\">launched</a>
        at the ISMB meeting in Long Beach. Every subsequent year we have celebrated
        with <a href=\"https://gigasciencejournal.com/blog/tag/ismb/\">increasingly
        big birthday parties</a> at the conference, and it feels weird we will not
        catch up with our many friends at next one in 2026. We realised our ideas
        about data publishing were timely when I was invited into the offices of one
        of the major publishers to talk about the subject, and the following week
        they emailed our entire Editorial Board to try to recruit them for a remarkably
        similar project they suddenly decided to launch. Amusingly they invited our
        EBM Wang Jun (who was our main backer at BGI) to one of their recruitment
        calls and he got me to attend in his place. When the call started and I surprised
        the publishers I''d just talked to the previous week they were unable to speak
        for several minutes through shock. Imitation being the most sincere form of
        flattery, we are proud to see how most of the major publishers now have data
        journals in their portfolio.</p>\n<figure class=\"wp-block-image size-full\"><img
        alt=\"\" class=\"wp-image-6306\" decoding=\"async\" height=\"832\" loading=\"lazy\"
        sizes=\"auto, (max-width: 720px) 100vw, 720px\" src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_2949.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_2949.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_2949-260x300.jpg
        260w\" width=\"720\"/><figcaption class=\"wp-element-caption\">Chris H and
        Rob cross the \"Frontier Closed Area\" to Yantian Industrial Area and BGI
        HQ</figcaption></figure>\n<p></p>\n<p>Working with the <a href=\"https://doi.org/10.1038/ng.1054\">ISA-Tab</a>,
        Nanopub, and <a href=\"https://www.researchobject.org/\">Research Object</a>
        communities we collaborated and published many <a href=\"https://doi.org/10.1371/journal.pone.0127612\">reproducibility
        case studies</a>, and from this experience I ended up getting involved in
        the reproducibility research space, being one of the authors on the highly
        influential <a href=\"https://doi.org/10.1038/sdata.2016.18\">FAIR Principles
        paper</a>, helped in the drafting of the <a href=\"https://force11.org/group/research-data-publishing-ethics-2/\">COPE-FORCE11
        Data Ethics guidelines</a>, <a href=\"https://gigasciencejournal.com/blog/dome-webinar-on-ml-recommendations/\">collaborating
        with ELIXIR on AI standards</a>, and ended up teaching the first Data Management
        and Curation course at Hong Kong University to MLIM students.</p>\n<figure
        class=\"wp-block-image size-full\"><img alt=\"\" class=\"wp-image-6301\" decoding=\"async\"
        height=\"490\" loading=\"lazy\" sizes=\"auto, (max-width: 720px) 100vw, 720px\"
        src=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_8926.jpg\"
        srcset=\"https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_8926.jpg
        720w, https://gigasciencejournal.com/blog/wp-content/uploads/2025/09/IMG_8926-300x204.jpg
        300w\" width=\"720\"/><figcaption class=\"wp-element-caption\">Visiting (pre-CRISPR
        twin infamy) He Jiankui''s lab at SUSTech with Randy and Meagan from iGEM.
        </figcaption></figure>\n<p><br/><strong>The Establishment Years</strong><br/>Once
        the journal launched we had to fight hard to get submissions in, which is
        especially challenging before you are established and indexed. Through the
        support of our incredible Editorial Board we slowly got many fantastic papers
        in and the journal built momentum and became a success. Indexing is a huge
        challenge for journals, and whilst we eventually achieved very high metrics
        in these we stuck to our <a href=\"https://gigasciencejournal.com/blog/reproducible-research-resources-researching-parasites/\">DORA
        signatory</a> guns and refused to market or <a href=\"https://gigasciencejournal.com/blog/jif_problems/\">list
        them anywhere on our website</a>. Being lean and nimble, and wearing our Open
        Science principles on our sleeves, we experimented and collaborated with many
        of the new Open Science platforms that were launching. Many of these projects
        have now fallen by the wayside, but we were one of the first journals to work
        with <a href=\"https://gigasciencejournal.com/blog/gigascience-making-open-peer-review-more-open-qa-with-publons-co-founder-andrew-preston/\">Publons</a>,
        and second journal to work with <a href=\"https://gigasciencejournal.com/blog/reproducible-research-resources-researching-parasites/\">Protocols.io</a>
        (the first with deep integration). These collaborations have continued to
        the present day, such as recent tie-ins with <a href=\"https://gigasciencejournal.com/blog/cassyni-x-sciety/\">Cassyni
        and Sciety</a>, and I hope this history of experimentation will continue.
        Many of our authors, collaborators and Ed Board Members became great friends,
        allowing us to visit their labs across the world, and also meet many of the
        species we published papers on. A highpoint <a href=\"https://gigasciencejournal.com/blog/community-genomes-from-the-peoples-parrot-to-crowdfernding/\">visiting
        the El Yunque forest breeding facility</a> to see the endangered Puerto Rican
        parrots we published the genome of (thanks Taras!). We also <a href=\"https://gigasciencejournal.com/blog/tag/icg-prize/\">launched
        our own awards</a>, the most important acknowledging and presenting COVID-19
        hero <a href=\"https://gigasciencejournal.com/blog/covid-19-hero-wins-gigascience-prize/\">Zhang
        Yongzhen with a GigaScience prize</a> for sharing the first SARS-CoV2 sequence.</p>\n<figure
        class=\"wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube
        wp-embed-aspect-16-9 wp-has-aspect-ratio\"><div class=\"wp-block-embed__wrapper\">\n<iframe
        allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
        picture-in-picture; web-share\" allowfullscreen=\"\" frameborder=\"0\" height=\"281\"
        loading=\"lazy\" referrerpolicy=\"strict-origin-when-cross-origin\" src=\"https://www.youtube.com/embed/KdG1B6cdg2U?feature=oembed\"
        title=\"ICG GigaScience Prize Presentation to Prof Zhang Yongzhen\" width=\"500\"></iframe>\n</div></figure>\n<p></p>\n<p><strong>Cyber
        Centipedes, Emblematic Genomes and More</strong><br/>Despite having a human
        genetics background, having free reign to get involved in interesting research
        experiments meant I managed to get involved in a wide range of research areas
        I never would have expected. From collaborating with Pensoft to <a href=\"https://gigasciencejournal.com/blog/the-cyber-centipede-giving-online-species-descriptions-a-leg-up/\">publish
        the most data-rich species description</a> of a blind cave centipede, to launching
        our own genome project of Hong Kong''s floral emblem. \u00a0Being based in
        Hong Kong, and <a href=\"https://gigasciencejournal.com/blog/community-genomes-from-the-peoples-parrot-to-crowdfernding/\">inspired</a>
        by the first community funded <a href=\"https://doi.org/10.1186/2047-217X-1-13\">genome
        project of the Puerto Rican parrot</a>, the historical and cultural interest
        of the Hong Kong <em>Bauhinia</em> flower led to our involvement in a community-crowdfunded
        genome project to try to answer some of the questions on the species'' origin
        and unclear parentage. Reaching out directly to the Hong public and launching
        a <a href=\"https://www.scmp.com/magazines/post-magazine/article/1875917/unique-project-sequence-genome-hong-kong-bauhinia-tree\">crowdfunding
        campaign in 2015</a> raised enough money to start the community <a href=\"http://bauhiniagenome.hk/\">Bauhinia
        Genome project</a>. This lead me to leave my comfort zone with <a href=\"https://bauhiniagenome.hk/2016/08/education-education-education-the-reason-for-bauhiniagenome/\">school
        visits</a>, <a href=\"https://bauhiniagenome.hk/2018/04/dna-day-2018-primary-school-genomics/\">teaching
        molecular biology to 7 year olds</a>, <a href=\"https://edition.cnn.com/videos/tv/2016/04/28/on-china-bauhinia-genome-project-natpkg.cnn\">CNN
        interviews</a>, and even a <a href=\"https://www.youtube.com/watch?v=RcBzJI8O4j0\">TEDx
        talk</a>.</p>\n<figure class=\"wp-block-embed is-type-video is-provider-youtube
        wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio\"><div class=\"wp-block-embed__wrapper\">\n<iframe
        allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
        picture-in-picture; web-share\" allowfullscreen=\"\" frameborder=\"0\" height=\"281\"
        loading=\"lazy\" referrerpolicy=\"strict-origin-when-cross-origin\" src=\"https://www.youtube.com/embed/RcBzJI8O4j0?feature=oembed\"
        title=\"Emblematic Education to Know Thy DNA | Scott Edmunds | TEDxEdUHK\"
        width=\"500\"></iframe>\n</div></figure>\n<p>What was most satisfying was
        the <a href=\"https://gigasciencejournal.com/blog/mission-accomplished-for-bauhinia-genome/\">\"mission
        accomplished\" completion</a> of the project this year, with a <a href=\"https://doi.org/10.1093/gigascience/giaf044\">publication
        in <em>GigaScience</em></a> definitively solving the parentage with a complete,
        gapless sequence of the <em>Bauhinia</em> genome, spanning from one end of
        a chromosome to the other. This Citizen Science experience also leading me
        to help co-found and register a Citizen Science NGO in Hong Kong called <a
        href=\"https://citizenscience.asia/\">CitizenScience.Asia</a>.</p>\n<p><strong>The
        Next Phase of Open Science Publishing</strong><br/>In 2017 we moved from publishing
        with BMC to Oxford University Press and the journal continued to flourish,
        <a href=\"https://gigasciencejournal.com/blog/gigascience-prose-award-for-innovation/\">winning
        the 2018 PROSE Award</a> for Innovation in Publishing. We were hungry to do
        more though, feeling our full potential to carry out Open Science was being
        frustrated with the legacy publishing infrastructure, incorporating print-based
        production processes and decades old codebases. No longer being fit for purpose
        in this non-print, online, more data-centric digital age. This lead us to
        team up with <a href=\"https://rivervalleytechnologies.com/\">River Valley
        Technologies</a> in 2020 to <a href=\"https://doi.org/10.46471/gigabyte.1\">launch
        our sister journal <em>GigaByte</em></a><em>:</em> an Open Science journal
        that allows rapid publication using custom-built, XML-first and end-to-end
        publishing technology. Also <a href=\"https://gigasciencejournal.com/blog/gigabyte-kickstarts-gigascience-press/\">allowing
        us to become a press</a>, and handle things like indexing and metadata debugging
        ourselves. This shake-up of our tech platform enabled much cheaper and quicker
        publishing, with accepted manuscripts converted to online and PDF-ready articles
        within a day. Being offered the opportunity to publish and proof papers for
        1/5 the cost and 1/30<sup>th</sup> of the time you''d have to be completely
        stupid to turn that down. Working with Kaveh and Maryam Bazargan from River
        Valley Technologies has been a dream, and the last 5 years have been my most
        productive and enjoyable time at <em>GigaScience. </em>Allowing us to tackle
        final barriers in accessibility and Open Science we''ve always dreamed of
        like <a href=\"https://gigasciencejournal.com/blog/frictionless-data-interactive-figures/\">interactive
        papers</a>, <a href=\"https://gigasciencejournal.com/blog/how-to-publish-multilingual-articles/\">multilingual
        publishing</a>, <a href=\"https://gigasciencejournal.com/blog/peerreviewweek-why-we-need-a-fair-principles-for-peer-review/\">FAIR
        peer review</a>, and making papers much more accessible to humans and machines.</p>\n<figure
        class=\"wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube
        wp-embed-aspect-16-9 wp-has-aspect-ratio\"><div class=\"wp-block-embed__wrapper\">\n<iframe
        allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
        picture-in-picture; web-share\" allowfullscreen=\"\" frameborder=\"0\" height=\"281\"
        loading=\"lazy\" referrerpolicy=\"strict-origin-when-cross-origin\" src=\"https://www.youtube.com/embed/Hno4C0Xh_4k?feature=oembed\"
        title=\"Opening the final barriers in Open Science. Submit your data and software
        to GigaByte.\" width=\"500\"></iframe>\n</div></figure>\n<p></p>\n<p>eLife
        have also been fantastically collaborative in this space, and I would like
        to thank them for the technical support and help they''ve provided over the
        years. Helping us to be the second journal to <a href=\"https://gigasciencejournal.com/blog/gigabyte-executable-research-articles/\">publish
        Executable Research Articles</a> (H/T also Stencila), and building the <a
        href=\"https://sciety.org/\">Sciety platform</a> that has <a href=\"https://gigasciencejournal.com/blog/peer-review-week-2023/\">allowed
        <em>GigaByte</em> to join the ''Publish, Review, Curate'' revolution</a> through
        linking reviews and highlighted editor''s assessments to their mandated linked
        preprints. </p>\n<p>This month we are finalising the <a href=\"https://gigasciencejournal.com/blog/extended-call-and-webinar-for-vectors-of-human-disease-series/\">final
        round of papers</a> from a WHO-sponsored collaboration with GBIF and TDR publishing
        human vector born disease data of extreme importance to public health. This
        has diversified and democratised the <a href=\"https://gigasciencejournal.com/blog/extended-call-and-webinar-for-vectors-of-human-disease-series/\">submission
        base</a> of <em>GigaByte</em> across Africa and Latin America (including submissions
        from Congo, Cuba, and Cabo Verde), also leveraging our multi-lingual functions
        to aid local public health field workers only able to read French, Spanish
        and Portuguese. Ultimately mobilizing new data on over one million vector
        specimens into the GBIF database. It has been nice to end on such a rewarding
        and enjoyable collaboration with GBIF and TDR that has taken me to other unexpected
        destinations, such as carrying out data publishing training in Borneo. It''s
        touching these efforts have also not gone unrecognized by others, with GigaScience
        Press and the platforms we''ve used from River Valley winning many prizes
        such as the 2022 ALPSP Innovation in Publishing Award. This summer <a href=\"https://gigasciencejournal.com/blog/gigascience-press-wins-crossref-metada-award/\">winning
        the 2025 Crossref Excellence in Metadata Award</a>, having been selected from
        nearly 150,000 journals and 22,000 publishers using Crossref infrastructure
        for having the highest metadata completeness in the small publishers category.</p>\n<figure
        class=\"wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube
        wp-embed-aspect-16-9 wp-has-aspect-ratio\"><div class=\"wp-block-embed__wrapper\">\n<iframe
        allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
        picture-in-picture; web-share\" allowfullscreen=\"\" frameborder=\"0\" height=\"281\"
        loading=\"lazy\" referrerpolicy=\"strict-origin-when-cross-origin\" src=\"https://www.youtube.com/embed/yp_pYwb78G4?feature=oembed\"
        title=\"GigaScience Press: An Award-Winning Publisher\" width=\"500\"></iframe>\n</div></figure>\n<p></p>\n<p>Good
        things unfortunately must come to an end, but it''s always good to leave on
        a high. It''s been an absolute privilege to setup and run <em>GigaScience</em>
        for the last 15 years, and I''d like to wish my successors the very best when
        they carry on the Open Science mission. None of this would have been possible
        without my amazing <em>GigaScience</em> team mates, and if anybody is looking
        to employ the greatest team of Editors, Curators and Developers in the business
        please get in touch. This job has taken me places I never imagined when as
        a naive thirty-something I headed Eastward in 2010 with all my belongings
        in a single rucksack. Apologies to the many people I''ve forgotten to thank
        here but this piece is already much too long and you''ll have to wait for
        the extended version in my upcoming memoirs. Thank you to everyone who was
        a part of this journey, and hope to see you on the next one.</p>","doi":"https://doi.org/10.59350/hzfr4-z0881","guid":"https://gigasciencejournal.com/blog/?p=6293","images":[{"height":"478","sizes":"(max-width:
