        of the International AIDS Society"],"published-print":{"date-parts":[[2017,1]]},"abstract":"<jats:title>Abstract<\/jats:title><jats:p><jats:bold>Introduction<\/jats:bold>:
        HIV self\u2010testing (HIVST) is a discreet and convenient way to reach people
        with HIV who do not know their status, including many who may not otherwise
        test. To inform World Health Organization (WHO) guidance, we assessed the
        effect of HIVST on uptake and frequency of testing, as well as identification
        of HIV\u2010positive persons, linkage to care, social harm, and risk behaviour.<\/jats:p><jats:p><jats:bold>Methods<\/jats:bold>:
        We systematically searched for studies comparing HIVST to standard HIV testing
        until 1 June 2016. Meta\u2010analyses of studies reporting comparable outcomes
        were conducted using a random\u2010effects model for relative risks (RR) and
        95% confidence intervals. The quality of evidence was evaluated using GRADE.<\/jats:p><jats:p><jats:bold>Results<\/jats:bold>:
        After screening 638 citations, we identified five randomized controlled trials
        (RCTs) comparing HIVST to standard HIV testing services among 4,145 total
        participants from four countries. All offered free oral\u2010fluid rapid tests
        for HIVST and were among men. Meta\u2010analysis of three RCTs showed HIVST
        doubled uptake of testing among men (RR\u00a0=\u00a02.12; 95% CI: 1.51, 2.98).
        Meta\u2010analysis of two RCTs among men who have sex with men showed frequency
        of testing nearly doubled (Rate ratio\u00a0=\u00a01.88; 95% CI: 1.17; 3.01),
        resulting in two more tests in a 12\u201315\u2010month period (Mean difference\u00a0=\u00a02.13;
        95% CI: 1.59, 2.66). Meta\u2010analysis of two RCTs showed HIVST also doubled
        the likelihood of an HIV\u2010positive diagnosis (RR\u00a0=\u00a02.02; 95%
        CI: 0.37, 10.76, 5.32). Across all RCTs, there was no indication of harm attributable
        to HIVST and potential increases in risk\u2010taking behaviour appeared to
        be minimal.<\/jats:p><jats:p><jats:bold>Conclusions<\/jats:bold>: HIVST is
        associated with increased uptake and frequency of testing in RCTs. Such increases,
        particularly among those at risk who may not otherwise test, will likely identify
        more HIV\u2010positive individuals as compared to standard testing services
        alone. However, further research on how to support linkage to confirmatory
        testing, prevention, treatment and care services is needed. WHO now recommends
        HIVST as an additional HIV testing approach.<\/jats:p>","DOI":"10.7448\/ias.20.1.21594","type":"journal-article","created":{"date-parts":[[2017,5,17]],"date-time":"2017-05-17T21:56:36Z","timestamp":1495058196000},"update-policy":"https:\/\/doi.org\/10.1002\/crossmark_policy","source":"Crossref","is-referenced-by-count":344,"title":["Examining
