        University Press (OUP)","issue":"3","license":[{"start":{"date-parts":[[2000,3,1]],"date-time":"2000-03-01T00:00:00Z","timestamp":951868800000},"content-version":"vor","delay-in-days":0,"URL":"https:\/\/academic.oup.com\/journals\/pages\/open_access\/funder_policies\/chorus\/standard_publication_model"}],"content-domain":{"domain":[],"crossmark-restriction":false},"published-print":{"date-parts":[[2000,3,1]]},"abstract":"<jats:title>Abstract<\/jats:title>\n               <jats:sec>\n                  <jats:title>Background<\/jats:title>\n                  <jats:p>Although
        laparoscopic cholecystectomy (LC) results in less pain than open chole-cystectomy,
        it is not a pain-free procedure. Many methods of analgesia for pain after
        laparoscopy have been evaluated.<\/jats:p>\n               <\/jats:sec>\n               <jats:sec>\n                  <jats:title>Methods<\/jats:title>\n                  <jats:p>Forty-two
        randomized controlled trials assessing interventions to reduce pain after
        LC are reviewed, as are the mechanisms and nature of pain after this procedure.<\/jats:p>\n               <\/jats:sec>\n               <jats:sec>\n                  <jats:title>Results<\/jats:title>\n                  <jats:p>Non-steroidal
        anti-inflammatory drugs, wound local anaesthetic, intraperitoneal local anaesthetic,
        intraperitoneal saline, a gas drain, heated gas, low-pressure gas and nitrous
        oxide pneumo-peritoneum have been shown to reduce pain after LC. The clinical
        significance of this pain reduction is questionable.<\/jats:p>\n               <\/jats:sec>\n               <jats:sec>\n                  <jats:title>Conclusion<\/jats:title>\n                  <jats:p>Pain
        after LC is multifactorial. Although many methods of analgesia produce short-term
        benefit, this does not equate with earlier discharge or improved postoperative
        function. However, single trials evaluating low-pressure insufflation, heated
        gas and multimodal analgesia suggest that clinically relevant benefits can
        be achieved.<\/jats:p>\n               <\/jats:sec>","DOI":"10.1046\/j.1365-2168.2000.01374.x","type":"journal-article","created":{"date-parts":[[2002,7,26]],"date-time":"2002-07-26T10:33:31Z","timestamp":1027679611000},"page":"273-284","source":"Crossref","is-referenced-by-count":202,"title":["Pain
