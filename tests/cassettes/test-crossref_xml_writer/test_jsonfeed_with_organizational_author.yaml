        research as a common good.","doi":"https://doi.org/10.59350/libscie","favicon":"https://rogue-scholar.org/api/communities/8655fbee-45c9-4cd4-9500-f55f85811cee/logo","feed_format":"application/rss+xml","feed_url":"https://libscie.org/rss/","filter":"visibility:public","generator":"Ghost","home_page_url":"https://www.libscie.org/","issn":null,"language":"eng","license":"https://creativecommons.org/licenses/by/4.0/legalcode","prefix":"10.59350","relative_url":null,"secure":true,"slug":"libscie","status":"archived","subfield":"1802","title":"Liberate
        Science","updated":null,"use_api":false},"blog_name":"Liberate Science","blog_slug":"libscie","content_html":"<p>KU
        Leuven is now an inaugural supporting member of ResearchEquals,\nsustaining
        and governing the development of modular publishing.</p>\n<p>As part of their
        commitment to Open Science, KU Leuven supports\nsustainable implementations
        of Open Access and Open Science through the\n<a\nhref=\"https://www.kuleuven.be/open-science/what-is-open-science/scholarly-publishing-and-open-access/open-access-kuleuven/OS-services?ref=libscie.org\">KU\nLeuven
        Fund for Fair OA</a>. The fund is usually only available to\nnon-profits,
        but ResearchEquals'' governance convinced KU Leuven to\nsupport a for-profit
        initiative.</p>\n<p>\"We don''t want to be too rigid in our approach and understand
        that\npublishing or other research infrastructures can work according to\ndifferent
        sustainability models. What matters to us is that, if profits\nare made, they
        are reinvested in the academic community and that\nresearchers remain firmly
        in control.\" Demmy Verbeke said.</p>\n<p>Supporting members help sustain
        operations and receive additional\ngovernance rights for <a\nhref=\"https://researchequals.com/?ref=libscie.org\">ResearchEquals</a>.\nThese
        rights include the option to participate in quarterly assemblies,\nstrategy
        and decision making processes, the power to block acquisitions,\nand to request
        more information around business operations. As a result,\nsupporting members
        shape how ResearchEquals evolves. Individuals can\nbecome supporting members
        for 79.99 euro''s per year. Institutions can\nbecome supporting members for
        a yearly contribution of at least 2500\neuro''s.</p>\n<p>ResearchEquals is
        an open source, open access publishing platform for\nresearch modules. ResearchEquals
        realized the first modular publishing\nplatform (launched February 1st, 2022),
        which revolves around sharing\nthe research process, step by step, instead
        of only the final\nreport.</p>\n<p>\"It is great to see KU Leuven support
        generative projects, regardless\nof whether they are for-profit or not\" Chris
        Hartgerink said.</p>\n<p>KU Leuven is one of the first institutional supporting
        members of\nResearchEquals.</p>\n<hr />\n<p>KU Leuven is one of the largest
        universities in Belgium, with a\nstrong commitment to open access and open
        science. Demmy Verbeke and\nLaura Mesotten manage the Fund for Fair OA of
        KU Leuven Libraries.</p>\n<p>Liberate Science GmbH (est. 2019) cultivates
        alternative publishing\nformats that work for researchers everywhere. ResearchEquals
        is a\nLiberate Science GmbH project. For more information view the <a\nhref=\"https://www.researchequals.com/supporting-member?ref=libscie.org\">supporting\nmember
        page</a> or contact CEO Chris Hartgerink (<a\nhref=\"mailto:ceo@libscie.org\">ceo@libscie.org</a>).</p>","doi":"https://doi.org/10.59350/2shz7-ehx26","guid":"6446a54e261a1e6be45d3764","image":"https://libscie.org/content/images/2023/04/thank-you-1-.jpg","language":"en","license":"https://creativecommons.org/licenses/by/4.0/legalcode","published_at":1683590400,"rid":"7tzqm-vcp96","summary":"KU
        Leuven is now an inaugural supporting member of ResearchEquals, sustaining
        and governing the development of modular publishing. As part of their commitment
        to Open Science, KU Leuven supports sustainable implementations of Open Access
        and Open Science through the KU Leuven Fund for Fair OA. The fund is usually
        only available to non-profits, but ResearchEquals'' governance convinced KU
        Leuven to support a for-profit initiative.","tags":["ResearchEquals"],"title":"KU
        Leuven supports ResearchEquals","updated_at":1744584362,"url":"https://libscie.org/ku-leuven-supports-researchequals"}

