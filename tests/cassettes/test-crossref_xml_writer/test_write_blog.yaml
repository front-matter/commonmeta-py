        Rogue Scholar science blog archive started work on improving the subject classification
        of blog posts, using an open approach to subject classification developed
        by CWTS and OpenAlex.","title":"Rogue Scholar is improving subject classification","updated_at":1780857106,"url":"https://blog.front-matter.de/posts/rogue-scholar-improving-subject-classificatiion/"},{"doi":"https://doi.org/10.53731/xm5m2-3j810","guid":"https://doi.org/10.53731/xm5m2-3j810","published_at":1763510400,"summary":"Yesterday
        I renamed the Front Matter blog to blog.front-matter.de, i.e. changing the
        top-level domain from .io to .de. I did this for two reasons: * The internet
        country code top-level domain .io has a complicated history, and I wanted
        to migrate away from it for some time.","title":"Renaming the Front Matter
        Blog","updated_at":1780857108,"url":"https://blog.front-matter.de/posts/renaming-the-front-matter-blog/"},{"doi":"https://doi.org/10.53731/rftfk-qv692","guid":"https://doi.org/10.53731/rftfk-qv692","published_at":1762128000,"summary":"The
        science blog archive Rogue Scholar started the process of becoming a German
        non-profit organization in 2026. This blog post summarizes the reasoning and
        the main steps needed to achieve this. Two weeks ago, I published a self-assessment
        of how Rogue Scholar adheres to the Principles of Open Scholarly Infrastructure
        (POSI). Major gaps were identified in the areas of governance and sustainability.","title":"Rogue
        Scholar is becoming a German Non-Profit Organization","updated_at":1780857109,"url":"https://blog.front-matter.de/posts/rogue-scholar-german-non-profit-organization/"},{"doi":"https://doi.org/10.53731/d0wwa-gwz14","guid":"https://doi.org/10.53731/d0wwa-gwz14","published_at":1761868800,"summary":"This
        is the October issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users. Blogs added to Rogue Scholar
        Ten blogs were added in September. Welcome! More blogs are on the waitlist
        and will be added soon.","title":"Rogue Scholar Newsletter October 2025","updated_at":1780857110,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-october-2025/"},{"doi":"https://doi.org/10.53731/9t6xx-kht30","guid":"https://doi.org/10.53731/9t6xx-kht30","published_at":1761523200,"summary":"This
        week the Rogue Scholar science blog archive has launched a new feature: contributor
        roles. Blog posts can now have contributor roles attached to each author,
        and this information is shown in the Rogue Scholar and Crossref metadata.
        We have discussed contributor roles for blog posts for several months, in
        particular with the rOpenSci team.","title":"Supporting blog contributions
        beyond authorship","updated_at":1780857112,"url":"https://blog.front-matter.de/posts/supporting-blog-contributions-beyond-authorship/"},{"doi":"https://doi.org/10.53731/m65a8-6sm21","guid":"https://doi.org/10.53731/m65a8-6sm21","published_at":1760918400,"summary":"With
        this blog post, the science blog archive Rogue Scholar starts the formal process
        to adhere to the Principles of Open Scholarly Infrastructure (POSI). To do
        so, an organization has to perform a self-audit of its compliance with the
        principles, with a focus on principles and not hard rules. POSI was updated
        to version 2.0 this October, with the changes marked up in a separate document.","title":"Rogue
        Scholar follows the Principles of Open Scholarly Infrastructure (POSI)","updated_at":1780857113,"url":"https://blog.front-matter.de/posts/rogue-scholar-follows-posi/"},{"doi":"https://doi.org/10.53731/kzg6q-mes47","guid":"https://doi.org/10.53731/kzg6q-mes47","published_at":1759363200,"summary":"This
        is the September issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users. Blogs added to Rogue Scholar
        One blog was added in September. Welcome!","title":"Rogue Scholar Newsletter
        September 2025","updated_at":1780857115,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-september-2025/"},{"doi":"https://doi.org/10.53731/nxp08-a9947","guid":"https://doi.org/10.53731/nxp08-a9947","published_at":1759104000,"summary":"The
        science blog archive Rogue Scholar this week started supporting versioning
        of blog posts. This is a core feature of the InvenioRDM repository platform
        used by Rogue Scholar, but Rogue Scholar uses DOIs from Crossref rather than
        DataCite, the default DOI registration agency for InvenioRDM. Crossref versioning
        was made possible with the Crossref schema 5.4.0 released in March.","title":"Rogue
        Scholar starts supporting versioning","updated_at":1780857116,"url":"https://blog.front-matter.de/posts/rogue-scholar-starts-supporting-versioning/"},{"doi":"https://doi.org/10.53731/taha2-fvd76","guid":"https://doi.org/10.53731/taha2-fvd76","published_at":1758672000,"summary":"On
        April 16, 2025, the Rogue Scholar Advisory Board met for the third time since
        it started in January 2024. Since the last Advisory Board Meeting on October
        24, Rogue Scholar has achieved several important milestones.","title":"Report
        Rogue Scholar Advisory Board Meeting April 16, 2025","updated_at":1780857118,"url":"https://blog.front-matter.de/posts/report-rogue-scholar-advisory-board-meeting-ap-16-2024/"},{"doi":"https://doi.org/10.53731/pk03d-24338","guid":"https://doi.org/10.53731/pk03d-24338","published_at":1757548800,"summary":"This
        week, the Rogue Scholar science blog archive started registering DOIs and
        metadata with Crossref using the InvenioRDM repository platform rather than
        relying on external tooling. InvenioRDM has of course supported DOI registration
        with DataCite for a long time, so this adds another option for repositories
        hosting reports, preprints, dissertations, or other textual documents.","title":"Rogue
        Scholar now registers DOIs with InvenioRDM","updated_at":1780857119,"url":"https://blog.front-matter.de/posts/rogue-scholar-registers-dois-with-inveniordm/"},{"doi":"https://doi.org/10.53731/1xbh4-mnt50","guid":"https://doi.org/10.53731/1xbh4-mnt50","published_at":1756684800,"summary":"This
        is the August issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users. Blogs added to Rogue Scholar
        Three blogs were added in August, with a few more in progress, requiring additional
        work. Welcome everybody!","title":"Rogue Scholar Newsletter August 2025","updated_at":1780857121,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-august-2025/"},{"doi":"https://doi.org/10.53731/326tr-95k32","guid":"https://doi.org/10.53731/326tr-95k32","published_at":1756080000,"summary":"References
        are an important element of scholarly metadata, and that is also true for
        science blog posts. Currently 5.06% of all Rogue Scholar posts include at
        least one reference, which are then registered with Crossref metadata. Citations
        are the counterpart of references. When other scholarly works are cited in
        the references of a scholarly work, this citation information can be communicated
        to the cited work.","title":"Adding references to Wordpress posts: updated
        kcite plugin","updated_at":1780857123,"url":"https://blog.front-matter.de/posts/adding-references-to-wordpress-posts-updated-kcite-plugin/"},{"doi":"https://doi.org/10.53731/yjq4w-5yr32","guid":"https://doi.org/10.53731/yjq4w-5yr32","published_at":1755475200,"summary":"The
        Rogue Scholar science blog archive has supported ORCID and DOI identifiers
        for linking to authors and blog posts since its launch. Starting this week,
        these two identifiers can also be used to navigate within the Rogue Scholar
        archive.","title":"Rogue Scholar links records via ORCID and DOI","updated_at":1780857124,"url":"https://blog.front-matter.de/posts/rogue-scholar-links-records-via-orcid-and-doi/"},{"doi":"https://doi.org/10.53731/qkhhf-jnr10","guid":"https://doi.org/10.53731/qkhhf-jnr10","published_at":1754956800,"summary":"The
        Rogue Scholar science blog archive has introduced authentication with passkeys
        and will disable local accounts on September 15. Reading Rogue Scholar content
        has always been free and never required user accounts or cookie permissions.
        This is true both for web and API usage.","title":"Rogue Scholar moves beyond
        passwords","updated_at":1780857126,"url":"https://blog.front-matter.de/posts/rogue-scholar-moves-beyond-passwords/"},{"doi":"https://doi.org/10.53731/zyg15-qv911","guid":"https://doi.org/10.53731/zyg15-qv911","published_at":1754265600,"summary":"The
        Rogue Scholar science blog archive uses DOIs to uniquely identify blog posts
        with meaningful metadata. This enables tracking citations of scholar blog
        posts in the scholarly literature using traditional citation tracking methods
        rather than altmetrics. Initially launched as a Rogue Scholar service six
        months ago, citation tracking has launched to production this week.","title":"Rogue
        Scholar citation tracking launches to production","updated_at":1780857127,"url":"https://blog.front-matter.de/posts/citation-tracking-launches-to-production/"},{"doi":"https://doi.org/10.53731/eh0m8-aca27","guid":"https://doi.org/10.53731/eh0m8-aca27","published_at":1753920000,"summary":"This
        is the July issue of the monthly newsletter from the Rogue Scholar\u00a0science
        blog archive. The newsletter reports on new blogs that have joined the platform,
        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users. Blogs added to Rogue Scholar
        Thirteen blogs have been added in July, making it one of the busiest months
        yet for Rogue Scholar. Welcome everybody!","title":"Rogue Scholar Newsletter
        July 2025","updated_at":1780857129,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-july-2025/"},{"doi":"https://doi.org/10.53731/jeatk-t8t07","guid":"https://doi.org/10.53731/jeatk-t8t07","published_at":1753833600,"summary":"This
        week the Rogue Scholar science blog archive has received two important updates:
        full-text search becomes the default search configuration, and blog authors
        can now self-manage basic settings of their Rogue Scholar blog community.
        Full-text search as default Rogue Scholar has long supported full-text search
        of all its content.","title":"Rogue Scholar Updates: full-text search as default
        and basic blog self-management","updated_at":1780857130,"url":"https://blog.front-matter.de/posts/rogue-scholar-updates-full-text-search-blog-self-management/"},{"doi":"https://doi.org/10.53731/8dg89-gnc10","guid":"https://doi.org/10.53731/8dg89-gnc10","published_at":1753228800,"summary":"The
