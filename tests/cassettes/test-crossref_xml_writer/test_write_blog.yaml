        Scholar uses the community functionality of the InvenioRDM repository platform
        to manage science blogs and their associated blog posts. In the community
        settings one can configure basic metadata such as blog name, description,
        logo and URL.","title":"Rogue Scholar improves blog self-management","updated_at":1780857085,"url":"https://blog.front-matter.de/posts/rogue-scholar-improves-blog-self-management/"},{"doi":"https://doi.org/10.53731/809xc-y7r79","guid":"https://doi.org/10.53731/809xc-y7r79","published_at":1774483200,"summary":"About
        12 months ago Rogue Scholar introduced dashboards with summary statistics
        of the science blogging archive. At the end of 2025 these dashboards migrated
        to the Rogue Scholar landing page. Today Rogue Scholar is launching community
        dashboards \u2013 showing the same summary statistics by community.","title":"Introducing
        Rogue Scholar community dashboards","updated_at":1780857086,"url":"https://blog.front-matter.de/posts/introducing-rogue-scholar-community-dashboards/"},{"doi":"https://doi.org/10.53731/3w24g-cdz85","guid":"https://doi.org/10.53731/3w24g-cdz85","published_at":1773619200,"summary":"Running
        scholarly infrastructure such as Rogue Scholar beyond the initial launch phase
        \u2013 what is typically called Day 2 operations\u00a0\u2013 requires the
        following activities:monitoringincident managementmaintenance and updatesscaling
        As Rogue Scholar is self-hosted infrastructure the natural fit for these activities
        is self-hosted observability frameworks.","title":"Increasing operational
        transparency in Rogue Scholar","updated_at":1780857088,"url":"https://blog.front-matter.de/posts/increasing-operational-transparency/"},{"doi":"https://doi.org/10.53731/9swze-jr923","guid":"https://doi.org/10.53731/9swze-jr923","published_at":1772668800,"summary":"This
