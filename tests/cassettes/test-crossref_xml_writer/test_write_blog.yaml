        science blogs participating in the Rogue Scholar science blog archive provide
        a feed (in RSS, Atom or JSON Feed format) that includes not only metadata
        and full-text content for all archived blog posts, but also metadata about
        the blog itself.","title":"Rogue Scholar starts to register blog DOIs","updated_at":1780857080,"url":"https://blog.front-matter.de/posts/rogue-scholar-starts-to-register-blog-dois/"},{"doi":"https://doi.org/10.53731/yaq8z-te090","guid":"https://doi.org/10.53731/yaq8z-te090","published_at":1775520000,"summary":"Rogue
