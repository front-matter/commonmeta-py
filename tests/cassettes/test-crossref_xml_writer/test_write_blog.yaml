        most digital infrastructure nowadays, Rogue Scholar and the underlying digital
        repository platform InvenioRDM are built and deployed using Docker containers.
        There are many ways to orchestrate (manage) Docker containers; two common
        options are Docker Compose for local development and Kubernetes for production
        infrastructure.","title":"Rogue Scholar migrated to Coolify Cloud","updated_at":1780857096,"url":"https://blog.front-matter.de/posts/rogue-scholar-migrated-coolify-cloud/"},{"doi":"https://doi.org/10.53731/tb8z7-7ft90","guid":"https://doi.org/10.53731/tb8z7-7ft90","published_at":1768435200,"summary":"The
        Rogue Scholar science blog archive consolidated authentication into a single
        Identity and Access Management (IAM) service, powered by a self-hosted\u00a0Keycloak\u00a0instance,
        by the end of last year. This week, this service started supporting passwordless
        authentication via magic links.","title":"Rogue Scholar now supports passwordless
        authentication with magic links","updated_at":1780857098,"url":"https://blog.front-matter.de/posts/rogue-scholar-now-supports-passwordless-authentication-with-magic-links/"},{"doi":"https://doi.org/10.53731/s7y9a-es04","guid":"https://doi.org/10.53731/s7y9a-es04","published_at":1767830400,"summary":"This
