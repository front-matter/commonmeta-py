        important technical updates in Rogue Scholar infrastructure, community updates,
        and other news relevant to Rogue Scholar users.","title":"Rogue Scholar Newsletter
        December 2025","updated_at":1780857099,"url":"https://blog.front-matter.de/posts/rogue-scholar-newsletter-december-2025/"},{"doi":"https://doi.org/10.53731/gvb08-7kc16","guid":"https://doi.org/","published_at":1767398400,"summary":"We
        refactored the R-universe CI workflows to make it possible to run the exact
        same workflow from your own GitHub repository. This allows you to test or
        debug the build and check process on your R package, exactly as it will happen
        on R-universe, but without actually deploying to https://r-universe.dev.","title":"Testing
