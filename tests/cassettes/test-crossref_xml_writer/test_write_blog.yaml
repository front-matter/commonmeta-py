        the Rogue Scholar science blog archive is launching an OPML file export of
        all active blogs. OPML is the standard export format for blog feeds and includes
        the blog category and feed URL \u2013 Rogue Scholar uses the OpenAlex subject
        area subfield as category.","title":"Launching the Rogue Scholar Feed OPML
        file and Feed Reader","updated_at":1780857078,"url":"https://blog.front-matter.de/posts/launching-the-rogue-scholar-feed-opml-file-and-feed-reader/"},{"doi":"https://doi.org/10.53731/p5aym-fhj14","guid":"https://doi.org/10.53731/p5aym-fhj14","published_at":1778630400,"summary":"Blogs
