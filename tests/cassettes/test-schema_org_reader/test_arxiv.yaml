        mathjax\">\n            <span class=\"descriptor\">Abstract:</span>In this
        paper, we analyse the current availability of open citations data in one particular
        dataset, namely COCI (the OpenCitations Index of Crossref open DOI-to-DOI
        citations; <a href=\"http://opencitations.net/index/coci\" rel=\"external
        noopener nofollow\" class=\"link-external link-http\">this http URL</a>) provided
        by OpenCitations. The results of these analyses show a persistent gap in the
        coverage of the currently available open citation data. In order to address
        this specific issue, we propose a strategy whereby the community (e.g. scholars
        and publishers) can directly involve themselves in crowdsourcing open citations,
        by uploading their citation data via the OpenCitations infrastructure into
        our new index, CROCI, the Crowdsourced Open Citations Index.\n    </blockquote>\n\n
