        class=\"content\" id=\"genesis-content\"><article class=\"post-27452 post
        type-post status-publish format-standard category-blog category-orcid-news
        tag-annual-report tag-orcid-community-town-hall tag-orcid-highlights entry\"
        aria-label=\"Now Available: ORCID&#8217;s 2023 Annual Report\"><header class=\"entry-header\"><h1
        class=\"entry-title\">Now Available: ORCID&#8217;s 2023 Annual Report</h1>\n<p
        class=\"entry-meta\"><time class=\"entry-time\">March 12, 2024</time> By <span
        class=\"entry-author\" itemprop=\"author\" itemscope itemtype=\"https://schema.org/Person\"><a
        href=\"https://info.orcid.org/author/orcid/\" class=\"entry-author-link\"
        rel=\"author\" itemprop=\"url\" data-wpel-link=\"internal\"><span class=\"entry-author-name\"
        itemprop=\"name\">ORCID</span></a></span> </p></header><div class=\"entry-content\"><div
        class=\"wp-block-image\">\n<figure class=\"alignright size-large is-resized\"><a
        href=\"https://doi.org/10.23640/07243.25134752.v1\" target=\"_blank\" rel=\"noreferrer
        noopener nofollow external\" data-wpel-link=\"external\"><img decoding=\"async\"
        width=\"791\" height=\"1024\" src=\"https://info.orcid.org/wp-content/uploads/2024/03/20240307ORCIDAnnualReport-791x1024.png\"
        alt=\"cover of orcid's 2023 annual report. colors are green and orange, text
        reads: ORCID, connecting research and researchers. 2023 Annual Report\" class=\"wp-image-27453\"
        style=\"width:316px;height:auto\" srcset=\"https://info.orcid.org/wp-content/uploads/2024/03/20240307ORCIDAnnualReport-791x1024.png
        791w, https://info.orcid.org/wp-content/uploads/2024/03/20240307ORCIDAnnualReport-232x300.png
        232w, https://info.orcid.org/wp-content/uploads/2024/03/20240307ORCIDAnnualReport-768x994.png
        768w, https://info.orcid.org/wp-content/uploads/2024/03/20240307ORCIDAnnualReport.png
        936w\" sizes=\"(max-width: 791px) 100vw, 791px\" /></a></figure>\n</div>\n\n\n<p
        class=\"wp-block-paragraph\">We are pleased to invite you to explore the <a
        href=\"https://doi.org/10.23640/07243.25134752.v1\" target=\"_blank\" rel=\"noreferrer
        noopener nofollow external\" data-wpel-link=\"external\">ORCID 2023 Annual
        Report</a>!</p>\n\n\n\n<p class=\"wp-block-paragraph\">2023 was the second
        full year of our current strategic plan, <a href=\"https://doi.org/10.23640/07243.16687207.v1\"
        data-wpel-link=\"external\" target=\"_blank\" rel=\"nofollow external noopener
        noreferrer\"><em>From Vision to Value: ORCID\u2019s 2022\u20132025 Strategic
        Plan</em></a>, and we\u2019re really starting to see the cumulative effects
        of the efforts we\u2019ve made toward the four priorities we defined when
        we published it back in 2021:&nbsp;</p>\n\n\n\n<ol class=\"wp-block-list\">\n<li>Increasing
        Value to Members</li>\n\n\n\n<li>Increasing Value to Researchers</li>\n\n\n\n<li>Increasing
        Global Participation</li>\n\n\n\n<li>Upholding Trust and Integrity</li>\n</ol>\n\n\n\n<p
        class=\"wp-block-paragraph\">In addition, in 2023 we added a fifth theme:</p>\n\n\n\n<p
        class=\"wp-block-paragraph\">\_\_\_\_\_5. Improving Staff Experience</p>\n\n\n\n<p
        class=\"wp-block-paragraph\">The central thesis of ORCID\u2019s current strategic
        plan is that by building stakeholder commitment to and engagement with ORCID,
        we will in turn create more value for researchers and members alike and drive
        further participation by (AND benefit to!) other stakeholders, perpetuating
        global adoption and reuse of ORCID data across the research ecosystem. To
        state this more simply, the more fully populated, sufficiently complete ORCID
        records and integrated systems there are, the more value that all stakeholders
        can gain from participating in ORCID.&nbsp;</p>\n\n\n\n<p class=\"wp-block-paragraph\">We
        invite you to explore our <a href=\"https://doi.org/10.23640/07243.25134752.v1\"
        target=\"_blank\" rel=\"noreferrer noopener nofollow external\" data-wpel-link=\"external\">Annual
        Report for 2023</a> and learn more about how we moved closer to our strategic
        goals, and to celebrate with us how support from our member organizations
        helped us to build on researcher delight, enable valuable connections, expand
        our global connections, and continue our maturation as an organization.</p>\n\n\n\n<p
        class=\"wp-block-paragraph\">There is still time to register for our upcoming
        <a href=\"https://info.orcid.org/event/orcid-community-town-hall-2/\" target=\"_blank\"
        rel=\"noreferrer noopener\" data-wpel-link=\"internal\">ORCID Community Town
        Hall</a> on 20 March. We invite you to join us while we share the progress
        we made in 2023 and give a special preview of our plans for 2024.\_ As always,
        there will be plenty of opportunity for you to engage with us: to provide
        feedback, make suggestions, and ask questions.</p>\n\n                \n                    <!--begin
        code -->\n\n                    \n                    <div class=\"pp-multiple-authors-boxes-wrapper
