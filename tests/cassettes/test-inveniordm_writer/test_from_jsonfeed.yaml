        href=\"https://twitter.com/DingemanseMark/status/1405488247057391616\">June
        17, 2021</a>.</em></p>\n\n\n\n<p></p>","doi":"https://doi.org/10.59350/dn2mm-m9q51","guid":"https://ideophone.org/?p=5639","image":"https://ideophone.org/files/E4FEkLuWUAI6IwO-696x1024.png","images":[{"src":"https://pbs.twimg.com/media/E4FDxONXwAMFvCh.png"},{"height":"1024","sizes":"auto,
