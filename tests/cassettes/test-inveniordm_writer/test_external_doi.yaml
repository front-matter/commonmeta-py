        welcher rechtlichen Grundlage? Wie sieht es aus mit der Beteiligung des Personals
        an diesen Prozessen?</p>\n<p>An der TIB \u2013 Leibniz-Informationszentrum
        Technik und Naturwissenschaften und Universit\u00e4tsbibliothek wurden diese
        Fragen gestellt und unter Beteiligung der Datenschutzbeauftragten und des
